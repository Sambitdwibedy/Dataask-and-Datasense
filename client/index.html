                            border: `1px solid ${progress.metadata_discovery.extracted_entries > 0 ? 'rgba(34, 197, 94, 0.2)' : 'var(--border)'}`,
                            fontSize: '13px', display: 'flex', alignItems: 'center', gap: '10px'
                        }}>
                            <Icon name={progress.metadata_discovery.extracted_entries > 0 ? 'Database' : 'Search'} size={16} />
                            <span>
                                <strong>Metadata Discovery:</strong>{' '}
                                {progress.metadata_discovery.extracted_entries > 0 ? (
                                    <span style={{ color: '#22c55e' }}>
                                        Found {progress.metadata_discovery.confirmed} metadata table{progress.metadata_discovery.confirmed !== 1 ? 's' : ''} — extracted {progress.metadata_discovery.extracted_entries} field descriptions (auto-injected into enrichment context)
                                    </span>
                                ) : progress.metadata_discovery.candidates > 0 ? (
                                    <span>{progress.metadata_discovery.candidates} candidate table{progress.metadata_discovery.candidates !== 1 ? 's' : ''} found but no extractable metadata</span>
                                ) : (
                                    <span style={{ color: 'var(--text-dim)' }}>No self-describing metadata tables detected in this schema</span>
                                )}
                            </span>
                        </div>
                    )}

                    {/* Stage cards */}
                    <div style={{ display: 'flex', gap: '8px', marginBottom: '20px', overflowX: 'auto', paddingBottom: '12px' }}>
                        {PIPELINE_STAGES.map((stage) => {
                            const status = getStageStatus(stage.id);
                            const stageData = stages[stage.id] || {};
                            return (
                                <div key={stage.id} className={`pipeline-stage ${status === 'running' || status === 'awaiting_approval' ? 'active' : ''}`}
                                    style={{ opacity: status === 'pending' ? 0.5 : 1 }}>
                                    <div className="stage-icon">
                                        {status === 'completed' ? <Icon name="CheckCircle" size={20} /> :
                                         status === 'running' ? <Icon name="Clock" size={20} /> :
                                         status === 'awaiting_approval' ? <Icon name="ShieldAlert" size={20} /> :
                                         status === 'skipped' ? <Icon name="SkipForward" size={20} /> :
                                         status === 'cancelled' ? <Icon name="Square" size={20} /> :
                                         status === 'failed' ? <Icon name="AlertTriangle" size={20} /> :
                                         <Icon name={stage.icon} size={20} />}
                                    </div>
                                    <div className="stage-name">{stage.name}</div>
                                    <div style={{ fontSize: '10px', color: 'var(--text-dim)', marginTop: '2px', lineHeight: '1.3' }}>{stage.desc}</div>
                                    <div className="stage-meta">
                                        <span className={`badge ${getStageBadge(status)}`}>
                                            {status === 'awaiting_approval' ? 'approval needed' : status}
                                        </span>
                                    </div>
                                    {stageData.duration_ms && (
                                        <div style={{ fontSize: '11px', color: 'var(--text-dim)', marginTop: '4px' }}>
                                            {formatDuration(stageData.duration_ms)}
                                        </div>
                                    )}
                                    {stageData.error && (
                                        <div style={{ fontSize: '10px', color: '#ef4444', marginTop: '4px', lineHeight: '1.3', maxWidth: '140px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}
                                            title={stageData.error}>
                                            {stageData.error}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    {/* QPD Seeding Results — shows after validate stage completes */}
                    {progress.qpd_results && !progress.qpd_results.skipped && !progress.qpd_results.error && (
                        <div style={{
                            marginBottom: '16px', padding: '12px 16px', borderRadius: '8px',
                            background: 'rgba(139, 92, 246, 0.06)', border: '1px solid rgba(139, 92, 246, 0.2)',
                            fontSize: '13px', display: 'flex', alignItems: 'center', gap: '10px'
                        }}>
                            <Icon name="Sparkles" size={16} />
                            <span>
                                <strong>QPD Seeding:</strong>{' '}
                                <span style={{ color: '#22c55e' }}>
                                    {progress.qpd_results.seeded} verified patterns
                                </span>{' '}
                                from {progress.qpd_results.entities} business objects
                                ({progress.qpd_results.total_questions} questions tested
                                {progress.qpd_results.failed > 0 && <span>, <span style={{ color: '#ef4444' }}>{progress.qpd_results.failed} failed</span></span>})
                            </span>
                        </div>
                    )}
                    {progress.qpd_results?.error && (
                        <div style={{
                            marginBottom: '16px', padding: '12px 16px', borderRadius: '8px',
                            background: 'rgba(239, 68, 68, 0.06)', border: '1px solid rgba(239, 68, 68, 0.2)',
                            fontSize: '13px', display: 'flex', alignItems: 'center', gap: '10px'
                        }}>
                            <Icon name="AlertTriangle" size={16} />
                            <span><strong>QPD Seeding:</strong> Non-fatal error — {progress.qpd_results.error}</span>
                        </div>
                    )}

                    {/* Context Coach Panel — shows after enrichment completes */}
                    {!isRunning && pipelineStatus?.stages?.enrich?.status === 'completed' && (
                        <ContextCoachPanel appId={appId} refreshKey={runCompleteCount} onReenrich={(run) => {
                            if (run) {
                                // Pipeline auto-started — update state to show progress
                                const stages = typeof run.stages === 'string' ? JSON.parse(run.stages) : run.stages;
                                wasRunningRef.current = true;
                                setIsRunning(true);
                                setPipelineStatus({ status: 'running', stages: stages, progress: {} });
                            }
                        }} onNavigate={onNavigate} />
                    )}

                    {/* Run history */}
                    <div className="header-bar">Pipeline History</div>
                    {history.length === 0 ? (
                        <div style={{ padding: '20px', color: 'var(--text-dim)', textAlign: 'center' }}>
                            No pipeline runs yet. Click "Run Pipeline" to start enrichment.
                        </div>
                    ) : (
                        <table className="data-grid">
                            <thead>
                                <tr>
                                    <th>Run</th>
                                    <th>Status</th>
                                    <th>Triggered By</th>
                                    <th>Started</th>
                                    <th>Completed</th>
                                </tr>
                            </thead>
                            <tbody>
                                {history.map(run => {
                                    const runStages = typeof run.stages === 'string' ? JSON.parse(run.stages) : (run.stages || {});
                                    const failedStages = Object.entries(runStages).filter(([k, v]) => v.error);
                                    const hasErrors = run.status === 'failed' && failedStages.length > 0;
                                    return (
                                        <React.Fragment key={run.id}>
                                            <tr>
                                                <td>#{run.id}</td>
                                                <td>
                                                    <span className={`badge ${run.status === 'completed' ? 'badge-green' : run.status === 'running' ? 'badge-orange' : run.status === 'failed' ? 'badge-orange' : run.status === 'cancelled' ? 'badge-blue' : 'badge-blue'}`}>
                                                        {run.status}
                                                    </span>
                                                </td>
                                                <td>{run.triggered_by_name || '-'}</td>
                                                <td>{run.started_at ? new Date(run.started_at).toLocaleString() : '-'}</td>
                                                <td>{run.completed_at ? new Date(run.completed_at).toLocaleString() : '-'}</td>
                                            </tr>
                                            {hasErrors && (
                                                <tr>
                                                    <td colSpan={5} style={{ padding: '0 12px 8px' }}>
                                                        <details style={{ fontSize: '12px' }}>
                                                            <summary style={{ cursor: 'pointer', color: '#ef4444', fontWeight: 600, padding: '4px 0' }}>
                                                                View failure details ({failedStages.length} stage{failedStages.length !== 1 ? 's' : ''})
                                                            </summary>
                                                            <div style={{ padding: '6px 0' }}>
                                                                {failedStages.map(([name, stage]) => (
                                                                    <div key={name} style={{
                                                                        padding: '6px 10px', marginTop: '4px', borderRadius: '4px',
                                                                        background: 'rgba(239, 68, 68, 0.06)', border: '1px solid rgba(239, 68, 68, 0.1)',
                                                                    }}>
                                                                        <span style={{ fontWeight: 600, color: '#ef4444' }}>{name}:</span>{' '}
                                                                        <span style={{ fontFamily: 'monospace', fontSize: '11px', color: 'var(--text-dim)', wordBreak: 'break-word' }}>
                                                                            {stage.error}
                                                                        </span>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </details>
                                                    </td>
                                                </tr>
                                            )}
                                        </React.Fragment>
                                    );
                                })}
                            </tbody>
                        </table>
                    )}
                </>
            );
        };

        // ── Profile Review ──────────────────────────────────────────
        const ProfileReview = ({ appId }) => {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [expandedTable, setExpandedTable] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => {
                const fetchProfile = async () => {
                    if (!appId) return;
                    setLoading(true);
                    const result = await api.get(`/pipeline/${appId}/profile-review`);
                    if (result) setData(result);
                    setLoading(false);
                };
                fetchProfile();
            }, [appId]);

            if (loading) return (<div style={{ padding: '40px', textAlign: 'center', color: 'var(--text-dim)' }}>Loading profile data...</div>);
            if (!data) return (<div style={{ padding: '40px', textAlign: 'center', color: 'var(--text-dim)' }}>No profile data available. Run Profile & Classify first.</div>);

            const { summary, tables, columns } = data;
            const filteredTables = tables.filter(t =>
                (t.entityName || t.tableName || '').toLowerCase().includes(searchTerm.toLowerCase())
            );

            const expandedColumns = expandedTable
                ? columns.filter(c => c.tableId === expandedTable)
                : [];

            return (
                <>
                    <h2 style={{ marginBottom: '20px' }}>Profile Review</h2>

                    {/* Summary stats row */}
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: '12px', marginBottom: '24px' }}>
                        {[
                            { label: 'Tables', value: summary.totalTables, sub: `${summary.emptyTables} empty` },
                            { label: 'Columns', value: summary.totalColumns, sub: `${summary.profiledColumns} profiled` },
                            { label: 'Date Columns', value: summary.dateColumns },
                            { label: 'Low-Cardinality', value: summary.lowCardColumns },
                            { label: 'Primary Keys', value: summary.pkColumns },
                            { label: 'Foreign Keys', value: summary.fkColumns },
                        ].map((s, i) => (
                            <div key={i} style={{
                                background: 'var(--card-bg, #1a1a2e)', border: '1px solid var(--border, #2a2a4a)',
                                borderRadius: '8px', padding: '14px 16px', textAlign: 'center'
                            }}>
                                <div style={{ fontSize: '24px', fontWeight: 700, color: 'var(--accent, #4fc3f7)' }}>{s.value}</div>
                                <div style={{ fontSize: '12px', color: 'var(--text-dim, #8888aa)', marginTop: '4px' }}>{s.label}</div>
                                {s.sub && <div style={{ fontSize: '11px', color: 'var(--text-dim, #8888aa)', marginTop: '2px' }}>({s.sub})</div>}
                            </div>
                        ))}
                    </div>

                    {/* Distribution row */}
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px', marginBottom: '24px' }}>
                        {/* Data type distribution */}
                        <div style={{ background: 'var(--card-bg, #1a1a2e)', border: '1px solid var(--border, #2a2a4a)', borderRadius: '8px', padding: '16px' }}>
                            <div style={{ fontWeight: 600, marginBottom: '10px', fontSize: '14px' }}>Data Type Distribution</div>
                            {Object.entries(summary.typeDistribution || {}).sort((a, b) => b[1] - a[1]).map(([type, count]) => (
                                <div key={type} style={{ display: 'flex', justifyContent: 'space-between', padding: '3px 0', fontSize: '13px' }}>
                                    <span style={{ color: 'var(--text-dim)' }}>{type}</span>
                                    <span style={{ fontWeight: 600 }}>{count}</span>
                                </div>
                            ))}
                        </div>
                        {/* Table size distribution */}
                        <div style={{ background: 'var(--card-bg, #1a1a2e)', border: '1px solid var(--border, #2a2a4a)', borderRadius: '8px', padding: '16px' }}>
                            <div style={{ fontWeight: 600, marginBottom: '10px', fontSize: '14px' }}>Table Size Distribution</div>
                            {Object.entries(summary.sizeDistribution || {}).map(([range, count]) => (
                                <div key={range} style={{ display: 'flex', justifyContent: 'space-between', padding: '3px 0', fontSize: '13px' }}>
                                    <span style={{ color: 'var(--text-dim)' }}>{range}</span>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                        <div style={{ width: `${Math.max(4, (count / summary.totalTables) * 120)}px`, height: '8px', background: 'var(--accent, #4fc3f7)', borderRadius: '4px' }}></div>
                                        <span style={{ fontWeight: 600, minWidth: '24px', textAlign: 'right' }}>{count}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Table list with expand-to-columns */}
                    <div className="toolbar">
                        <input
                            type="text"
                            placeholder="Search tables..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            className="search-input"
                        />
                        <span style={{ color: 'var(--text-dim)', fontSize: '13px', marginLeft: '12px' }}>
                            {filteredTables.length} of {tables.length} tables
                        </span>
                    </div>

                    <div style={{ maxHeight: '500px', overflowY: 'auto' }}>
                        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '13px' }}>
                            <thead>
                                <tr style={{ borderBottom: '1px solid var(--border, #2a2a4a)', textAlign: 'left' }}>
                                    <th style={{ padding: '8px 10px' }}>Table</th>
                                    <th style={{ padding: '8px 10px', textAlign: 'right' }}>Rows</th>
                                    <th style={{ padding: '8px 10px', textAlign: 'right' }}>Columns</th>
                                    <th style={{ padding: '8px 10px', textAlign: 'right' }}>Profiled</th>
                                    <th style={{ padding: '8px 10px', textAlign: 'right' }}>Date</th>
                                    <th style={{ padding: '8px 10px', textAlign: 'right' }}>Low-Card</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredTables.map(t => (
                                    <React.Fragment key={t.id}>
                                        <tr
                                            onClick={() => setExpandedTable(expandedTable === t.id ? null : t.id)}
                                            style={{
                                                cursor: 'pointer',
                                                borderBottom: '1px solid var(--border, #2a2a4a)',
                                                background: expandedTable === t.id ? 'rgba(79,195,247,0.08)' : 'transparent',
                                                color: t.isEmpty ? 'var(--text-dim, #8888aa)' : 'inherit',
                                            }}
                                        >
                                            <td style={{ padding: '8px 10px' }}>
                                                <span style={{ marginRight: '6px', fontSize: '10px', color: 'var(--text-dim)' }}>{expandedTable === t.id ? '▼' : '▶'}</span>
                                                {t.entityName || t.tableName}
                                                {t.isEmpty && <span style={{ marginLeft: '6px', fontSize: '10px', padding: '1px 5px', background: 'rgba(255,152,0,0.15)', color: '#ffb74d', borderRadius: '4px' }}>empty</span>}
                                            </td>
                                            <td style={{ padding: '8px 10px', textAlign: 'right' }}>{(t.rowCount || 0).toLocaleString()}</td>
                                            <td style={{ padding: '8px 10px', textAlign: 'right' }}>{t.columnCount}</td>
                                            <td style={{ padding: '8px 10px', textAlign: 'right' }}>{t.profiledColumns}</td>
                                            <td style={{ padding: '8px 10px', textAlign: 'right' }}>{t.dateColumns}</td>
                                            <td style={{ padding: '8px 10px', textAlign: 'right' }}>{t.lowCardColumns}</td>
                                        </tr>
                                        {expandedTable === t.id && expandedColumns.length > 0 && (
                                            <tr>
                                                <td colSpan={6} style={{ padding: '0 10px 12px 30px', background: 'rgba(79,195,247,0.04)' }}>
                                                    <table style={{ width: '100%', fontSize: '12px', borderCollapse: 'collapse', marginTop: '6px' }}>
                                                        <thead>
                                                            <tr style={{ color: 'var(--text-dim)', borderBottom: '1px solid var(--border, #2a2a4a)' }}>
                                                                <th style={{ padding: '4px 6px', textAlign: 'left' }}>Column</th>
                                                                <th style={{ padding: '4px 6px', textAlign: 'left' }}>Type</th>
                                                                <th style={{ padding: '4px 6px', textAlign: 'center' }}>PK</th>
                                                                <th style={{ padding: '4px 6px', textAlign: 'center' }}>FK</th>
                                                                <th style={{ padding: '4px 6px', textAlign: 'left' }}>Values</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {expandedColumns.map(c => (
                                                                <tr key={c.id} style={{ borderBottom: '1px solid var(--border, #1a1a3a)' }}>
                                                                    <td style={{ padding: '4px 6px' }}>{c.columnName}</td>
                                                                    <td style={{ padding: '4px 6px', color: 'var(--text-dim)' }}>{c.dataType}</td>
                                                                    <td style={{ padding: '4px 6px', textAlign: 'center' }}>{c.isPk ? '🔑' : ''}</td>
                                                                    <td style={{ padding: '4px 6px', textAlign: 'center' }}>{c.isFk ? '🔗' : ''}</td>
                                                                    <td style={{ padding: '4px 6px', color: 'var(--text-dim)', maxWidth: '300px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                                                                        {c.hasValueMap ? c.valueMapPreview : '—'}
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </td>
                                            </tr>
                                        )}
                                    </React.Fragment>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </>
            );
        };

        const SchemaExplorer = ({ appId }) => {
            const [tables, setTables] = useState([]);
            const [columns, setColumns] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedTable, setSelectedTable] = useState(null);
            const [selectedColumn, setSelectedColumn] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchTables = async () => {
                    if (!appId) return;
                    setLoading(true);
                    const data = await api.get(`/schema/${appId}/tables`);
                    if (data && data.tables) {
                        setTables(data.tables);
                        if (data.tables.length > 0) {
                            handleSelectTable(data.tables[0]);
                        }
                    }
                    setLoading(false);
                };
                fetchTables();
            }, [appId]);

            const handleSelectTable = async (table) => {
                setSelectedTable(table);
                setSelectedColumn(null);
                const data = await api.get(`/schema/${appId}/tables/${table.id}/columns`);
                if (data && data.columns) {
                    setColumns(data.columns.map(col => ({
                        id: col.id,
                        tableName: table.entity_name || table.table_name,
                        name: col.column_name,
                        dataType: col.data_type,
                        businessName: col.business_name || '',
                        description: col.description || '',
                        status: col.enrichment_status || 'draft',
                        confidence: col.confidence_score || 0,
                        isPk: col.is_pk,
                        isFk: col.is_fk
                    })));
                }
            };

            const filteredTables = tables.filter(t =>
                (t.entity_name || t.table_name || '').toLowerCase().includes(searchTerm.toLowerCase())
            );

            return (
                <>
                    <h2 style={{ marginBottom: '20px' }}>Schema Explorer</h2>

                    <div className="toolbar">
                        <input
                            type="text"
                            placeholder="Search tables..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            className="search-input"
                        />
                        <span style={{ color: 'var(--text-dim)', fontSize: '13px', marginLeft: '12px' }}>
                            {tables.length} tables {selectedTable && `· ${columns.length} columns in ${selectedTable.entity_name || selectedTable.table_name}`}
                        </span>
                    </div>

                    <div className="two-column">
                        <div>
                            <div className="header-bar">Tables ({filteredTables.length})</div>
                            <ul className="review-queue" style={{ maxHeight: '600px', overflowY: 'auto' }}>
                                {filteredTables.map(table => (
                                    <li key={table.id}
                                        className={`review-item ${selectedTable && selectedTable.id === table.id ? 'active' : ''}`}
                                        onClick={() => handleSelectTable(table)}
                                        style={{
                                            cursor: 'pointer',

                    {selectedColumn && (
