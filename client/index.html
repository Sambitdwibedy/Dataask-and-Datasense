                                            <details style={{ marginTop: '12px' }}>
                                                <summary style={{ cursor: 'pointer', fontSize: '13px', color: 'var(--accent)', fontWeight: 600 }}>
                                                    Top tables by row count
                                                </summary>
                                                <div style={{ maxHeight: '200px', overflowY: 'auto', marginTop: '8px' }}>
                                                    {currentResult.topTables.map((t, i) => (
                                                        <div key={i} style={{ fontSize: '12px', fontFamily: 'monospace', padding: '4px 0', display: 'flex', justifyContent: 'space-between', maxWidth: '400px' }}>
                                                            <span style={{ color: 'var(--text-primary)' }}>{t.table_name}</span>
                                                            <span style={{ color: 'var(--text-dim)' }}>{parseInt(t.row_count).toLocaleString()} rows</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </details>
                                        )}

                                        {/* Error message */}
                                        {currentResult.error && (
                                            <div style={{ marginTop: '12px', padding: '10px', background: 'rgba(239,68,68,0.08)', borderRadius: '6px',
                                                fontSize: '13px', color: '#ef4444', fontFamily: 'monospace' }}>
                                                {currentResult.error}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* Navigation: Previous / Next */}
                                <div style={{ display: 'flex', justifyContent: 'space-between', paddingTop: '16px', borderTop: '1px solid var(--border)' }}>
                                    <button
                                        onClick={() => { setActiveStep(STEPS[activeIdx - 1]?.key); setStepResult(null); }}
                                        disabled={activeIdx <= 0}
                                        style={{
                                            padding: '8px 18px', borderRadius: '6px', border: '1px solid var(--border)',
                                            background: 'var(--bg-surface2)', color: activeIdx > 0 ? 'var(--text-primary)' : 'var(--text-dim)',
                                            cursor: activeIdx > 0 ? 'pointer' : 'default', fontSize: '13px', fontWeight: 500,
                                            opacity: activeIdx > 0 ? 1 : 0.5,
                                        }}
                                    >
                                        ← Previous Step
                                    </button>
                                    <button
                                        onClick={() => { setActiveStep(STEPS[activeIdx + 1]?.key); setStepResult(null); }}
                                        disabled={activeIdx >= STEPS.length - 1}
                                        style={{
                                            padding: '8px 18px', borderRadius: '6px', border: 'none',
                                            background: activeIdx < STEPS.length - 1 ? 'var(--accent)' : 'var(--bg-surface2)',
                                            color: activeIdx < STEPS.length - 1 ? 'white' : 'var(--text-dim)',
                                            cursor: activeIdx < STEPS.length - 1 ? 'pointer' : 'default', fontSize: '13px', fontWeight: 600,
                                            opacity: activeIdx < STEPS.length - 1 ? 1 : 0.5,
                                        }}
                                    >
                                        Next Step →
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const Settings = ({ appId }) => {
            const [activeTab, setActiveTab] = useState('app');
            const [users, setUsers] = useState([
                { id: 1, email: 'mark@solix.com', role: 'Admin' },
                { id: 2, email: 'john@solix.com', role: 'Curator' }
            ]);
            const [newUserEmail, setNewUserEmail] = useState('');
            const [newUserRole, setNewUserRole] = useState('Curator');

            // App settings state
            const [appName, setAppName] = useState('');
            const [appDesc, setAppDesc] = useState('');
            const [appConfig, setAppConfig] = useState({});
            const [saving, setSaving] = useState(false);
            const [saveMsg, setSaveMsg] = useState('');

            // Pipeline config with defaults
            const [pipelineConfig, setPipelineConfig] = useState({
                parallel_concurrency: 8,
                batch_column_threshold: 8,
                batch_max_columns: 30,
                sample_row_count: 10,
                auto_approve_threshold: 90,
                review_threshold: 60,
                enable_auto_enrichment: true
            });

            // Voice assistant settings (stored in localStorage, not server)
            const [voiceSettings, setVoiceSettings] = useState({
                enabled: isVoiceEnabled(),
                assistantName: getAssistantName(),
                voice: (() => { try { return localStorage.getItem('claudia_voice') || 'nova'; } catch { return 'nova'; } })(),
            });
            const saveVoiceSetting = (key, value) => {
                setVoiceSettings(prev => ({ ...prev, [key]: value }));
                try {
                    if (key === 'enabled') localStorage.setItem('voice_enabled', value ? 'true' : 'false');
                    if (key === 'assistantName') localStorage.setItem('assistant_name', value);
                    if (key === 'voice') localStorage.setItem('claudia_voice', value);
                } catch {}
            };

            // Query engine config with defaults
            const [queryEngineConfig, setQueryEngineConfig] = useState({
                model: 'claude-sonnet-4-20250514',
                show_token_cost: true,
                show_sql_details: true,
                schema_link_threshold: 15,
                column_link_threshold: 20,
                auto_seed_qpd: true,
                max_seed_questions_per_entity: 5
            });

            // Load app data on mount
            useEffect(() => {
                if (!appId) return;
                const loadApp = async () => {
                    try {
                        const data = await api.get(`/applications/${appId}`);
                        const app = data.application;
                        setAppName(app.name || '');
                        setAppDesc(app.description || '');
                        const cfg = app.config || {};
                        setAppConfig(cfg);
                        // Merge saved pipeline config with defaults
                        setPipelineConfig(prev => ({
                            ...prev,
                            ...(cfg.pipeline || {})
                        }));
                        // Merge saved query engine config with defaults
                        setQueryEngineConfig(prev => ({
                            ...prev,
                            ...(cfg.query_engine || {})
                        }));
                    } catch (err) {
                        console.error('Failed to load app settings:', err);
                    }
                };
                loadApp();
            }, [appId]);

            const handleAddUser = () => {
                if (newUserEmail) {
                    setUsers([...users, { id: users.length + 1, email: newUserEmail, role: newUserRole }]);
                    setNewUserEmail('');
                }
            };

            const showSaveSuccess = (msg) => {
                setSaveMsg(msg);
                setTimeout(() => setSaveMsg(''), 3000);
            };

            const handleSaveApp = async () => {
                setSaving(true);
                try {
                    await api.put(`/applications/${appId}`, { name: appName, description: appDesc });
                    showSaveSuccess('Application settings saved.');
                } catch (err) {
                    alert('Failed to save: ' + err.message);
                } finally {
                    setSaving(false);
                }
            };

            const handleSavePipeline = async () => {
                setSaving(true);
                try {
                    const newConfig = { ...appConfig, pipeline: pipelineConfig };
                    await api.put(`/applications/${appId}`, { config: newConfig });
                    setAppConfig(newConfig);
                    showSaveSuccess('Pipeline settings saved.');
                } catch (err) {
                    alert('Failed to save: ' + err.message);
                } finally {
                    setSaving(false);
                }
            };

            const updatePipeline = (key, value) => {
                setPipelineConfig(prev => ({ ...prev, [key]: value }));
            };

            const updateQueryEngine = (key, value) => {
                setQueryEngineConfig(prev => ({ ...prev, [key]: value }));
            };

            const handleSaveQueryEngine = async () => {
                setSaving(true);
                try {
                    const newConfig = { ...appConfig, query_engine: queryEngineConfig };
                    await api.put(`/applications/${appId}`, { config: newConfig });
                    setAppConfig(newConfig);
                    showSaveSuccess('Query engine settings saved.');

        // IDA CHART COMPONENT — ported from OEBS prototype with smart column classification
        // =====================================================
        const CHART_COLORS = ['#6366f1', '#22c55e', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#ec4899', '#14b8a6', '#f97316', '#a855f7'];

        // Smart column analysis — ported from OEBS prototype
        // Classifies columns by scanning actual data: date patterns checked FIRST so years aren't treated as numbers
        function analyzeColumnsForChart(rows, columns, getDisplayName) {
            const colInfo = columns.map(colName => {
                let numericCount = 0, stringCount = 0, dateCount = 0;
                const uniqueVals = new Set();
                for (const row of rows) {
                    const v = row[colName];
                    if (v == null) continue;
                    uniqueVals.add(String(v));
                    const sv = String(v).trim();
                    // Check date/year patterns FIRST — "1993", "2025-03", "Q1 2024" must be date, not numeric
                    if (/^\d{4}$/.test(sv) && parseInt(sv) >= 1900 && parseInt(sv) <= 2100) {
                        dateCount++; // Year values like 1993, 2024
                    } else if (/^\d{4}[-/]\d{1,2}([-/]\d{1,2})?$/.test(sv) || /^\d{1,2}[-/]\d{1,2}[-/]\d{2,4}$/.test(sv) || /Q[1-4]\s*\d{4}/i.test(sv) || /^\d{4}\s*Q[1-4]/i.test(sv) || /^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)/i.test(sv)) {
                        dateCount++;
                    } else if (typeof v === 'number' || (typeof v === 'string' && !isNaN(parseFloat(v)) && /^[\d,.\-+$%]+$/.test(sv))) {
                        numericCount++;
                    } else {
                        stringCount++;
                    }
                }
                const total = rows.length;
                const type = dateCount > total * 0.5 ? 'date' : numericCount > total * 0.7 ? 'numeric' : 'string';
                return { name: colName, displayName: getDisplayName(colName), type, uniqueCount: uniqueVals.size };
            });

            const labelCols = colInfo.filter(c => c.type === 'string' || c.type === 'date');
            const valueCols = colInfo.filter(c => c.type === 'numeric');
            if (valueCols.length === 0) return null;

            // Smart label column selection — priority: date-typed > time-named > most unique values
            let labelCol = null;
            if (labelCols.length > 0) {
                const timePattern = /year|month|quarter|week|date|period|day|time|yr|mth|qtr|fy|fiscal/i;
                const dateCols = labelCols.filter(c => c.type === 'date');
                const timeNamedCols = labelCols.filter(c => timePattern.test(c.name));
                if (dateCols.length > 0) labelCol = dateCols[0];
                else if (timeNamedCols.length > 0) labelCol = timeNamedCols[0];
                else labelCol = labelCols.reduce((best, c) => c.uniqueCount > best.uniqueCount ? c : best, labelCols[0]);
            }

            const hasTimeLabels = labelCol && (labelCol.type === 'date' || /year|month|quarter|week|date|period/i.test(labelCol.name));
            const fewCategories = labelCol && labelCol.uniqueCount <= 8;
            let suggestedTypes;
            if (hasTimeLabels) suggestedTypes = ['line', 'bar'];
            else if (fewCategories && valueCols.length === 1) suggestedTypes = ['bar', 'pie', 'doughnut'];
            else if (valueCols.length > 1) suggestedTypes = ['bar', 'line'];
            else suggestedTypes = ['bar', 'line'];

            return { labelCol, valueCols, suggestedTypes, defaultType: suggestedTypes[0] || 'bar' };
        }

        const IDAChart = ({ rows, columns, getDisplayName, msgIdx }) => {
            const canvasRef = React.useRef(null);
            const chartRef = React.useRef(null);
            const analysis = React.useMemo(() => analyzeColumnsForChart(rows, columns, getDisplayName), [rows, columns]);
            const [chartType, setChartType] = React.useState(analysis ? analysis.defaultType : 'bar');

            React.useEffect(() => {
                if (!canvasRef.current || !analysis) return;
                const ChartJS = window.Chart;
                if (!ChartJS) { console.warn('Chart.js not loaded'); return; }

                const rafId = requestAnimationFrame(() => {
                    if (!canvasRef.current) return;
                    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }

                    const container = canvasRef.current.parentElement;
                    if (container) {
                        canvasRef.current.width = container.clientWidth;
                        canvasRef.current.height = container.clientHeight;
                    }

                    const { labelCol, valueCols } = analysis;
                    const displayRows = rows.slice(0, 50);
                    const labels = labelCol
                        ? displayRows.map(r => r[labelCol.name] != null ? String(r[labelCol.name]) : '')
                        : displayRows.map((_, idx) => `Row ${idx + 1}`);
                    const displayLabels = labels.map(l => l.length > 25 ? l.substring(0, 22) + '...' : l);

                    const isPie = chartType === 'pie' || chartType === 'doughnut';
                    const datasets = [];

                    if (isPie && valueCols.length === 1) {
                        const vc = valueCols[0];
                        datasets.push({
                            label: vc.displayName,
                            data: displayRows.map(r => { const v = r[vc.name]; return v != null ? (typeof v === 'number' ? v : parseFloat(String(v).replace(/[,$%]/g, '')) || 0) : 0; }),
                            backgroundColor: CHART_COLORS.slice(0, displayRows.length),
                            borderColor: '#1a1d27', borderWidth: 2
                        });
                    } else {
                        valueCols.forEach((vc, ci) => {
                            datasets.push({
                                label: vc.displayName,
                                data: displayRows.map(r => { const v = r[vc.name]; return v != null ? (typeof v === 'number' ? v : parseFloat(String(v).replace(/[,$%]/g, '')) || 0) : 0; }),
                                backgroundColor: isPie ? CHART_COLORS.slice(0, displayRows.length) : CHART_COLORS[ci % CHART_COLORS.length] + '88',
                                borderColor: CHART_COLORS[ci % CHART_COLORS.length],
                                borderWidth: 2, tension: 0.3, fill: false
                            });
                        });
                    }

                    try {
                        chartRef.current = new ChartJS(canvasRef.current.getContext('2d'), {
                            type: chartType,
                            data: { labels: displayLabels, datasets },
                            options: {
                                responsive: true, maintainAspectRatio: false,
                                animation: { duration: 400 },
                                plugins: {
                                    legend: { display: datasets.length > 1 || isPie, position: isPie ? 'right' : 'top', labels: { color: '#9294a0', font: { size: 11 }, padding: 12 } },
                                    tooltip: {
                                        backgroundColor: '#242736', borderColor: '#2e3144', borderWidth: 1, titleColor: '#e4e4e7', bodyColor: '#e4e4e7', padding: 10,
                                        callbacks: {
                                            label: function(ctx) {
                                                let val = ctx.parsed.y !== undefined ? ctx.parsed.y : ctx.parsed;
                                                return `${ctx.dataset.label}: ${typeof val === 'number' ? val.toLocaleString() : val}`;
                                            }
                                        }
                                    }
                                },
                                scales: isPie ? {} : {
                                    x: { ticks: { color: '#9294a0', font: { size: 10 }, maxRotation: 45 }, grid: { color: 'rgba(46,49,68,0.4)' } },
                                    y: { ticks: { color: '#9294a0', font: { size: 10 }, callback: function(val) { return val.toLocaleString(); } }, grid: { color: 'rgba(46,49,68,0.4)' } }
                                }
                            }
                        });
                    } catch (chartErr) {
                        console.error('Chart.js render error:', chartErr);
                    }
                });

                return () => {
                    cancelAnimationFrame(rafId);
                    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
                };
            }, [chartType, rows, analysis]);

            if (!analysis) return null;

            return (
                <div style={{ marginTop: '8px' }}>
                    <div style={{ display: 'flex', gap: '4px', marginBottom: '8px', alignItems: 'center' }}>
                        {analysis.suggestedTypes.map(t => (
                            <button key={t} onClick={() => setChartType(t)}
                                style={{ background: chartType === t ? 'var(--accent)' : 'transparent', color: chartType === t ? '#fff' : 'var(--text-dim)', border: '1px solid var(--border)', borderRadius: '4px', padding: '2px 10px', cursor: 'pointer', fontSize: '11px', textTransform: 'capitalize' }}>
                                {t}
                            </button>
                        ))}
                        {analysis.labelCol && (
                            <span style={{ marginLeft: '8px', fontSize: '10px', color: 'var(--text-dim)' }}>
                                {analysis.valueCols.map(v => v.displayName).join(', ')} by {analysis.labelCol.displayName}
                            </span>
                        )}
                    </div>
                    <div style={{ height: '280px', position: 'relative' }}>
                        <canvas ref={canvasRef} />
                    </div>
                </div>
            );
        };

        // =====================================================
        // END-USER IDA INTERFACE
        // =====================================================
        const IDAInterface = ({ user, onLogout, onOpenGraphViewer }) => {
            const [apps, setApps] = useState([]);
            const [selectedApp, setSelectedApp] = useState(null);
            const [query, setQuery] = useState('');
            const [messages, setMessages] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [history, setHistory] = useState([]);
            const [showHistory, setShowHistory] = useState(false);
            const [sampleQuestions, setSampleQuestions] = useState([]);
            const [userMenuOpen, setUserMenuOpen] = useState(false);
            // IMPORTANT: all useState hooks must be here (before early returns) to maintain hook order
            const [sidebarTab, setSidebarTab] = useState('examples');
            const [idaSidebarOpen, setIdaSidebarOpen] = useState(true);
            const [exampleDomainFilter, setExampleDomainFilter] = useState('All');
            // Workspace model state
            const [workspaces, setWorkspaces] = useState([]);
            const [selectedWorkspace, setSelectedWorkspace] = useState(null);
            const [workspaceSwitcherOpen, setWorkspaceSwitcherOpen] = useState(false);
            const [theme, setTheme] = useState(window.__idaTheme || 'dark');
            const toggleTheme = () => {
                const next = theme === 'dark' ? 'light' : 'dark';
                setTheme(next);
                window.__setIdaTheme(next);
            };
            const messagesEndRef = useRef(null);
            // New state for advanced features
            const [showChart, setShowChart] = useState({});
            const [copiedMsgIdx, setCopiedMsgIdx] = useState(null);
            const [tablePages, setTablePages] = useState({});  // { msgIndex: pageNumber }
            const TABLE_PAGE_SIZE = 50;
            const [showDevPanel, setShowDevPanel] = useState(false);
            const [showKGViewer, setShowKGViewer] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [showQueryCatalog, setShowQueryCatalog] = useState(false);
            const [devPanelTab, setDevPanelTab] = useState('sql');
            const [devSql, setDevSql] = useState('');
            const [devResults, setDevResults] = useState(null);
            const [devLog, setDevLog] = useState([]);
            const [kgTableData, setKgTableData] = useState([]);
            const [kgRelationshipData, setKgRelationshipData] = useState([]);
            const [qpdData, setQpdData] = useState([]);
            const [domainInfo, setDomainInfo] = useState([]);
            // Slot-based disambiguation state
            const [pendingSlotSelections, setPendingSlotSelections] = useState({});
            const [disambiguationOriginalQuery, setDisambiguationOriginalQuery] = useState('');
            const disambiguationAttemptRef = useRef(0); // Tracks disambiguation rounds to prevent loops

            // Voice mode state
            const [voiceMode, setVoiceMode] = useState(false);
            const [interimTranscript, setInterimTranscript] = useState('');
            const voiceHandleAskRef = useRef(null); // ref to handleAsk for voice callback
            const voiceStartListeningRef = useRef(null); // ref for auto-listen after disambiguation

            // Claudia Conversation Router state
            const [conversationHistory, setConversationHistory] = useState([]); // {role: 'user'|'claudia', text: '...'}
            const [conversing, setConversing] = useState(false); // true while waiting for /converse response
            const converseHandlerRef = useRef(null); // ref to handleConverse
            const sessionRequestCountRef = useRef(0);  // how many queries answered this session
            const sessionIdleTimerRef = useRef(null);   // idle timeout handle
            const pendingQueriesRef = useRef([]);        // queued queries waiting for batch execution
            const deferredInputRef = useRef(null);       // input received during executing phase — process after results
            // Conversation phase: 'greeting' → 'collecting' → 'executing' → 'reviewing' → 'farewell'
            const conversationPhaseRef = useRef('greeting');
            const SESSION_IDLE_TIMEOUT_MS = 45000;      // 45s of silence ends session

            const voiceOutput = useVoiceOutput();

            const voiceInput = useVoiceInput({
                onResult: (transcript) => {
                    setInterimTranscript('');
                    // In voice mode, route through Claudia conversation handler
                    if (voiceMode && converseHandlerRef.current) {
                        converseHandlerRef.current(transcript);
                    } else if (voiceHandleAskRef.current) {
                        voiceHandleAskRef.current(transcript);
                    }
                },
                onInterim: (transcript) => {
                    setInterimTranscript(transcript);
                },
            });

            // Keep startListening ref current so onComplete callbacks never get stale closures
            voiceStartListeningRef.current = voiceInput.startListening;

            // Pre-warm mic when user selects an app — this triggers getUserMedia (and the
            // macOS mic chime) BEFORE the user clicks the mic button. By the time they want
            // to talk, the stream is already active and startListening is instant (no delay, no chime).
            useEffect(() => {
                if (selectedApp && voiceInput.supported) {
                    voiceInput.prewarmMic();
                }
            }, [selectedApp]);

            // ── ECHO SUPPRESSION ──
            // Abort STT whenever TTS starts playing to prevent the mic from picking up
            // Katy's own voice and feeding it back as user input.
            // Uses abortListening (not stopListening) to avoid re-delivering already-sent text.
            // The mic only restarts via explicit autoListen() callbacks after TTS finishes.
            useEffect(() => {
                if (voiceOutput.speaking && voiceInput.listening) {
                    console.log('[Voice] Echo guard — aborting STT while TTS is playing');
                    voiceInput.abortListening();
                    setInterimTranscript('');
                }
            }, [voiceOutput.speaking]);

            // Fetch workspaces (new model) and published apps (backward compat)
            useEffect(() => {
                const fetchWorkspacesAndApps = async () => {
                    // Try workspace model first
                    try {
                        const wsData = await api.get('/workspaces');
                        if (wsData && wsData.workspaces && wsData.workspaces.length > 0) {
                            setWorkspaces(wsData.workspaces);
                            // Auto-select default workspace (or first)
                            const defaultWs = wsData.workspaces.find(w => w.is_default) || wsData.workspaces[0];
                            if (defaultWs) {
                                setSelectedWorkspace(defaultWs);
                                if (defaultWs.app_id) setSelectedApp(String(defaultWs.app_id));
                            }
                        }
                    } catch (wsErr) {
                        console.log('[IDA] Workspace fetch failed (may not be migrated yet):', wsErr.message);
                    }
                    // Also fetch published apps (backward compat + enrichment)
                    const data = await api.get('/applications/published/list');
                    if (data && data.applications) setApps(data.applications);
                };
                fetchWorkspacesAndApps();
            }, []);

            // Fetch sample questions, history, domains, KG data when app changes
            useEffect(() => {
                if (!selectedApp) return;
                const fetchSamples = async () => {
                    const data = await api.get(`/schema/${selectedApp}/tables`);
                    if (data && data.tables) {
                        const qs = [];
                        const domainMap = {};
                        data.tables.forEach(t => {
                            const meta = typeof t.entity_metadata === 'string' ? JSON.parse(t.entity_metadata || '{}') : (t.entity_metadata || {});
                            const domain = meta.domain || meta.module || 'General';
                            if (meta.sample_questions) {
                                meta.sample_questions.forEach(q => qs.push({ question: q, table: t.entity_name || t.table_name, domain }));
                            }
                            // Group tables by domain/module
                            if (!domainMap[domain]) domainMap[domain] = [];
                            domainMap[domain].push(t.entity_name || t.table_name);
                        });
                        // Load ALL questions — domain filtering happens in the UI
                        setSampleQuestions(qs);
                        // Build domain info
                        const domainList = Object.entries(domainMap).map(([name, tables]) => ({
                            name,
                            tableCount: tables.length,
                            tables,
                            description: `${tables.length} tables in ${name} domain`
                        }));
                        setDomainInfo(domainList);
                        setKgTableData(data.tables || []);
                    }
                };
                const fetchHistory = async () => {
                    const data = await api.get(`/test/${selectedApp}/query-history`);
                    if (data && data.queries) setHistory(data.queries);
                };
                const fetchRelationships = async () => {
                    const data = await api.get(`/schema/${selectedApp}/relationships`);
                    if (data && data.relationships) setKgRelationshipData(data.relationships);
                };
                const fetchQPD = async () => {
                    const data = await api.get(`/test/${selectedApp}/qpd-status`);
                    if (data && data.qpd_results) setQpdData(data.qpd_results);
                };
                fetchSamples();
                fetchHistory();
                fetchRelationships();
                fetchQPD();
                setMessages([]);
            }, [selectedApp]);

            // Scroll to show the latest message — find the last user message bubble and scroll it into view
            // so the question + response are visible, not scrolled past
            useEffect(() => {
                if (messages.length === 0) return;
                const lastMsg = messages[messages.length - 1];
                if (lastMsg.role === 'user') {
                    // User just asked — scroll to bottom to show loading indicator
                    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
                } else {
                    // Response arrived — scroll to the start of the user's question so both are visible
                    const chatArea = messagesEndRef.current?.parentElement;
                    if (chatArea) {
                        const msgElements = chatArea.querySelectorAll('[data-msg-idx]');
                        // Find the last user message element (the question that triggered this response)
                        const userIdx = messages.length - 2; // user msg is one before the response
                        const targetEl = chatArea.querySelector(`[data-msg-idx="${userIdx}"]`);
                        if (targetEl) {
                            targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        } else {
                            messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
                        }
                    }
                }
            }, [messages]);

            // Close workspace switcher on outside click
            useEffect(() => {
                const handleClick = (e) => { if (!e.target.closest('.ws-switcher')) setWorkspaceSwitcherOpen(false); };
                document.addEventListener('click', handleClick);
                return () => document.removeEventListener('click', handleClick);
            }, []);

            // Handle workspace switch
            const handleWorkspaceSwitch = (ws) => {
                setSelectedWorkspace(ws);
                if (ws.app_id) setSelectedApp(String(ws.app_id));
                else setSelectedApp(null);
                setMessages([]);
                setHistory([]);
                setSampleQuestions([]);
                setKgTableData([]);
                setKgRelationshipData([]);
                setDomainInfo([]);
                setWorkspaceSwitcherOpen(false);
            };

            const handleAsk = async (questionOverride) => {
                const q = questionOverride || query;
                if (!q.trim() || !selectedApp) return;
                setQuery('');
                setIsLoading(true);

                // Add user message
                const userMsg = { role: 'user', content: q, timestamp: new Date() };
                setMessages(prev => [...prev, userMsg]);

                try {
                    // Intent classification is now handled by /api/ask (intent-router).
                    // The old /test/{appId}/classify endpoint is bypassed — it was designed for
                    // structured-only queries and triggers false disambiguation on hybrid questions.
                    // /api/ask returns CLARIFY intent for genuinely vague questions.
                    console.log('[IDA] Routing directly to /api/ask (unified intent classification)');

                    {
                        // Step 2: Route through unified /api/ask (handles STRUCTURED, UNSTRUCTURED, HYBRID)
                        const askPayload = { question: q };
                        if (selectedWorkspace) askPayload.workspaceId = selectedWorkspace.id;
                        else askPayload.appId = parseInt(selectedApp);
                        // Skip disambiguation if user already went through guided prompts
                        if (disambiguationAttemptRef.current >= 1) {
                            askPayload.skipDisambiguation = true;
                            disambiguationAttemptRef.current = 0;
                        }
                        const data = await api.callWithErrors('POST', '/ask', askPayload);
                        console.log('[IDA Ask] Intent:', data.intent, 'Keys:', Object.keys(data));

                        const intent = data.intent || 'STRUCTURED';

                        if (intent === 'DISAMBIGUATION') {
                            // Vague structured query — show slot-based guided prompt
                            disambiguationAttemptRef.current++;
                            setDisambiguationOriginalQuery(q);
                            setPendingSlotSelections({});
                            const disambigMsg = {
                                role: 'disambiguation',
                                interpretation: data.interpretation,
                                disambiguation_reason: data.disambiguation_reason || '',
                                suggestions: data.suggestions || [],
                                slot_questions: data.slot_questions || [],
                                slots: data.slots || {},
                                confidence: data.confidence,
                                timestamp: new Date()
                            };
                            setMessages(prev => [...prev, disambigMsg]);

                            // Voice mode: speak the clarifying question and auto-listen
                            if (voiceMode && voiceOutput.supported) {
                                const voicePrompt = generateDisambiguationPrompt(disambigMsg);
                                if (voicePrompt) {
                                    voiceOutput.speak(voicePrompt, {
                                        onComplete: () => {
                                            console.log('[Voice] Disambiguation speech done, auto-starting mic...');
                                            if (voiceStartListeningRef.current) {
                                                setTimeout(() => voiceStartListeningRef.current(), 400);
                                            }
                                        }
                                    });
                                }
                            }

                        } else if (intent === 'CLARIFY') {
                            // Server wants clarification — show as a soft message
                            const clarifyMsg = {
                                role: 'assistant',
                                content: q,
                                intent: 'CLARIFY',
                                answer: data.answer || 'Could you rephrase or add more detail?',
                                isDocAnswer: true,
                                timestamp: new Date()
                            };
                            setMessages(prev => [...prev, clarifyMsg]);
                            if (voiceMode) voiceOutput.speak(data.answer || 'Could you rephrase your question?');

                        } else if (intent === 'UNSTRUCTURED') {
                            // Document-only answer with citations
                            const docMsg = {
                                role: 'assistant',
                                content: q,
                                intent: 'UNSTRUCTURED',
                                answer: data.answer || 'No relevant documents found.',
                                citations: data.citations || [],
                                isDocAnswer: true,
                                timestamp: new Date()
                            };
                            setMessages(prev => [...prev, docMsg]);
                            if (voiceMode) {
                                const spk = (data.answer || '').replace(/\*\*/g, '').replace(/\[[\d,\s]+\]/g, '').substring(0, 400);
                                voiceOutput.speak(spk || 'I found some relevant information in your documents.', { rate: 0.95 });
                            }

                        } else if (intent === 'HYBRID') {
                            // Both structured data + document context
                            const rows = data.results?.rows || [];
                            const columns = rows.length > 0 ? Object.keys(rows[0]) : [];
                            const hybridMsg = {
                                role: 'assistant',
                                content: q,
                                intent: 'HYBRID',
                                answer: data.answer || '',
                                sql: data.sql,
                                rows,
                                columns,
                                column_business_names: data.column_business_names || {},
                                row_count: rows.length,
                                citations: data.citations || [],
                                isDocAnswer: !!(data.citations && data.citations.length > 0),
                                hasStructuredData: rows.length > 0,
                                displaySettings: { show_token_cost: true, show_sql_details: true },
                                feedback: null,
                                timestamp: new Date()
                            };
                            setMessages(prev => [...prev, hybridMsg]);
                            if (voiceMode) {
                                const spk = (data.answer || '').replace(/\*\*/g, '').replace(/\[[\d,\s]+\]/g, '').substring(0, 400);
                                voiceOutput.speak(spk || 'I found results from both your data and documents.', { rate: 0.95 });
                            }

                        } else {
                            // STRUCTURED — standard SQL result (backward-compatible shape)
                            const rows = data.results?.rows || [];
                            const columns = rows.length > 0 ? Object.keys(rows[0]) : [];
                            const assistantMsg = {
                                role: 'assistant',
                                content: q,
                                intent: 'STRUCTURED',
                                sql: data.sql,
                                rows,
                                columns,
                                column_business_names: data.column_business_names || {},
                                row_count: rows.length,
                                error: data.error,
                                answer: data.answer || '',
                                token_usage: data.tokenUsage,
                                schemaLinked: true,
                                displaySettings: { show_token_cost: true, show_sql_details: true },
                                feedback: null,
                                timestamp: new Date()
                            };
                            setMessages(prev => [...prev, assistantMsg]);

                            if (voiceMode) {
                                const summary = generateVoiceSummary(assistantMsg);
                                if (summary) voiceOutput.speak(summary, { rate: 0.95, pitch: 1.0 });
                            }
                        }

                        // Add to dev log
                        setDevLog(prev => [...prev, { timestamp: new Date().toLocaleTimeString(), query: q, sql: data.sql, intent, status: 'success' }]);

                        // Refresh history
                        const histData = await api.get(`/test/${selectedApp}/query-history`);
                        if (histData && histData.queries) setHistory(histData.queries);
                    }
                } catch (err) {
                    setMessages(prev => [...prev, { role: 'error', content: err.message, timestamp: new Date() }]);
                    setDevLog(prev => [...prev, { timestamp: new Date().toLocaleTimeString(), query: q, status: 'error', error: err.message }]);
                    if (voiceMode) voiceOutput.speak('Sorry, something went wrong. ' + err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            // Keep ref current so voice input callback can call handleAsk
            voiceHandleAskRef.current = handleAsk;

            // ── Claudia Conversation Router Handler ──
            // Sends full conversation history to /converse endpoint.
            // On clarify: speaks response, auto-listens for next turn.
            // On answer: speaks summary, displays data, auto-listens for follow-up.
            const converseLockedRef = useRef(false);
            const handleConverse = async (userText) => {
                if (!userText.trim() || !selectedApp) return;
                // Clear idle timer IMMEDIATELY when user speaks — prevents race with phase routing
                if (sessionIdleTimerRef.current) { clearTimeout(sessionIdleTimerRef.current); sessionIdleTimerRef.current = null; }
                // Concurrency guard — queue input instead of dropping it
                if (converseLockedRef.current) {
                    console.log('[Session] handleConverse locked — queuing for later:', userText.substring(0, 40));
                    deferredInputRef.current = userText;
                    return;
                }
                converseLockedRef.current = true;
                try {  // outer try — ensures lock is always released
                setQuery('');
                setConversing(true);

                // Add user turn to conversation history and chat
                const newHistory = [...conversationHistory, { role: 'user', text: userText }];
                setConversationHistory(newHistory);
                setMessages(prev => [...prev, { role: 'user', content: userText, timestamp: new Date() }]);

                // CRITICAL: Stop mic EARLY — before the server round-trip, not when
                // the response arrives. This gives macOS Core Audio 1-2 seconds to fully
                // disengage from mic/AEC mode before TTS playback starts. Stopping the mic
                // only at playback time (in speakResponse) was too late — the audio hardware
                // still produced volume dips on the first TTS after mic input.
                if (voiceMode && voiceInput.listening) {
                    voiceInput.abortListening();
                }
                // Pre-warm audio hardware before server round-trip. By the time
                // TTS audio arrives (~500-1500ms later), output is already active.
                if (voiceMode) voiceOutput.primePlayback();

                // ── ALL INTENT DETECTION IS NOW SERVER-SIDE (Haiku) ──
                // The server's conversation router classifies all 11 response types using full
                // conversation context, phase, and results-on-screen. No client-side regex needed.
                const phase = conversationPhaseRef.current;
                const hasPendingQueries = pendingQueriesRef.current.length > 0;

                // Helper: end the session cleanly (guards against double-fire)
                const endSessionFiredRef = { current: false };
                const endSession = (msg) => {
                    if (endSessionFiredRef.current) {
                        console.log('[Session] endSession already fired — skipping duplicate');
                        return;
                    }
                    endSessionFiredRef.current = true;
                    conversationPhaseRef.current = 'farewell';
                    // Clear idle timer IMMEDIATELY to prevent race condition
                    if (sessionIdleTimerRef.current) { clearTimeout(sessionIdleTimerRef.current); sessionIdleTimerRef.current = null; }
                    setConversationHistory(prev => [...prev, { role: 'claudia', text: msg }]);
                    setMessages(prev => [...prev, { role: 'claudia', content: msg, type: 'farewell', timestamp: new Date() }]);
                    voiceOutput.stopSpeaking();
                    voiceOutput.speak(msg, {
                        onComplete: () => {
                            setVoiceMode(false);
                            voiceInput.stopListening();
                            setInterimTranscript('');
                            setConversationHistory([]);
                            sessionRequestCountRef.current = 0;
                            pendingQueriesRef.current = [];
                            conversationPhaseRef.current = 'greeting';
                        }
                    });
                    setConversing(false);
                };

                // Helper: auto-listen after speaking
                const autoListen = () => {
                    if (voiceMode && voiceStartListeningRef.current) {
                        setTimeout(() => voiceStartListeningRef.current(), 200);
                    }
                };

                // Helper: batch execute all pending queries, show results, then continue or farewell
                const executePendingQueries = async (thenFarewell = false) => {
                    const queriesToRun = [...pendingQueriesRef.current];
                    pendingQueriesRef.current = [];
                    const qCount = queriesToRun.length;
                    conversationPhaseRef.current = 'executing';

                    // Show "working on it" — use different phrasing from the collecting ack to avoid repetition
                    const workingMsg = qCount === 1
                        ? `On it, one moment.`
                        : `Alright, pulling up ${qCount === 2 ? 'both of those' : 'those ' + qCount + ' things'} now.`;
                    setMessages(prev => [...prev, { role: 'claudia', content: workingMsg, type: 'spoken', timestamp: new Date() }]);
                    voiceOutput.stopSpeaking();
                    voiceOutput.speak(workingMsg, {});
                    setIsLoading(true);

                    try {
                        const batchData = await api.callWithErrors('POST', `/test/${selectedApp}/converse/execute`, {
                            queries: queriesToRun,
                            assistantName: getAssistantName(),
                            voice: voiceOutput.selectedVoiceName || 'nova',
                        });
                        setIsLoading(false);

                        if (batchData.type === 'multi_answer' && batchData.results) {
                            sessionRequestCountRef.current += batchData.result_count || qCount;

                            // Build a clean summary (strip server's "anything else?" — we control that)
                            let summaryText = batchData.spoken || 'Here are your results.';
                            summaryText = summaryText.replace(/\s*(anything else[^.?]*[.?]?|what else[^.?]*[.?]?|need anything[^.?]*[.?]?)$/i, '').trim();

                            // Show data cards (structured results) and doc cards (unstructured results)
                            const newMessages = batchData.results.map(r => ({
                                role: 'assistant',
                                content: r.query || r.label,
                                label: r.label,
                                intent: r.intent || 'STRUCTURED',
                                sql: r.sql,
                                rows: r.rows || [],
                                columns: r.columns || [],
                                column_business_names: r.column_business_names || {},
                                row_count: r.row_count || 0,
                                error: r.error,
                                queryId: r.queryId,
                                answer: r.answer || null,
                                citations: r.citations || [],
                                token_usage: r.token_usage,
                                executionTime: r.executionTime,
                                retryCount: r.retryCount || 0,
                                schemaLinked: r.intent !== 'UNSTRUCTURED',
                                explanation: '',
                                feedback: null,
                                timestamp: new Date(),
                                isMultiResult: batchData.results.length > 1,
                            }));
                            setMessages(prev => [...prev, ...newMessages]);

                            if (thenFarewell) {
                                // User already said goodbye — show results then farewell
                                const farewellMsg = `There you go — ${qCount} thing${qCount !== 1 ? 's' : ''} pulled up. Come back anytime!`;
                                // Show summary bubble, speak it, then farewell
                                setMessages(prev => [...prev, { role: 'claudia', content: summaryText, type: 'spoken', timestamp: new Date() }]);
                                voiceOutput.stopSpeaking();
                                voiceOutput.speak(summaryText, {
                                    onComplete: () => endSession(farewellMsg)
                                });
                            } else if (deferredInputRef.current) {
                                // User spoke while we were executing — process their input now
                                const deferred = deferredInputRef.current;
                                deferredInputRef.current = null;
                                conversationPhaseRef.current = 'reviewing';
                                console.log('[Session] Processing deferred input:', deferred.substring(0, 40));
                                // Show summary briefly, then process the deferred query
                                setMessages(prev => [...prev, { role: 'claudia', content: summaryText, type: 'spoken', timestamp: new Date() }]);
                                voiceOutput.stopSpeaking();
                                voiceOutput.speak(summaryText, {
                                    onComplete: () => {
                                        // Now handle the deferred input as a new query
                                        converseLockedRef.current = false; // release lock so handleConverse can run
                                        if (converseHandlerRef.current) converseHandlerRef.current(deferred);
                                    }
                                });
                            } else {
                                // Normal flow — show results, ask "anything else?", KEEP LISTENING
                                conversationPhaseRef.current = 'reviewing';
                                const reviewMsg = summaryText + ' Need anything else?';
                                setMessages(prev => [...prev, { role: 'claudia', content: reviewMsg, type: 'spoken', timestamp: new Date() }]);
                                setConversationHistory(prev => [...prev, { role: 'claudia', text: reviewMsg }]);
                                voiceOutput.stopSpeaking();
                                voiceOutput.speak(reviewMsg, {
                                    onComplete: () => {
                                        // Auto-listen THEN start idle timer — so the full 20s starts
                                        // AFTER Katy finishes speaking, not while she's still talking
                                        autoListen();
                                        if (sessionIdleTimerRef.current) clearTimeout(sessionIdleTimerRef.current);
                                        const reviewingIdleMs = 20000;
                                        sessionIdleTimerRef.current = setTimeout(() => {
                                            if (!voiceMode || conversationPhaseRef.current === 'farewell' || conversationPhaseRef.current === 'executing') return;
                                            const cnt = sessionRequestCountRef.current;
                                            endSession(`Looks like you're all set. I pulled up ${cnt} thing${cnt !== 1 ? 's' : ''}. Just click the mic if you need me again!`);
                                        }, reviewingIdleMs);
                                    }
                                });
                            }
                        }
                    } catch (batchErr) {
                        setIsLoading(false);
                        console.error('[BatchExec] Error:', batchErr);
                        const errMsg = "Sorry, I had trouble pulling those up. You can try asking one at a time in the text box.";
                        setMessages(prev => [...prev, { role: 'claudia', content: errMsg, type: 'error', timestamp: new Date() }]);
                        voiceOutput.speak(errMsg, { onComplete: autoListen });
                    }
                    setConversing(false);
                };

                // ── PHASE GUARDS (client-side) — only block input during executing/farewell ──
                console.log('[Session] Phase:', phase, 'Pending:', pendingQueriesRef.current.length, 'Text:', userText.substring(0, 40));

                // EXECUTING phase — queue input for processing after results return
                if (phase === 'executing') {
                    deferredInputRef.current = userText;
                    console.log('[Session] Deferred input during executing phase:', userText.substring(0, 40));
                    setConversing(false);
                    return;
                }

                // FAREWELL phase — session is ending, ignore stray input
                if (phase === 'farewell') {
                    console.log('[Session] Ignoring input during farewell phase');
                    setConversing(false);
                    return;
                }

                try {
                    // No "thinking" phrases needed — collect_only mode returns quickly
                    // The server classifies but doesn't execute SQL, so response is fast

                    // Clear idle timer while processing
                    if (sessionIdleTimerRef.current) { clearTimeout(sessionIdleTimerRef.current); sessionIdleTimerRef.current = null; }

                    // Build resultsOnScreen summary for Haiku context
                    const resultsOnScreenSummary = messages
                        .filter(m => m.role === 'assistant' && (m.rows?.length > 0 || m.answer))
                        .map((m, i) => ({
                            index: i + 1,
                            label: m.label || m.content?.substring(0, 60) || 'Result',
                            type: m.intent === 'UNSTRUCTURED' ? 'document' : 'data',
                            row_count: m.row_count || m.rows?.length || 0,
                        }));

                    const data = await api.callWithErrors('POST', `/test/${selectedApp}/converse`, {
                        messages: newHistory,
                        userName: 'Mark',
                        assistantName: getAssistantName(),
                        voice: voiceOutput.selectedVoiceName || 'nova',
                        requestCount: sessionRequestCountRef.current,
                        collect_only: true,  // Collect queries first, batch-execute on confirm_done
                        phase: conversationPhaseRef.current,
                        resultsOnScreen: resultsOnScreenSummary,
                        pendingQueries: pendingQueriesRef.current.map(q => q.label || q.query),
                    });

                    // Add Claudia's response to conversation history
                    const claudiaText = data.spoken || "I'm not sure how to help with that.";
                    setConversationHistory(prev => [...prev, { role: 'claudia', text: claudiaText }]);

                    // STUCK LOOP DETECTION — if Claudia keeps saying error/sorry responses, bail out
                    const isErrorResponse = /sorry|again|catch that|didn't quite|trouble/i.test(claudiaText) && claudiaText.length < 80;
                    if (isErrorResponse && data.type === 'clarify') {
                        // Check if last Claudia response was also an error
                        const lastClaudiaMsg = conversationHistory.filter(m => m.role === 'claudia').slice(-1)[0];
                        const lastWasError = lastClaudiaMsg && /sorry|again|catch that|didn't quite|trouble/i.test(lastClaudiaMsg.text) && lastClaudiaMsg.text.length < 80;
                        if (lastWasError) {
                            console.warn('[Session] Stuck loop detected — breaking out');
                            const bailMsg = "I'm having trouble understanding. You can try typing your question in the text box, or click the mic button to start a fresh conversation.";
                            setMessages(prev => [...prev, { role: 'claudia', content: bailMsg, type: 'clarify', timestamp: new Date() }]);
                            voiceOutput.stopSpeaking();
                            voiceOutput.speak(bailMsg, {
                                onComplete: () => {
                                    setVoiceMode(false);
                                    voiceInput.stopListening();
                                    setInterimTranscript('');
                                }
                            });
                            setConversing(false);
                            return;
                        }
                    }

                    // Helper: play inline audio (fast) or fall back to TTS fetch
                    const speakResponse = (text, audioBase64, onComplete) => {
                        // CRITICAL: Stop mic BEFORE playing TTS to prevent echo cancellation
                        // from suppressing playback. The browser's AEC (Acoustic Echo Cancellation)
                        // detects speaker output through the open mic and actively kills it,
                        // causing "Would [silence] revenue" on the first TTS after mic was active.
                        // The reactive echo guard (useEffect) fires too late — we must stop sync.
                        if (voiceInput.listening) {
                            voiceInput.abortListening();
                        }
                        voiceOutput.stopSpeaking();
                        if (audioBase64) {
                            console.log('[Voice] Playing inline audio (%d KB)', Math.round(audioBase64.length * 0.75 / 1024));
                            voiceOutput.playBase64Audio(audioBase64, onComplete);
                        } else {
                            voiceOutput.speak(text, { onComplete });
                        }
                    };

                    // Helper: session management after each response — simplified, uses phase-aware endSession/autoListen
                    const onResponseDelivered = (responseType, resultCount = 1) => {
                        if (responseType === 'answer' || responseType === 'multi_answer') {
                            sessionRequestCountRef.current += resultCount;
                            conversationPhaseRef.current = 'reviewing';
                            console.log('[Session] Phase: REVIEWING. Count:', sessionRequestCountRef.current, '(+' + resultCount + ')');
                        }
                        if (responseType === 'farewell') {
                            // Guard: don't fire a second farewell if session is already ending
                            if (conversationPhaseRef.current === 'farewell') {
                                console.log('[Session] Skipping duplicate farewell — session already ending');
                                return;
                            }
                            conversationPhaseRef.current = 'farewell';
                            const cnt = sessionRequestCountRef.current;
                            endSession(cnt > 0
                                ? `Got it! I pulled up ${cnt} thing${cnt !== 1 ? 's' : ''} for you. Come back anytime!`
                                : `No problem! Just click the mic whenever you need me.`);
                            return;
                        }
                        // Reset idle timer
                        if (sessionIdleTimerRef.current) clearTimeout(sessionIdleTimerRef.current);
                        sessionIdleTimerRef.current = setTimeout(() => {
                            if (!voiceMode || conversationPhaseRef.current === 'farewell' || conversationPhaseRef.current === 'executing') return;
                            const cnt = sessionRequestCountRef.current;
                            endSession(`Looks like you're all set. I pulled up ${cnt} thing${cnt !== 1 ? 's' : ''}. Just click the mic if you need me again!`);
                        }, SESSION_IDLE_TIMEOUT_MS);
                    };

                    // ── QUEUED: query collected, not yet executed ──
                    // Add to pending queue (deduplicated), set phase to collecting, listen for more
                    if (data.type === 'queued' && data.queries) {
                        conversationPhaseRef.current = 'collecting';

                        let newQueries;
                        if (data.replace) {
                            // REPLACE mode: user corrected the queue ("change that to X and Y")
                            // Clear existing queue and use only the new queries
                            console.log('[Session] Queue REPLACE — clearing', pendingQueriesRef.current.length, 'existing, setting', data.queries.length, 'new');
                            pendingQueriesRef.current = [...data.queries];
                            newQueries = data.queries;
                        } else {
                            // ADD mode (default): deduplicate and append
                            const existingQueryTexts = new Set(pendingQueriesRef.current.map(q => q.query.toLowerCase()));
                            newQueries = data.queries.filter(q => !existingQueryTexts.has(q.query.toLowerCase()));
                            if (newQueries.length > 0) {
                                pendingQueriesRef.current = [...pendingQueriesRef.current, ...newQueries];
                            }
                        }
                        const totalPending = pendingQueriesRef.current.length;
                        const allLabels = pendingQueriesRef.current.map(q => q.label);
                        console.log('[Session] Phase: COLLECTING. Queued', newQueries.length, 'new. Total:', totalPending, allLabels.join(', '));

                        // Build a friendly acknowledgment showing total pending
                        const newLabels = newQueries.map(q => q.label).join(' and ');
                        // Use server's spoken field (clean, short) for TTS; build display text with context
                        const serverSpoken = (data.spoken || '').trim();
                        let spokenAck, displayAck;
                        if (totalPending === 1) {
                            // Single query: short ack, no "anything else?" — 4s auto-execute
                            spokenAck = serverSpoken || `Got it — ${allLabels[0]}.`;
                            displayAck = `Got it — ${allLabels[0]}. Say something to add more, or I'll go ahead.`;
                        } else if (newQueries.length > 0) {
                            // Multiple queries: prompt for more — user may want to add a briefing, etc.
                            spokenAck = `Got it, I have ${totalPending} things queued up. Anything else?`;
                            displayAck = spokenAck;
                        } else {
                            spokenAck = `I already have that queued. ${totalPending} things ready to go. Anything else?`;
                            displayAck = spokenAck;
                        }

                        // Show Claudia's acknowledgment bubble (display text includes "Anything else?")
                        setMessages(prev => [...prev, { role: 'claudia', content: displayAck, type: 'queued', timestamp: new Date() }]);
                        setConversationHistory(prev => [...prev, { role: 'claudia', text: displayAck }]);

                        // Speak ONLY the short ack (no "anything else?" — let silence prompt the user naturally)
                        voiceOutput.stopSpeaking();
                        voiceOutput.speak(spokenAck, {
                            onComplete: () => {
                                autoListen();
                                // Start idle timer AFTER Katy finishes speaking "Anything else?"
                                // so user gets the full window to respond
                                if (sessionIdleTimerRef.current) clearTimeout(sessionIdleTimerRef.current);
                                // Single query = short wait (user asked something specific, just go)
                                // Multiple queries = longer wait (user is building a list)
                                const collectingIdleMs = totalPending === 1 ? 4000 : 12000;
                                sessionIdleTimerRef.current = setTimeout(async () => {
                                    if (!voiceMode || conversationPhaseRef.current === 'farewell' || conversationPhaseRef.current === 'executing') return;
                                    if (pendingQueriesRef.current.length > 0) {
                                        console.log('[Session] Idle timeout with', pendingQueriesRef.current.length, 'pending queries — auto-executing');
                                        await executePendingQueries(false);
                                    } else {
                                        endSession(`Looks like you're all set. Just click the mic if you need me again!`);
                                    }
                                }, collectingIdleMs);
                            }
                        });

                        setConversing(false);
                        return;
                    }

                    // ── CONFIRM_DONE: user is done collecting → execute batch ──
                    if (data.type === 'confirm_done') {
                        if (hasPendingQueries) {
                            await executePendingQueries(false);
                        } else {
                            // Nothing pending — treat as farewell
                            const cnt = sessionRequestCountRef.current;
                            endSession(cnt > 0
                                ? `Got it! I pulled up ${cnt} thing${cnt !== 1 ? 's' : ''} for you. Come back anytime!`
                                : `No problem! Just click the mic whenever you need me.`);
                        }
                        setConversing(false);
                        return;
                    }

                    // ── BRIEFING: user wants results compiled into a document ──
                    if (data.type === 'briefing') {
                        const ackMsg = data.spoken || `Sure, let me put together a briefing for you.`;
                        setMessages(prev => [...prev, { role: 'claudia', content: ackMsg, type: 'spoken', timestamp: new Date() }]);
                        voiceOutput.stopSpeaking();
                        voiceOutput.speak(ackMsg, {});

                        try {
                            const resultMessages = messages.filter(m => m.role === 'assistant' && (m.rows?.length > 0 || m.answer));
                            const briefingData = resultMessages.map(m => ({
                                label: m.label || m.content,
                                columns: m.columns || [],
                                column_business_names: m.column_business_names || {},
                                rows: (m.rows || []).slice(0, 50),
                                row_count: m.row_count || m.rows?.length || 0,
                                answer: m.answer || null,
                            }));

                            const briefingResp = await api.callWithErrors('POST', `/test/${selectedApp}/converse/briefing`, {
                                results: briefingData,
                                userName: 'Mark',
                                assistantName: getAssistantName(),
                                userRequest: userText,
                            });

                            if (briefingResp && briefingResp.html) {
                                const briefingBlob = new Blob([briefingResp.html], { type: 'text/html' });
                                const briefingUrl = URL.createObjectURL(briefingBlob);
                                const doneMsg = `Your briefing is ready — just tap the View Briefing button in the chat to open it. Anything else?`;
                                setMessages(prev => [...prev, {
                                    role: 'claudia', content: doneMsg, type: 'briefing_ready',
                                    briefingUrl, timestamp: new Date()
                                }]);
                                voiceOutput.stopSpeaking();
                                voiceOutput.speak(doneMsg, { onComplete: autoListen });
                            } else {
                                throw new Error('No briefing content returned');
                            }
                        } catch (briefErr) {
                            console.error('[Briefing] Error:', briefErr);
                            const errMsg = `Sorry, I had trouble creating that briefing. You can still see all the results on screen.`;
                            setMessages(prev => [...prev, { role: 'claudia', content: errMsg, type: 'error', timestamp: new Date() }]);
                            voiceOutput.stopSpeaking();
                            voiceOutput.speak(errMsg, { onComplete: autoListen });
                        }
                        setConversing(false);
                        return;
                    }

                    // ── FOLLOW_UP: drill down / modify an existing result ──
                    if (data.type === 'follow_up' && data.query) {
                        // Queue as a new query that replaces/supplements the referenced result
                        conversationPhaseRef.current = 'collecting';
                        pendingQueriesRef.current = [{ query: data.query, label: data.label || 'Follow-up', intent: data.engine === 'unstructured' ? 'UNSTRUCTURED' : undefined }];
                        const spokenAck = data.spoken || `Sure, let me refine that.`;
                        setMessages(prev => [...prev, { role: 'claudia', content: spokenAck, type: 'queued', timestamp: new Date() }]);
                        setConversationHistory(prev => [...prev, { role: 'claudia', text: spokenAck }]);
                        // Auto-execute immediately (follow-ups are singular — don't wait for more)
                        await executePendingQueries(false);
                        setConversing(false);
                        return;
                    }

                    // ── CORRECTION: fix a previous query and re-run ──
                    if (data.type === 'correction' && data.query) {
                        const correctionQuery = { query: data.query, label: data.label || 'Correction', intent: data.engine === 'unstructured' ? 'UNSTRUCTURED' : undefined };
                        if (phase === 'collecting' && hasPendingQueries && data.ref) {
                            // Partial replacement: swap the referenced item, keep the rest
                            const refIdx = Math.max(0, (data.ref || 1) - 1);
                            const updated = [...pendingQueriesRef.current];
                            if (refIdx < updated.length) {
                                updated[refIdx] = correctionQuery;
                            } else {
                                updated.push(correctionQuery);
                            }
                            pendingQueriesRef.current = updated;
                        } else {
                            // Full replacement (reviewing phase or no ref)
                            conversationPhaseRef.current = 'collecting';
                            pendingQueriesRef.current = [correctionQuery];
                        }
                        const spokenAck = data.spoken || `Got it, let me fix that.`;
                        setMessages(prev => [...prev, { role: 'claudia', content: spokenAck, type: 'queued', timestamp: new Date() }]);
                        setConversationHistory(prev => [...prev, { role: 'claudia', text: spokenAck }]);
                        // Auto-execute immediately
                        await executePendingQueries(false);
                        setConversing(false);
                        return;
                    }

                    // ── CHITCHAT: conversational (non-data) response ──
                    if (data.type === 'chitchat') {
                        setMessages(prev => [...prev, { role: 'claudia', content: claudiaText, type: 'chitchat', timestamp: new Date() }]);
                        speakResponse(claudiaText, data.audio_base64, autoListen);
                        onResponseDelivered('chitchat');
                        setConversing(false);
                        return;
                    }

                    // ── HYBRID: both structured + unstructured queries ──
                    if (data.type === 'hybrid' && data.queries) {
                        conversationPhaseRef.current = 'collecting';
                        // Split into structured and unstructured queries
                        const hybridQueries = data.queries.map(q => ({
                            query: q.query,
                            label: q.label || 'Query',
                            intent: q.engine === 'unstructured' ? 'UNSTRUCTURED' : undefined,
                        }));
                        pendingQueriesRef.current = [...pendingQueriesRef.current, ...hybridQueries];
                        const spokenAck = data.spoken || `Let me pull the data and check the docs.`;
                        setMessages(prev => [...prev, { role: 'claudia', content: spokenAck, type: 'queued', timestamp: new Date() }]);
                        setConversationHistory(prev => [...prev, { role: 'claudia', text: spokenAck }]);
                        // Auto-execute hybrid queries immediately (user asked one compound question)
                        await executePendingQueries(false);
                        setConversing(false);
                        return;
                    }

                    // ── For non-queued server responses (greeting after initial greeting, etc.) set phase ──
                    if (data.type === 'greeting') conversationPhaseRef.current = 'collecting';
                    if (data.type === 'clarify') conversationPhaseRef.current = conversationPhaseRef.current || 'collecting';

                    if (data.type === 'multi_answer' && data.results) {
                        // Show Claudia's spoken text (including "anything else?") as a visible chat bubble ABOVE the data cards
                        setMessages(prev => [...prev, { role: 'claudia', content: claudiaText, type: 'spoken', timestamp: new Date() }]);

                        // Multi-query briefing — display each result as a separate message card
                        const newMessages = data.results.map(r => ({
                            role: 'assistant',
                            content: r.query || r.label,
                            label: r.label,
                            intent: r.intent || 'STRUCTURED',
                            sql: r.sql,
                            rows: r.rows || [],
                            columns: r.columns || [],
                            column_business_names: r.column_business_names || {},
                            row_count: r.row_count || 0,
                            error: r.error,
                            queryId: r.queryId,
                            answer: r.answer || null,
                            citations: r.citations || [],
                            token_usage: r.token_usage,
                            executionTime: r.executionTime,
                            retryCount: r.retryCount || 0,
                            schemaLinked: r.intent !== 'UNSTRUCTURED',
                            explanation: '',
                            feedback: null,
