        };

        // =====================================================
        // DATA BROWSER — Browse actual source data values
        // =====================================================
        const DataBrowser = ({ appId }) => {
            const [tables, setTables] = useState([]);
            const [selectedTable, setSelectedTable] = useState(null);
            const [rows, setRows] = useState([]);
            const [columns, setColumns] = useState([]);
            const [columnMeta, setColumnMeta] = useState([]);
            const [totalRows, setTotalRows] = useState(0);
            const [offset, setOffset] = useState(0);
            const [available, setAvailable] = useState(true);
            const [loading, setLoading] = useState(true);
            const [tableListOpen, setTableListOpen] = useState(true);
            const [hideEmptyTables, setHideEmptyTables] = useState(false);
            const limit = 50;

            useEffect(() => {
                const fetchTables = async () => {
                    setLoading(true);
                    const data = await api.get(`/data/${appId}/tables`);
                    if (data) {
                        setAvailable(data.available);
                        setTables(data.tables || []);
                        if (data.tables && data.tables.length > 0) {
                            handleSelectTable(data.tables[0].table_name);
                        }
                    }
                    setLoading(false);
                };
                fetchTables();
            }, [appId]);

            const handleSelectTable = async (tableName) => {
                setSelectedTable(tableName);
                setOffset(0);
                await loadPage(tableName, 0);
            };

            const loadPage = async (tableName, pageOffset) => {
                const data = await api.get(`/data/${appId}/browse/${tableName}?limit=${limit}&offset=${pageOffset}`);
                if (data) {
                    setRows(data.rows || []);
                    setColumns(data.columns || []);
                    setColumnMeta(data.column_metadata || []);
                    setTotalRows(data.total_rows || 0);
                }
            };

            const handlePage = (dir) => {
                const newOffset = dir === 'next' ? offset + limit : Math.max(0, offset - limit);
                setOffset(newOffset);
                loadPage(selectedTable, newOffset);
            };

            if (!available) {
                return (
                    <>
                        <h2 style={{ marginBottom: '20px' }}>Data Browser</h2>
                        <div style={{ padding: '40px', textAlign: 'center', color: 'var(--text-dim)' }}>
                            <Icon name="Database" size={48} />
                            <p style={{ marginTop: '12px', fontSize: '15px' }}>Source data not loaded yet</p>
                            <p style={{ fontSize: '13px' }}>Run the pipeline on this application first. The "Load Data" stage will import the source database for browsing.</p>
                        </div>
                    </>
                );
            }

            const getMetaForCol = (colName) => columnMeta.find(m => m.column_name === colName);

            return (
                <div style={{ display: 'flex', flexDirection: 'column', height: 'calc(100vh - 140px)' }}>
                    <div style={{ display: 'flex', alignItems: 'center', marginBottom: '12px', gap: '12px' }}>
                        <h2 style={{ margin: 0 }}>Data Browser</h2>
                        <button className="btn-secondary btn-sm" onClick={() => setTableListOpen(!tableListOpen)}
                            style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                            <Icon name={tableListOpen ? 'PanelLeftClose' : 'PanelLeftOpen'} size={14} />
                            {tableListOpen ? 'Hide Tables' : 'Show Tables'}
                        </button>
                        <label style={{ display: 'flex', alignItems: 'center', gap: '6px', fontSize: '13px', color: 'var(--text-dim)', cursor: 'pointer', userSelect: 'none' }}>
                            <input type="checkbox" checked={hideEmptyTables} onChange={e => setHideEmptyTables(e.target.checked)}
                                style={{ accentColor: 'var(--accent)' }} />
                            Hide empty tables
                        </label>
                    </div>

                    <div style={{ display: 'flex', flex: 1, gap: '12px', minHeight: 0 }}>
                        {/* Collapsible table list */}
                        {tableListOpen && (
                            <div style={{ width: '220px', flexShrink: 0, display: 'flex', flexDirection: 'column', background: 'var(--bg-surface)', border: '1px solid var(--border)', borderRadius: '8px', overflow: 'hidden' }}>
                                <div style={{ padding: '10px 12px', fontWeight: 600, fontSize: '13px', borderBottom: '1px solid var(--border)', background: 'var(--bg-surface2)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                    <span>Tables ({hideEmptyTables ? tables.filter(t => (t.row_count || 0) > 0).length : tables.length}{hideEmptyTables ? ` of ${tables.length}` : ''})</span>
                                </div>
                                <div style={{ flex: 1, overflowY: 'auto', padding: '4px' }}>
                                    {tables.filter(t => !hideEmptyTables || (t.row_count || 0) > 0).map(t => (
                                        <div key={t.table_name}
                                            onClick={() => handleSelectTable(t.table_name)}
                                            style={{
                                                cursor: 'pointer', padding: '8px 10px', marginBottom: '2px', borderRadius: '6px',
                                                background: selectedTable === t.table_name ? 'var(--accent)' : 'transparent',
                                                color: selectedTable === t.table_name ? '#fff' : 'var(--text-primary)',
                                                fontSize: '13px', display: 'flex', justifyContent: 'space-between', alignItems: 'center'
                                            }}>
                                            <span style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                                                <Icon name="Table" size={13} /> {t.entity_name || t.table_name}
                                            </span>
                                            <span style={{ fontSize: '10px', opacity: 0.7 }}>
                                                {(t.row_count || 0).toLocaleString()}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Data grid area — takes remaining width */}
                        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 12px', background: 'var(--bg-surface2)', borderRadius: '8px 8px 0 0', border: '1px solid var(--border)', borderBottom: 'none' }}>
                                <span style={{ fontWeight: 600, fontSize: '13px' }}>{selectedTable || 'Select a table'} — {totalRows.toLocaleString()} rows</span>
                                <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                                    <button disabled={offset === 0} onClick={() => handlePage('prev')} className="btn-secondary btn-sm">Prev</button>
                                    <span style={{ fontSize: '12px', color: 'var(--text-dim)' }}>
                                        {offset + 1}–{Math.min(offset + limit, totalRows)} of {totalRows.toLocaleString()}
                                    </span>
                                    <button disabled={offset + limit >= totalRows} onClick={() => handlePage('next')} className="btn-secondary btn-sm">Next</button>
                                </div>
                            </div>
                            <div style={{ flex: 1, overflow: 'auto', border: '1px solid var(--border)', borderRadius: '0 0 8px 8px' }}>
                                <table className="data-grid" style={{ fontSize: '12px' }}>
                                    <thead>
                                        <tr>
                                            {columns.map(col => {
                                                const meta = getMetaForCol(col);
                                                return (
                                                    <th key={col} title={meta ? `${meta.business_name}: ${meta.description}` : col} style={{ position: 'sticky', top: 0, zIndex: 1 }}>
                                                        <div>{col}</div>
                                                        {meta && meta.business_name && (
                                                            <div style={{ fontSize: '10px', color: 'var(--accent)', fontWeight: 'normal' }}>
                                                                {meta.business_name}
                                                            </div>
                                                        )}
                                                    </th>
                                                );
                                            })}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {rows.map((row, i) => (
                                            <tr key={i}>
                                                {columns.map(col => (
                                                    <td key={col} style={{ maxWidth: '200px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                                                        {row[col] !== null && row[col] !== undefined ? String(row[col]) : <span style={{ color: '#666' }}>NULL</span>}
                                                    </td>
                                                ))}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const CurationWorkspace = ({ appId }) => {
            const [allColumns, setAllColumns] = useState([]);
            const [summary, setSummary] = useState({ total: 0, auto_approve: 0, review: 0, manual: 0, approved: 0, rejected: 0, ai_enriched: 0, draft: 0 });
            const [pagination, setPagination] = useState({ page: 1, limit: 50, filtered_total: 0, total_pages: 0 });
            const [tables, setTables] = useState([]);
            const [entitySummary, setEntitySummary] = useState({ total: 0, approved: 0, rejected: 0, pending: 0 });
            const [relationships, setRelationships] = useState([]);
            const [relSummary, setRelSummary] = useState({ total: 0, approved: 0, rejected: 0, pending: 0 });
            const [activeTier, setActiveTier] = useState('all');
            const [selectedCol, setSelectedCol] = useState(null);
            const [editMode, setEditMode] = useState(false);
            const [correctMode, setCorrectMode] = useState(false); // Correct & Approve flow
            const [editFields, setEditFields] = useState({});
            const [searchTerm, setSearchTerm] = useState('');
            const [domainFilter, setDomainFilter] = useState('all');
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [bulkApproving, setBulkApproving] = useState(false);
            const [viewMode, setViewMode] = useState('columns');
            const [selectedTable, setSelectedTable] = useState(null);
            const [editTableFields, setEditTableFields] = useState({});
            const [editTableMode, setEditTableMode] = useState(false);
            const [correctEntityMode, setCorrectEntityMode] = useState(false);
            const [expandedDomains, setExpandedDomains] = useState({});
            const [savingTable, setSavingTable] = useState(false);
            const [notification, setNotification] = useState(null);
            // Relationship state
            const [showAddRel, setShowAddRel] = useState(false);
            const [newRel, setNewRel] = useState({ from_table_name: '', from_column: '', to_table_name: '', to_column: '', rel_type: 'inferred', cardinality: 'one_to_many' });
            const [savingRel, setSavingRel] = useState(false);
            const searchTimeoutRef = React.useRef(null);

            const showNotification = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const fetchColumns = async (page = 1, tier = activeTier, search = searchTerm) => {
                if (!appId) return;
                try {
                    const params = new URLSearchParams({ page, limit: 50 });
                    if (tier && tier !== 'all' && tier !== 'approved' && tier !== 'rejected') params.set('tier', tier);
                    if (tier === 'approved') params.set('status', 'approved');
                    if (tier === 'rejected') params.set('status', 'rejected');
                    if (search) params.set('search', search);
                    const colData = await api.get(`/schema/${appId}/columns?${params}`);
                    setAllColumns(colData?.columns || []);
                    setSummary(colData?.summary || {});
                    setPagination(colData?.pagination || { page: 1, limit: 50, filtered_total: 0, total_pages: 0 });
                } catch (err) {
                    console.error('Columns fetch error:', err);
                }
            };

            const fetchData = async () => {
                if (!appId) return;
                setLoading(true);
                try {
                    const [_, tableData, relData] = await Promise.all([
                        fetchColumns(1, activeTier, searchTerm),
                        api.get(`/schema/${appId}/tables`),
                        api.get(`/schema/${appId}/relationships`),
                    ]);
                    setTables(tableData?.tables || []);
                    setEntitySummary(tableData?.entitySummary || {});
                    setRelationships(relData?.relationships || []);
                    setRelSummary(relData?.relSummary || {});
                } catch (err) {
                    console.error('Curation fetch error:', err);
                }
                setLoading(false);
            };

            useEffect(() => { fetchData(); }, [appId]);

            // Debounced search
            const handleSearchChange = (val) => {
                setSearchTerm(val);
                if (searchTimeoutRef.current) clearTimeout(searchTimeoutRef.current);
                searchTimeoutRef.current = setTimeout(() => {
                    fetchColumns(1, activeTier, val);
                }, 300);
            };

            const handleTierChange = (tier) => {
                setActiveTier(tier);
                setSelectedCol(null);
                fetchColumns(1, tier, searchTerm);
            };

            const handlePageChange = (newPage) => {
                fetchColumns(newPage, activeTier, searchTerm);
            };

            const handleSelectCol = (col) => {
                setSelectedCol(col);
                setEditMode(false);
                setCorrectMode(false);
                setEditFields({ business_name: col.business_name || '', description: col.description || '' });
            };

            const handleUpdateColumn = async (columnId, updates) => {
                setSaving(true);
                try {
                    await api.put(`/schema/${appId}/columns/${columnId}`, updates);
                    showNotification('Column updated');
                    await fetchColumns(pagination.page, activeTier, searchTerm);
                    // Also refresh tables/rels for summary counts
                    const [tableData, relData] = await Promise.all([
                        api.get(`/schema/${appId}/tables`),
                        api.get(`/schema/${appId}/relationships`),
                    ]);
                    setTables(tableData?.tables || []);
                    setEntitySummary(tableData?.entitySummary || {});
                    setRelationships(relData?.relationships || []);
                    setRelSummary(relData?.relSummary || {});
                    // Refresh selected
                    if (selectedCol && selectedCol.id === columnId) {
                        const refreshed = (await api.get(`/schema/${appId}/columns?search=${selectedCol.column_name}&limit=200`))?.columns?.find(c => c.id === columnId);
                        if (refreshed) { setSelectedCol(refreshed); setEditFields({ business_name: refreshed.business_name || '', description: refreshed.description || '' }); }
                    }
                } catch (err) {
                    console.error('Update column error:', err);
                    showNotification('Update failed', 'error');
                }
                setSaving(false);
                setEditMode(false);
                setCorrectMode(false);
            };

            const handleCorrectAndApprove = async (columnId) => {
                await handleUpdateColumn(columnId, {
                    business_name: editFields.business_name,
                    description: editFields.description,
                    enrichment_status: 'approved',
                });
            };

            const handleBulkApprove = async (minConfidence = 90) => {
                const label = minConfidence >= 90 ? 'high-confidence (90%+)' : 'review-tier (60%+)';
                if (!confirm(`Approve all ${label} columns?`)) return;
                setBulkApproving(true);
                try {
                    const result = await api.post(`/schema/${appId}/columns/bulk-approve`, { min_confidence: minConfidence });
                    showNotification(`Bulk approved ${result?.approved_count || 0} columns`);
                    await fetchColumns(pagination.page, activeTier, searchTerm);
                } catch (err) {
                    console.error('Bulk approve error:', err);
                    showNotification('Bulk approve failed', 'error');
                }
                setBulkApproving(false);
            };

            // Entity handlers
            const handleUpdateTable = async (tableId, extraUpdates = {}) => {
                setSavingTable(true);
                try {
                    const meta = selectedTable?.entity_metadata ? (typeof selectedTable.entity_metadata === 'string' ? JSON.parse(selectedTable.entity_metadata) : selectedTable.entity_metadata) : {};
                    const updatedMeta = { ...meta, entity_type: editTableFields.entity_type || meta.entity_type, domain: editTableFields.domain || meta.domain };
                    await api.put(`/schema/${appId}/tables/${tableId}/metadata`, {
                        entity_name: editTableFields.entity_name,
                        description: editTableFields.description,
                        entity_metadata: updatedMeta,
                        ...extraUpdates,
                    });
                    showNotification('Entity updated');
                    const tableData = await api.get(`/schema/${appId}/tables`);
                    setTables(tableData?.tables || []);
                    setEntitySummary(tableData?.entitySummary || {});
                    const updated = tableData?.tables?.find(t => t.id === tableId);
                    if (updated) { setSelectedTable(updated); const m = updated.entity_metadata ? (typeof updated.entity_metadata === 'string' ? JSON.parse(updated.entity_metadata) : updated.entity_metadata) : {}; setEditTableFields({ entity_name: updated.entity_name || '', description: updated.description || '', entity_type: m.entity_type || '', domain: m.domain || '' }); }
                    setEditTableMode(false);
                } catch (err) {
                    console.error('Update table error:', err);
                    showNotification('Entity update failed', 'error');
                }
                setSavingTable(false);
            };

            const handleEntityApproval = async (tableId, status) => {
                setSavingTable(true);
                try {
                    await api.put(`/schema/${appId}/tables/${tableId}/metadata`, { enrichment_status: status });
                    showNotification(`Entity ${status}`);
                    const tableData = await api.get(`/schema/${appId}/tables`);
                    setTables(tableData?.tables || []);
                    setEntitySummary(tableData?.entitySummary || {});
                    const updated = tableData?.tables?.find(t => t.id === tableId);
                    if (updated) setSelectedTable(updated);
                } catch (err) {
                    showNotification('Update failed', 'error');
                }
                setSavingTable(false);
            };

            const handleCorrectAndApproveEntity = async (tableId) => {
                setSavingTable(true);
                try {
                    const meta = selectedTable?.entity_metadata ? (typeof selectedTable.entity_metadata === 'string' ? JSON.parse(selectedTable.entity_metadata) : selectedTable.entity_metadata) : {};
                    const updatedMeta = { ...meta, entity_type: editTableFields.entity_type || meta.entity_type, domain: editTableFields.domain || meta.domain };
                    await api.put(`/schema/${appId}/tables/${tableId}/metadata`, {
                        entity_name: editTableFields.entity_name,
                        description: editTableFields.description,
                        entity_metadata: updatedMeta,
                        enrichment_status: 'approved',
                    });
                    showNotification('Entity corrected & approved');
                    const tableData = await api.get(`/schema/${appId}/tables`);
                    setTables(tableData?.tables || []);
                    setEntitySummary(tableData?.entitySummary || {});
                    const updated = tableData?.tables?.find(t => t.id === tableId);
                    if (updated) { setSelectedTable(updated); const m = updated.entity_metadata ? (typeof updated.entity_metadata === 'string' ? JSON.parse(updated.entity_metadata) : updated.entity_metadata) : {}; setEditTableFields({ entity_name: updated.entity_name || '', description: updated.description || '', entity_type: m.entity_type || '', domain: m.domain || '' }); }
                    setCorrectEntityMode(false);
                } catch (err) {
                    showNotification('Update failed', 'error');
                }
                setSavingTable(false);
            };

            const handleBulkApproveEntities = async () => {
                if (!confirm('Approve all entities?')) return;
                setBulkApproving(true);
                try {
                    const result = await api.post(`/schema/${appId}/tables/bulk-approve`, {});
                    showNotification(`Approved ${result?.approved_count || 0} entities`);
                    const tableData = await api.get(`/schema/${appId}/tables`);
                    setTables(tableData?.tables || []);
                    setEntitySummary(tableData?.entitySummary || {});
                } catch (err) {
                    showNotification('Bulk approve failed', 'error');
                }
                setBulkApproving(false);
            };

            // Relationship handlers
            const handleRelApproval = async (relId, status) => {
                setSaving(true);
                try {
                    await api.put(`/schema/${appId}/relationships/${relId}`, { enrichment_status: status });
                    showNotification(`Relationship ${status}`);
                    const relData = await api.get(`/schema/${appId}/relationships`);
                    setRelationships(relData?.relationships || []);
                    setRelSummary(relData?.relSummary || {});
                } catch (err) {
                    showNotification('Update failed', 'error');
                }
                setSaving(false);
            };

            const handleDeleteRel = async (relId) => {
                if (!confirm('Delete this relationship?')) return;
                try {
                    await api.delete(`/schema/${appId}/relationships/${relId}`);
                    showNotification('Relationship deleted');
                    const relData = await api.get(`/schema/${appId}/relationships`);
                    setRelationships(relData?.relationships || []);
                    setRelSummary(relData?.relSummary || {});
                } catch (err) {
                    showNotification('Delete failed', 'error');
                }
            };

            const handleAddRelationship = async () => {
                if (!newRel.from_table_name || !newRel.from_column || !newRel.to_table_name || !newRel.to_column) {
                    showNotification('All fields are required', 'error'); return;
                }
                setSavingRel(true);
                try {
                    await api.post(`/schema/${appId}/relationships`, newRel);
                    showNotification('Relationship added');
                    setShowAddRel(false);
                    setNewRel({ from_table_name: '', from_column: '', to_table_name: '', to_column: '', rel_type: 'inferred', cardinality: 'one_to_many' });
                    const relData = await api.get(`/schema/${appId}/relationships`);
                    setRelationships(relData?.relationships || []);
                    setRelSummary(relData?.relSummary || {});
                } catch (err) {
                    showNotification(err?.message || 'Add failed', 'error');
                }
                setSavingRel(false);
            };

            const handleBulkApproveRels = async () => {
                if (!confirm('Approve all pending relationships?')) return;
                setBulkApproving(true);
                try {
                    const result = await api.post(`/schema/${appId}/relationships/bulk-approve`, {});
                    showNotification(`Approved ${result?.approved_count || 0} relationships`);
                    const relData = await api.get(`/schema/${appId}/relationships`);
                    setRelationships(relData?.relationships || []);
                    setRelSummary(relData?.relSummary || {});
                } catch (err) {
                    showNotification('Bulk approve failed', 'error');
                }
                setBulkApproving(false);
            };

            const confidenceColor = (score) => {
                if (score >= 90) return '#22c55e';
                if (score >= 60) return '#f59e0b';
                return '#ef4444';
            };

            const statusBadge = (status) => {
                const map = {
                    draft: { label: 'Draft', cls: 'badge-muted' },
                    ai_enriched: { label: 'AI Enriched', cls: 'badge-blue' },
                    needs_review: { label: 'Needs Review', cls: 'badge-orange' },
                    approved: { label: 'Approved', cls: 'badge-green' },
                    rejected: { label: 'Rejected', cls: 'badge-red' },
                };
                const m = map[status] || { label: status || 'Draft', cls: 'badge-muted' };
                return React.createElement('span', { className: `badge ${m.cls}` }, m.label);
            };

            const tableNames = tables.map(t => t.table_name).sort();

            // Build table→domain map and unique domain list for column filtering
            const tableDomainMap = {};
            const domainSet = new Set();
            tables.forEach(t => {
                const meta = t.entity_metadata ? (typeof t.entity_metadata === 'string' ? JSON.parse(t.entity_metadata) : t.entity_metadata) : {};
                const d = meta.domain && meta.domain !== 'General' && meta.domain !== 'UNKNOWN' && meta.domain !== '' ? meta.domain : 'Unclassified';
                tableDomainMap[t.table_name] = d;
                domainSet.add(d);
            });
            const availableDomains = [...domainSet].sort((a, b) => a === 'Unclassified' ? 1 : b === 'Unclassified' ? -1 : a.localeCompare(b));

            // Apply domain filter to columns (client-side, on top of server-side pagination)
            const domainFilteredColumns = domainFilter === 'all' ? allColumns : allColumns.filter(c => tableDomainMap[c.table_name] === domainFilter);

            if (loading) return React.createElement('div', { className: 'loading-container' }, React.createElement('div', { className: 'spinner' }), React.createElement('p', null, 'Loading curation data...'));

            return (
                <>
                    {notification && (
                        <div style={{ position: 'fixed', top: '16px', right: '16px', zIndex: 9999, padding: '10px 20px', borderRadius: '8px', background: notification.type === 'error' ? '#ef4444' : '#22c55e', color: '#fff', fontSize: '13px', fontWeight: 600, boxShadow: '0 4px 12px rgba(0,0,0,0.3)' }}>
                            {notification.msg}
                        </div>
                    )}

                    <h2 style={{ marginBottom: '12px' }}>Curation Workspace</h2>

                    {/* KPI Bar */}
                    <div className="stats-bar" style={{ marginBottom: '16px' }}>
                        <div className="stat-item" onClick={() => handleTierChange('all')} style={{ cursor: 'pointer', opacity: activeTier === 'all' ? 1 : 0.6 }}>
                            <div className="stat-item-label">Total</div>
                            <div className="stat-item-value">{summary.total}</div>
                        </div>
                        <div className="stat-item" onClick={() => handleTierChange('auto')} style={{ cursor: 'pointer', opacity: activeTier === 'auto' ? 1 : 0.6 }}>
                            <div className="stat-item-label">Auto-Approve (90%+)</div>
                            <div className="stat-item-value" style={{ color: '#22c55e' }}>{summary.auto_approve}</div>
                        </div>
                        <div className="stat-item" onClick={() => handleTierChange('review')} style={{ cursor: 'pointer', opacity: activeTier === 'review' ? 1 : 0.6 }}>
                            <div className="stat-item-label">Review (60-89%)</div>
                            <div className="stat-item-value" style={{ color: '#f59e0b' }}>{summary.review}</div>
                        </div>
                        <div className="stat-item" onClick={() => handleTierChange('manual')} style={{ cursor: 'pointer', opacity: activeTier === 'manual' ? 1 : 0.6 }}>
                            <div className="stat-item-label">Manual (&lt;60%)</div>
                            <div className="stat-item-value" style={{ color: '#ef4444' }}>{summary.manual}</div>
                        </div>
                        <div className="stat-item" onClick={() => handleTierChange('approved')} style={{ cursor: 'pointer', opacity: activeTier === 'approved' ? 1 : 0.6 }}>
                            <div className="stat-item-label">Approved</div>
                            <div className="stat-item-value" style={{ color: 'var(--green)' }}>{summary.approved}</div>
                        </div>
                        <div className="stat-item" onClick={() => handleTierChange('rejected')} style={{ cursor: 'pointer', opacity: activeTier === 'rejected' ? 1 : 0.6 }}>
                            <div className="stat-item-label">Rejected</div>
                            <div className="stat-item-value" style={{ color: 'var(--red)' }}>{summary.rejected}</div>
                        </div>
                    </div>

                    {/* View mode tabs + actions */}
                    <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', alignItems: 'center', flexWrap: 'wrap' }}>
                        <div style={{ display: 'flex', gap: '2px', background: 'var(--bg-secondary)', borderRadius: '6px', padding: '2px' }}>
                            {[{k:'columns',l:'Columns'},{k:'entities',l:`Entities (${tables.length})`},{k:'relationships',l:`Relationships (${relationships.length})`}].map(t => (
                                <button key={t.k} onClick={() => { setViewMode(t.k); setSelectedCol(null); setSelectedTable(null); }}
                                    style={{ padding: '6px 14px', fontSize: '12px', fontWeight: 600, border: 'none', borderRadius: '5px', cursor: 'pointer',
                                        background: viewMode === t.k ? 'var(--accent)' : 'transparent', color: viewMode === t.k ? '#fff' : 'var(--text-dim)' }}>
                                    {t.l}
                                </button>
                            ))}
                        </div>
                        {viewMode === 'columns' && (activeTier === 'auto' || activeTier === 'review') && (
                            <button className="btn-primary" onClick={() => handleBulkApprove(activeTier === 'auto' ? 90 : 60)} disabled={bulkApproving}
                                style={{ marginLeft: 'auto', fontSize: '12px', padding: '6px 16px' }}>
                                {bulkApproving ? 'Approving...' : activeTier === 'auto' ? `Bulk Approve ${summary.auto_approve} Columns` : `Bulk Approve ${summary.review} Review Columns`}
                            </button>
                        )}
                        {viewMode === 'entities' && entitySummary.pending > 0 && (
                            <button className="btn-primary" onClick={handleBulkApproveEntities} disabled={bulkApproving}
                                style={{ marginLeft: 'auto', fontSize: '12px', padding: '6px 16px' }}>
                                {bulkApproving ? 'Approving...' : `Bulk Approve ${entitySummary.pending} Entities`}
                            </button>
                        )}
                        {viewMode === 'relationships' && (
                            <div style={{ marginLeft: 'auto', display: 'flex', gap: '8px' }}>
                                {relSummary.pending > 0 && (
                                    <button className="btn-secondary" onClick={handleBulkApproveRels} disabled={bulkApproving}
                                        style={{ fontSize: '12px', padding: '6px 16px' }}>
                                        {bulkApproving ? 'Approving...' : `Bulk Approve ${relSummary.pending}`}
                                    </button>
                                )}
                                <button className="btn-primary" onClick={() => setShowAddRel(!showAddRel)}
                                    style={{ fontSize: '12px', padding: '6px 16px' }}>
                                    {showAddRel ? 'Cancel' : '+ Add Relationship'}
                                </button>
                            </div>
                        )}
                    </div>

                    {/* ===== COLUMNS VIEW ============ */}
                    {viewMode === 'columns' && (
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                            <div>
                                {/* Search bar + domain filter */}
                                <div style={{ display: 'flex', gap: '8px', marginBottom: '8px' }}>
                                    <input type="text" placeholder="Search columns, tables, descriptions..." value={searchTerm}
                                        onChange={e => handleSearchChange(e.target.value)}
                                        style={{ flex: 1, padding: '8px 12px', fontSize: '13px', borderRadius: '6px', border: '1px solid var(--border)', background: 'var(--bg-primary)', color: 'var(--text-primary)', boxSizing: 'border-box' }} />
                                    <select value={domainFilter} onChange={e => { setDomainFilter(e.target.value); setSelectedCol(null); }}
                                        style={{ padding: '8px 10px', fontSize: '12px', borderRadius: '6px', border: '1px solid var(--border)', background: 'var(--bg-primary)', color: 'var(--text-primary)', minWidth: '140px' }}>
                                        <option value="all">All Domains</option>
                                        {availableDomains.map(d => (
                                            <option key={d} value={d}>{d}</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="header-bar">
                                    {activeTier === 'all' ? 'All Columns' : activeTier === 'auto' ? 'Auto-Approve Queue (90%+)' : activeTier === 'review' ? 'Review Queue (60-89%)' : activeTier === 'manual' ? 'Manual Curation (<60%)' : activeTier === 'approved' ? 'Approved Columns' : 'Rejected Columns'}
                                    {domainFilter !== 'all' ? ` · ${domainFilter}` : ''}
                                    {' '}({domainFilteredColumns.length}{domainFilter !== 'all' ? ` of ${pagination.filtered_total}` : ''})
                                </div>
                                <div style={{ maxHeight: '520px', overflowY: 'auto' }}>
                                    {domainFilteredColumns.length === 0 ? (
                                        <div style={{ padding: '32px', textAlign: 'center', color: 'var(--text-dim)' }}>
                                            <Icon name="CheckCircle" size={32} />
                                            <p style={{ marginTop: '8px' }}>No columns in this {domainFilter !== 'all' ? 'domain/' : ''}tier</p>
                                        </div>
                                    ) : domainFilteredColumns.map(col => (
                                        <div key={col.id} onClick={() => handleSelectCol(col)}
                                            style={{ padding: '10px 12px', cursor: 'pointer', borderBottom: '1px solid var(--border)',
                                                background: selectedCol?.id === col.id ? 'rgba(99,102,241,0.1)' : 'transparent',
                                                borderLeft: selectedCol?.id === col.id ? '3px solid var(--accent)' : '3px solid transparent' }}>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                <div>
                                                    <span style={{ fontFamily: 'monospace', fontSize: '12px', fontWeight: 600 }}>{col.column_name}</span>
                                                    {col.business_name && <span style={{ fontSize: '11px', color: 'var(--text-dim)', marginLeft: '8px' }}>({col.business_name})</span>}
                                                </div>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                                                    <span style={{ fontSize: '11px', fontWeight: 700, color: confidenceColor(col.confidence_score) }}>
                                                        {Number(col.confidence_score).toFixed(0)}%
                                                    </span>
                                                    {statusBadge(col.enrichment_status)}
                                                </div>
                                            </div>
                                            <div style={{ fontSize: '11px', color: 'var(--text-dim)', marginTop: '2px' }}>
                                                {col.table_name} · {col.data_type}{col.is_pk ? ' · PK' : ''}{col.is_fk ? ' · FK' : ''}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                {/* Pagination */}
                                {pagination.total_pages > 1 && (
                                    <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', gap: '8px', padding: '10px 0', borderTop: '1px solid var(--border)' }}>
                                        <button onClick={() => handlePageChange(pagination.page - 1)} disabled={pagination.page <= 1}
                                            style={{ padding: '4px 10px', fontSize: '12px', borderRadius: '4px', border: '1px solid var(--border)', background: 'var(--bg-secondary)', color: 'var(--text-primary)', cursor: pagination.page <= 1 ? 'default' : 'pointer', opacity: pagination.page <= 1 ? 0.4 : 1 }}>
                                            Prev
                                        </button>
                                        <span style={{ fontSize: '12px', color: 'var(--text-dim)' }}>
                                            Page {pagination.page} of {pagination.total_pages}
                                        </span>
                                        <button onClick={() => handlePageChange(pagination.page + 1)} disabled={pagination.page >= pagination.total_pages}
                                            style={{ padding: '4px 10px', fontSize: '12px', borderRadius: '4px', border: '1px solid var(--border)', background: 'var(--bg-secondary)', color: 'var(--text-primary)', cursor: pagination.page >= pagination.total_pages ? 'default' : 'pointer', opacity: pagination.page >= pagination.total_pages ? 0.4 : 1 }}>
                                            Next
                                        </button>
                                    </div>
                                )}
                            </div>

                            {/* Right: Detail panel */}
                            <div>
                                {!selectedCol ? (
                                    <div style={{ padding: '48px', textAlign: 'center', color: 'var(--text-dim)', background: 'var(--bg-secondary)', borderRadius: '8px' }}>
                                        <Icon name="Columns" size={36} />
                                        <p style={{ marginTop: '12px' }}>Select a column to review</p>
                                    </div>
                                ) : (
                                    <div className="detail-panel" style={{ padding: '16px' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '16px' }}>
                                            <div>
                                                <h3 style={{ margin: 0, fontFamily: 'monospace' }}>{selectedCol.column_name}</h3>
                                                <div style={{ fontSize: '12px', color: 'var(--text-dim)', marginTop: '4px' }}>
                                                    {selectedCol.table_name} · {selectedCol.data_type}
                                                    {selectedCol.is_pk ? ' · Primary Key' : ''}{selectedCol.is_fk ? ` · FK → ${selectedCol.fk_reference || ''}` : ''}
                                                </div>
                                            </div>
                                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                                <div style={{ width: '40px', height: '40px', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center',
                                                    background: `${confidenceColor(selectedCol.confidence_score)}22`, color: confidenceColor(selectedCol.confidence_score),
                                                    fontWeight: 700, fontSize: '13px' }}>
                                                    {Number(selectedCol.confidence_score).toFixed(0)}%
                                                </div>
                                                {statusBadge(selectedCol.enrichment_status)}
                                            </div>
                                        </div>

                                        {/* Editable fields */}
                                        <div className="header-bar" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                            <span>AI Enrichment</span>
                                            {!editMode && !correctMode && (
                                                <button onClick={() => setEditMode(true)} style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', fontSize: '11px', fontWeight: 600 }}>
                                                    Edit
                                                </button>
                                            )}
                                        </div>

                                        {(editMode || correctMode) ? (
                                            <div style={{ marginBottom: '12px' }}>
                                                {correctMode && (
                                                    <div style={{ padding: '8px 12px', marginBottom: '10px', background: 'rgba(245,158,11,0.1)', border: '1px solid rgba(245,158,11,0.3)', borderRadius: '6px', fontSize: '12px', color: '#f59e0b' }}>
                                                        Correct the enrichment below, then save & approve
                                                    </div>
                                                )}
                                                <label style={{ fontSize: '11px', fontWeight: 600, color: 'var(--text-dim)', display: 'block', marginBottom: '4px' }}>Business Name</label>
                                                <input type="text" value={editFields.business_name} onChange={e => setEditFields({ ...editFields, business_name: e.target.value })}
                                                    style={{ width: '100%', padding: '8px 10px', fontSize: '13px', borderRadius: '6px', border: '1px solid var(--border)', background: 'var(--bg-primary)', color: 'var(--text-primary)', marginBottom: '8px', boxSizing: 'border-box' }} />
                                                <label style={{ fontSize: '11px', fontWeight: 600, color: 'var(--text-dim)', display: 'block', marginBottom: '4px' }}>Description</label>
                                                <textarea value={editFields.description} onChange={e => setEditFields({ ...editFields, description: e.target.value })}
                                                    rows={3} style={{ width: '100%', padding: '8px 10px', fontSize: '13px', borderRadius: '6px', border: '1px solid var(--border)', background: 'var(--bg-primary)', color: 'var(--text-primary)', resize: 'vertical', boxSizing: 'border-box' }} />
                                                <div style={{ display: 'flex', gap: '8px', marginTop: '8px' }}>
                                                    <button className="btn-secondary" onClick={() => { setEditMode(false); setCorrectMode(false); }} style={{ fontSize: '12px', padding: '6px 12px' }}>Cancel</button>
                                                    {correctMode ? (
                                                        <>
                                                            <button className="btn-secondary" onClick={() => handleUpdateColumn(selectedCol.id, { business_name: editFields.business_name, description: editFields.description, enrichment_status: 'rejected' })}
                                                                disabled={saving} style={{ fontSize: '12px', padding: '6px 12px' }}>
                                                                {saving ? '...' : 'Reject Without Correction'}
                                                            </button>
                                                            <button className="btn-primary" disabled={saving} onClick={() => handleCorrectAndApprove(selectedCol.id)}
                                                                style={{ fontSize: '12px', padding: '6px 12px' }}>{saving ? 'Saving...' : 'Save & Approve'}</button>
                                                        </>
                                                    ) : (
                                                        <button className="btn-primary" disabled={saving} onClick={() => handleUpdateColumn(selectedCol.id, { business_name: editFields.business_name, description: editFields.description })}
                                                            style={{ fontSize: '12px', padding: '6px 12px' }}>{saving ? 'Saving...' : 'Save Changes'}</button>
                                                    )}
                                                </div>
                                            </div>
                                        ) : (
                                            <div style={{ marginBottom: '12px' }}>
                                                <div style={{ padding: '8px 0' }}>
                                                    <div style={{ fontSize: '11px', fontWeight: 600, color: 'var(--text-dim)', marginBottom: '2px' }}>Business Name</div>
                                                    <div style={{ fontSize: '13px' }}>{selectedCol.business_name || '—'}</div>
                                                </div>
                                                <div style={{ padding: '8px 0', borderTop: '1px solid var(--border)' }}>
                                                    <div style={{ fontSize: '11px', fontWeight: 600, color: 'var(--text-dim)', marginBottom: '2px' }}>Description</div>
                                                    <div style={{ fontSize: '13px' }}>{selectedCol.description || '—'}</div>
                                                </div>
                                            </div>
                                        )}

                                        {/* Value Dictionary */}
                                        {selectedCol.value_mapping && typeof selectedCol.value_mapping === 'object' && Object.keys(selectedCol.value_mapping).length > 0 && (
                                            <>
                                                <div className="header-bar">Value Dictionary</div>
                                                <div style={{ maxHeight: '150px', overflowY: 'auto', marginBottom: '12px' }}>
                                                    <table style={{ width: '100%', fontSize: '12px', borderCollapse: 'collapse' }}>
                                                        <thead><tr style={{ borderBottom: '1px solid var(--border)' }}>
                                                            <th style={{ textAlign: 'left', padding: '4px 8px', color: 'var(--text-dim)' }}>Value</th>
                                                            <th style={{ textAlign: 'left', padding: '4px 8px', color: 'var(--text-dim)' }}>Meaning</th>
                                                        </tr></thead>
                                                        <tbody>
                                                            {Object.entries(selectedCol.value_mapping).slice(0, 20).map(([k, v]) => (
                                                                <tr key={k} style={{ borderBottom: '1px solid var(--border)' }}>
                                                                    <td style={{ padding: '4px 8px', fontFamily: 'monospace' }}>{k}</td>
                                                                    <td style={{ padding: '4px 8px' }}>{v}</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                    {Object.keys(selectedCol.value_mapping).length > 20 && (
                                                        <div style={{ fontSize: '11px', color: 'var(--text-dim)', padding: '4px 8px' }}>+{Object.keys(selectedCol.value_mapping).length - 20} more</div>
                                                    )}
                                                </div>
                                            </>
                                        )}

                                        {/* Enrichment metadata */}
                                        <div style={{ fontSize: '11px', color: 'var(--text-dim)', padding: '8px 0', borderTop: '1px solid var(--border)' }}>
                                            Enriched by: {selectedCol.enriched_by || '—'} · {selectedCol.enriched_at ? new Date(selectedCol.enriched_at).toLocaleDateString() : '—'}
                                        </div>

                                        {/* Action buttons — Approve / Correct & Approve flow */}
                                        {selectedCol.enrichment_status !== 'approved' && selectedCol.enrichment_status !== 'rejected' && !editMode && !correctMode && (
                                            <div style={{ display: 'flex', gap: '8px', marginTop: '8px' }}>
                                                <button className="btn-secondary" onClick={() => { setCorrectMode(true); setEditFields({ business_name: selectedCol.business_name || '', description: selectedCol.description || '' }); }}
                                                    style={{ flex: 1, fontSize: '13px', padding: '10px' }} disabled={saving}>
                                                    Correct & Approve
                                                </button>
                                                <button className="btn-primary" onClick={() => handleUpdateColumn(selectedCol.id, { enrichment_status: 'approved' })}
                                                    style={{ flex: 1, fontSize: '13px', padding: '10px' }} disabled={saving}>
                                                    Approve
                                                </button>
                                            </div>
                                        )}
                                        {selectedCol.enrichment_status === 'approved' && !editMode && !correctMode && (
                                            <div style={{ display: 'flex', gap: '8px', marginTop: '8px' }}>
                                                <button className="btn-secondary" onClick={() => handleUpdateColumn(selectedCol.id, { enrichment_status: 'needs_review' })}
                                                    style={{ flex: 1, fontSize: '12px', padding: '8px' }} disabled={saving}>
                                                    Revert to Review
                                                </button>
                                            </div>
                                        )}
                                        {selectedCol.enrichment_status === 'rejected' && !editMode && !correctMode && (
                                            <div style={{ display: 'flex', gap: '8px', marginTop: '8px' }}>
                                                <button className="btn-secondary" onClick={() => { setCorrectMode(true); setEditFields({ business_name: selectedCol.business_name || '', description: selectedCol.description || '' }); }}
                                                    style={{ flex: 1, fontSize: '12px', padding: '8px' }} disabled={saving}>
                                                    Correct & Approve
                                                </button>
                                                <button className="btn-primary" onClick={() => handleUpdateColumn(selectedCol.id, { enrichment_status: 'approved' })}
                                                    style={{ flex: 1, fontSize: '12px', padding: '8px' }} disabled={saving}>
                                                    Approve As-Is
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* ===== ENTITIES VIEW ============ */}
                    {viewMode === 'entities' && (() => {
                        // Group tables by domain
                        const domainGroups = {};
                        tables.forEach(t => {
                            const meta = t.entity_metadata ? (typeof t.entity_metadata === 'string' ? JSON.parse(t.entity_metadata) : t.entity_metadata) : {};
                            const domain = meta.domain && meta.domain !== 'General' && meta.domain !== 'UNKNOWN' && meta.domain !== '' ? meta.domain : null;
                            const key = domain || '__unclassified__';
                            if (!domainGroups[key]) domainGroups[key] = [];
                            domainGroups[key].push(t);
                        });
                        // Sort domains alphabetically, Unclassified last
                        const domainKeys = Object.keys(domainGroups).filter(k => k !== '__unclassified__').sort();
                        if (domainGroups['__unclassified__']) domainKeys.push('__unclassified__');

                        const toggleDomain = (key) => {
                            setExpandedDomains(prev => ({ ...prev, [key]: !prev[key] }));
                        };
                        // Default: all expanded on first render
                        const isDomainExpanded = (key) => expandedDomains[key] !== false;

                        return (
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                            <div>
                                <div className="header-bar" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                    <span>Entities ({tables.length})</span>
                                    <span style={{ fontSize: '11px', color: 'var(--text-dim)' }}>
                                        {entitySummary.approved} approved · {entitySummary.rejected} rejected · {entitySummary.pending} pending
                                    </span>
                                </div>
                                <div style={{ maxHeight: '600px', overflowY: 'auto' }}>
                                    {domainKeys.map(domainKey => {
                                        const isUnclassified = domainKey === '__unclassified__';
                                        const domainLabel = isUnclassified ? 'Unclassified' : domainKey;
                                        const domainTables = domainGroups[domainKey];
                                        const domainApproved = domainTables.filter(t => t.enrichment_status === 'approved').length;
                                        const expanded = isDomainExpanded(domainKey);

                                        return (
                                            <div key={domainKey}>
                                                {/* Domain group header */}
                                                <div onClick={() => toggleDomain(domainKey)}
                                                    style={{ padding: '8px 12px', cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                                                        background: isUnclassified ? 'rgba(245,158,11,0.08)' : 'var(--bg-secondary)',
                                                        borderBottom: '1px solid var(--border)', borderLeft: isUnclassified ? '3px solid #f59e0b' : '3px solid var(--accent)',
                                                        position: 'sticky', top: 0, zIndex: 1 }}>
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                                        <span style={{ fontSize: '11px', color: 'var(--text-dim)' }}>{expanded ? '▾' : '▸'}</span>
                                                        <span style={{ fontSize: '12px', fontWeight: 700, color: isUnclassified ? '#f59e0b' : 'var(--text-primary)' }}>
                                                            {domainLabel}
                                                        </span>
                                                        <span style={{ fontSize: '11px', color: 'var(--text-dim)' }}>
                                                            ({domainTables.length} {domainTables.length === 1 ? 'table' : 'tables'})
                                                        </span>
                                                    </div>
                                                    <span style={{ fontSize: '11px', color: 'var(--text-dim)' }}>
                                                        {domainApproved}/{domainTables.length} approved
                                                    </span>
                                                </div>
                                                {/* Domain tables */}
                                                {expanded && domainTables.map(t => {
                                                    const meta = t.entity_metadata ? (typeof t.entity_metadata === 'string' ? JSON.parse(t.entity_metadata) : t.entity_metadata) : {};
                                                    return (
                                                        <div key={t.id} onClick={() => { setSelectedTable(t); setEditTableMode(false); setCorrectEntityMode(false); setEditTableFields({ entity_name: t.entity_name || '', description: t.description || '', entity_type: meta.entity_type || '', domain: meta.domain || '' }); }}
                                                            style={{ padding: '10px 12px 10px 28px', cursor: 'pointer', borderBottom: '1px solid var(--border)',
                                                                background: selectedTable?.id === t.id ? 'rgba(99,102,241,0.1)' : 'transparent',
                                                                borderLeft: selectedTable?.id === t.id ? '3px solid var(--accent)' : '3px solid transparent' }}>
                                                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                                <span style={{ fontWeight: 600, fontSize: '13px' }}>{t.entity_name || t.table_name}</span>

                try {

                    setPatterns(patterns.map(p => p.id === patternId ? { ...p, status: 'approved' } : p));
                } catch (err) { console.error(err); }
            };

            const filtered = filterStatus === 'all' ? patterns : patterns.filter(p => p.status === filterStatus);

            if (loading) return <div style={{ padding: '40px', textAlign: 'center', color: 'var(--text-dim)' }}>Loading patterns...</div>;

            return (
                <>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                        <h2 style={{ margin: 0 }}>Pattern Library (QPD)</h2>
                        <div style={{ display: 'flex', gap: '8px' }}>
                            {['all', 'ai_discovered', 'approved'].map(s => (
                                <button key={s} className={filterStatus === s ? 'btn-primary btn-sm' : 'btn-secondary btn-sm'}
                                    onClick={() => setFilterStatus(s)}>
                                    {s === 'all' ? `All (${patterns.length})` : s === 'ai_discovered' ? `Discovered (${patterns.filter(p => p.status === 'ai_discovered').length})` : `Approved (${patterns.filter(p => p.status === 'approved').length})`}
                                </button>
                            ))}
                        </div>
                    </div>

                    {filtered.length === 0 ? (
                        <div style={{ padding: '40px', textAlign: 'center', color: 'var(--text-dim)' }}>
                            <Icon name="Grid" size={48} />
                            <p style={{ marginTop: '12px', fontSize: '15px' }}>No query patterns yet</p>
                            <p style={{ fontSize: '13px' }}>Run the pipeline to discover sample questions per business object.</p>
                        </div>
                    ) : (
                        <div className="pattern-grid">
                            {filtered.map(pattern => (
                                <div key={pattern.id} className="pattern-card" onClick={() => setExpanded(expanded === pattern.id ? null : pattern.id)}>
                                    <div className="pattern-name">{pattern.pattern_name || 'Query Pattern'}</div>
                                    <div className="pattern-meta" style={{ fontSize: '13px', lineHeight: '1.4' }}>
                                        {pattern.nl_template}
                                    </div>

                                    {expanded === pattern.id && (
                                        <>
                                            {pattern.sql_template && (
                                                <div className="code-block" style={{ marginTop: '12px', fontSize: '11px', whiteSpace: 'pre-wrap' }}>
                                                    {pattern.sql_template}
                                                </div>
                                            )}
                                            <div className="tags" style={{ marginTop: '12px' }}>
                                                {pattern.tables_used && <span className="tag">{pattern.tables_used}</span>}
                                                <span className="tag">{pattern.usage_count || 0} uses</span>
                                                <span className={`tag ${pattern.status === 'approved' ? 'badge-green' : 'badge-orange'}`}>{pattern.status}</span>
                                            </div>
                                            {pattern.status !== 'approved' && (
                                                <div className="action-bar" style={{ marginTop: '12px' }}>
                                                    <button className="btn-primary btn-sm" onClick={(e) => { e.stopPropagation(); handleApprove(pattern.id); }}>Approve</button>
                                                </div>
                                            )}
                                        </>
                                    )}
                                </div>
                            ))}
                        </div>
                    )}
                </>
            );
        };

        const TestConsole = ({ appId }) => {

            const [results, setResults] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [history, setHistory] = useState([]);

                        setSampleQuestions(allQuestions.length > 0 ? allQuestions : getDefaultQuestions());
                    } catch (err) {
                        setSampleQuestions(getDefaultQuestions());
                    }
                };
                fetchSamples();
            }, [appId]);

            const getDefaultQuestions = () => [
                { question: 'How many accounts were opened in each district over time?', table: 'account', businessName: 'Bank Account' },
                { question: 'What is the default rate for loans by duration and amount ranges?', table: 'loan', businessName: 'Loan Contract' },
                { question: 'What percentage of cards are gold versus classic type?', table: 'card', businessName: 'Payment Card' },
                { question: 'Which districts have the highest average salaries and lowest unemployment rates?', table: 'district', businessName: 'District' },
                { question: 'What is the most common fee payment frequency for bank accounts?', table: 'account', businessName: 'Bank Account' },
                { question: 'How many accounts have multiple authorized users?', table: 'disp', businessName: 'Account Disposition' },
                { question: 'Which account holders have credit card transactions below the average amount?', table: 'trans', businessName: 'Transaction' },
                { question: 'What was the purpose of debiting a total from a specific account?', table: 'order', businessName: 'Payment Order' },
                { question: 'Which loan amounts and terms have the best repayment performance?', table: 'loan', businessName: 'Loan Contract' },
                { question: 'What is the age distribution of bank clients by gender?', table: 'client', businessName: 'Client' },
                { question: 'List all cash withdrawals for a specific client', table: 'trans', businessName: 'Transaction' },

            ];

            const handleAsk = async () => {
                if (!query.trim()) return;
                setIsLoading(true);
                setFeedbackGiven(null);
                try {
                    const data = await api.callWithErrors('POST', `/test/${appId}/nl2sql`, { question: query });
                    setHistory([{ question: query, timestamp: new Date().toLocaleTimeString() }, ...history]);
                    setResults(data);
                    // Refresh query log if it's open
                    if (showQueryLog) fetchQueryLog();
                } catch (err) {
                    setResults({ error: err.message, sql: null, rows: [] });

            };

            const handleSelectQuestion = (q) => {

            };

            return (
                <>

                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px' }}>

                                    <Icon name="Eye" size={48} />

                            onClick={() => { if (!showQueryLog) fetchQueryLog(); setShowQueryLog(!showQueryLog); }}>
                            <div className="header-bar" style={{ margin: 0, flex: 1 }}>
                                Query History {queryLog.length > 0 ? `(${queryLog.length})` : ''}
                            </div>
                            <span style={{ fontSize: '12px', color: 'var(--text-dim)', padding: '0 8px' }}>

                        {showQueryLog && (
                            <div style={{ marginTop: '8px' }}>

                                <div style={{ display: 'flex', gap: '6px', marginBottom: '10px' }}>
                                    {[
                                        { key: 'all', label: 'All' },

                                        <button key={f.key}
                                            className={logFilter === f.key ? 'btn-primary' : 'btn-secondary'}
                                            onClick={() => setLogFilter(f.key)}

                                <div style={{ maxHeight: '350px', overflowY: 'auto' }}>

                                                <th style={{ width: '30%' }}>SQL</th>
                                                <th style={{ width: '10%' }}>Feedback</th>
                                                <th style={{ width: '12%' }}>Date</th>
                                                <th style={{ width: '13%' }}>Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {queryLog
                                                .filter(q => logFilter === 'all' ? true :
                                                    logFilter === 'none' ? !q.feedback :
                                                    q.feedback === logFilter)
                                                .map(q => (
                                                <tr key={q.id}>
                                                    <td style={{ maxWidth: '250px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={q.nl_query}>{q.nl_query}</td>
                                                    <td style={{ fontFamily: 'monospace', fontSize: '11px', maxWidth: '200px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }} title={q.generated_sql}>{q.generated_sql}</td>
                                                    <td>
                                                        {q.feedback === 'thumbs_up' ? (
                                                            <span style={{ color: '#16a34a', fontWeight: 600 }}>👍</span>
                                                        ) : q.feedback === 'thumbs_down' ? (
                                                            <span style={{ color: '#dc2626', fontWeight: 600 }}>👎</span>

                                                            <span style={{ color: 'var(--text-dim)' }}>—</span>

                                                    </td>
                                                    <td style={{ color: 'var(--text-dim)', fontSize: '11px' }}>

                                                                <button className="btn-secondary" style={{ padding: '2px 6px', fontSize: '11px' }}
                                                                    title="Mark as correct"
                                                                    onClick={async () => {
                                                                        await api.post(`/test/${appId}/query/${q.id}/feedback`, { feedback: 'thumbs_up' });

                                                            )}
                                                            {q.feedback !== 'thumbs_down' && (
                                                                <button className="btn-secondary" style={{ padding: '2px 6px', fontSize: '11px' }}
                                                                    title="Mark as incorrect"
                                                                    onClick={async () => {
                                                                        await api.post(`/test/${appId}/query/${q.id}/feedback`, { feedback: 'thumbs_down' });
                                                                        fetchQueryLog();
                                                                    }}>👎</button>
                                                            )}
                                                            {/* Re-run query */}
                                                            <button className="btn-secondary" style={{ padding: '2px 6px', fontSize: '11px' }}
                                                                title="Load this question"
                                                                onClick={() => { setQuery(q.nl_query); window.scrollTo({ top: 0, behavior: 'smooth' }); }}>
                                                                ↺
                                                            </button>
                                                            {/* Delete */}
                                                            <button className="btn-secondary" style={{ padding: '2px 6px', fontSize: '11px', color: '#ef4444' }}
                                                                title="Delete this query"
                                                                onClick={async () => {
                                                                    if (confirm('Delete this query from history?')) {
                                                                        await api.delete(`/test/${appId}/query/${q.id}`);
                                                                        fetchQueryLog();
                                                                    }
                                                                }}>✕</button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                            {queryLog.filter(q => logFilter === 'all' ? true : logFilter === 'none' ? !q.feedback : q.feedback === logFilter).length === 0 && (
                                                <tr><td colSpan="5" style={{ textAlign: 'center', color: 'var(--text-dim)', padding: '20px' }}>
                                                    {queryLog.length === 0 ? 'No queries yet. Run some questions above to build your history.' : 'No queries match this filter.'}
                                                </td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </div>
                </>
            );
        };

        // =====================================================
        // KNOWLEDGE GRAPH VIEWER
        // =====================================================
        const KnowledgeGraph = ({ appId, onOpenGraphViewer }) => {
            const [entities, setEntities] = useState([]);
            const [selectedEntity, setSelectedEntity] = useState(null);
            const [relationships, setRelationships] = useState([]);
            const [loading, setLoading] = useState(true);
            const [viewMode, setViewMode] = useState('graph'); // 'graph' or 'list'

            useEffect(() => {
                if (!appId) return;
                const fetchKG = async () => {
                    setLoading(true);
                    try {
                        // Fetch tables, columns, and relationships in parallel
                        const [tablesResp, relsResp] = await Promise.all([
                            api.get(`/schema/${appId}/tables`),
                            api.get(`/schema/${appId}/relationships`)
                        ]);
                        const tablesList = tablesResp?.tables || tablesResp || [];
                        const apiRels = relsResp?.relationships || [];
                        const enrichedEntities = [];
