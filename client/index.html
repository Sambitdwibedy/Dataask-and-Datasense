                    columnId: newSynonym.columnId || null,
                    tableId: newSynonym.tableId || null,
                    source: 'builder_curated',
                };
                try {
                    const res = await fetch(`/api/synonyms/${appId}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', ...authHeaders() },
                        body: JSON.stringify(payload),
                    });
                    const data = await res.json();
                    if (!res.ok || data.error) {
                        alert('Save failed: ' + (data.error || res.status));
                        return;
                    }
                    setNewSynonym({ term: '', columnId: '', tableId: '' });
                    setShowAdd(false);
                    fetchSynonyms();
                } catch (e) {
                    alert('Save failed: ' + e.message);
                }
            };

            const handleDelete = async (id) => {
                if (!confirm('Delete this synonym?')) return;
                await fetch(`/api/synonyms/${appId}/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${sessionStorage.getItem('bokg_jwt')}` },
                });
                fetchSynonyms();
            };

            const handleStatusToggle = async (syn) => {
                const newStatus = syn.status === 'active' ? 'rejected' : 'active';
                await fetch(`/api/synonyms/${appId}/${syn.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionStorage.getItem('bokg_jwt')}` },
                    body: JSON.stringify({ status: newStatus }),
                });
                fetchSynonyms();
            };

            const handleEdit = async (id) => {
                if (!editTerm.trim()) return;
                await fetch(`/api/synonyms/${appId}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionStorage.getItem('bokg_jwt')}` },
                    body: JSON.stringify({ term: editTerm.trim() }),
                });
                setEditingId(null);
                setEditTerm('');
                fetchSynonyms();
            };

            const handleGenerate = async () => {
                setGenerating(true);
                try {
                    const res = await fetch(`/api/synonyms/${appId}/generate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionStorage.getItem('bokg_jwt')}` },
                        body: JSON.stringify({}),
                    });
                    const data = await res.json();
                    alert(`Generated ${data.generated} synonyms for review`);
                    fetchSynonyms();
                } catch (e) { alert('Generation failed'); }
                setGenerating(false);
            };

            const handleOpenPackPicker = async () => {
                try {
                    const res = await fetch(`/api/synonyms/packs?_=${Date.now()}`, {
                        headers: { 'Authorization': `Bearer ${sessionStorage.getItem('bokg_jwt')}`, 'Cache-Control': 'no-cache' },
                    });
                    if (!res.ok) {
                        const errText = await res.text();
                        console.error('Pack fetch failed:', res.status, errText);
                        alert('Failed to load packs: ' + res.status);
                        return;
                    }
                    const data = await res.json();
                    const packs = data.packs || [];
                    if (packs.length === 0) {
                        alert('No domain packs are available yet.');
                        return;
                    }
                    setAvailablePacks(packs);
                    setSelectedPacks(packs.map(p => p.name));
                    setShowPackPicker(true);
                } catch (e) {
                    console.error('Pack picker error:', e);
                    alert('Failed to load domain packs: ' + e.message);
                }
            };

            const handleApplySelected = async () => {
                if (selectedPacks.length === 0) return;
                setApplying(true);
                try {
                    const res = await fetch(`/api/synonyms/${appId}/apply-global?_=${Date.now()}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionStorage.getItem('bokg_jwt')}`, 'Cache-Control': 'no-cache' },
                        body: JSON.stringify({ packs: selectedPacks }),
                    });
                    const data = await res.json();
                    if (data.error) {
                        setApplying(false);
                        alert('Error: ' + data.error);
                        return;
                    }
                    setShowPackPicker(false);
                    setApplying(false);
                    fetchSynonyms();
                } catch (e) {
                    setApplying(false);
                    alert('Failed to apply synonym packs: ' + e.message);
                }
            };

            const togglePack = (name) => {
                setSelectedPacks(prev => prev.includes(name) ? prev.filter(p => p !== name) : [...prev, name]);
            };

            const handleResetSynonyms = async () => {
                try {
                    const res = await fetch(`/api/synonyms/${appId}/all?_=${Date.now()}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${sessionStorage.getItem('bokg_jwt')}`, 'Cache-Control': 'no-cache' },
                    });
                    const data = await res.json();
                    setShowResetConfirm(false);
                    fetchSynonyms();
                } catch (e) {
                    alert('Reset failed: ' + e.message);
                }
            };

            const sourceColor = (src) => {
                switch(src) {
                    case 'solix_global': return 'var(--blue)';
                    case 'domain_pack': return 'var(--accent)';
                    case 'ai_generated': return 'var(--orange)';
                    case 'builder_curated': return 'var(--green)';
                    default: return 'var(--text-dim)';
                }
            };

            const statusIcon = (s) => s === 'active' ? '✓' : s === 'rejected' ? '✗' : '⏳';

            return (
                <div style={{ padding: '24px' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                        <div>
                            <h2 style={{ color: 'var(--text-primary)', margin: 0 }}>Synonym & Ontology Manager</h2>
                            <p style={{ color: 'var(--text-dim)', fontSize: '14px', marginTop: '4px' }}>
                                Manage business language synonyms that help users find data using natural language
                            </p>
                        </div>
                        <div style={{ display: 'flex', gap: '8px' }}>
                            <button onClick={handleOpenPackPicker} style={{ padding: '8px 16px', background: 'var(--blue)', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer', fontSize: '13px' }}>
                                Apply Domain Packs
                            </button>
                            <button onClick={handleGenerate} disabled={generating} style={{ padding: '8px 16px', background: 'var(--accent)', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer', fontSize: '13px', opacity: generating ? 0.6 : 1 }}>
                                {generating ? 'Generating...' : 'AI Generate'}
                            </button>
                            <button onClick={() => setShowAdd(!showAdd)} style={{ padding: '8px 16px', background: 'var(--green)', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer', fontSize: '13px' }}>
                                + Add Synonym
                            </button>
                            {(summary.total || 0) > 0 && (
                                <button onClick={() => setShowResetConfirm(true)} style={{ padding: '8px 16px', background: 'none', color: 'var(--red)', border: '1px solid var(--red)', borderRadius: '6px', cursor: 'pointer', fontSize: '13px' }}>
                                    Reset
                                </button>
                            )}
                        </div>
                    </div>

                    {/* Reset confirmation */}
                    {showResetConfirm && (
                        <div style={{ background: 'rgba(239, 68, 68, 0.08)', border: '1px solid var(--red)', borderRadius: '8px', padding: '14px 20px', marginBottom: '16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <span style={{ color: 'var(--text-primary)', fontSize: '14px' }}>
                                Remove all {summary.total || 0} synonyms? This will clear domain pack, AI-generated, and manually added synonyms.
                            </span>
                            <div style={{ display: 'flex', gap: '8px' }}>
                                <button onClick={handleResetSynonyms} style={{ padding: '6px 16px', background: 'var(--red)', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer', fontSize: '13px', fontWeight: 600 }}>Confirm Reset</button>
                                <button onClick={() => setShowResetConfirm(false)} style={{ padding: '6px 16px', background: 'var(--bg-surface2)', color: 'var(--text-dim)', border: '1px solid var(--border)', borderRadius: '6px', cursor: 'pointer', fontSize: '13px' }}>Cancel</button>
                            </div>
                        </div>
                    )}

                    {/* Summary cards */}
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: '12px', marginBottom: '20px' }}>
                        {[
                            { label: 'Total', value: summary.total || 0, color: 'var(--text-primary)' },
                            { label: 'Active', value: summary.active || 0, color: 'var(--green)' },
                            { label: 'Pending Review', value: summary.pending_review || 0, color: 'var(--orange)' },
                            { label: 'Rejected', value: summary.rejected || 0, color: 'var(--red)' },
                        ].map(card => (
                            <div key={card.label} style={{ background: 'var(--bg-surface)', border: '1px solid var(--border)', borderRadius: '8px', padding: '16px', textAlign: 'center' }}>
                                <div style={{ fontSize: '24px', fontWeight: 600, color: card.color }}>{card.value}</div>
                                <div style={{ fontSize: '12px', color: 'var(--text-dim)', marginTop: '4px' }}>{card.label}</div>
                            </div>
                        ))}
                        {summary.by_source && Object.entries(summary.by_source).map(([src, count]) => (
                            <div key={src} style={{ background: 'var(--bg-surface)', border: '1px solid var(--border)', borderRadius: '8px', padding: '16px', textAlign: 'center' }}>
                                <div style={{ fontSize: '24px', fontWeight: 600, color: sourceColor(src) }}>{count}</div>
                                <div style={{ fontSize: '12px', color: 'var(--text-dim)', marginTop: '4px' }}>{src.replace('_', ' ')}</div>
                            </div>
                        ))}
                    </div>

                    {/* Domain Pack Picker Modal */}
                    {showPackPicker && (
                        <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.6)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center' }}
                             onClick={() => setShowPackPicker(false)}>
                            <div style={{ background: 'var(--bg-surface)', border: '1px solid var(--border)', borderRadius: '12px', padding: '28px', width: '520px', maxHeight: '80vh', overflow: 'auto', boxShadow: '0 20px 60px rgba(0,0,0,0.4)' }}
                                 onClick={e => e.stopPropagation()}>
                                <h3 style={{ color: 'var(--text-primary)', margin: '0 0 6px 0', fontSize: '18px' }}>Apply Domain Synonym Packs</h3>
                                <p style={{ color: 'var(--text-dim)', fontSize: '13px', margin: '0 0 20px 0' }}>
                                    Select the synonym packs to apply to this application. Each pack adds industry-specific terminology that helps Data Ask understand natural language queries.
                                </p>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', marginBottom: '24px' }}>
                                    {availablePacks.map(pack => (
                                        <div key={pack.name}
                                             onClick={() => togglePack(pack.name)}
                                             style={{
                                                 background: selectedPacks.includes(pack.name) ? 'rgba(74, 158, 255, 0.08)' : 'var(--bg-surface2)',
                                                 border: selectedPacks.includes(pack.name) ? '2px solid var(--blue)' : '2px solid var(--border)',
                                                 borderRadius: '8px', padding: '16px', cursor: 'pointer',
                                                 transition: 'all 0.15s ease',
                                             }}>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '6px' }}>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                                    <div style={{
                                                        width: '20px', height: '20px', borderRadius: '4px',
                                                        border: selectedPacks.includes(pack.name) ? '2px solid var(--blue)' : '2px solid var(--text-dim)',
                                                        background: selectedPacks.includes(pack.name) ? 'var(--blue)' : 'transparent',
                                                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                                                        color: 'white', fontSize: '14px', fontWeight: 700,
                                                    }}>{selectedPacks.includes(pack.name) ? '✓' : ''}</div>
                                                    <span style={{ color: 'var(--text-primary)', fontWeight: 600, fontSize: '15px' }}>{pack.label}</span>
                                                </div>
                                                <span style={{ padding: '3px 10px', background: 'var(--bg-surface)', borderRadius: '12px', fontSize: '12px', color: 'var(--text-dim)', fontWeight: 600 }}>{pack.termCount} terms</span>
                                            </div>
                                            <p style={{ color: 'var(--text-dim)', fontSize: '13px', margin: '0 0 0 30px', lineHeight: '1.4' }}>{pack.description}</p>
                                            {pack.categories && pack.categories.length > 0 && (
                                                <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap', marginTop: '8px', marginLeft: '30px' }}>
                                                    {pack.categories.slice(0, 8).map(cat => (
                                                        <span key={cat} style={{ padding: '2px 8px', background: 'var(--bg-surface)', borderRadius: '10px', fontSize: '11px', color: 'var(--text-dim)' }}>{cat}</span>
                                                    ))}
                                                    {pack.categories.length > 8 && <span style={{ fontSize: '11px', color: 'var(--text-dim)' }}>+{pack.categories.length - 8} more</span>}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '10px' }}>
                                    <button onClick={() => setShowPackPicker(false)}
                                        style={{ padding: '10px 20px', background: 'var(--bg-surface2)', color: 'var(--text-dim)', border: '1px solid var(--border)', borderRadius: '6px', cursor: 'pointer', fontSize: '13px' }}>
                                        Cancel
                                    </button>
                                    <button onClick={handleApplySelected} disabled={selectedPacks.length === 0 || applying}
                                        style={{ padding: '10px 24px', background: selectedPacks.length > 0 ? 'var(--blue)' : 'var(--bg-surface2)', color: 'white', border: 'none', borderRadius: '6px', cursor: selectedPacks.length > 0 ? 'pointer' : 'default', fontSize: '13px', fontWeight: 600, opacity: applying ? 0.6 : 1 }}>
                                        {applying ? 'Applying...' : `Apply ${selectedPacks.length} Pack${selectedPacks.length !== 1 ? 's' : ''}`}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Add form */}
                    {showAdd && (
                        <div style={{ background: 'var(--bg-surface)', border: '1px solid var(--border)', borderRadius: '8px', padding: '16px', marginBottom: '16px' }}>
                            <h3 style={{ color: 'var(--text-primary)', marginBottom: '12px', fontSize: '15px' }}>Add New Synonym</h3>
                            <div style={{ display: 'flex', gap: '12px', flexWrap: 'wrap', alignItems: 'end' }}>
                                <div>
                                    <label style={{ display: 'block', fontSize: '12px', color: 'var(--text-dim)', marginBottom: '4px' }}>Synonym Term *</label>
                                    <input value={newSynonym.term} onChange={e => { const v = e.target.value; setNewSynonym(prev => ({...prev, term: v})); }}
                                        placeholder="e.g., revenue, income, sales"
                                        style={{ padding: '8px 12px', background: 'var(--bg-surface2)', border: '1px solid var(--border)', borderRadius: '6px', color: 'var(--text-primary)', width: '220px' }}
                                    />
                                </div>
                                <div>
                                    <label style={{ display: 'block', fontSize: '12px', color: 'var(--text-dim)', marginBottom: '4px' }}>Table (optional)</label>
                                    <select value={newSynonym.tableId} onChange={e => { const v = e.target.value; setNewSynonym(prev => ({...prev, tableId: v, columnId: ''})); fetchColumns(v); }}
                                        style={{ padding: '8px 12px', background: 'var(--bg-surface2)', border: '1px solid var(--border)', borderRadius: '6px', color: 'var(--text-primary)', width: '200px' }}>
                                        <option value="">All tables</option>
                                        {tables.map(t => <option key={t.id} value={t.id}>{t.entity_name || t.table_name}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label style={{ display: 'block', fontSize: '12px', color: 'var(--text-dim)', marginBottom: '4px' }}>Column (optional)</label>
                                    <select value={newSynonym.columnId} onChange={e => { const v = e.target.value; setNewSynonym(prev => ({...prev, columnId: v})); }}
                                        style={{ padding: '8px 12px', background: 'var(--bg-surface2)', border: '1px solid var(--border)', borderRadius: '6px', color: 'var(--text-primary)', width: '200px' }}>
                                        <option value="">All columns</option>
                                        {columns.map(c => <option key={c.id} value={c.id}>{c.business_name || c.column_name}</option>)}
                                    </select>
                                </div>
                                <button type="button" onClick={handleAdd} style={{ padding: '8px 20px', background: 'var(--green)', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer', fontWeight: 600 }}>Save</button>
                                <button type="button" onClick={() => setShowAdd(false)} style={{ padding: '8px 20px', background: 'var(--bg-surface2)', color: 'var(--text-dim)', border: '1px solid var(--border)', borderRadius: '6px', cursor: 'pointer' }}>Cancel</button>
                            </div>
                        </div>
                    )}

                    {/* Filters */}
                    <div style={{ display: 'flex', gap: '12px', marginBottom: '16px', alignItems: 'center' }}>
                        <input placeholder="Search synonyms, columns, tables..." value={filter.search}
                            onChange={e => setFilter({...filter, search: e.target.value})}
                            onKeyDown={e => { if (e.key === 'Enter') fetchSynonyms(); }}
                            style={{ padding: '8px 12px', background: 'var(--bg-surface)', border: '1px solid var(--border)', borderRadius: '6px', color: 'var(--text-primary)', flex: 1, maxWidth: '300px' }}
                        />
                        <select value={filter.status} onChange={e => setFilter({...filter, status: e.target.value})}
                            style={{ padding: '8px 12px', background: 'var(--bg-surface)', border: '1px solid var(--border)', borderRadius: '6px', color: 'var(--text-primary)' }}>
                            <option value="">All Statuses</option>
                            <option value="active">Active</option>
                            <option value="pending_review">Pending Review</option>
                            <option value="rejected">Rejected</option>
                        </select>
                        <select value={filter.source} onChange={e => setFilter({...filter, source: e.target.value})}
                            style={{ padding: '8px 12px', background: 'var(--bg-surface)', border: '1px solid var(--border)', borderRadius: '6px', color: 'var(--text-primary)' }}>
                            <option value="">All Sources</option>
                            <option value="solix_global">Global Ontology</option>
                            <option value="domain_pack">Domain Pack</option>
                            <option value="ai_generated">AI Generated</option>
                            <option value="builder_curated">Builder Curated</option>
                        </select>
                    </div>

                    {/* Synonym table */}
                    {loading ? (
                        <div style={{ textAlign: 'center', padding: '40px', color: 'var(--text-dim)' }}>Loading synonyms...</div>
                    ) : synonyms.length === 0 ? (
                        <div style={{ textAlign: 'center', padding: '40px', color: 'var(--text-dim)', background: 'var(--bg-surface)', borderRadius: '8px', border: '1px solid var(--border)' }}>
                            <p style={{ fontSize: '16px', marginBottom: '8px' }}>No synonyms yet</p>
                            <p style={{ fontSize: '13px' }}>Use "AI Generate" to automatically suggest synonyms, or add them manually</p>
                        </div>
                    ) : (
                        <div style={{ background: 'var(--bg-surface)', border: '1px solid var(--border)', borderRadius: '8px', overflow: 'hidden' }}>
                            <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                                <thead>
                                    <tr style={{ borderBottom: '1px solid var(--border)' }}>
                                        <th style={{ padding: '10px 16px', textAlign: 'left', fontSize: '12px', fontWeight: 600, color: 'var(--text-dim)', textTransform: 'uppercase' }}>Synonym</th>
                                        <th style={{ padding: '10px 16px', textAlign: 'left', fontSize: '12px', fontWeight: 600, color: 'var(--text-dim)', textTransform: 'uppercase' }}>Maps To</th>
                                        <th style={{ padding: '10px 16px', textAlign: 'left', fontSize: '12px', fontWeight: 600, color: 'var(--text-dim)', textTransform: 'uppercase' }}>Table</th>
                                        <th style={{ padding: '10px 16px', textAlign: 'center', fontSize: '12px', fontWeight: 600, color: 'var(--text-dim)', textTransform: 'uppercase' }}>Source</th>
                                        <th style={{ padding: '10px 16px', textAlign: 'center', fontSize: '12px', fontWeight: 600, color: 'var(--text-dim)', textTransform: 'uppercase' }}>Status</th>
                                        <th style={{ padding: '10px 16px', textAlign: 'center', fontSize: '12px', fontWeight: 600, color: 'var(--text-dim)', textTransform: 'uppercase' }}>Confidence</th>
                                        <th style={{ padding: '10px 16px', textAlign: 'center', fontSize: '12px', fontWeight: 600, color: 'var(--text-dim)', textTransform: 'uppercase' }}>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {synonyms.map(syn => (
                                        <tr key={syn.id} style={{ borderBottom: '1px solid var(--border)' }}>
                                            <td style={{ padding: '10px 16px', color: 'var(--text-primary)', fontWeight: 500 }}>
                                                {editingId === syn.id ? (
                                                    <input value={editTerm} onChange={e => setEditTerm(e.target.value)}
                                                        onKeyDown={e => { if (e.key === 'Enter') handleEdit(syn.id); if (e.key === 'Escape') setEditingId(null); }}
                                                        autoFocus
                                                        style={{ padding: '4px 8px', background: 'var(--bg-surface2)', border: '1px solid var(--accent)', borderRadius: '4px', color: 'var(--text-primary)', width: '160px' }}
                                                    />
                                                ) : syn.term}
                                            </td>
                                            <td style={{ padding: '10px 16px', color: 'var(--text-dim)', fontSize: '13px' }}>{syn.business_name || syn.column_name || '—'}</td>
                                            <td style={{ padding: '10px 16px', color: 'var(--text-dim)', fontSize: '13px' }}>{syn.entity_name || syn.table_name || '—'}</td>
                                            <td style={{ padding: '10px 16px', textAlign: 'center' }}>
                                                <span style={{ padding: '2px 8px', borderRadius: '12px', fontSize: '11px', fontWeight: 600, color: 'white', background: sourceColor(syn.source) }}>
                                                    {(syn.source || '').replace('_', ' ')}
                                                </span>
                                            </td>
                                            <td style={{ padding: '10px 16px', textAlign: 'center' }}>
                                                <span style={{ cursor: 'pointer', fontSize: '14px' }} onClick={() => handleStatusToggle(syn)} title={`Click to ${syn.status === 'active' ? 'reject' : 'activate'}`}>
                                                    {statusIcon(syn.status)} {syn.status}
                                                </span>
                                            </td>
                                            <td style={{ padding: '10px 16px', textAlign: 'center', color: 'var(--text-dim)', fontSize: '13px' }}>{syn.confidence_score}%</td>
                                            <td style={{ padding: '10px 16px', textAlign: 'center' }}>
                                                <div style={{ display: 'flex', gap: '6px', justifyContent: 'center' }}>
                                                    <button onClick={() => { setEditingId(syn.id); setEditTerm(syn.term); }} style={{ padding: '4px 8px', background: 'none', border: '1px solid var(--border)', borderRadius: '4px', color: 'var(--text-dim)', cursor: 'pointer', fontSize: '12px' }}>Edit</button>
                                                    <button onClick={() => handleDelete(syn.id)} style={{ padding: '4px 8px', background: 'none', border: '1px solid var(--red)', borderRadius: '4px', color: 'var(--red)', cursor: 'pointer', fontSize: '12px' }}>Delete</button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                </div>
            );
        };

        // ═══════════════════════════════════════════════════════════════
        //  Guided Workflow V2 — Replaces Pipeline page
        //  Interlocking chevron stepper with dependency enforcement
        // ═══════════════════════════════════════════════════════════════
        const GuidedWorkflow = ({ appId, onNavigate, onPipelineStatusChange }) => {
            const [stepStatus, setStepStatus] = useState(null);
            const [activeStep, setActiveStep] = useState(null);
            const [runningStep, setRunningStep] = useState(null);
            const [stepResult, setStepResult] = useState(null);
            const [loading, setLoading] = useState(true);
            const [resetConfirm, setResetConfirm] = useState(null); // null or step key
            const [enrichProgress, setEnrichProgress] = useState(null);
            const enrichPollRef = useRef(null);

            const STEPS = [
                { key: 'connect', order: 1, label: 'Connect & Load', icon: 'Database',
                  desc: 'Configure data source and load schema metadata',
                  detail: 'Connects to the source database (SQLite, Oracle, SAP), loads all tables and columns into the knowledge graph. This is the foundation — all other steps depend on this.',
                  runnable: true, requires: [],
                  reviewLinks: [
                    { page: 'schema', label: 'Schema Explorer', icon: 'Database' },
                    { page: 'data', label: 'Data Browser', icon: 'Table' },
                  ] },
                { key: 'profile', order: 2, label: 'Profile & Classify', icon: 'BarChart2',
                  desc: 'Statistical profiling, data type detection, and table classification',
                  detail: 'Samples rows from each table, builds value dictionaries, detects data types, identifies date columns and low-cardinality fields. Also classifies tables as business data, enrichment sources (metadata), or excludable system tables.',
                  runnable: true, requires: ['connect'],
                  reviewLinks: [
                    { page: 'profile', label: 'Profile Review', icon: 'BarChart2' },
                    { page: 'data', label: 'Data Browser', icon: 'Table' },
                    { page: 'schema', label: 'Schema Explorer', icon: 'Database' },
                  ] },
                { key: 'discover', order: 3, label: 'Discover Relationships', icon: 'Share',
                  desc: 'Detect foreign keys and table relationships',
                  detail: 'Finds join paths between tables using declared FKs, naming conventions (column_id → table), and shared column names. Correct relationships are critical for multi-table queries.',
                  runnable: true, requires: ['connect', 'profile'],
                  reviewLinks: [
                    { page: 'knowledge', label: 'Knowledge Graph', icon: 'Share' },
                  ] },
                { key: 'context', order: 4, label: 'Add Context', icon: 'FileText',
                  desc: 'Provide business rules, domain docs, and field mappings',
                  detail: 'Upload data dictionaries, ERDs, vendor documentation, or enter business rules manually. More context = better enrichment quality. Examples: "INVOICE_STATUS A = Approved", "Always filter on ORG_ID for multi-org".',
                  runnable: false, humanStep: true, requires: ['connect', 'profile', 'discover'],
                  skipLabel: 'Skip — No Context Available',
                  completeLabel: 'Context Provided — Proceed',
                  reviewLinks: [
                    { page: 'context', label: 'Context Library', icon: 'FileText' },
                  ] },
                { key: 'enrich', order: 5, label: 'AI Enrichment', icon: 'Wand2',
                  desc: 'AI generates business names, descriptions, and classifications',
                  detail: 'The AI analyzes each table\'s columns using profiling data, relationships, and context documents to generate human-readable business names and descriptions. This is the longest step — may take several minutes for large schemas.',
                  runnable: true, requires: ['connect', 'profile', 'discover'],
                  reviewLinks: [
                    { page: 'curation', label: 'Review Enrichments', icon: 'CheckCircle' },
                    { page: 'schema', label: 'Schema Explorer', icon: 'Database' },
                  ] },
                { key: 'synonyms', order: 6, label: 'Synonyms', icon: 'BookOpen',
                  desc: 'Add business language synonyms for natural language matching',
                  detail: 'Open the Synonym Manager to configure synonyms across three layers: (1) Domain packs (healthcare, banking, etc.), (2) AI-generated from enrichment results, (3) manual additions. Review all synonyms and their sources, then mark as reviewed to proceed.',
                  runnable: false, humanStep: true, requires: ['connect', 'profile', 'discover', 'enrich'],
                  skipLabel: 'Skip — No Synonyms Needed',
                  completeLabel: 'Synonyms Reviewed — Proceed',
                  reviewLinks: [
                    { page: 'synonyms', label: 'Synonym Manager', icon: 'BookOpen' },
                  ] },
                { key: 'curate', order: 7, label: 'Curate & Review', icon: 'CheckCircle',
                  desc: 'Human review and quality gate before indexing',
                  detail: 'Review AI-generated business names, descriptions, relationships, and query patterns. This is the quality gate — approve good enrichments, edit inaccurate ones. Check the Quality dashboard for KG completeness. Mark as reviewed when satisfied.',
                  runnable: false, humanStep: true, requires: ['connect', 'profile', 'discover', 'enrich'],
                  completeLabel: 'Mark as Reviewed',
                  reviewLinks: [
                    { page: 'curation', label: 'Curation Workspace', icon: 'CheckCircle' },
                    { page: 'knowledge', label: 'Knowledge Graph', icon: 'Share' },
                    { page: 'patterns', label: 'Query Patterns', icon: 'Grid' },
                    { page: 'quality', label: 'Quality Dashboard', icon: 'TrendingUp' },
                  ] },
                { key: 'index', order: 8, label: 'Build Index', icon: 'Layers',
                  desc: 'Build vector embeddings for semantic schema linking',
                  detail: 'Creates vector embeddings from the full enriched KG — including business names, descriptions, query patterns, and synonyms. This powers the semantic search that helps Data Ask find relevant tables by meaning, not just keyword matching.',
                  runnable: true, requires: ['connect', 'profile', 'discover', 'enrich', 'curate'],
                  reviewLinks: [] },
                { key: 'validate', order: 9, label: 'Validate', icon: 'FlaskConical',
                  desc: 'Test NL→SQL accuracy with sample queries',
                  detail: 'Run sample questions through the full NL→SQL pipeline (query-engine.js) and verify the generated SQL is correct. You can also type your own test questions. Aim for 80%+ accuracy before publishing.',
                  runnable: true, requires: ['connect', 'profile', 'discover', 'enrich', 'curate', 'index'],
                  reviewLinks: [
                    { page: 'test', label: 'Test Console', icon: 'Eye' },
                  ] },
                { key: 'publish', order: 10, label: 'Publish', icon: 'Rocket',
                  desc: 'Make knowledge graph available for Data Ask end-users',
                  detail: 'Publishing makes this application\'s knowledge graph active in Data Ask. End-users can immediately start asking natural language questions against this data source.',
                  runnable: true, requires: ['connect', 'profile', 'discover', 'enrich', 'curate', 'index', 'validate'],
                  reviewLinks: [] },
            ];

            const fetchStatus = async () => {
                try {
                    const data = await api.get(`/pipeline/${appId}/step-status`);
                    if (data) {
                        setStepStatus(data);
                        // Auto-select first incomplete step
                        if (!activeStep) {
                            const firstIncomplete = STEPS.find(s => !data[s.key]?.done);
                            setActiveStep(firstIncomplete ? firstIncomplete.key : STEPS[STEPS.length - 1].key);
                        }
                    }
                } catch (e) { console.error('Step status error:', e); }
                setLoading(false);
            };

            useEffect(() => { fetchStatus(); }, [appId]);

            // Poll for enrichment progress when running enrich step
            useEffect(() => {
                if (runningStep === 'enrich') {
                    enrichPollRef.current = setInterval(async () => {
                        try {
                            const data = await api.get(`/pipeline/${appId}/status`);
                            if (data?.progress) setEnrichProgress(data.progress);
                            if (data?.status !== 'running') {
                                clearInterval(enrichPollRef.current);
                            }
                        } catch {}
                    }, 3000);
                } else {
                    if (enrichPollRef.current) clearInterval(enrichPollRef.current);
                    setEnrichProgress(null);
                }
                return () => { if (enrichPollRef.current) clearInterval(enrichPollRef.current); };
            }, [runningStep]);

            const runStep = async (stepKey) => {
                setRunningStep(stepKey);
                setStepResult(null);
                try {
                    const data = await api.callWithErrors('POST', `/pipeline/${appId}/run-step`, { step: stepKey });
                    setStepResult({ step: stepKey, ...data });
                    // Refresh status after step completes
                    await fetchStatus();
                    // If re-running a step that invalidates published state, update KG status
                    if (data?.kgStatusChanged) {
                        if (onPipelineStatusChange) onPipelineStatusChange();
                    }
                } catch (e) {
                    setStepResult({ step: stepKey, success: false, error: e.message });
                }
                setRunningStep(null);
            };

            const handleHumanComplete = async (stepKey) => {
                try {
                    await api.callWithErrors('POST', `/pipeline/${appId}/run-step`, { step: stepKey, action: 'complete' });
                    await fetchStatus();
                } catch (e) {
                    setStepResult({ step: stepKey, success: false, error: e.message });
                }
            };

            const handleHumanSkip = async (stepKey) => {
                try {
                    await api.callWithErrors('POST', `/pipeline/${appId}/run-step`, { step: stepKey, action: 'skip' });
                    await fetchStatus();
                } catch (e) {
                    setStepResult({ step: stepKey, success: false, error: e.message });
                }
            };

            const handleResetStep = async (stepKey) => {
                try {
                    await api.callWithErrors('POST', `/pipeline/${appId}/run-step`, { step: stepKey, action: 'reset' });
                    setResetConfirm(null);
                    setStepResult(null);
                    await fetchStatus();
                } catch (e) {
                    setStepResult({ step: stepKey, success: false, error: e.message });
                }
            };

            const isStepLocked = (step) => {
                if (!stepStatus) return true;
                return step.requires.some(req => !stepStatus[req]?.done);
            };

            const getMissingDeps = (step) => {
                if (!stepStatus) return [];
                return step.requires
                    .filter(req => !stepStatus[req]?.done)
                    .map(req => STEPS.find(s => s.key === req)?.label || req);
            };

            const completedCount = stepStatus ? STEPS.filter(s => stepStatus[s.key]?.done).length : 0;
            const totalSteps = STEPS.length;
            const pct = Math.round((completedCount / totalSteps) * 100);

            if (loading) return <div style={{ padding: '40px', textAlign: 'center', color: 'var(--text-dim)' }}>Loading workflow...</div>;

            const currentStepDef = STEPS.find(s => s.key === activeStep);
            const currentStatus = stepStatus?.[activeStep];
            const currentResult = stepResult?.step === activeStep ? stepResult : null;
            const activeIdx = STEPS.findIndex(s => s.key === activeStep);

            // Chevron colors
            const getChevronStyle = (step) => {
                const done = stepStatus?.[step.key]?.done;
                const isActive = step.key === activeStep;
                const locked = isStepLocked(step);
                const needsRerun = stepStatus?.[step.key]?.needsRerun;
                if (done && !needsRerun) return { bg: '#22c55e', text: 'white', border: '#16a34a' };
                if (needsRerun) return { bg: '#f59e0b', text: 'white', border: '#d97706' };
                if (isActive && !locked) return { bg: 'var(--accent)', text: 'white', border: '#3b82f6' };
                if (locked) return { bg: 'var(--bg-surface2)', text: 'rgba(255,255,255,0.3)', border: 'var(--border)' };
                return { bg: 'var(--bg-surface2)', text: 'var(--text-dim)', border: 'var(--border)' };
            };

            return (
                <div style={{ padding: '24px' }}>
                    {/* Header */}
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                        <div>
                            <h2 style={{ color: 'var(--text-primary)', margin: 0 }}>Knowledge Graph Builder</h2>
                            <p style={{ color: 'var(--text-dim)', fontSize: '13px', marginTop: '4px' }}>
                                Step-by-step guided workflow — run each step, review results, then proceed
                            </p>
                        </div>
                        <div style={{ textAlign: 'center', minWidth: '80px' }}>
                            <div style={{ fontSize: '28px', fontWeight: 700, color: pct === 100 ? 'var(--green)' : 'var(--accent)' }}>{pct}%</div>
                            <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>{completedCount}/{totalSteps} steps</div>
                        </div>
                    </div>

                    {/* Interlocking Chevron Stepper */}
                    <div style={{ display: 'flex', alignItems: 'stretch', marginBottom: '24px', overflowX: 'auto', paddingBottom: '4px' }}>
                        {STEPS.map((s, idx) => {
                            const done = stepStatus?.[s.key]?.done;
                            const isActive = s.key === activeStep;
                            const locked = isStepLocked(s);
                            const chevStyle = getChevronStyle(s);
                            return (
                                <div
                                    key={s.key}
                                    onClick={() => { setActiveStep(s.key); setStepResult(null); }}
                                    title={locked ? `Requires: ${getMissingDeps(s).join(', ')}` : `${s.order}. ${s.label}`}
                                    style={{
                                        position: 'relative', cursor: locked ? 'not-allowed' : 'pointer',
                                        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                                        padding: '10px 20px 10px 28px', minWidth: '90px',
                                        background: chevStyle.bg, color: chevStyle.text,
                                        clipPath: idx === 0
                                            ? 'polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%)'
                                            : idx === STEPS.length - 1
                                            ? 'polygon(0 0, 100% 0, 100% 100%, 0 100%, 14px 50%)'
                                            : 'polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%, 14px 50%)',
                                        marginLeft: idx > 0 ? '-8px' : '0',
                                        transition: 'all 0.2s',
                                        opacity: locked ? 0.45 : 1,
                                        filter: isActive ? 'brightness(1.1)' : 'none',
                                        boxShadow: isActive ? '0 0 0 2px rgba(59,130,246,0.4)' : 'none',
                                        zIndex: isActive ? 10 : STEPS.length - idx,
                                        flexShrink: 0,
                                    }}
                                >
                                    <div style={{ fontSize: '13px', fontWeight: 700, lineHeight: 1 }}>
                                        {done ? '✓' : s.order}
                                    </div>
                                    <div style={{ fontSize: '9px', fontWeight: 500, marginTop: '2px', whiteSpace: 'nowrap', letterSpacing: '0.3px', textAlign: 'center', lineHeight: '1.2' }}>
                                        {s.label}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Active step detail panel */}
                    {currentStepDef && (
                        <div style={{ background: 'var(--bg-surface)', border: '1px solid var(--border)', borderRadius: '12px', overflow: 'hidden' }}>
                            {/* Step header bar */}
                            <div style={{ padding: '20px 24px', borderBottom: '1px solid var(--border)',
                                background: currentStatus?.done ? 'rgba(34,197,94,0.04)' : isStepLocked(currentStepDef) ? 'rgba(128,128,128,0.04)' : 'rgba(59,130,246,0.04)' }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '14px' }}>
                                    <div style={{
                                        width: '44px', height: '44px', borderRadius: '12px',
                                        background: currentStatus?.done ? 'var(--green)' : isStepLocked(currentStepDef) ? '#4b5563' : 'var(--accent)',
                                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                                        color: 'white', fontSize: '18px', fontWeight: 700,
                                    }}>
                                        {currentStatus?.done ? '✓' : currentStepDef.order}
                                    </div>
                                    <div style={{ flex: 1 }}>
                                        <div style={{ fontSize: '18px', fontWeight: 700, color: 'var(--text-primary)' }}>
                                            Step {currentStepDef.order}: {currentStepDef.label}
                                        </div>
                                        <div style={{ fontSize: '13px', color: 'var(--text-dim)', marginTop: '2px' }}>
                                            {currentStepDef.desc}
                                        </div>
                                    </div>
                                    {currentStatus?.done && (
                                        <span style={{ padding: '6px 14px', borderRadius: '20px', fontSize: '12px', fontWeight: 600,
                                            background: 'rgba(34,197,94,0.12)', color: 'var(--green)' }}>
                                            Complete
                                        </span>
                                    )}
                                    {isStepLocked(currentStepDef) && (
                                        <span style={{ padding: '6px 14px', borderRadius: '20px', fontSize: '12px', fontWeight: 600,
                                            background: 'rgba(107,114,128,0.12)', color: '#9ca3af' }}>
                                            Locked
                                        </span>
                                    )}
                                    {!currentStatus?.done && !isStepLocked(currentStepDef) && currentStatus?.summary && currentStatus.summary !== 'No tests' && currentStatus.summary !== 'Not built' && currentStatus.summary !== 'draft' && (
                                        <span style={{ padding: '6px 14px', borderRadius: '20px', fontSize: '12px', fontWeight: 600,
                                            background: 'rgba(245,158,11,0.12)', color: 'var(--orange)' }}>
                                            In Progress
                                        </span>
                                    )}
                                </div>
                            </div>

                            {/* Step body */}
                            <div style={{ padding: '24px' }}>
                                {/* Dependency warning */}
                                {isStepLocked(currentStepDef) && (
                                    <div style={{ fontSize: '13px', color: '#f59e0b', lineHeight: '1.5', marginBottom: '20px',
                                        padding: '12px 18px', background: 'rgba(245,158,11,0.06)', borderRadius: '8px', border: '1px solid rgba(245,158,11,0.2)',
                                        display: 'flex', alignItems: 'center', gap: '10px' }}>
                                        <Icon name="Lock" size={16} />
                                        <span>This step requires completing: <strong>{getMissingDeps(currentStepDef).join(', ')}</strong></span>
                                    </div>
                                )}

                                {/* What this step does */}
                                <div style={{ fontSize: '14px', color: 'var(--text-secondary)', lineHeight: '1.6', marginBottom: '20px',
                                    padding: '14px 18px', background: 'var(--bg-surface2)', borderRadius: '8px', borderLeft: '3px solid var(--accent)' }}>
                                    {currentStepDef.detail}
                                </div>

                                {/* Current status summary */}
                                {currentStatus && (
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '20px',
                                        padding: '12px 18px', background: currentStatus.done ? 'rgba(34,197,94,0.06)' : 'var(--bg-surface2)',
                                        borderRadius: '8px', border: `1px solid ${currentStatus.done ? 'rgba(34,197,94,0.2)' : 'var(--border)'}` }}>
                                        <span style={{ fontSize: '13px', fontWeight: 600, color: 'var(--text-dim)' }}>Current Status:</span>
                                        <span style={{ fontSize: '14px', color: 'var(--text-primary)', fontWeight: 500 }}>{currentStatus.summary}</span>
                                    </div>
                                )}

                                {/* Enrichment live progress (when running enrich step) */}
                                {runningStep === 'enrich' && enrichProgress && enrichProgress.columns_total > 0 && (
                                    <div style={{ marginBottom: '20px', padding: '16px', background: 'rgba(59,130,246,0.06)', borderRadius: '8px', border: '1px solid rgba(59,130,246,0.2)' }}>
                                        <div style={{ fontSize: '14px', fontWeight: 600, color: 'var(--text)', marginBottom: '8px' }}>
                                            AI Enrichment in Progress
                                        </div>
                                        <div style={{ fontSize: '13px', color: 'var(--text-dim)', marginBottom: '8px' }}>
                                            Analyzing: <strong style={{ color: 'var(--text)' }}>{enrichProgress.current_table || '...'}</strong>
                                            &nbsp;·&nbsp; {enrichProgress.tables_done}/{enrichProgress.tables_total} tables
                                            &nbsp;·&nbsp; {Math.round((enrichProgress.columns_done / enrichProgress.columns_total) * 100)}% complete
                                            {enrichProgress.eta_seconds > 0 && (
                                                <>&nbsp;·&nbsp; ~{enrichProgress.eta_seconds > 60 ? Math.ceil(enrichProgress.eta_seconds / 60) + ' min' : enrichProgress.eta_seconds + 's'} remaining</>
                                            )}
                                        </div>
                                        <div className="progress-bar" style={{ height: '8px' }}>
                                            <div className="progress-fill" style={{ width: `${Math.round((enrichProgress.columns_done / enrichProgress.columns_total) * 100)}%`, transition: 'width 0.5s' }} />
                                        </div>
                                    </div>
                                )}

                                {/* Action buttons */}
                                <div style={{ display: 'flex', gap: '10px', flexWrap: 'wrap', marginBottom: '20px' }}>
                                    {/* Runnable steps: Run / Re-run button */}
                                    {currentStepDef.runnable && !isStepLocked(currentStepDef) && (
                                        <button
                                            onClick={() => runStep(currentStepDef.key)}
                                            disabled={!!runningStep}
                                            style={{
                                                padding: '10px 20px', borderRadius: '8px', border: 'none', cursor: runningStep ? 'wait' : 'pointer',
                                                background: currentStatus?.done ? 'var(--bg-surface2)' : 'var(--accent)',
                                                color: currentStatus?.done ? 'var(--text-primary)' : 'white',
                                                fontSize: '14px', fontWeight: 600, display: 'flex', alignItems: 'center', gap: '8px',
                                                opacity: runningStep ? 0.7 : 1,
                                            }}
                                        >
                                            {runningStep === currentStepDef.key ? (
                                                <><span style={{ display: 'inline-block', animation: 'spin 1s linear infinite', fontSize: '14px' }}>⟳</span> Running...</>
                                            ) : currentStatus?.done ? (
                                                <><Icon name="RefreshCw" size={14} /> Re-run Step</>
                                            ) : (
                                                <><Icon name="Play" size={14} /> Run {currentStepDef.label}</>
                                            )}
                                        </button>
                                    )}

                                    {/* Human steps: Complete / Skip buttons */}
                                    {currentStepDef.humanStep && !isStepLocked(currentStepDef) && !currentStatus?.done && (
                                        <>
                                            <button onClick={() => handleHumanComplete(currentStepDef.key)}
                                                style={{
                                                    padding: '10px 20px', borderRadius: '8px', border: 'none', cursor: 'pointer',
                                                    background: 'var(--green)', color: 'white',
                                                    fontSize: '14px', fontWeight: 600, display: 'flex', alignItems: 'center', gap: '8px',
                                                }}>
                                                <Icon name="CheckCircle" size={14} /> {currentStepDef.completeLabel || 'Mark as Complete'}
                                            </button>
                                            {currentStepDef.skipLabel && (
                                                <button onClick={() => handleHumanSkip(currentStepDef.key)}
                                                    style={{
                                                        padding: '10px 20px', borderRadius: '8px', cursor: 'pointer',
                                                        background: 'none', color: 'var(--text-dim)',
                                                        border: '1px solid var(--border)',
                                                        fontSize: '14px', fontWeight: 500, display: 'flex', alignItems: 'center', gap: '8px',
                                                    }}>
                                                    <Icon name="SkipForward" size={14} /> {currentStepDef.skipLabel}
                                                </button>
                                            )}
                                        </>
                                    )}

                                    {/* Human steps already done: allow re-open */}
                                    {currentStepDef.humanStep && currentStatus?.done && (
                                        <button onClick={() => handleResetStep(currentStepDef.key)}
                                            style={{
                                                padding: '10px 20px', borderRadius: '8px', cursor: 'pointer',
                                                background: 'var(--bg-surface2)', color: 'var(--text-primary)',
                                                border: '1px solid var(--border)',
                                                fontSize: '14px', fontWeight: 500, display: 'flex', alignItems: 'center', gap: '8px',
                                            }}>
                                            <Icon name="RefreshCw" size={14} /> Re-open for Review
                                        </button>
                                    )}

                                    {/* Reset / Re-run warning for completed runnable steps */}
                                    {currentStepDef.runnable && currentStatus?.done && !resetConfirm && (
                                        <button onClick={() => setResetConfirm(currentStepDef.key)}
                                            style={{
                                                padding: '10px 20px', borderRadius: '8px', cursor: 'pointer',
                                                background: 'none', color: '#d97706',
                                                border: '1px solid rgba(217,119,6,0.3)',
                                                fontSize: '13px', fontWeight: 500, display: 'flex', alignItems: 'center', gap: '8px',
                                            }}>
                                            <Icon name="RotateCcw" size={14} /> Reset Step & Downstream
                                        </button>
                                    )}
                                    {resetConfirm === currentStepDef.key && (
                                        <div style={{ display: 'flex', gap: '8px', alignItems: 'center', padding: '8px 12px', background: 'rgba(217,119,6,0.06)', borderRadius: '6px', border: '1px solid rgba(217,119,6,0.2)' }}>
                                            <span style={{ color: '#d97706', fontSize: '13px' }}>This will reset this step and invalidate all downstream steps. The KG will be marked as unpublished.</span>
                                            <button onClick={() => handleResetStep(currentStepDef.key)}
                                                style={{ background: '#d97706', color: 'white', border: 'none', padding: '6px 12px', borderRadius: '4px', cursor: 'pointer', fontSize: '12px', whiteSpace: 'nowrap' }}>Confirm Reset</button>
                                            <button onClick={() => setResetConfirm(null)}
                                                style={{ background: '#374151', color: 'white', border: 'none', padding: '6px 12px', borderRadius: '4px', cursor: 'pointer', fontSize: '12px' }}>Cancel</button>
                                        </div>
                                    )}
                                </div>

                                {/* Review links — multiple per step */}
                                {currentStepDef.reviewLinks && currentStepDef.reviewLinks.length > 0 && onNavigate && (
                                    <div style={{ marginBottom: '20px' }}>
                                        <div style={{ fontSize: '12px', fontWeight: 600, color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '8px' }}>Review</div>
                                        <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
                                            {currentStepDef.reviewLinks.map(link => (
                                                <button key={link.page}
                                                    onClick={() => onNavigate(link.page)}
                                                    style={{
                                                        padding: '8px 16px', borderRadius: '8px', cursor: 'pointer',
                                                        background: 'none', color: 'var(--accent)',
                                                        border: '1px solid var(--accent)',
                                                        fontSize: '13px', fontWeight: 500, display: 'flex', alignItems: 'center', gap: '6px',
                                                    }}>
                                                    <Icon name={link.icon} size={14} /> {link.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Step execution results */}
                                {currentResult && (
                                    <div style={{
                                        padding: '18px', borderRadius: '10px', marginBottom: '20px',
                                        background: currentResult.success ? 'rgba(34,197,94,0.06)' : 'rgba(239,68,68,0.06)',
                                        border: `1px solid ${currentResult.success ? 'rgba(34,197,94,0.2)' : 'rgba(239,68,68,0.2)'}`,
                                    }}>
                                        <div style={{ fontSize: '14px', fontWeight: 700, marginBottom: '12px',
                                            color: currentResult.success ? 'var(--green)' : '#ef4444',
                                            display: 'flex', alignItems: 'center', gap: '8px' }}>
                                            {currentResult.success ? '✓ Step Completed' : '✗ Step Failed'}
                                        </div>

                                        {/* Guidance message */}
                                        {currentResult.guidance && (
                                            <div style={{ fontSize: '14px', color: 'var(--text-primary)', lineHeight: '1.6', marginBottom: '12px' }}>
                                                {currentResult.guidance}
                                            </div>
                                        )}

                                        {/* Result metrics */}
                                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '12px' }}>
                                            {currentResult.tables !== undefined && (
                                                <div style={{ padding: '10px 16px', background: 'rgba(255,255,255,0.5)', borderRadius: '8px', border: '1px solid var(--border)', minWidth: '90px' }}>
                                                    <div style={{ fontSize: '22px', fontWeight: 700, color: 'var(--text-primary)' }}>{currentResult.tables}</div>
                                                    <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>Tables</div>
                                                </div>
                                            )}
                                            {currentResult.columns !== undefined && (
                                                <div style={{ padding: '10px 16px', background: 'rgba(255,255,255,0.5)', borderRadius: '8px', border: '1px solid var(--border)', minWidth: '90px' }}>
                                                    <div style={{ fontSize: '22px', fontWeight: 700, color: 'var(--text-primary)' }}>{currentResult.columns}</div>
                                                    <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>Columns</div>
                                                </div>
                                            )}
                                            {currentResult.totalRows !== undefined && (
                                                <div style={{ padding: '10px 16px', background: 'rgba(255,255,255,0.5)', borderRadius: '8px', border: '1px solid var(--border)', minWidth: '90px' }}>
                                                    <div style={{ fontSize: '22px', fontWeight: 700, color: 'var(--text-primary)' }}>{currentResult.totalRows?.toLocaleString()}</div>
                                                    <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>Total Rows</div>
                                                </div>
                                            )}
                                            {currentResult.relationships !== undefined && (
                                                <div style={{ padding: '10px 16px', background: 'rgba(255,255,255,0.5)', borderRadius: '8px', border: '1px solid var(--border)', minWidth: '90px' }}>
                                                    <div style={{ fontSize: '22px', fontWeight: 700, color: 'var(--text-primary)' }}>{currentResult.relationships}</div>
                                                    <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>Relationships</div>
                                                </div>
                                            )}
                                            {currentResult.profiledTables !== undefined && (
                                                <div style={{ padding: '10px 16px', background: 'rgba(255,255,255,0.5)', borderRadius: '8px', border: '1px solid var(--border)', minWidth: '90px' }}>
                                                    <div style={{ fontSize: '22px', fontWeight: 700, color: 'var(--text-primary)' }}>{currentResult.profiledTables}/{currentResult.totalTables}</div>
                                                    <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>Tables Profiled</div>
                                                </div>
                                            )}
                                            {currentResult.dateColumnCount !== undefined && currentResult.dateColumnCount > 0 && (
                                                <div style={{ padding: '10px 16px', background: 'rgba(255,255,255,0.5)', borderRadius: '8px', border: '1px solid var(--border)', minWidth: '90px' }}>
                                                    <div style={{ fontSize: '22px', fontWeight: 700, color: 'var(--accent)' }}>{currentResult.dateColumnCount}</div>
                                                    <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>Date Columns</div>
                                                </div>
                                            )}
                                            {currentResult.lowCardCount !== undefined && currentResult.lowCardCount > 0 && (
                                                <div style={{ padding: '10px 16px', background: 'rgba(34,197,94,0.08)', borderRadius: '8px', border: '1px solid rgba(34,197,94,0.2)', minWidth: '90px' }}>
                                                    <div style={{ fontSize: '22px', fontWeight: 700, color: 'var(--green)' }}>{currentResult.lowCardCount}</div>
                                                    <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>Value Dictionaries</div>
                                                </div>
                                            )}
                                            {currentResult.totalSynonyms !== undefined && (
                                                <div style={{ padding: '10px 16px', background: 'rgba(255,255,255,0.5)', borderRadius: '8px', border: '1px solid var(--border)', minWidth: '90px' }}>
                                                    <div style={{ fontSize: '22px', fontWeight: 700, color: 'var(--text-primary)' }}>{currentResult.totalSynonyms}</div>
                                                    <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>Active Synonyms</div>
                                                </div>
                                            )}
                                            {currentResult.totalTests !== undefined && (
                                                <div style={{ padding: '10px 16px', background: 'rgba(255,255,255,0.5)', borderRadius: '8px', border: '1px solid var(--border)', minWidth: '90px' }}>
                                                    <div style={{ fontSize: '22px', fontWeight: 700, color: 'var(--text-primary)' }}>{currentResult.passed}/{currentResult.totalTests}</div>
                                                    <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>Tests Passed</div>
                                                </div>
                                            )}
                                            {currentResult.emptyTableCount > 0 && (
                                                <div style={{ padding: '10px 16px', background: 'rgba(245,158,11,0.08)', borderRadius: '8px', border: '1px solid rgba(245,158,11,0.2)', minWidth: '90px' }}>
                                                    <div style={{ fontSize: '22px', fontWeight: 700, color: 'var(--orange)' }}>{currentResult.emptyTableCount}</div>
                                                    <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>Empty Tables</div>
                                                </div>
                                            )}
                                        </div>

                                        {/* Empty tables warning */}
                                        {currentResult.emptyTables && currentResult.emptyTables.length > 0 && (
                                            <details style={{ marginTop: '12px' }}>
                                                <summary style={{ cursor: 'pointer', fontSize: '13px', color: 'var(--orange)', fontWeight: 600 }}>
                                                    ⚠ {currentResult.emptyTables.length} empty table{currentResult.emptyTables.length !== 1 ? 's' : ''} — flagged for review
                                                </summary>
                                                <div style={{ maxHeight: '160px', overflowY: 'auto', marginTop: '8px', padding: '8px 12px', background: 'rgba(245,158,11,0.04)', borderRadius: '6px' }}>
                                                    {currentResult.emptyTables.map((t, i) => (
                                                        <div key={i} style={{ fontSize: '12px', fontFamily: 'monospace', padding: '3px 0', color: 'var(--text-dim)' }}>
                                                            <span style={{ color: 'var(--orange)' }}>{t.table_name}</span>
                                                            <span style={{ opacity: 0.6 }}> ({t.column_count} columns, 0 rows)</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </details>
                                        )}

                                        {/* Table listing from Connect step */}
                                        {currentResult.tableList && currentResult.tableList.length > 0 && (
                                            <details style={{ marginTop: '12px' }}>
                                                <summary style={{ cursor: 'pointer', fontSize: '13px', color: 'var(--accent)', fontWeight: 600 }}>
                                                    View {currentResult.tables} tables loaded
                                                </summary>
                                                <div style={{ maxHeight: '240px', overflowY: 'auto', marginTop: '8px' }}>
                                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 80px 60px', gap: '2px', fontSize: '12px' }}>
                                                        <div style={{ fontWeight: 700, color: 'var(--text-dim)', padding: '4px 0', borderBottom: '1px solid var(--border)' }}>Table</div>
                                                        <div style={{ fontWeight: 700, color: 'var(--text-dim)', padding: '4px 0', borderBottom: '1px solid var(--border)', textAlign: 'right' }}>Rows</div>
                                                        <div style={{ fontWeight: 700, color: 'var(--text-dim)', padding: '4px 0', borderBottom: '1px solid var(--border)', textAlign: 'right' }}>Cols</div>
                                                        {currentResult.tableList.map((t, i) => (
                                                            <React.Fragment key={i}>
                                                                <div style={{ padding: '3px 0', fontFamily: 'monospace', color: (!t.row_count || parseInt(t.row_count) === 0) ? 'var(--orange)' : 'var(--text-primary)' }}>{t.table_name}</div>
                                                                <div style={{ padding: '3px 0', textAlign: 'right', color: 'var(--text-dim)' }}>{t.row_count ? parseInt(t.row_count).toLocaleString() : '0'}</div>
                                                                <div style={{ padding: '3px 0', textAlign: 'right', color: 'var(--text-dim)' }}>{t.column_count}</div>
                                                            </React.Fragment>
                                                        ))}
                                                    </div>
                                                </div>
                                            </details>
                                        )}

                                        {/* Relationship details table */}
                                        {currentResult.details && currentResult.details.length > 0 && (
                                            <details style={{ marginTop: '12px' }}>
                                                <summary style={{ cursor: 'pointer', fontSize: '13px', color: 'var(--accent)', fontWeight: 600 }}>
                                                    View {currentResult.details.length} relationship{currentResult.details.length !== 1 ? 's' : ''} found
                                                </summary>
                                                <div style={{ maxHeight: '200px', overflowY: 'auto', marginTop: '8px' }}>
                                                    {currentResult.details.map((r, i) => (
                                                        <div key={i} style={{ fontSize: '12px', fontFamily: 'monospace', padding: '4px 0', color: 'var(--text-dim)' }}>
                                                            {r.from_table}.<strong style={{ color: 'var(--text-primary)' }}>{r.from_column}</strong>
                                                            {' → '}{r.to_table}.<strong style={{ color: 'var(--text-primary)' }}>{r.to_column}</strong>
                                                            <span style={{ opacity: 0.6 }}> ({r.cardinality})</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </details>
                                        )}

                                        {/* Top tables by row count */}
                                        {currentResult.topTables && currentResult.topTables.length > 0 && (
