                                                        <div style={{ fontSize: '10px', color: 'var(--text-dim)', lineHeight: 1.4 }}>
                                                            {domain.tables.slice(0, 3).join(', ')}{domain.tables.length > 3 ? '...' : ''}
                                                        </div>
                                                    </div>
                                                ))}
                                            </>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                        ) : (
                        <div style={{ borderRight: '1px solid var(--border)', display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '8px 4px', background: 'var(--surface)', flexShrink: 0 }}>
                            <button onClick={() => setIdaSidebarOpen(true)} title="Show sidebar"
                                style={{ background: 'transparent', border: 'none', color: 'var(--text-dim)', cursor: 'pointer', padding: '8px', fontSize: '14px', writingMode: 'vertical-rl' }}>
                                <Icon name="PanelLeftOpen" size={16} />
                            </button>
                        </div>
                        )}

                        {/* MAIN CHAT AREA */}
                        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
                            {/* Messages */}
                            <div style={{ flex: 1, overflowY: 'auto', padding: '24px', width: '100%', boxSizing: 'border-box' }}>
                                {messages.length === 0 && (
                                    <div style={{ textAlign: 'center', padding: '40px 0' }}>
                                        <KGLogo size={48} />
                                        <h3 style={{ color: 'var(--text)', margin: '12px 0 8px' }}>Ask anything about your data</h3>
                                        <p style={{ color: 'var(--text-dim)', fontSize: '14px', margin: '0 0 24px' }}>
                                            {selectedWorkspace
                                                ? `You're in the ${selectedWorkspace.name} workspace. Ask data questions or search documents.`
                                                : 'Select an example from the sidebar, or type your own question below.'}
                                        </p>
                                        <div style={{
                                            maxWidth: '500px', margin: '0 auto', padding: '16px 20px', borderRadius: '10px',
                                            background: 'rgba(99, 102, 241, 0.06)', border: '1px solid rgba(99, 102, 241, 0.15)',
                                            textAlign: 'left', fontSize: '13px', lineHeight: '1.6', color: 'var(--text-dim)'
                                        }}>
                                            <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '8px', color: 'var(--accent)', fontWeight: 600, fontSize: '12px', textTransform: 'uppercase', letterSpacing: '0.3px' }}>
                                                <Icon name="Sparkles" size={14} /> Your feedback makes Data Ask smarter
                                            </div>
                                            <p style={{ margin: '0 0 4px' }}>
                                                <strong style={{ color: '#22c55e' }}>👍</strong> Right answer — Data Ask reuses the pattern
                                            </p>
                                            <p style={{ margin: 0 }}>
                                                <strong style={{ color: '#ef4444' }}>👎</strong> Wrong answer — Data Ask tries a different approach
                                            </p>
                                        </div>
                                    </div>
                                )}

                                {messages.map((msg, i) => {
                                    if (msg.role === 'user') {
                                        return (
                                            <div key={i} data-msg-idx={i} style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: '16px' }}>
                                                <div style={{ background: 'var(--accent)', color: '#fff', padding: '10px 16px', borderRadius: '16px 16px 4px 16px', maxWidth: '75%', fontSize: '14px' }}>
                                                    {msg.content}
                                                </div>
                                            </div>
                                        );
                                    }
                                    if (msg.role === 'error') {
                                        return (
                                            <div key={i} style={{ display: 'flex', justifyContent: 'flex-start', marginBottom: '16px' }}>
                                                <div style={{ background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.3)', color: '#ef4444', padding: '10px 16px', borderRadius: '16px 16px 16px 4px', maxWidth: '75%', fontSize: '13px' }}>
                                                    Error: {msg.content}
                                                </div>
                                            </div>
                                        );
                                    }
                                    if (msg.role === 'claudia') {
                                        const isGreeting = msg.type === 'greeting';
                                        const isFarewell = msg.type === 'farewell';
                                        return (
                                            <div key={i} style={{ display: 'flex', justifyContent: 'flex-start', marginBottom: '16px' }}>
                                                <div style={{
                                                    background: 'var(--surface)',
                                                    border: '1px solid rgba(99,102,241,0.25)',
                                                    padding: '12px 18px',
                                                    borderRadius: '16px 16px 16px 4px',
                                                    maxWidth: '75%', fontSize: '13px'
                                                }}>
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '6px' }}>
                                                        <span style={{ background: 'rgba(99,102,241,0.15)', color: 'var(--accent)', fontSize: '10px', fontWeight: 700, padding: '2px 8px', borderRadius: '4px' }}>{getAssistantName()}</span>
                                                        {isGreeting && <span style={{ fontSize: '10px', color: 'var(--text-dim)' }}>Voice Assistant</span>}
                                                    </div>
                                                    <p style={{ margin: 0, lineHeight: 1.5, color: 'var(--text)' }}>{msg.content}</p>
                                                    {msg.type === 'briefing_ready' && msg.briefingUrl && (
                                                        <a href={msg.briefingUrl} target="_blank" rel="noopener noreferrer"
                                                            style={{
                                                                display: 'inline-flex', alignItems: 'center', gap: '6px',
                                                                marginTop: '10px', padding: '8px 16px',
                                                                background: 'var(--accent)', color: '#fff',
                                                                borderRadius: '8px', fontSize: '13px', fontWeight: 600,
                                                                textDecoration: 'none', cursor: 'pointer',
                                                                transition: 'opacity 0.15s'
                                                            }}
                                                            onMouseOver={e => e.currentTarget.style.opacity = '0.85'}
                                                            onMouseOut={e => e.currentTarget.style.opacity = '1'}
                                                        >
                                                            <Icon name="FileText" size={14} /> View Briefing
                                                        </a>
                                                    )}
                                                    {voiceMode && voiceOutput.supported && (
                                                        <button onClick={() => voiceOutput.speak(msg.content, {
                                                            onComplete: () => { if (!isFarewell && voiceStartListeningRef.current) setTimeout(() => voiceStartListeningRef.current(), 400); }
                                                        })} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: '4px 0 0', color: 'var(--text-dim)', fontSize: '12px' }} title="Replay">
                                                            <Icon name="Volume2" size={12} />
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    }
                                    if (msg.role === 'disambiguation') {
                                        const conf = msg.confidence || 'low';
                                        const badgeText = conf === 'medium' ? 'Needs clarification' : 'Help me understand';
                                        const badgeColor = conf === 'medium' ? '#f59e0b' : '#ef4444';
                                        // Clean up LLM meta-language from interpretation
                                        let interp = msg.interpretation || '';
                                        interp = interp.replace(/^(The\s+)?user\s+(has\s+)?(specified|wants?\s+to|is\s+asking|asked)\s*/i, '').trim();
                                        if (interp) interp = interp.charAt(0).toUpperCase() + interp.slice(1);

                                        // Slot option click handler
                                        const handleSlotClick = (slotName, value) => {
                                            setPendingSlotSelections(prev => ({ ...prev, [slotName]: value }));
                                        };

                                        // Compose question from slot selections, preserving time scope from original query
                                        const composeFromSlots = (selections) => {
                                            const entries = Object.entries(selections);
                                            if (entries.length === 0) return disambiguationOriginalQuery || 'Show me data';
                                            let metric = '', timePeriod = '', grouping = '', scope = '';
                                            for (const [slot, val] of entries) {
                                                const ls = slot.toLowerCase();
                                                const coreVal = val.replace(/\s*\([^)]*\)\s*/g, '').trim();
                                                if (ls.includes('type') || ls.includes('metric') || ls.includes('aspect') || ls.includes('what')) metric = coreVal;
                                                else if (ls.includes('time') || ls.includes('period') || ls.includes('when')) timePeriod = coreVal;
                                                else if (ls.includes('group') || ls.includes('dimension') || ls.includes('how') || ls.includes('format') || ls.includes('output')) grouping = coreVal;
                                                else if (ls.includes('scope') || ls.includes('specific') || ls.includes('entity')) scope = coreVal;
                                                else if (!metric) metric = coreVal;
                                            }
                                            // Extract time scope from original query if not already specified in selections
                                            if (!timePeriod && disambiguationOriginalQuery) {
                                                const origLower = disambiguationOriginalQuery.toLowerCase();
                                                const timeMatch = origLower.match(/\b((?:for\s+)?(?:this|the|last|current|previous|next)\s+(?:quarter|month|year|week|fiscal\s+year|fy|q[1-4])|(?:for\s+)?(?:q[1-4]\s+)?\d{4}|(?:for\s+)?(?:january|february|march|april|may|june|july|august|september|october|november|december)(?:\s+\d{4})?|(?:month|quarter|year)\s+to\s+date|mtd|qtd|ytd|last\s+\d+\s+(?:months?|quarters?|years?|weeks?)|(?:for\s+)?the\s+(?:quarter|month|year))\b/i);
                                                if (timeMatch) timePeriod = timeMatch[0].replace(/^for\s+/i, '').trim();
                                            }
                                            let q = 'Show me';
                                            const base = (disambiguationOriginalQuery || '').replace(/^show\s+me\s*/i, '').trim();
                                            q += metric ? ` ${metric.toLowerCase()}` : (base ? ` ${base}` : ' data');
                                            if (scope) q += ` for ${scope.toLowerCase()}`;
                                            if (timePeriod) q += ` for ${timePeriod.toLowerCase()}`;
                                            if (grouping) q += ` ${grouping.toLowerCase()}`;
                                            return q;
                                        };

                                        // Run composed query handler
                                        const handleSlotRunQuery = () => {
                                            const composed = composeFromSlots(pendingSlotSelections);
                                            setPendingSlotSelections({});
                                            setDisambiguationOriginalQuery('');
                                            handleAsk(composed);
                                        };

                                        const slotCount = Object.keys(pendingSlotSelections).length;

                                        return (
                                            <div key={i} style={{ display: 'flex', justifyContent: 'flex-start', marginBottom: '16px' }}>
                                                <div style={{ background: 'var(--surface)', border: '1px solid rgba(245,158,11,0.3)', padding: '16px 20px', borderRadius: '16px 16px 16px 4px', maxWidth: '85%', fontSize: '13px' }}>
                                                    {/* Pipeline badge + voice replay */}
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '10px' }}>
                                                        <span style={{ background: `${badgeColor}22`, color: badgeColor, fontSize: '11px', fontWeight: 600, padding: '3px 10px', borderRadius: '4px' }}>{badgeText}</span>
                                                        {voiceMode && voiceOutput.supported && (
                                                            <button onClick={() => {
                                                                const prompt = generateDisambiguationPrompt(msg);
                                                                if (prompt) voiceOutput.speak(prompt, {
                                                                    onComplete: () => { if (voiceStartListeningRef.current) setTimeout(() => voiceStartListeningRef.current(), 400); }
                                                                });
                                                            }} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: '2px 4px', color: 'var(--text-dim)', fontSize: '14px' }} title="Listen to this question">
                                                                <Icon name="Volume2" size={13} />
                                                            </button>
                                                        )}
                                                    </div>

                                                    {/* Interpretation & reason */}
                                                    {interp && <p style={{ margin: '6px 0', fontWeight: 600, color: 'var(--text)', lineHeight: 1.5 }}>{interp}</p>}
                                                    {msg.disambiguation_reason && <p style={{ margin: '4px 0 12px', color: 'var(--text-dim)', fontSize: '12px' }}>{msg.disambiguation_reason}</p>}

                                                    {/* Slot questions with clickable tile options */}
                                                    {msg.slot_questions && msg.slot_questions.length > 0 && (
                                                        <div style={{ marginBottom: '14px' }}>
                                                            {msg.slot_questions.map((sq, sqi) => (
                                                                <div key={sqi} style={{ marginBottom: '10px' }}>
                                                                    <p style={{ margin: '0 0 6px', fontWeight: 600, fontSize: '12px', color: 'var(--text)' }}>{sq.question}</p>
                                                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px' }}>
                                                                        {(sq.options || []).map((opt, oi) => {
                                                                            const isSelected = pendingSlotSelections[sq.slot] === opt;
                                                                            return (
                                                                                <button key={oi} onClick={() => handleSlotClick(sq.slot, opt)}
                                                                                    style={{
                                                                                        padding: '6px 14px', fontSize: '12px', borderRadius: '8px', cursor: 'pointer',
                                                                                        border: isSelected ? '1px solid var(--accent)' : '1px solid var(--border)',
                                                                                        background: isSelected ? 'var(--accent)' : 'transparent',
                                                                                        color: isSelected ? '#fff' : 'var(--text)',
                                                                                        opacity: (pendingSlotSelections[sq.slot] && !isSelected) ? 0.4 : 1,
                                                                                        transition: 'all 0.15s', fontWeight: isSelected ? 600 : 400
                                                                                    }}
                                                                                    onMouseOver={e => { if (!isSelected) { e.currentTarget.style.borderColor = 'var(--accent)'; e.currentTarget.style.background = 'rgba(99,102,241,0.08)'; } }}
                                                                                    onMouseOut={e => { if (!isSelected) { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.background = 'transparent'; } }}>
                                                                                    {opt}
                                                                                </button>
                                                                            );
                                                                        })}
                                                                    </div>
                                                                </div>
                                                            ))}
                                                            {/* Run Query button */}
                                                            <div style={{ marginTop: '14px' }}>
                                                                <button onClick={handleSlotRunQuery}
                                                                    style={{
                                                                        background: 'var(--accent)', color: '#fff', border: 'none', borderRadius: '8px',
                                                                        padding: '10px 24px', fontSize: '13px', fontWeight: 600, cursor: slotCount > 0 ? 'pointer' : 'default',
                                                                        opacity: slotCount > 0 ? 1 : 0.4, pointerEvents: slotCount > 0 ? 'auto' : 'none',
                                                                        transition: 'all 0.2s'
                                                                    }}>
                                                                    {slotCount > 0 ? `Run Query (${slotCount} selection${slotCount > 1 ? 's' : ''})` : 'Run Query (select options above)'}
                                                                </button>
                                                            </div>
                                                        </div>
                                                    )}

                                                    {/* KG-powered suggestions */}
                                                    {msg.suggestions && msg.suggestions.length > 0 && (
                                                        <div style={{ marginTop: '14px' }}>
                                                            <div style={{ fontWeight: 600, fontSize: '12px', color: 'var(--text-dim)', marginBottom: '8px' }}>
                                                                Questions I can answer with high accuracy (KG-powered):
                                                            </div>
                                                            {msg.suggestions.map((s, si) => (
                                                                <button key={si} onClick={() => handleAsk(s.prompt || s.text)}
                                                                    style={{ display: 'block', width: '100%', textAlign: 'left', padding: '8px 12px', marginBottom: '4px', fontSize: '12px', background: 'transparent', border: '1px solid var(--border)', borderRadius: '6px', color: 'var(--accent)', cursor: 'pointer', lineHeight: '1.4' }}
                                                                    onMouseOver={e => { e.currentTarget.style.borderColor = 'var(--accent)'; e.currentTarget.style.background = 'rgba(99,102,241,0.06)'; }}
                                                                    onMouseOut={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.background = 'transparent'; }}>
                                                                    <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                                                                        {s.object && <span style={{ background: 'rgba(99,102,241,0.12)', color: 'var(--accent)', fontSize: '10px', padding: '1px 6px', borderRadius: '3px', fontWeight: 600 }}>{s.object}</span>}
                                                                        <span>{s.prompt || s.text}</span>
                                                                        {s.match_quality === 'exact' && <span style={{ color: '#22c55e', fontSize: '10px', fontWeight: 600 }}>✓ validated</span>}
                                                                    </div>
                                                                </button>
                                                            ))}
                                                        </div>
                                                    )}

                                                    {/* Footer */}
                                                    <div style={{ marginTop: '14px', fontSize: '11px', color: 'var(--text-dim)', borderTop: '1px solid var(--border)', paddingTop: '10px' }}>
                                                        Pick a suggestion, answer the questions above, or rephrase your question.
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    }
                                    // Assistant response with results
                                    const bizNames = msg.column_business_names || {};
                                    const getDisplayName = (col) => {
                                        const biz = bizNames[col.toLowerCase()];
                                        return biz || col;
                                    };
                                    const getTooltip = (col) => {
                                        const biz = bizNames[col.toLowerCase()];
                                        return biz ? col : null; // show raw name as tooltip when business name is used
                                    };

                                    // Token cost calculation
                                    const tokenCost = msg.token_usage ? (() => {
                                        const inp = msg.token_usage.input_tokens || 0;
                                        const out = msg.token_usage.output_tokens || 0;
                                        const cost = (inp * 3 / 1000000) + (out * 15 / 1000000);
                                        return cost < 0.01 ? '$' + cost.toFixed(4) : '$' + cost.toFixed(2);
                                    })() : null;

                                    // Export functions
                                    const exportCSV = () => {
                                        if (!msg.rows || msg.rows.length === 0) return;
                                        const lines = [];
                                        lines.push(`# Query: ${msg.content}`);
                                        lines.push(`# Exported: ${new Date().toLocaleString()}`);
                                        lines.push(`# Rows: ${msg.row_count}`);
                                        lines.push(msg.columns.map(c => `"${getDisplayName(c).replace(/"/g, '""')}"`).join(','));
                                        for (const row of msg.rows) {
                                            lines.push(msg.columns.map(c => {
                                                const v = row[c];
                                                if (v === null || v === undefined) return '';
                                                const s = String(v);
                                                return (s.includes(',') || s.includes('"') || s.includes('\n')) ? `"${s.replace(/"/g, '""')}"` : s;
                                            }).join(','));
                                        }
                                        const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
                                        const url = URL.createObjectURL(blob);
                                        const a = document.createElement('a');
                                        const fname = (msg.content || 'query').toLowerCase().replace(/[^a-z0-9\s]/g, '').trim().replace(/\s+/g, '_').substring(0, 40);
                                        a.href = url; a.download = `${fname}_${new Date().toISOString().slice(0,10)}.csv`; a.click();
                                        URL.revokeObjectURL(url);
                                    };
                                    const copyToClipboard = () => {
                                        if (!msg.rows || msg.rows.length === 0) return;
                                        const lines = [];
                                        lines.push(msg.columns.map(c => getDisplayName(c)).join('\t'));
                                        for (const row of msg.rows) {
                                            lines.push(msg.columns.map(c => row[c] === null ? '' : String(row[c])).join('\t'));
                                        }
                                        navigator.clipboard.writeText(lines.join('\n'));
                                    };
                                    const exportExcel = () => {
                                        if (!msg.rows || msg.rows.length === 0) {
                                            alert('No data to export');
                                            return;
                                        }
                                        if (typeof XLSX === 'undefined') {
                                            alert('Excel export library not loaded. Please try again.');
                                            return;
                                        }
                                        try {
                                            const wb = XLSX.utils.book_new();
                                            const headers = msg.columns.map(c => getDisplayName(c));
                                            const wsData = [headers, ...msg.rows.map(row => msg.columns.map(c => row[c] === null ? '' : row[c]))];
                                            const ws = XLSX.utils.aoa_to_sheet(wsData);
                                            ws['!cols'] = headers.map((h, ci) => {
                                                let maxLen = h.length;
                                                for (const row of msg.rows) { const cl = String(row[msg.columns[ci]] ?? '').length; if (cl > maxLen) maxLen = cl; }
                                                return { wch: Math.min(maxLen + 2, 50) };
                                            });
                                            const metaWs = XLSX.utils.aoa_to_sheet([['Query', msg.content], ['Exported', new Date().toLocaleString()], ['Rows', msg.row_count], ['Source', 'Data Ask — Solix']]);
                                            metaWs['!cols'] = [{ wch: 12 }, { wch: 60 }];
                                            XLSX.utils.book_append_sheet(wb, ws, 'Results');
                                            XLSX.utils.book_append_sheet(wb, metaWs, 'Metadata');
                                            const fname = (msg.content || 'query').toLowerCase().replace(/[^a-z0-9\s]/g, '').trim().replace(/\s+/g, '_').substring(0, 40);
                                            XLSX.writeFile(wb, `${fname}_${new Date().toISOString().slice(0,10)}.xlsx`);
                                        } catch (e) {
                                            alert('Error exporting to Excel: ' + e.message);
                                        }
                                    };
                                    const handleCopy = () => {
                                        copyToClipboard();
                                        setCopiedMsgIdx(i);
                                        setTimeout(() => setCopiedMsgIdx(null), 2000);
                                    };

                                    // Detect if results match a QPD seed question (validation badge)
                                    const matchedQPD = qpdData.find(q => q.original_question && q.original_question.toLowerCase() === msg.content.toLowerCase());
                                    // Confidence reflects final answer quality, not the journey:
                                    // High = executed successfully + schema-linked (retries are self-correction, not a quality issue)
                                    // Medium = executed but no schema linking
                                    // Low = execution error (query never succeeded)
                                    const confidenceLevel = msg.error ? 'Low'
                                        : msg.intent === 'HYBRID' && msg.rows?.length > 0 && msg.citations?.length > 0 ? 'High'
                                        : msg.intent === 'HYBRID' && (msg.rows?.length > 0 || msg.citations?.length > 0) ? 'High'
                                        : msg.intent === 'UNSTRUCTURED' && msg.answer ? 'High'
                                        : msg.schemaLinked ? 'High'
                                        : msg.fewShotUsed ? 'High'
                                        : msg.intent === 'STRUCTURED' && msg.rows?.length > 0 ? 'High'
                                        : 'Medium';

                                    return (
                                        <div key={i} data-msg-idx={i} style={{ display: 'flex', justifyContent: 'flex-start', marginBottom: '20px' }}>
                                            <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', padding: '16px', borderRadius: '16px 16px 16px 4px', width: '100%', minWidth: 0 }}>
                                                {/* Intent + Confidence/Validation badges */}
                                                <div style={{ display: 'flex', gap: '8px', marginBottom: '12px', flexWrap: 'wrap' }}>
                                                    {msg.isMultiResult && msg.label && <span style={{ display: 'inline-block', background: 'rgba(139,92,246,0.15)', color: '#8b5cf6', padding: '4px 10px', borderRadius: '4px', fontSize: '11px', fontWeight: 600 }}>{msg.label}</span>}
                                                    {/* Intent routing badge */}
                                                    {msg.intent === 'UNSTRUCTURED' && <span style={{ display: 'inline-block', background: 'rgba(168,85,247,0.15)', color: '#a855f7', padding: '4px 10px', borderRadius: '4px', fontSize: '11px', fontWeight: 600 }}>Document Search</span>}
                                                    {msg.intent === 'HYBRID' && <span style={{ display: 'inline-block', background: 'rgba(6,182,212,0.15)', color: '#06b6d4', padding: '4px 10px', borderRadius: '4px', fontSize: '11px', fontWeight: 600 }}>Hybrid (Data + Docs)</span>}
                                                    {matchedQPD && <span style={{ display: 'inline-block', background: 'rgba(34,197,94,0.15)', color: '#22c55e', padding: '4px 10px', borderRadius: '4px', fontSize: '11px', fontWeight: 600 }}>KG Validated</span>}
                                                    {msg.schemaLinked && msg.intent !== 'UNSTRUCTURED' && <span style={{ display: 'inline-block', background: 'rgba(6,182,212,0.15)', color: '#06b6d4', padding: '4px 10px', borderRadius: '4px', fontSize: '11px', fontWeight: 600 }}>Schema-Linked</span>}
                                                    {msg.contextUsed && <span style={{ display: 'inline-block', background: 'rgba(5,150,105,0.15)', color: '#059669', padding: '4px 10px', borderRadius: '4px', fontSize: '11px', fontWeight: 600 }}>Context-Enhanced</span>}
                                                    <span style={{ display: 'inline-block', background: confidenceLevel === 'High' ? 'rgba(34,197,94,0.15)' : (confidenceLevel === 'Medium' ? 'rgba(245,158,11,0.15)' : 'rgba(241,165,58,0.15)'), color: confidenceLevel === 'High' ? '#22c55e' : (confidenceLevel === 'Medium' ? '#f59e0b' : '#f9a825'), padding: '4px 10px', borderRadius: '4px', fontSize: '11px', fontWeight: 600 }}>
                                                        {confidenceLevel} Confidence
                                                    </span>
                                                </div>

                                                {/* Error */}
                                                {msg.error && (
                                                    <div style={{ background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.3)', padding: '8px 12px', borderRadius: '6px', fontSize: '12px', color: '#ef4444', marginBottom: '12px' }}>
                                                        {msg.intent === 'UNSTRUCTURED' ? 'Search Error' : 'SQL Error'}: {msg.error}
                                                    </div>
                                                )}

                                                {/* Document answer (unstructured RAG results, also shown for HYBRID) */}
                                                {(msg.intent === 'UNSTRUCTURED' || msg.intent === 'HYBRID') && msg.answer && (
                                                    <div style={{ marginBottom: '12px' }}>
                                                        <div style={{ fontSize: '13px', lineHeight: 1.7, color: 'var(--text)', whiteSpace: 'pre-wrap' }}
                                                            dangerouslySetInnerHTML={{ __html: (typeof marked !== 'undefined' && marked.parse) ? marked.parse(msg.answer) : msg.answer }} />
                                                        {/* Citations */}
                                                        {msg.citations && msg.citations.length > 0 && (
                                                            <div style={{ marginTop: '14px', padding: '12px', background: 'rgba(168,85,247,0.05)', border: '1px solid rgba(168,85,247,0.15)', borderRadius: '8px' }}>
                                                                <div style={{ fontSize: '11px', fontWeight: 700, color: '#a855f7', textTransform: 'uppercase', marginBottom: '8px' }}>
                                                                    Sources ({msg.citations.length})
                                                                </div>
                                                                {msg.citations.map((cit, ci) => (
                                                                    <div key={ci} style={{ display: 'flex', gap: '8px', marginBottom: '8px', fontSize: '12px' }}>
                                                                        <span style={{ background: 'rgba(168,85,247,0.2)', color: '#a855f7', fontWeight: 700, width: '22px', height: '22px', borderRadius: '4px', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontSize: '10px' }}>{ci + 1}</span>
                                                                        <div>
                                                                            <span style={{ color: '#a855f7', fontWeight: 600 }}>{cit.filename || cit.source || 'Document'}</span>
                                                                            {cit.chunkIndex != null && <span style={{ color: 'var(--text-dim)', marginLeft: '6px' }}>chunk {cit.chunkIndex}</span>}
                                                                            {cit.score != null && <span style={{ color: 'var(--text-dim)', marginLeft: '6px' }}>({(cit.score * 100).toFixed(0)}% match)</span>}
                                                                            {cit.excerpt && <div style={{ color: 'var(--text-dim)', marginTop: '4px', lineHeight: 1.4 }}>{cit.excerpt.substring(0, 200)}{cit.excerpt.length > 200 ? '…' : ''}</div>}
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                )}

                                                {/* Separator for HYBRID: label the structured data section */}
                                                {msg.intent === 'HYBRID' && msg.rows && msg.rows.length > 0 && (
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', margin: '12px 0 8px', fontSize: '11px', fontWeight: 700, color: '#06b6d4', textTransform: 'uppercase' }}>
                                                        <span style={{ flex: 1, height: '1px', background: 'rgba(6,182,212,0.2)' }} />
                                                        Data Results ({msg.rows.length} row{msg.rows.length !== 1 ? 's' : ''})
                                                        <span style={{ flex: 1, height: '1px', background: 'rgba(6,182,212,0.2)' }} />
                                                    </div>
                                                )}

                                                {/* Results table with business-friendly column names */}
                                                {!msg.error && msg.rows && msg.rows.length > 0 && msg.intent !== 'UNSTRUCTURED' && (
                                                    <div style={{ marginBottom: '12px' }}>
                                                        <div style={{ overflowX: 'auto' }}>
                                                            <table className="data-grid" style={{ fontSize: '12px' }}>
                                                                <thead>
                                                                    <tr>{msg.columns.map(c => {
                                                                        const sampleVal = msg.rows[0]?.[c];
                                                                        const colIsNumeric = sampleVal != null && !isNaN(parseFloat(String(sampleVal)));
                                                                        const displayName = getDisplayName(c);
                                                                        const tooltip = getTooltip(c);
                                                                        return <th key={c} style={colIsNumeric ? { textAlign: 'right' } : {}} title={tooltip || undefined}>{displayName}</th>;
                                                                    })}</tr>
                                                                </thead>
                                                                <tbody>
                                                                    {(() => {
                                                                        const page = tablePages[i] || 0;
                                                                        const start = page * TABLE_PAGE_SIZE;
                                                                        const end = start + TABLE_PAGE_SIZE;
                                                                        return msg.rows.slice(start, end).map((row, ri) => (
                                                                            <tr key={start + ri}>{msg.columns.map(c => {
                                                                                const formatted = formatCellValue(row[c], c);
                                                                                const isNumeric = row[c] != null && !isNaN(parseFloat(String(row[c])));
                                                                                return <td key={c} style={isNumeric ? { textAlign: 'right', fontVariantNumeric: 'tabular-nums' } : {}}>{formatted}</td>;
                                                                            })}</tr>
                                                                        ));
                                                                    })()}
                                                                </tbody>
                                                            </table>
                                                        </div>
                                                        {msg.rows.length > TABLE_PAGE_SIZE && (() => {
                                                            const page = tablePages[i] || 0;
                                                            const totalPages = Math.ceil(msg.rows.length / TABLE_PAGE_SIZE);
                                                            const start = page * TABLE_PAGE_SIZE + 1;
                                                            const end = Math.min((page + 1) * TABLE_PAGE_SIZE, msg.rows.length);
                                                            return <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: '6px', fontSize: '12px', color: 'var(--text-dim)' }}>
                                                                <span>Showing rows {start}–{end} of {msg.row_count || msg.rows.length}</span>
                                                                <div style={{ display: 'flex', gap: '4px' }}>
                                                                    <button disabled={page === 0} onClick={() => setTablePages(p => ({ ...p, [i]: page - 1 }))}
                                                                        style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: '4px', padding: '2px 8px', cursor: page === 0 ? 'default' : 'pointer', opacity: page === 0 ? 0.4 : 1, fontSize: '12px', color: 'var(--text-dim)' }}>
                                                                        <Icon name="ChevronLeft" size={12} /> Prev
                                                                    </button>
                                                                    <span style={{ padding: '2px 6px', fontSize: '11px' }}>Page {page + 1} of {totalPages}</span>
                                                                    <button disabled={page >= totalPages - 1} onClick={() => setTablePages(p => ({ ...p, [i]: page + 1 }))}
                                                                        style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: '4px', padding: '2px 8px', cursor: page >= totalPages - 1 ? 'default' : 'pointer', opacity: page >= totalPages - 1 ? 0.4 : 1, fontSize: '12px', color: 'var(--text-dim)' }}>
                                                                        Next <Icon name="ChevronRight" size={12} />
                                                                    </button>
                                                                </div>
                                                            </div>;
                                                        })()}
                                                    </div>
                                                )}

                                                {/* Export toolbar below table (structured results only) */}
                                                {!msg.error && msg.rows && msg.rows.length > 0 && msg.intent !== 'UNSTRUCTURED' && (
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: '12px', padding: '12px 0', borderTop: '1px solid var(--border)', borderBottom: '1px solid var(--border)', marginBottom: '12px' }}>
                                                        <span style={{ fontSize: '11px', color: 'var(--text-dim)', fontWeight: 600, textTransform: 'uppercase' }}>Export:</span>
                                                        <button onClick={exportCSV} title="Download CSV"
                                                            style={{ background: 'transparent', border: '1px solid var(--border)', borderRadius: '4px', padding: '4px 10px', cursor: 'pointer', fontSize: '12px', color: 'var(--text-dim)', display: 'flex', alignItems: 'center', gap: '4px' }}>
                                                            <Icon name="Download" size={12} /> CSV
                                                        </button>
                                                        <button onClick={exportExcel} title="Download Excel"
                                                            style={{ background: 'transparent', border: '1px solid var(--border)', borderRadius: '4px', padding: '4px 10px', cursor: 'pointer', fontSize: '12px', color: 'var(--text-dim)', display: 'flex', alignItems: 'center', gap: '4px' }}>
                                                            <Icon name="Download" size={12} /> Excel
                                                        </button>
                                                        <button onClick={handleCopy} title="Copy to clipboard (tab-separated)"
                                                            style={{ background: 'transparent', border: '1px solid var(--border)', borderRadius: '4px', padding: '4px 10px', cursor: 'pointer', fontSize: '12px', color: copiedMsgIdx === i ? '#22c55e' : 'var(--text-dim)', display: 'flex', alignItems: 'center', gap: '4px' }}>
                                                            <Icon name="Copy" size={12} /> {copiedMsgIdx === i ? 'Copied!' : 'Copy'}
                                                        </button>
                                                        {/* Chart toggle button — uses smart column analysis */}
                                                        {(() => {
                                                            const chartAnalysis = analyzeColumnsForChart(msg.rows, msg.columns, getDisplayName);
                                                            if (!chartAnalysis) return null;
                                                            return (
                                                                <button onClick={() => setShowChart(prev => ({ ...prev, [i]: !prev[i] }))} title="Toggle chart"
                                                                    style={{ background: showChart[i] ? 'rgba(99,102,241,0.15)' : 'transparent', border: '1px solid var(--border)', borderRadius: '4px', padding: '4px 10px', cursor: 'pointer', fontSize: '12px', color: showChart[i] ? 'var(--accent)' : 'var(--text-dim)', display: 'flex', alignItems: 'center', gap: '4px' }}>
                                                                    <Icon name="BarChart2" size={12} /> Chart
                                                                </button>
                                                            );
                                                        })()}
                                                        <span style={{ marginLeft: 'auto', fontSize: '11px', color: 'var(--text-dim)' }}>
                                                            {msg.row_count} row{msg.row_count !== 1 ? 's' : ''} {msg.executionTime ? ` • ${msg.executionTime}` : ''}
                                                        </span>
                                                    </div>
                                                )}

                                                {/* Chart visualization (state-based toggle, smart column analysis — structured only) */}
                                                {!msg.error && msg.rows && msg.rows.length >= 2 && msg.intent !== 'UNSTRUCTURED' && showChart[i] && (
                                                    <div style={{ marginBottom: '12px' }}>
                                                        <IDAChart rows={msg.rows} columns={msg.columns} getDisplayName={getDisplayName} msgIdx={i} />
                                                    </div>
                                                )}

                                                {!msg.error && msg.rows && msg.rows.length === 0 && msg.intent !== 'UNSTRUCTURED' && !msg.answer && (
                                                    <div style={{ fontSize: '13px', color: 'var(--text-dim)', padding: '8px 0' }}>No results found.</div>
                                                )}

                                                {/* SQL + Details (OEBS-style rich progressive disclosure below data) */}
                                                {(() => {
                                                    // Try to parse sections from server-side explanation first
                                                    let approach = '', assumptions = [], whySQL = '';

                                                    if (msg.explanation && msg.explanation.length > 0) {
                                                        // Parse server-side explanation for structured sections
                                                        const explText = msg.explanation;

                                                        // Extract ### Approach section
                                                        const approachMatch = explText.match(/###\s+Approach\s*\n([\s\S]*?)(?=###|$)/);
                                                        if (approachMatch) {
                                                            approach = approachMatch[1].trim().split('\n')[0]; // First line
                                                        }

                                                        // Extract ### Assumptions section
                                                        const assumptionsMatch = explText.match(/###\s+Assumptions\s*\n([\s\S]*?)(?=###|$)/);
                                                        if (assumptionsMatch) {
                                                            const assumpText = assumptionsMatch[1].trim();
                                                            // Split by lines starting with - or •
                                                            const lines = assumpText.split('\n').filter(l => l.trim());
                                                            assumptions = lines.map(l => l.replace(/^[-•]\s*/, '').trim()).filter(l => l);
                                                        }

                                                        // Extract ### Why this SQL section
                                                        const whyMatch = explText.match(/###\s+Why\s+this\s+SQL\s*\n([\s\S]*?)(?=###|$)/);
                                                        if (whyMatch) {
                                                            whySQL = whyMatch[1].trim().split('\n')[0]; // First line
                                                        }
                                                    }

                                                    // Fallback to client-side SQL analysis if no explanation
                                                    if (!approach) {
                                                        const sqlText = msg.sql || '';
                                                        const tables = [];
                                                        const joinMatch = sqlText.match(/(?:FROM|JOIN)\s+"?(\w+)"?/gi);
                                                        if (joinMatch) joinMatch.forEach(m => {
                                                            const t = m.replace(/(?:FROM|JOIN)\s+"?/i, '').replace(/"?$/, '');
                                                            if (t && !tables.includes(t)) tables.push(t);
                                                        });
                                                        const hasJoin = /\bJOIN\b/i.test(sqlText);
                                                        const hasGroupBy = /\bGROUP\s+BY\b/i.test(sqlText);
                                                        const hasAgg = /\b(COUNT|SUM|AVG|MIN|MAX)\s*\(/i.test(sqlText);
                                                        const hasWhere = /\bWHERE\b/i.test(sqlText);
                                                        const hasLimit = /\bLIMIT\b/i.test(sqlText);

                                                        if (tables.length > 0) {
                                                            approach = `Querying ${tables.length === 1 ? `the ${tables[0]} table` : `across ${tables.length} tables (${tables.join(', ')})`}`;
                                                            if (hasJoin) approach += ` using JOIN relationships from the knowledge graph`;
                                                            if (hasAgg && hasGroupBy) approach += `, aggregating results with GROUP BY`;
                                                            else if (hasAgg) approach += `, computing aggregate metrics`;
                                                            if (hasWhere) approach += `, with filtering conditions`;
                                                            approach += '.';
                                                            if (msg.fewShotUsed) approach += ' This matches a validated KG query pattern.';
                                                            if (msg.schemaLinked) approach += ' Schema linking pre-selected the relevant tables.';
                                                        }

                                                        if (hasLimit) assumptions.push('Results limited to avoid excessive data transfer');
                                                        if (hasAgg) assumptions.push('Using aggregate functions to summarize data');
                                                        if (hasJoin) assumptions.push('Join paths derived from KG relationship metadata');
                                                        if (msg.retryCount > 0) assumptions.push(`Query required ${msg.retryCount} ${msg.retryCount === 1 ? 'retry' : 'retries'} for SQL correction`);
                                                        if (!hasWhere) assumptions.push('No specific filters — returning all matching data');

                                                        if (tables.length > 0) {
                                                            whySQL = `This query uses ${tables.length === 1 ? `the ${tables[0]} table` : `${tables.length} tables`} from the knowledge graph.`;
                                                            if (hasJoin) whySQL += ` The JOIN${tables.length > 2 ? 's follow' : ' follows'} validated relationship paths in the Knowledge Graph.`;
                                                            if (hasAgg) whySQL += ` Aggregation functions provide the summary view requested.`;
                                                            if (msg.schemaLinked) whySQL += ` Schema linking narrowed the search to relevant tables, improving accuracy.`;
                                                            if (msg.fewShotUsed) whySQL += ` A validated query pattern (QPD) was used as reference, increasing confidence.`;
                                                        }
                                                    }

                                                    const showSqlDetails = msg.displaySettings?.show_sql_details !== false;
                                                    const showTokenCost = msg.displaySettings?.show_token_cost !== false;

                                                    if (!showSqlDetails) return null;

                                                    return (
                                                        <details style={{ marginBottom: '12px', marginTop: '12px' }}>
                                                            <summary style={{ cursor: 'pointer', fontSize: '12px', color: 'var(--text-dim)', userSelect: 'none', padding: '8px 0' }}>
                                                                <Icon name="Code" size={12} /> Query Details &middot; {msg.generationTime}
                                                                {msg.retryCount > 0 && <span style={{ color: '#f59e0b' }}> &middot; {msg.retryCount} {msg.retryCount === 1 ? 'retry' : 'retries'}</span>}
                                                                {msg.fewShotUsed && <span style={{ color: '#8b5cf6' }}> &middot; few-shot</span>}
                                                                {msg.schemaLinked && <span style={{ color: '#06b6d4' }}> &middot; schema-linked</span>}
                                                                {msg.contextUsed && <span style={{ color: '#059669' }}> &middot; context-enhanced</span>}
                                                            </summary>
                                                            <div style={{ marginTop: '8px', paddingTop: '8px', borderTop: '1px solid var(--border)' }}>
                                                                {approach && (
                                                                    <div style={{ marginBottom: '12px' }}>
                                                                        <div style={{ fontSize: '11px', fontWeight: 700, color: 'var(--accent)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '6px' }}>Approach</div>
                                                                        <div style={{ fontSize: '12px', color: 'var(--text)', lineHeight: 1.6, padding: '8px 12px', background: 'rgba(99,102,241,0.06)', borderRadius: '6px', borderLeft: '3px solid var(--accent)' }}>{approach}</div>
                                                                    </div>
                                                                )}
                                                                <div style={{ marginBottom: '12px' }}>
                                                                    <div style={{ fontSize: '11px', fontWeight: 700, color: 'var(--accent)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '6px' }}>SQL</div>
                                                                    <div style={{ position: 'relative' }}>
                                                                        <pre style={{ background: 'var(--bg)', padding: '10px', borderRadius: '6px', fontSize: '11px', overflowX: 'auto', color: 'var(--text)', margin: 0, lineHeight: 1.5 }} dangerouslySetInnerHTML={{ __html: highlightSQL(msg.sql) }} />
                                                                        <button onClick={() => { navigator.clipboard.writeText(msg.sql); setCopiedMsgIdx(`sql_${i}`); setTimeout(() => setCopiedMsgIdx(null), 2000); }}
                                                                            style={{ position: 'absolute', top: '4px', right: '4px', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: '4px', padding: '4px 8px', cursor: 'pointer', fontSize: '10px', color: copiedMsgIdx === `sql_${i}` ? '#22c55e' : 'var(--text-dim)' }}>
                                                                            {copiedMsgIdx === `sql_${i}` ? 'Copied!' : 'Copy'}
                                                                        </button>
                                                                    </div>
                                                                </div>
                                                                {assumptions.length > 0 && (
                                                                    <div style={{ marginBottom: '12px' }}>
                                                                        <div style={{ fontSize: '11px', fontWeight: 700, color: 'var(--accent)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '6px' }}>Assumptions</div>
                                                                        <ul style={{ margin: 0, paddingLeft: '20px', fontSize: '12px', color: 'var(--text-dim)', lineHeight: 1.8 }}>
                                                                            {assumptions.map((a, ai) => <li key={ai}>{a}</li>)}
                                                                        </ul>
                                                                    </div>
                                                                )}
                                                                {whySQL && (
                                                                    <div style={{ marginBottom: '12px' }}>
                                                                        <div style={{ fontSize: '11px', fontWeight: 700, color: 'var(--accent)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '6px' }}>Why this SQL</div>
                                                                        <div style={{ fontSize: '12px', color: 'var(--text-dim)', lineHeight: 1.6 }}>{whySQL}</div>
                                                                    </div>
                                                                )}
                                                                <div style={{ fontSize: '11px', color: 'var(--text-dim)', padding: '8px 0', borderTop: '1px solid var(--border)', display: 'flex', gap: '12px', flexWrap: 'wrap' }}>
                                                                    {showTokenCost && msg.token_usage && (
                                                                        <React.Fragment>
                                                                            <span>Tokens: {(msg.token_usage.input_tokens || 0).toLocaleString()} in · {(msg.token_usage.output_tokens || 0).toLocaleString()} out · {(msg.token_usage.total_tokens || 0).toLocaleString()} total</span>
                                                                            {tokenCost && <span>· {tokenCost}</span>}
                                                                        </React.Fragment>
                                                                    )}
                                                                    <span>Generation: {msg.generationTime || 'N/A'} · Execution: {msg.executionTime || 'N/A'}</span>
                                                                    {msg.retryCount > 0 && <span style={{ color: '#f59e0b' }}>· Retries: {msg.retryCount}</span>}
                                                                </div>
                                                                {msg.retryLog && msg.retryLog.length > 0 && (
                                                                    <div style={{ fontSize: '10px', color: 'var(--text-dim)', padding: '6px 8px', background: 'rgba(245,158,11,0.06)', borderRadius: '4px', marginTop: '4px' }}>
                                                                        <div style={{ fontWeight: 600, marginBottom: '4px', color: '#f59e0b' }}>Retry Details:</div>
                                                                        {msg.retryLog.map((r, ri) => (
                                                                            <div key={ri} style={{ marginBottom: '4px' }}>
                                                                                <span style={{ fontWeight: 600 }}>Attempt {r.attempt}:</span>{' '}
                                                                                {r.reason === 'exec_error' ? <span style={{ color: '#ef4444' }}>SQL Error — {r.error}</span> : <span style={{ color: '#f59e0b' }}>Query returned 0 rows</span>}
                                                                                {r.sql && <div style={{ fontFamily: 'monospace', fontSize: '9px', marginTop: '2px', whiteSpace: 'pre-wrap', wordBreak: 'break-all', maxHeight: '60px', overflow: 'hidden' }}>{r.sql}</div>}
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </details>
                                                    );
                                                })()}

                                                {/* Feedback + cost summary */}
