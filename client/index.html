        };

        // =====================================================
        // BUILDER GUIDE (Stepper Sidebar)
        // =====================================================
        const BUILDER_STEPS = [
            {
                id: 'ingest', num: 1, label: 'Ingest Schema',
                desc: 'Upload DDL, connect to a database, or import a SQLite file. The builder extracts tables, columns, PKs, and FKs.',
                tip: 'Start here — select an app from the Dashboard or create a new one, then run the pipeline.',
                page: 'pipeline', icon: 'Download'
            },
            {
                id: 'context', num: 2, label: 'Provide Context',
                desc: 'Upload data dictionaries, user guides, ERDs, or vendor documentation. More context = better enrichment quality.',
                tip: 'Optional but recommended. Even a bulleted list of modules and their purpose helps significantly.',
                page: 'context', icon: 'FileText', optional: true
            },
            {
                id: 'enrich', num: 3, label: 'Run Enrichment',
                desc: 'AI assigns business domains, friendly names, descriptions, entity types, and generates query patterns for every table.',
                tip: 'Enrichment runs automatically as part of the pipeline. Context-assisted builds produce much better results.',
                page: 'pipeline', icon: 'Zap'
            },
            {
                id: 'review', num: 4, label: 'Review KG',
                desc: 'Use the Knowledge Graph viewer and Curation workspace to validate domains, relationships, and business names.',
                tip: 'Use view modes (Tables & Joins, Concepts, Full) and domain filters to explore different aspects.',
                page: 'knowledge', icon: 'Share'
            },
            {
                id: 'iterate', num: 5, label: 'Iterate',
                desc: 'Upload additional context docs and re-enrich specific domains. Manually adjust names and descriptions in the Curation view.',
                tip: 'The Context Coach helps refine areas where zero-shot enrichment was weak.',
                page: 'context', icon: 'RefreshCw', optional: true
            },
            {
                id: 'publish', num: 6, label: 'Publish',
                desc: 'Publish the Knowledge Graph so Data Ask end users can query this application.',
                tip: 'Use the Publish button in the header when you\'re satisfied with the knowledge graph quality.',
                page: 'dashboard', icon: 'Send'
            },
        ];

        const BuilderGuide = ({ appId, currentPage, onNavigate, pipelineStatus, appStatus }) => {
            const [guideOpen, setGuideOpen] = React.useState(() => {
                const saved = sessionStorage.getItem('bokg_guide_open');
                return saved !== null ? saved === 'true' : true;
            });
            const [expandedStep, setExpandedStep] = React.useState(null);
            const [progress, setProgress] = React.useState(null);

            // Persist collapse state
            React.useEffect(() => {
                sessionStorage.setItem('bokg_guide_open', String(guideOpen));
            }, [guideOpen]);

            // Fetch builder progress when app changes or pipeline completes
            React.useEffect(() => {
                if (!appId) { setProgress(null); return; }
                const fetchProgress = async () => {
                    try {
                        const data = await api.get(`/applications/${appId}/builder-progress`);
                        if (data) setProgress(data.steps);
                    } catch (e) { /* ignore */ }
                };
                fetchProgress();
                // Re-fetch when pipeline status changes
            }, [appId, pipelineStatus]);

            const getStepStatus = (step) => {
                if (!progress || !appId) return 'locked';
                const p = progress[step.id];
                if (!p) return 'pending';

                switch (step.id) {
                    case 'ingest':
                        return p.complete ? 'complete' : (pipelineStatus === 'running' ? 'active' : 'pending');
                    case 'context':
                        return p.complete ? 'complete' : 'pending';
                    case 'enrich':
                        if (p.complete && p.pct >= 80) return 'complete';
                        if (pipelineStatus === 'running') return 'active';
                        return p.enriched > 0 ? 'partial' : 'pending';
                    case 'review':
                        // Mark as active if user is on KG or curation page
                        if (currentPage === 'knowledge' || currentPage === 'curation') return 'active';
                        return progress.enrich?.complete ? 'pending' : 'locked';
                    case 'iterate':
                        return progress.enrich?.complete ? 'pending' : 'locked';
                    case 'publish':
                        if (appStatus === 'published') return 'complete';
                        return progress.enrich?.complete ? 'pending' : 'locked';
                    default:
                        return 'pending';
                }
            };

            const getStepDetail = (step) => {
                if (!progress) return '';
                const p = progress[step.id];
                if (!p) return '';
                switch (step.id) {
                    case 'ingest': return p.complete ? `${p.tables} tables, ${p.columns} cols, ${p.relationships} rels` : '';
                    case 'context': return p.documents > 0 ? `${p.documents} document${p.documents !== 1 ? 's' : ''} uploaded` : '';
                    case 'enrich': return p.enriched > 0 ? `${p.pct}% enriched (${p.enriched}/${p.total})` : '';
                    case 'publish': return p.complete ? 'Live for end users' : p.patterns > 0 ? `${p.patterns} query patterns` : '';
                    default: return '';
                }
            };

            const statusColors = {
                complete: '#22c55e',
                active: '#f59e0b',
                partial: '#818cf8',
                pending: 'var(--text-dim)',
                locked: 'rgba(255,255,255,0.15)',
            };

            const statusIcons = {
                complete: '✓',
                active: '●',
                partial: '◐',
                pending: '○',
                locked: '○',
            };

            if (!appId) return null;

            return (
                <div style={{ borderTop: '1px solid var(--border)', marginTop: '8px' }}>
                    <div
                        onClick={() => setGuideOpen(!guideOpen)}
                        style={{
                            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                            padding: '10px 14px', cursor: 'pointer', fontSize: '11px',
                            fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.5px',
                            color: 'var(--text-dim)', userSelect: 'none'
                        }}
                    >
                        <span style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                            <Icon name="BookOpen" size={13} />
                            Builder Guide
                        </span>
                        <Icon name={guideOpen ? 'ChevronDown' : 'ChevronRight'} size={13} />
                    </div>

                    {guideOpen && (
                        <div style={{ padding: '0 8px 12px 8px' }}>
                            {BUILDER_STEPS.map((step, i) => {
                                const status = getStepStatus(step);
                                const detail = getStepDetail(step);
                                const isExpanded = expandedStep === step.id;
                                const isLocked = status === 'locked';
                                const isCurrentPage = currentPage === step.page;

                                return (
                                    <div key={step.id} style={{ position: 'relative', paddingLeft: '22px', paddingBottom: i < 5 ? '4px' : '0' }}>
                                        {/* Vertical connector line */}
                                        {i < 5 && (
                                            <div style={{
                                                position: 'absolute', left: '14px', top: '20px', bottom: '0',
                                                width: '1px', background: status === 'complete' ? 'rgba(34,197,94,0.3)' : 'rgba(255,255,255,0.08)'
                                            }} />
                                        )}
                                        {/* Step indicator circle */}
                                        <div style={{
                                            position: 'absolute', left: '8px', top: '8px',
                                            width: '14px', height: '14px', borderRadius: '50%',
                                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                                            fontSize: status === 'complete' ? '10px' : '8px',
                                            color: statusColors[status],
                                            background: status === 'complete' ? 'rgba(34,197,94,0.15)' : status === 'active' ? 'rgba(245,158,11,0.15)' : 'transparent',
                                            border: `1.5px solid ${status === 'locked' ? 'rgba(255,255,255,0.1)' : statusColors[status]}`,
                                            fontWeight: 700, lineHeight: 1,
                                        }}>
                                            {statusIcons[status]}
                                        </div>
                                        {/* Step content */}
                                        <div
                                            onClick={() => {
                                                if (!isLocked) {
                                                    if (isExpanded) { setExpandedStep(null); }
                                                    else { setExpandedStep(step.id); }
                                                }
                                            }}
                                            style={{
                                                padding: '4px 8px', borderRadius: '6px', cursor: isLocked ? 'default' : 'pointer',
                                                opacity: isLocked ? 0.35 : 1,
                                                background: isExpanded ? 'rgba(99,102,241,0.08)' : isCurrentPage ? 'rgba(99,102,241,0.05)' : 'transparent',
                                                transition: 'background 0.15s',
                                            }}
                                        >
                                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                                                <span style={{
                                                    fontSize: '12px', fontWeight: 500,
                                                    color: status === 'complete' ? '#22c55e' : status === 'active' ? '#f59e0b' : 'var(--text)',
                                                }}>
                                                    {step.label}
                                                    {step.optional && <span style={{ fontSize: '9px', color: 'var(--text-dim)', marginLeft: '4px', fontWeight: 400 }}>(opt)</span>}
                                                </span>
                                            </div>
                                            {/* Detail line — always show if available */}
                                            {detail && (
                                                <div style={{ fontSize: '10px', color: 'var(--text-dim)', marginTop: '1px' }}>{detail}</div>
                                            )}
                                            {/* Expanded description + tip + navigate button */}
                                            {isExpanded && (
                                                <div style={{ marginTop: '6px' }}>
                                                    <div style={{ fontSize: '11px', color: 'var(--text-dim)', lineHeight: '1.4' }}>{step.desc}</div>
                                                    <div style={{
                                                        fontSize: '10px', color: '#818cf8', marginTop: '4px', padding: '4px 6px',
                                                        background: 'rgba(129,140,248,0.08)', borderRadius: '4px', lineHeight: '1.3',
                                                    }}>
                                                        💡 {step.tip}
                                                    </div>
                                                    <button
                                                        onClick={(e) => { e.stopPropagation(); onNavigate(step.page); }}
                                                        style={{
                                                            marginTop: '6px', padding: '3px 10px', fontSize: '10px', fontWeight: 500,
                                                            background: 'var(--accent)', color: '#fff', border: 'none', borderRadius: '4px',
                                                            cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '4px',
                                                        }}
                                                    >
                                                        <Icon name={step.icon} size={11} /> Go to {step.page === 'pipeline' ? 'Pipeline' : step.page === 'context' ? 'Context Library' : step.page === 'knowledge' ? 'Knowledge Graph' : 'Dashboard'}
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        // =====================================================
        // KG VIEWER OVERLAY — standalone full-screen D3 force graph
        // =====================================================
        const KGViewerOverlay = ({ appId, show, onClose }) => {
            const svgRef = React.useRef(null);
            const zoomRef = React.useRef(null);
            const gRef = React.useRef(null);
            const [kgSearch, setKgSearch] = React.useState('');
            const [kgSelectedNode, setKgSelectedNode] = React.useState(null);
            const [kgViewMode, setKgViewMode] = React.useState('tables');
            const [kgDomainFilter, setKgDomainFilter] = React.useState('all');
            const [kgTableData, setKgTableData] = React.useState([]);
            const [kgRelationshipData, setKgRelationshipData] = React.useState([]);
            const [domainInfo, setDomainInfo] = React.useState([]);
            const [loading, setLoading] = React.useState(false);

            // Fetch data when overlay opens
            React.useEffect(() => {
                if (!show || !appId) return;
                const fetchData = async () => {
                    setLoading(true);
                    try {
                        const [tablesResp, relsResp] = await Promise.all([
                            api.get(`/schema/${appId}/tables`),
                            api.get(`/schema/${appId}/relationships`)
                        ]);
                        const tables = tablesResp?.tables || tablesResp || [];
                        const rels = relsResp?.relationships || [];
                        setKgTableData(tables);
                        setKgRelationshipData(rels);
                        // Compute domain info
                        const domainMap = {};
                        tables.forEach(t => {
                            const meta = typeof t.entity_metadata === 'string' ? JSON.parse(t.entity_metadata || '{}') : (t.entity_metadata || {});
                            const domain = meta.domain || meta.module || 'Unclassified';
                            if (!domainMap[domain]) domainMap[domain] = { name: domain, tableCount: 0 };
                            domainMap[domain].tableCount++;
                        });
                        setDomainInfo(Object.values(domainMap).sort((a, b) => b.tableCount - a.tableCount));
                    } catch (err) {
                        console.error('KG Viewer data fetch error:', err);
                    }
                    setLoading(false);
                };
                fetchData();
                // Reset filters when opening
                setKgSearch('');
                setKgSelectedNode(null);
                setKgViewMode('tables');
                setKgDomainFilter('all');
            }, [show, appId]);

            const kgZoomIn = () => {
                if (!svgRef.current || !zoomRef.current) return;
                d3.select(svgRef.current).transition().duration(300).call(zoomRef.current.scaleBy, 1.4);
            };
            const kgZoomOut = () => {
                if (!svgRef.current || !zoomRef.current) return;
                d3.select(svgRef.current).transition().duration(300).call(zoomRef.current.scaleBy, 0.7);
            };
            const kgZoomFit = () => {
                if (!svgRef.current || !zoomRef.current || !gRef.current) return;
                const width = svgRef.current.clientWidth;
                const height = svgRef.current.clientHeight;
                const bounds = gRef.current.node().getBBox();
                if (bounds.width === 0 || bounds.height === 0) return;
                const scale = Math.min(0.9 * width / bounds.width, 0.9 * height / bounds.height, 2);
                const tx = width / 2 - scale * (bounds.x + bounds.width / 2);
                const ty = height / 2 - scale * (bounds.y + bounds.height / 2);
                d3.select(svgRef.current).transition().duration(500).call(zoomRef.current.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
            };

            // D3 force simulation
            React.useEffect(() => {
                if (!show || !svgRef.current || typeof d3 === 'undefined') return;
                if (kgTableData.length === 0) return;

                const svg = d3.select(svgRef.current);
                svg.selectAll('*').remove();

                const width = svgRef.current.clientWidth;
                const height = svgRef.current.clientHeight;
                svg.attr('viewBox', [0, 0, width, height]);

                const domainColors = {};
                const palette = ['#6366f1','#8b5cf6','#06b6d4','#22c55e','#f59e0b','#ef4444','#ec4899','#14b8a6','#f97316','#a855f7','#0ea5e9','#84cc16','#d946ef','#f43f5e','#2dd4bf','#facc15','#fb923c','#c084fc'];
                domainInfo.forEach((d, i) => { domainColors[d.name] = palette[i % palette.length]; });
                let colorIdx = domainInfo.length;

                const relDegree = {};
                kgRelationshipData.forEach(r => {
                    relDegree[r.from_table] = (relDegree[r.from_table] || 0) + 1;
                    relDegree[r.to_table] = (relDegree[r.to_table] || 0) + 1;
                });

                const allNodes = kgTableData.map(t => {
                    const meta = typeof t.entity_metadata === 'string' ? JSON.parse(t.entity_metadata || '{}') : (t.entity_metadata || {});
                    const domain = meta.domain || meta.module || 'Unclassified';
                    if (!domainColors[domain]) domainColors[domain] = palette[colorIdx++ % palette.length];
                    const entityType = (meta.entity_type || 'UNKNOWN').toUpperCase();
                    const degree = relDegree[t.table_name] || 0;
                    const nodeSize = Math.max(5, Math.min(18, 5 + degree * 1.2));
                    return {
                        id: t.table_name,
                        label: t.entity_name || t.table_name,
                        domain, entityType,
                        color: domainColors[domain],
                        size: nodeSize, degree,
                        description: meta.business_description || meta.description || '',
                        columnCount: t.column_count || 0,
                        nodeType: 'TABLE'
                    };
                });

                let nodes = kgDomainFilter === 'all' ? [...allNodes] : allNodes.filter(n => n.domain === kgDomainFilter);

                const searchLower = kgSearch.toLowerCase().trim();
                if (searchLower) {
                    const matchIds = new Set();
                    nodes.forEach(n => {
                        if (n.id.toLowerCase().includes(searchLower) || n.label.toLowerCase().includes(searchLower) || n.description.toLowerCase().includes(searchLower) || n.domain.toLowerCase().includes(searchLower))
                            matchIds.add(n.id);
                    });
                    kgRelationshipData.forEach(r => {
                        if (matchIds.has(r.from_table)) matchIds.add(r.to_table);
                        if (matchIds.has(r.to_table)) matchIds.add(r.from_table);
                    });
                    nodes = nodes.filter(n => matchIds.has(n.id));
                }

                const nodeIds = new Set(nodes.map(n => n.id));

                let links = kgRelationshipData
                    .filter(r => nodeIds.has(r.from_table) && nodeIds.has(r.to_table))
                    .map(r => ({
                        source: r.from_table, target: r.to_table,
                        label: `${r.from_column} → ${r.to_column}`,
                        type: r.rel_type || 'FK'
                    }));

                if (kgViewMode === 'tables') {
                    const connectedIds = new Set();
                    links.forEach(l => { connectedIds.add(l.source); connectedIds.add(l.target); });
                    if (nodes.length > 30) nodes = nodes.filter(n => connectedIds.has(n.id));
                    const finalIds = new Set(nodes.map(n => n.id));
                    links = links.filter(l => finalIds.has(l.source) && finalIds.has(l.target));
                } else if (kgViewMode === 'concepts') {
                    const domainHubs = {};
                    nodes.forEach(n => {
                        if (!domainHubs[n.domain]) {
                            domainHubs[n.domain] = {
                                id: `domain:${n.domain}`, label: n.domain, domain: n.domain,
                                entityType: 'DOMAIN', color: domainColors[n.domain] || '#666',
                                size: 18, description: `Domain: ${n.domain}`, columnCount: 0,
                                nodeType: 'DOMAIN'
                            };
                        }
                    });
                    Object.values(domainHubs).forEach(hub => nodes.push(hub));
                    nodes.filter(n => n.nodeType === 'TABLE').forEach(n => {
                        links.push({ source: `domain:${n.domain}`, target: n.id, label: '', type: 'BELONGS_TO' });
                    });
                }

                const g = svg.append('g');
                gRef.current = g;
                const zoom = d3.zoom()
                    .scaleExtent([0.1, 5])
                    .on('zoom', (event) => g.attr('transform', event.transform));
                zoomRef.current = zoom;
                svg.call(zoom);

                const defs = svg.append('defs');
                defs.append('marker')
                    .attr('id', 'kg-arrow')
                    .attr('viewBox', '0 -3 6 6')
                    .attr('refX', 18).attr('refY', 0)
                    .attr('markerWidth', 6).attr('markerHeight', 6)
                    .attr('orient', 'auto')
                    .append('path').attr('d', 'M0,-3L6,0L0,3').attr('fill', '#555');

                const simulation = d3.forceSimulation(nodes)
                    .force('link', d3.forceLink(links).id(d => d.id)
                        .distance(d => d.type === 'BELONGS_TO' ? 60 : 90)
                        .strength(d => d.type === 'BELONGS_TO' ? 0.7 : 0.4))
                    .force('charge', d3.forceManyBody().strength(d => d.nodeType === 'DOMAIN' ? -500 : -200))
                    .force('center', d3.forceCenter(width / 2, height / 2))
                    .force('collision', d3.forceCollide().radius(d => (d.size || 10) + 8))
                    .force('x', d3.forceX(width / 2).strength(0.03))
                    .force('y', d3.forceY(height / 2).strength(0.03));

                const link = g.append('g')
                    .selectAll('line').data(links).join('line')
                    .attr('stroke', d => d.type === 'BELONGS_TO' ? '#444' : '#555')
                    .attr('stroke-opacity', d => d.type === 'BELONGS_TO' ? 0.3 : 0.6)
                    .attr('stroke-width', d => d.type === 'BELONGS_TO' ? 0.8 : 1.5)
                    .attr('stroke-dasharray', d => d.type === 'BELONGS_TO' ? '3,3' : 'none')
                    .attr('marker-end', d => d.type === 'BELONGS_TO' ? '' : 'url(#kg-arrow)');

                const node = g.append('g')
                    .selectAll('g').data(nodes).join('g')
                    .attr('cursor', 'pointer')
                    .call(d3.drag()
                        .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                        .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
                        .on('end', (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
                    );

                node.each(function(d) {
                    const el = d3.select(this);
                    if (d.nodeType === 'DOMAIN') {
                        el.append('rect')
                            .attr('x', -12).attr('y', -12).attr('width', 24).attr('height', 24)
                            .attr('rx', 3).attr('transform', 'rotate(45)')
                            .attr('fill', d.color || '#666')
                            .attr('stroke', '#fff').attr('stroke-width', 2).attr('opacity', 0.95);
                    } else {
                        el.append('circle')
                            .attr('r', d.size || 10)
                            .attr('fill', d.color || '#666')
                            .attr('stroke', 'rgba(255,255,255,0.3)').attr('stroke-width', 1).attr('opacity', 0.9);
                    }
                });

                node.append('text')
                    .attr('dy', d => d.nodeType === 'DOMAIN' ? 26 : (d.size || 10) + 12)
                    .attr('text-anchor', 'middle')
                    .attr('fill', d => d.nodeType === 'DOMAIN' ? '#fff' : '#bbb')
                    .attr('font-size', d => d.nodeType === 'DOMAIN' ? 11 : 9)
                    .attr('font-weight', d => d.nodeType === 'DOMAIN' ? 700 : 400)
                    .text(d => {
                        const name = d.label || d.id;
                        return name.length > 22 ? name.substring(0, 20) + '...' : name;
                    });

                node.on('mouseover', (event, d) => {
                    link.attr('stroke-opacity', l => {
                        const src = typeof l.source === 'object' ? l.source.id : l.source;
                        const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                        return (src === d.id || tgt === d.id) ? 1 : 0.1;
                    }).attr('stroke-width', l => {
                        const src = typeof l.source === 'object' ? l.source.id : l.source;
                        const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                        return (src === d.id || tgt === d.id) ? 2.5 : 1;
                    });
                    node.attr('opacity', n => {
                        if (n.id === d.id) return 1;
                        const connected = links.some(l => {
                            const src = typeof l.source === 'object' ? l.source.id : l.source;
                            const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                            return (src === d.id && tgt === n.id) || (tgt === d.id && src === n.id);
                        });
                        return connected ? 1 : 0.2;
                    });
                }).on('mouseout', () => {
                    link.attr('stroke-opacity', 0.6).attr('stroke-width', 1.5);
                    node.attr('opacity', 1);
                }).on('click', (event, d) => {
                    event.stopPropagation();
                    setKgSelectedNode(d);
                });

                svg.on('click', () => setKgSelectedNode(null));

                simulation.on('tick', () => {
                    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
                    node.attr('transform', d => `translate(${d.x},${d.y})`);
                });

                simulation.on('end', () => {
                    const bounds = g.node().getBBox();
                    if (bounds.width > 0 && bounds.height > 0) {
                        const padding = 40;
                        const scale = Math.min((width - padding * 2) / bounds.width, (height - padding * 2) / bounds.height, 1.5);
                        const tx = width / 2 - (bounds.x + bounds.width / 2) * scale;
                        const ty = height / 2 - (bounds.y + bounds.height / 2) * scale;
                        svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
                    }
                });

                return () => simulation.stop();
            }, [show, kgTableData, kgRelationshipData, kgViewMode, kgDomainFilter, kgSearch]);

            const filteredNodeInfo = kgSelectedNode ? (() => {
                const rels = kgRelationshipData.filter(r => r.from_table === kgSelectedNode.id || r.to_table === kgSelectedNode.id);
                return { node: kgSelectedNode, rels };
            })() : null;

            if (!show) return null;

            return (
                <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'var(--bg-primary)', zIndex: 2000, display: 'flex', flexDirection: 'column' }}>
                    {/* KG Header */}
                    <div style={{ padding: '12px 20px', background: 'var(--bg-surface)', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                            <span style={{ fontSize: '16px', fontWeight: 600, color: 'var(--text-primary)' }}>Knowledge Graph</span>
                            <span style={{ background: 'linear-gradient(135deg, #6366f1, #8b5cf6)', color: '#fff', fontSize: '10px', padding: '2px 8px', borderRadius: '9px', fontWeight: 700 }}>KG</span>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                            <input type="text" placeholder="Search tables..." value={kgSearch} onChange={e => setKgSearch(e.target.value)}
                                style={{ background: 'var(--bg-surface2)', border: '1px solid var(--border)', borderRadius: '6px', color: 'var(--text-primary)', padding: '5px 10px', fontSize: '12px', width: '200px', outline: 'none' }} />
                            <button onClick={onClose}
                                style={{ background: 'var(--bg-surface2)', border: '1px solid var(--border)', borderRadius: '6px', color: 'var(--text-primary)', padding: '6px 14px', cursor: 'pointer', fontSize: '13px' }}>Close</button>
                        </div>
                    </div>
                    {/* KG Filter Bar */}
                    <div style={{ padding: '8px 20px', background: 'var(--bg-surface)', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: '16px', fontSize: '11px', color: 'var(--text-dim)', flexShrink: 0, flexWrap: 'wrap' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                            <span style={{ fontSize: '10px', textTransform: 'uppercase', letterSpacing: '0.5px', fontWeight: 600, marginRight: '4px' }}>View:</span>
                            {[
                                { key: 'tables', label: 'Tables & Joins' },
                                { key: 'concepts', label: 'Business Concepts' },
                                { key: 'full', label: 'Full Graph' }
                            ].map(v => (
                                <button key={v.key} onClick={() => setKgViewMode(v.key)}
                                    style={{
                                        background: kgViewMode === v.key ? 'var(--accent)' : 'var(--bg-surface2)',
                                        color: kgViewMode === v.key ? '#fff' : 'var(--text-dim)',
                                        border: '1px solid ' + (kgViewMode === v.key ? 'var(--accent)' : 'var(--border)'),
                                        borderRadius: '4px', padding: '3px 10px', cursor: 'pointer', fontSize: '11px', fontWeight: kgViewMode === v.key ? 600 : 400, transition: 'all 0.15s'
                                    }}>{v.label}</button>
                            ))}
                        </div>
                        <div style={{ width: '1px', height: '18px', background: 'var(--border)' }} />
                        <div style={{ display: 'flex', alignItems: 'center', gap: '4px', flexWrap: 'wrap' }}>
                            <span style={{ fontSize: '10px', textTransform: 'uppercase', letterSpacing: '0.5px', fontWeight: 600, marginRight: '4px' }}>Domain:</span>
                            <button onClick={() => setKgDomainFilter('all')}
                                style={{
                                    background: kgDomainFilter === 'all' ? 'var(--accent)' : 'var(--bg-surface2)',
                                    color: kgDomainFilter === 'all' ? '#fff' : 'var(--text-dim)',
                                    border: '1px solid ' + (kgDomainFilter === 'all' ? 'var(--accent)' : 'var(--border)'),
                                    borderRadius: '4px', padding: '3px 10px', cursor: 'pointer', fontSize: '11px', fontWeight: kgDomainFilter === 'all' ? 600 : 400
                                }}>All ({kgTableData.length})</button>
                            {domainInfo.map((d, di) => {
                                const dPalette = ['#6366f1','#8b5cf6','#06b6d4','#22c55e','#f59e0b','#ef4444','#ec4899','#14b8a6','#f97316','#a855f7','#0ea5e9','#84cc16','#d946ef','#f43f5e','#2dd4bf','#facc15','#fb923c','#c084fc'];
                                const dColor = dPalette[di % dPalette.length];
                                return (
                                    <button key={d.name} onClick={() => setKgDomainFilter(d.name)}
                                        style={{
                                            background: kgDomainFilter === d.name ? dColor + '22' : 'var(--bg-surface2)',
                                            color: kgDomainFilter === d.name ? dColor : 'var(--text-dim)',
                                            border: '1px solid ' + (kgDomainFilter === d.name ? dColor : 'var(--border)'),
                                            borderRadius: '4px', padding: '3px 8px', cursor: 'pointer', fontSize: '11px',
                                            fontWeight: kgDomainFilter === d.name ? 600 : 400, display: 'flex', alignItems: 'center', gap: '4px'
                                        }}>
                                        <span style={{ width: '7px', height: '7px', borderRadius: '50%', background: dColor, flexShrink: 0 }} />
                                        {d.name} ({d.tableCount})
                                    </button>
                                );
                            })}
                        </div>
                        <div style={{ flex: 1 }} />
                        <span>Tables: <strong style={{ color: 'var(--accent)' }}>{kgTableData.length}</strong></span>
                        <span>Relationships: <strong style={{ color: 'var(--accent)' }}>{kgRelationshipData.length}</strong></span>
                    </div>
                    {/* KG Body */}
                    <div style={{ flex: 1, display: 'flex', overflow: 'hidden', position: 'relative' }}>
                        {loading ? (
                            <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-dim)' }}>Loading graph data...</div>
                        ) : (
                            <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
                                <svg ref={svgRef} style={{ width: '100%', height: '100%', display: 'block', background: 'var(--bg-primary)' }} />
                                <div style={{ position: 'absolute', top: '16px', right: '16px', display: 'flex', flexDirection: 'column', gap: '4px', zIndex: 10 }}>
                                    <button onClick={kgZoomIn} title="Zoom in" style={{ background: 'rgba(26,29,39,0.92)', border: '1px solid var(--border)', borderRadius: '6px', color: 'var(--text-dim)', padding: '6px 10px', cursor: 'pointer', fontSize: '16px', fontWeight: 700, lineHeight: 1 }}>+</button>
                                    <button onClick={kgZoomOut} title="Zoom out" style={{ background: 'rgba(26,29,39,0.92)', border: '1px solid var(--border)', borderRadius: '6px', color: 'var(--text-dim)', padding: '6px 10px', cursor: 'pointer', fontSize: '16px', fontWeight: 700, lineHeight: 1 }}>&minus;</button>
                                    <button onClick={kgZoomFit} title="Fit to screen" style={{ background: 'rgba(26,29,39,0.92)', border: '1px solid var(--border)', borderRadius: '6px', color: 'var(--text-dim)', padding: '6px 10px', cursor: 'pointer', fontSize: '12px', lineHeight: 1 }}>&#8982;</button>
                                </div>
                                <div style={{ position: 'absolute', bottom: '16px', left: '16px', background: 'rgba(26,29,39,0.92)', border: '1px solid var(--border)', borderRadius: '8px', padding: '10px 14px', fontSize: '11px', zIndex: 10, maxWidth: '260px', maxHeight: '300px', overflowY: 'auto' }}>
                                    <div style={{ fontSize: '11px', color: 'var(--text-dim)', marginBottom: '6px', textTransform: 'uppercase', letterSpacing: '0.5px', fontWeight: 600 }}>
                                        {kgViewMode === 'concepts' ? 'Domains' : 'Legend'}
                                    </div>
                                    {(kgDomainFilter === 'all' ? domainInfo : domainInfo.filter(d => d.name === kgDomainFilter)).map((d, di) => {
                                        const lPalette = ['#6366f1','#8b5cf6','#06b6d4','#22c55e','#f59e0b','#ef4444','#ec4899','#14b8a6','#f97316','#a855f7','#0ea5e9','#84cc16','#d946ef','#f43f5e','#2dd4bf','#facc15','#fb923c','#c084fc'];
                                        const idx = domainInfo.indexOf(d);
                                        return (
                                            <div key={d.name} style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '3px', color: 'var(--text-dim)', cursor: 'pointer' }}
                                                onClick={() => setKgDomainFilter(kgDomainFilter === d.name ? 'all' : d.name)}>
                                                <div style={{ width: '10px', height: '10px', borderRadius: '50%', flexShrink: 0, background: lPalette[idx % lPalette.length] }} />
                                                <span>{d.name} ({d.tableCount})</span>
                                            </div>
                                        );
                                    })}
                                    {kgViewMode === 'concepts' && (
                                        <div style={{ marginTop: '8px', borderTop: '1px solid var(--border)', paddingTop: '6px', display: 'flex', alignItems: 'center', gap: '6px', color: 'var(--text-dim)' }}>
                                            <div style={{ width: '10px', height: '10px', borderRadius: '2px', transform: 'rotate(45deg)', flexShrink: 0, border: '1.5px solid #aaa', background: 'transparent' }} />
                                            <span>Domain hub</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                        {filteredNodeInfo && (
                            <div style={{ width: '320px', background: 'var(--bg-surface)', borderLeft: '1px solid var(--border)', overflowY: 'auto', padding: '16px', flexShrink: 0 }}>
                                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '12px' }}>
                                    <span style={{ fontSize: '14px', fontWeight: 600, wordBreak: 'break-word' }}>{filteredNodeInfo.node.label}</span>
                                    <button onClick={() => setKgSelectedNode(null)} style={{ background: 'none', border: 'none', color: 'var(--text-dim)', cursor: 'pointer', fontSize: '16px' }}>✕</button>
                                </div>
                                <div style={{ marginBottom: '14px' }}>
                                    <div style={{ fontSize: '11px', color: 'var(--text-dim)', textTransform: 'uppercase', marginBottom: '4px' }}>Table</div>
                                    <div style={{ fontSize: '12px', color: 'var(--text-primary)', fontFamily: 'monospace' }}>{filteredNodeInfo.node.id}</div>
                                </div>
                                {filteredNodeInfo.node.description && (
                                    <div style={{ marginBottom: '14px' }}>
                                        <div style={{ fontSize: '11px', color: 'var(--text-dim)', textTransform: 'uppercase', marginBottom: '4px' }}>Description</div>
                                        <div style={{ fontSize: '12px', color: 'var(--text-primary)', lineHeight: 1.5 }}>{filteredNodeInfo.node.description}</div>
                                    </div>
                                )}
                                <div style={{ marginBottom: '14px' }}>
                                    <div style={{ fontSize: '11px', color: 'var(--text-dim)', textTransform: 'uppercase', marginBottom: '4px' }}>Domain</div>
                                    <div style={{ fontSize: '12px', color: filteredNodeInfo.node.color }}>{filteredNodeInfo.node.domain}</div>
                                </div>
                                <div style={{ marginBottom: '14px' }}>
                                    <div style={{ fontSize: '11px', color: 'var(--text-dim)', textTransform: 'uppercase', marginBottom: '6px' }}>Relationships ({filteredNodeInfo.rels.length})</div>
                                    {filteredNodeInfo.rels.map((r, ri) => (
                                        <div key={ri} style={{ fontSize: '12px', padding: '6px 8px', background: 'var(--bg-surface2)', borderRadius: '6px', marginBottom: '4px' }}>
                                            <div>{r.from_table}.{r.from_column} → {r.to_table}.{r.to_column}</div>
                                            <div style={{ fontSize: '10px', color: 'var(--text-dim)' }}>{r.rel_type} · {r.cardinality || 'many_to_one'}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // =====================================================
        // APP (TOP-LEVEL)
        // =====================================================
        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(!!sessionStorage.getItem('bokg_jwt'));
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [currentApp, setCurrentApp] = useState(() => sessionStorage.getItem('bokg_app_id') || null);
            const [currentAppName, setCurrentAppName] = useState(() => sessionStorage.getItem('bokg_app_name') || '');
            const [currentAppStatus, setCurrentAppStatus] = useState('');
            const [showNewAppWizard, setShowNewAppWizard] = useState(false);
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [userMenuOpen, setUserMenuOpen] = useState(false);
            const [pipelineStatus, setPipelineStatus] = useState(null); // null, 'running', 'completed', 'failed'
            const [pipelineProgress, setPipelineProgress] = useState('');
            const [toast, setToast] = useState(null); // { message, type: 'success'|'error' }
            const [showKGViewer, setShowKGViewer] = useState(false);

            // Parse user info from JWT
            const [userInfo, setUserInfo] = useState(() => {
                const token = sessionStorage.getItem('bokg_jwt');
                return token ? parseJwt(token) : {};
            });
            const isEndUser = userInfo.role === 'end_user';

            // Close user menu when clicking outside
            useEffect(() => {
                const handleClick = (e) => {
                    if (!e.target.closest('.dropdown')) setUserMenuOpen(false);
                };
                document.addEventListener('click', handleClick);
                return () => document.removeEventListener('click', handleClick);
            }, []);

            // Poll for pipeline status when an app is selected (background awareness)
            // PRODUCTION NOTE: In production, this should integrate with the CDP/EAI
            // status monitor infrastructure. Pipeline jobs would be submitted to the
            // job queue and tracked via the existing status monitor UI. The prototype
            // uses polling to demonstrate the background job concept.
            const prevStatusRef = React.useRef(null);
            const pipelineSeenRef = React.useRef(false); // tracks if user has seen the completion
            useEffect(() => {
                if (!currentApp || !isLoggedIn) return;
                const poll = async () => {
                    try {
                        const data = await api.get(`/pipeline/${currentApp}/status`);
                        if (!data) return;

                        if (data.status === 'running') {
                            const p = data.progress || {};
                            setPipelineStatus('running');
                            const stage = p.current_stage || '';
                            const pct = p.tables_total > 0 ? Math.round((p.tables_done / p.tables_total) * 100) : 0;
                            setPipelineProgress(`${stage} ${pct}%`);
                            prevStatusRef.current = 'running';
                            pipelineSeenRef.current = false;
                        } else if (prevStatusRef.current === 'running') {
                            // Just transitioned from running to done — show toast
                            const failed = data.status === 'failed';
                            setPipelineStatus(failed ? 'failed' : 'completed');
                            setPipelineProgress('');
                            setToast({
                                message: failed ? 'Pipeline failed — check Pipeline Monitor for details' : 'Pipeline completed successfully',
                                type: failed ? 'error' : 'success'
                            });
                            setTimeout(() => setToast(null), 6000);
                            prevStatusRef.current = data.status;
                            // Re-fetch app status — pipeline changes it (e.g. published → in_review)
                            try {
                                const appData = await api.get('/applications');
                                if (appData && appData.applications) {
                                    const app = appData.applications.find(a => String(a.id) === String(currentApp));
                                    if (app) setCurrentAppStatus(app.status);
                                }
                            } catch (e) { /* ignore */ }
                            // Keep the badge visible until user visits Pipeline page
                        } else if ((data.status === 'completed' || data.status === 'failed') && data.completed_at) {
                            // Check if completed recently (within 2 minutes) and not yet seen
                            const completedAgo = Date.now() - new Date(data.completed_at).getTime();
                            if (completedAgo < 120000 && !pipelineSeenRef.current) {
                                setPipelineStatus(data.status === 'failed' ? 'failed' : 'completed');
                            } else {
                                setPipelineStatus(null);
                            }
                            setPipelineProgress('');
                            prevStatusRef.current = data.status;
                        } else {
                            setPipelineStatus(null);
                            setPipelineProgress('');
                            prevStatusRef.current = null;
                        }
                    } catch (e) { /* ignore poll errors */ }
                };
                poll();
                const interval = setInterval(poll, 3000);
                return () => clearInterval(interval);
            }, [currentApp, isLoggedIn]);

            // Clear pipeline badge when user visits Pipeline page
            useEffect(() => {
                if (currentPage === 'pipeline' && (pipelineStatus === 'completed' || pipelineStatus === 'failed')) {
                    pipelineSeenRef.current = true;
                    setTimeout(() => setPipelineStatus(null), 1000);
                }
            }, [currentPage, pipelineStatus]);

            // Fetch current app details when app changes
            useEffect(() => {
                if (!currentApp || !isLoggedIn) return;
                const fetchApp = async () => {
                    try {
                        const data = await api.get('/applications');
                        if (data && data.applications) {
                            const app = data.applications.find(a => String(a.id) === String(currentApp));
                            if (app) {
                                setCurrentAppName(app.name);
                                setCurrentAppStatus(app.status);
                                sessionStorage.setItem('bokg_app_name', app.name);
                            }
                        }
                    } catch (err) { /* ignore */ }
                };
                fetchApp();
            }, [currentApp, isLoggedIn]);

            const handleSelectApp = (appId) => {
                setCurrentApp(String(appId));
                sessionStorage.setItem('bokg_app_id', String(appId));
                setCurrentPage('workflow'); // Navigate to workflow after selecting app
            };

            const handleLogin = (token, user) => {
                const parsed = parseJwt(token);
                setUserInfo(parsed);
                setCurrentApp(null);
                setCurrentAppName('');
                setCurrentAppStatus('');
                setCurrentPage('dashboard');
                setIsLoggedIn(true);
            };

            const handleLogout = () => {
                sessionStorage.removeItem('bokg_jwt');
                sessionStorage.removeItem('bokg_app_id');
                sessionStorage.removeItem('bokg_app_name');
                setIsLoggedIn(false);
                setUserInfo({});
                setCurrentApp(null);
                setCurrentAppName('');
                setCurrentAppStatus('');
                setCurrentPage('dashboard');
                setPipelineStatus(null);
                setPipelineProgress('');
                setToast(null);
            };

            // IMPORTANT: All useState hooks MUST be above any early returns
            // React requires hooks to be called in the same order every render
            const [seedingQPD, setSeedingQPD] = React.useState(false);

            if (!isLoggedIn) {
                return <LoginScreen onLogin={handleLogin} />;
            }

            // End-user role gets the IDA interface
            if (isEndUser) {
                return <IDAInterface user={userInfo} onLogout={handleLogout} onOpenGraphViewer={() => setShowKGViewer(true)} />;
            }

            // Publish / Unpublish handlers for builder role
            const handlePublish = async () => {
                if (!currentApp) return;
                const data = await api.post(`/applications/${currentApp}/publish`, {});
                if (data && data.application) {
                    setCurrentAppStatus('published');
                    setToast({ message: `${currentAppName} published — now available to end users`, type: 'success' });
                    setTimeout(() => setToast(null), 5000);
                }
            };

            const handleUnpublish = async () => {
                if (!currentApp) return;
                const data = await api.post(`/applications/${currentApp}/unpublish`, {});
                if (data && data.application) {
                    setCurrentAppStatus('in_review');
                    setToast({ message: `${currentAppName} unpublished — back in review mode`, type: 'success' });
                    setTimeout(() => setToast(null), 5000);
                }
            };

            const handleSeedQPD = async () => {
                if (!currentApp || seedingQPD) return;
                setSeedingQPD(true);
                setToast({ message: 'Seeding QPD — generating and validating sample queries for each business object...', type: 'info' });
                try {
                    const data = await api.post(`/test/${currentApp}/seed-qpd`, {});
                    if (data) {
                        setToast({ message: `QPD seeded: ${data.seeded} verified patterns from ${data.entities} business objects (${data.failed} failed)`, type: 'success' });
                        setTimeout(() => setToast(null), 8000);
                    }
                } catch (err) {
                    setToast({ message: `QPD seeding failed: ${err.message}`, type: 'error' });
                    setTimeout(() => setToast(null), 5000);
                } finally {
                    setSeedingQPD(false);
                }
            };

            // Pages that require an app to be selected
            const appRequiredPages = ['pipeline', 'schema', 'data', 'context', 'curation', 'knowledge', 'synonyms', 'workflow', 'patterns', 'test', 'quality'];
            const needsApp = appRequiredPages.includes(currentPage) && !currentApp;

            const sidebarItems = [
                { id: 'dashboard', label: 'Dashboard', icon: 'Home' },
                { id: 'workflow', label: 'Workflow', icon: 'ListChecks' },
                { id: 'schema', label: 'Schema Explorer', icon: 'Database' },
                { id: 'data', label: 'Data Browser', icon: 'Table' },
                { id: 'context', label: 'Context Library', icon: 'FileText' },
                { id: 'curation', label: 'Curation', icon: 'CheckCircle' },
                { id: 'knowledge', label: 'Knowledge Graph', icon: 'Share' },
                { id: 'synonyms', label: 'Synonyms', icon: 'BookOpen' },
                { id: 'patterns', label: 'Patterns', icon: 'Grid' },
                { id: 'test', label: 'Test Console', icon: 'Eye' },
                { id: 'quality', label: 'Quality', icon: 'TrendingUp' },
                { id: 'consumption', label: 'Consumption', icon: 'Activity' },
                { id: 'settings', label: 'Settings', icon: 'Settings' }
            ];

            return (
                <div className="container">
                    <nav className={`sidebar ${!sidebarOpen ? 'collapsed' : ''}`}>
                        <div className="sidebar-logo">
                            <span><KGLogo size={22} /> Menu</span>
                            <button className="sidebar-collapse-btn" onClick={() => setSidebarOpen(false)} title="Hide sidebar">
                                <Icon name="PanelLeftClose" size={16} />
                            </button>
                        </div>
                        <ul className="sidebar-nav">
                            {sidebarItems.map(item => (
                                <li key={item.id}>
                                    <a
                                        className={currentPage === item.id ? 'active' : ''}
                                        onClick={() => {
                                            setCurrentPage(item.id);
                                            if (window.innerWidth <= 768) setSidebarOpen(false);
                                        }}
                                        style={{ position: 'relative' }}
                                    >
                                        <Icon name={item.icon} />
                                        {item.label}
                                        {item.id === 'workflow' && pipelineStatus === 'running' && (
                                            <span style={{
                                                position: 'absolute', right: '8px', top: '50%', transform: 'translateY(-50%)',
                                                width: '8px', height: '8px', borderRadius: '50%', background: '#f59e0b',
                                                animation: 'pulse 1.5s infinite'
                                            }} title={pipelineProgress} />
                                        )}
                                        {item.id === 'workflow' && pipelineStatus === 'completed' && (
                                            <span style={{
                                                position: 'absolute', right: '6px', top: '50%', transform: 'translateY(-50%)',
                                                fontSize: '12px', color: '#22c55e'
                                            }}>✓</span>
                                        )}
                                        {item.id === 'workflow' && pipelineStatus === 'failed' && (
                                            <span style={{
                                                position: 'absolute', right: '6px', top: '50%', transform: 'translateY(-50%)',
                                                fontSize: '12px', color: '#ef4444'
                                            }}>✕</span>
                                        )}
                                    </a>
                                </li>
                            ))}
                        </ul>
                        {!isEndUser && (
                            <BuilderGuide
                                appId={currentApp}
                                currentPage={currentPage}
                                onNavigate={setCurrentPage}
                                pipelineStatus={pipelineStatus}
                                appStatus={currentAppStatus}
                            />
                        )}
                    </nav>

                    <div className="main">
                        <div className="header">
                            <div className="header-left">
                                {!sidebarOpen && (
                                    <button
                                        className="sidebar-toggle visible"
                                        onClick={() => setSidebarOpen(true)}
                                        title="Show sidebar"
                                        style={{position: 'relative', top: 'auto', left: 'auto', marginRight: '12px'}}
                                    >
                                        <Icon name="PanelLeftOpen" size={16} />
                                    </button>
                                )}
                                <div className="header-logo"><KGLogo size={24} /> Data Sense Knowledge Graph Builder</div>
                            </div>
                            <div className="header-right" style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                                {/* Publish/Unpublish removed from header — publish is workflow-only (step 10) */}
                                <div className={`dropdown ${userMenuOpen ? 'open' : ''}`}>
                                    <div className="user-menu" onClick={(e) => { e.stopPropagation(); setUserMenuOpen(!userMenuOpen); }}>
                                        <span style={{ fontSize: '12px', color: 'var(--text-dim)', marginRight: '4px' }}>{userInfo.name || 'User'}</span>
                                        <div className="avatar">{(userInfo.name || 'U')[0]}</div>
                                        <Icon name="ChevronDown" />
                                    </div>
                                    <div className="dropdown-menu">
                                        <button className="dropdown-item" onClick={() => { setCurrentPage('settings'); setUserMenuOpen(false); }}>Profile</button>
                                        <button className="dropdown-item" onClick={() => { setCurrentPage('settings'); setUserMenuOpen(false); }}>Settings</button>
                                        <button className="dropdown-item" onClick={() => { handleLogout(); setUserMenuOpen(false); }}>Logout</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="content page">
                            {needsApp ? (
                                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '300px', color: 'var(--text-dim)' }}>
                                    <Icon name="AlertCircle" size={48} />
                                    <div style={{ marginTop: '16px', fontSize: '16px' }}>No application selected</div>
                                    <div style={{ marginTop: '8px', fontSize: '13px' }}>Go to the Dashboard and select an application first.</div>
                                    <button className="btn-primary" style={{ marginTop: '16px' }} onClick={() => setCurrentPage('dashboard')}>Go to Dashboard</button>
                                </div>
                            ) : (
                                <>
                                    {currentPage === 'dashboard' && <Dashboard user={mockData.user} onLogout={handleLogout} currentApp={currentApp} onSelectApp={handleSelectApp} onNewApp={() => setShowNewAppWizard(true)} />}
                                    {currentPage === 'pipeline' && <><AppContextBar appId={currentApp} appName={currentAppName} appStatus={currentAppStatus} currentPage={currentPage} onNavigate={setCurrentPage} /><PipelineMonitor appId={currentApp} onNavigate={setCurrentPage} /></>}
                                    {currentPage === 'workflow' && <><AppContextBar appId={currentApp} appName={currentAppName} appStatus={currentAppStatus} /><GuidedWorkflow appId={currentApp} onNavigate={setCurrentPage} onPipelineStatusChange={() => { /* refresh app status */ }} /></>}
                                    {currentPage === 'profile' && <><AppContextBar appId={currentApp} appName={currentAppName} appStatus={currentAppStatus} currentPage={currentPage} onNavigate={setCurrentPage} /><ProfileReview appId={currentApp} /></>}
                                    {currentPage === 'schema' && <><AppContextBar appId={currentApp} appName={currentAppName} appStatus={currentAppStatus} currentPage={currentPage} onNavigate={setCurrentPage} /><SchemaExplorer appId={currentApp} /></>}
                                    {currentPage === 'curation' && <><AppContextBar appId={currentApp} appName={currentAppName} appStatus={currentAppStatus} currentPage={currentPage} onNavigate={setCurrentPage} /><CurationWorkspace appId={currentApp} /></>}
                                    {currentPage === 'patterns' && <><AppContextBar appId={currentApp} appName={currentAppName} appStatus={currentAppStatus} currentPage={currentPage} onNavigate={setCurrentPage} /><PatternLibrary appId={currentApp} /></>}
                                    {currentPage === 'test' && <><AppContextBar appId={currentApp} appName={currentAppName} appStatus={currentAppStatus} currentPage={currentPage} onNavigate={setCurrentPage} /><TestConsole appId={currentApp} /></>}
                                    {currentPage === 'quality' && <><AppContextBar appId={currentApp} appName={currentAppName} appStatus={currentAppStatus} currentPage={currentPage} onNavigate={setCurrentPage} /><QualityDashboard appId={currentApp} /></>}
                                    {currentPage === 'data' && <><AppContextBar appId={currentApp} appName={currentAppName} appStatus={currentAppStatus} currentPage={currentPage} onNavigate={setCurrentPage} /><DataBrowser appId={currentApp} /></>}
                                    {currentPage === 'context' && <><AppContextBar appId={currentApp} appName={currentAppName} appStatus={currentAppStatus} currentPage={currentPage} onNavigate={setCurrentPage} /><ContextLibrary appId={currentApp} /></>}
                                    {currentPage === 'knowledge' && <><AppContextBar appId={currentApp} appName={currentAppName} appStatus={currentAppStatus} currentPage={currentPage} onNavigate={setCurrentPage} /><KnowledgeGraph appId={currentApp} onOpenGraphViewer={() => setShowKGViewer(true)} /></>}
                                    {currentPage === 'synonyms' && <><AppContextBar appId={currentApp} appName={currentAppName} appStatus={currentAppStatus} currentPage={currentPage} onNavigate={setCurrentPage} /><SynonymManager appId={currentApp} /></>}
                                    {currentPage === 'consumption' && <ConsumptionTracker appId={currentApp} />}
                                    {currentPage === 'settings' && <Settings appId={currentApp} />}
                                </>
                            )}
                        </div>
                    </div>

                    {showNewAppWizard && (
                        <NewApplicationWizard
                            onClose={() => setShowNewAppWizard(false)}
                            onSuccess={() => setCurrentPage('dashboard')}
                        />
                    )}

                    {/* Toast notification for pipeline completion */}
                    {toast && (
                        <div className={`toast ${toast.type}`}>
                            {toast.type === 'success' ? '✓ ' : '✕ '}{toast.message}
                        </div>
                    )}

                    {/* KG Viewer Overlay — renders at App level so it works from both builder and end-user views */}
                    <KGViewerOverlay appId={currentApp} show={showKGViewer} onClose={() => setShowKGViewer(false)} />
                </div>
            );
        };

        // =====================================================
        // RENDER
        // =====================================================

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
