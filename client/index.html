        const api = {
            async call(method, endpoint, body = null) {
                const token = sessionStorage.getItem('bokg_jwt');
                const headers = {
                    'Content-Type': 'application/json',
                    ...(token && { 'Authorization': `Bearer ${token}` })
                };

                try {
                    const options = { method, headers };
                    if (body) options.body = JSON.stringify(body);

                    const response = await fetch(`${API_BASE_URL}${endpoint}`, options);
                    if (!response.ok) throw new Error(`API error: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    console.warn('API call failed, using mock data:', error);
                    return null;
                }
            },
            // Same as call() but propagates errors with server messages instead of returning null
            async callWithErrors(method, endpoint, body = null) {
                const token = sessionStorage.getItem('bokg_jwt');
                const headers = {
                    'Content-Type': 'application/json',
                    ...(token && { 'Authorization': `Bearer ${token}` })
                };
                const options = { method, headers };
                if (body) options.body = JSON.stringify(body);

                const response = await fetch(`${API_BASE_URL}${endpoint}`, options);
                if (!response.ok) {
                    let errMsg = `Server error (${response.status})`;
                    try {
                        const errData = await response.json();
                        if (errData.error) errMsg = errData.error;
                    } catch (e) { /* ignore parse errors */ }
                    throw new Error(errMsg);
                }
                return await response.json();
            },

            get(endpoint) { return this.call('GET', endpoint); },
            post(endpoint, body) { return this.call('POST', endpoint, body); },
            put(endpoint, body) { return this.call('PUT', endpoint, body); },
            delete(endpoint) { return this.call('DELETE', endpoint); }
        };

            const [knowledgeSaved, setKnowledgeSaved] = useState(false);
            const [showDiff, setShowDiff] = useState(false);
            const [diff, setDiff] = useState(null);
            const [diffLoading, setDiffLoading] = useState(false);
            const [reEnriching, setReEnriching] = useState(false);
            // Merge context state
            // Quick Merge state removed in v2.1.1 — merge API still available for future use
            // Inline upload state
            const [contextDocs, setContextDocs] = useState([]);
            const [uploading, setUploading] = useState(false);
            const [uploadMsg, setUploadMsg] = useState('');
            const [dragOver, setDragOver] = useState(false);
            const fileInputRef = useRef(null);

            const fetchSummary = async () => {
                setLoading(true);
                const data = await api.get(`/pipeline/${appId}/confidence-summary`);
                if (data) setSummary(data);
                setLoading(false);
            };

            const fetchDocs = async () => {
                const data = await api.get(`/context/${appId}/documents`);
                if (data && data.documents) setContextDocs(data.documents);
            };

            const fetchDiff = async () => {
                setDiffLoading(true);
                const data = await api.get(`/pipeline/${appId}/enrichment-diff`);
                if (data && data.has_snapshot) {
                    setDiff(data);
                    setShowDiff(true);
                }
                setDiffLoading(false);
            };

            useEffect(() => {
                fetchSummary();
                fetchDocs();
                // Check if there's a diff available from a previous re-enrichment
                api.get(`/pipeline/${appId}/enrichment-diff`).then(data => {
                    if (data && data.has_snapshot) {
                        setDiff(data);
                        setShowDiff(true);
                    }
                });
            }, [appId, refreshKey]);

            const handleFileUpload = async (file) => {
                if (!file) return;
                setUploading(true);
                setUploadMsg('');
                try {
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('description', '');
                    const token = sessionStorage.getItem('bokg_jwt');
                    const resp = await fetch(`${API_BASE_URL}/context/${appId}/upload`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData,
                    });
                    const data = await resp.json();
                    if (!resp.ok) throw new Error(data.error || 'Upload failed');
                    setUploadMsg(`Uploaded "${file.name}" — ${data.text_length.toLocaleString()} chars extracted`);
                    fetchDocs();
                } catch (err) {
                    setUploadMsg(`Error: ${err.message}`);
                } finally {
                    setUploading(false);
                }
            };

            const handleDropzoneClick = () => fileInputRef.current?.click();
            const handleFileChange = (e) => { Array.from(e.target.files).forEach(f => handleFileUpload(f)); e.target.value = ''; };
            const handleDrop = (e) => { e.preventDefault(); setDragOver(false); Array.from(e.dataTransfer.files).forEach(f => handleFileUpload(f)); };
            const handleDeleteDoc = async (docId) => {
                await api.call('DELETE', `/context/${appId}/documents/${docId}`);
                fetchDocs();
            };

            const handleKnowledgeChange = (columnId, field, value) => {
                setKnowledgeEntries(prev => ({
                    ...prev,
                    [columnId]: { ...prev[columnId], [field]: value }
                }));
                setKnowledgeSaved(false);
            };

            const handleSaveKnowledge = async () => {
                const entries = [];
                for (const [columnId, entry] of Object.entries(knowledgeEntries)) {
                    if (entry.business_name && entry.business_name.trim()) {
                        entries.push({
                            table_name: entry.table_name,
                            column_name: entry.column_name,
                            business_name: entry.business_name.trim(),
                            description: (entry.description || '').trim(),
                        });
                    }
                }
                if (entries.length === 0) return;

                setSavingKnowledge(true);
                const result = await api.post(`/pipeline/${appId}/save-user-knowledge`, { entries });
                setSavingKnowledge(false);
                if (result) {
                    setKnowledgeSaved(true);
                }
            };

            const handleReenrichWithContext = async () => {
                setReEnriching(true);
                setShowDiff(false); // Hide old comparison
                try {
                    // One-click: snapshot + reset + auto-run pipeline
                    console.log('[Context Coach] Starting re-enrich with context...');
                    const data = await api.post(`/pipeline/${appId}/re-enrich-with-context`, {});
                    console.log('[Context Coach] Re-enrich response:', data);
                    if (data && data.run) {
                        // Tell parent PipelineMonitor that a run has started
                        onReenrich(data.run);
                    } else {
                        console.error('[Context Coach] Re-enrich failed — no run in response:', data);
                        setReEnriching(false);
                    }
                } catch (err) {
                    console.error('[Context Coach] Re-enrich error:', err);
                    setReEnriching(false);
                }
            };

            const knowledgeEntryCount = Object.values(knowledgeEntries).filter(e => e.business_name && e.business_name.trim()).length;

            if (loading) return null;
            if (!summary || !summary.has_enrichments) return null;

            const tierColors = { high: '#22c55e', moderate: '#eab308', low: '#ef4444' };

            return (
                <div style={{
                    marginBottom: '20px',
                    borderRadius: '10px',
                    border: '1px solid var(--border)',
                    background: 'var(--surface)',
                    overflow: 'hidden',
                }}>
                    {/* Header */}
                    <div onClick={() => setCollapsed(!collapsed)} style={{
                        padding: '14px 18px',
                        cursor: 'pointer',
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center',
                        background: summary.context_opportunity ? 'rgba(234, 179, 8, 0.06)' : 'transparent',
                        borderBottom: collapsed ? 'none' : '1px solid var(--border)',
                    }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                            <Icon name="Sparkles" size={18} />
                            <span style={{ fontWeight: 600, fontSize: '14px' }}>Context Coach</span>
                            <span style={{ fontSize: '13px', color: 'var(--text-dim)' }}>
                                {summary.total_columns} columns enriched — Avg confidence: {summary.avg_confidence}%
                            </span>
                            {summary.context_opportunity && (
                                <span style={{
                                    fontSize: '11px', padding: '2px 8px', borderRadius: '10px',
                                    background: 'rgba(234, 179, 8, 0.15)', color: '#eab308', fontWeight: 600,
                                }}>
                                    Context can help
                                </span>
                            )}
                        </div>
                        <Icon name={collapsed ? 'ChevronDown' : 'ChevronUp'} size={16} />
                    </div>

                    {!collapsed && (
                        <div style={{ padding: '16px 18px' }}>
                            {/* Confidence tier summary */}
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '12px', marginBottom: '16px' }}>
                                {[
                                    { key: 'high', label: 'High Confidence', icon: 'CheckCircle', desc: '85%+' },
                                    { key: 'moderate', label: 'Moderate', icon: 'AlertCircle', desc: '50-84%' },
                                    { key: 'low', label: 'Low Confidence', icon: 'AlertTriangle', desc: '<50%' },
                                ].map(tier => (
                                    <div key={tier.key} style={{
                                        padding: '12px 14px',
                                        borderRadius: '8px',
                                        border: `1px solid ${tierColors[tier.key]}22`,
                                        background: `${tierColors[tier.key]}08`,
                                    }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '4px' }}>
                                            <Icon name={tier.icon} size={14} />
                                            <span style={{ fontSize: '12px', fontWeight: 600, color: tierColors[tier.key] }}>{tier.label}</span>
                                            <span style={{ fontSize: '11px', color: 'var(--text-dim)' }}>({tier.desc})</span>
                                        </div>
                                        <div style={{ fontSize: '22px', fontWeight: 700, color: 'var(--text)' }}>
                                            {summary.tiers[tier.key].count}
                                            <span style={{ fontSize: '13px', fontWeight: 400, color: 'var(--text-dim)', marginLeft: '4px' }}>
                                                ({summary.tiers[tier.key].pct}%)
                                            </span>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Low-confidence columns by table */}
                            {summary.tiers.low.count > 0 && (
                                <div style={{ marginBottom: '16px' }}>
                                    <div style={{ fontSize: '13px', fontWeight: 600, marginBottom: '8px', display: 'flex', alignItems: 'center', gap: '6px' }}>
                                        <Icon name="AlertTriangle" size={14} />
                                        Low-Confidence Columns by Table
                                    </div>
                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px' }}>
                                        {Object.entries(summary.low_by_table).map(([tableName, cols]) => (
                                            <div key={tableName} style={{
                                                padding: '6px 10px',
                                                borderRadius: '6px',
                                                background: 'rgba(239, 68, 68, 0.08)',
                                                border: '1px solid rgba(239, 68, 68, 0.15)',
                                                fontSize: '12px',
                                            }}>
                                                <strong>{tableName}</strong>
                                                <span style={{ color: 'var(--text-dim)', marginLeft: '4px' }}>
                                                    ({cols.length} col{cols.length !== 1 ? 's' : ''}:
                                                    {' '}{cols.map(c => c.column_name).join(', ')})
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Step-by-step workflow */}
                            <div style={{
                                marginBottom: '16px', padding: '14px 16px', borderRadius: '8px',
                                background: 'rgba(99, 102, 241, 0.04)', border: '1px solid rgba(99, 102, 241, 0.12)',
                            }}>
                                <div style={{ fontSize: '13px', fontWeight: 600, marginBottom: '10px', display: 'flex', alignItems: 'center', gap: '6px' }}>
                                    <Icon name="Lightbulb" size={14} />
                                    Improve Enrichment Quality
                                </div>
                                <div style={{ display: 'flex', gap: '16px', fontSize: '12px', color: 'var(--text-dim)' }}>
                                    <div style={{ display: 'flex', alignItems: 'flex-start', gap: '8px', flex: 1 }}>
                                        <span style={{ background: 'var(--accent)', color: 'white', borderRadius: '50%', width: '20px', height: '20px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '11px', fontWeight: 700, flexShrink: 0 }}>1</span>
                                        <span><strong style={{ color: 'var(--text)' }}>Add context</strong> — Upload reference docs below, or enter what you know about specific columns</span>
                                    </div>
                                    <div style={{ display: 'flex', alignItems: 'flex-start', gap: '8px', flex: 1 }}>
                                        <span style={{ background: 'var(--accent)', color: 'white', borderRadius: '50%', width: '20px', height: '20px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '11px', fontWeight: 700, flexShrink: 0 }}>2</span>
                                        <span><strong style={{ color: 'var(--text)' }}>Re-enrich</strong> — The AI uses your context to improve low-confidence columns</span>
                                    </div>
                                    <div style={{ display: 'flex', alignItems: 'flex-start', gap: '8px', flex: 1 }}>
                                        <span style={{ background: 'var(--accent)', color: 'white', borderRadius: '50%', width: '20px', height: '20px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '11px', fontWeight: 700, flexShrink: 0 }}>3</span>
                                        <span><strong style={{ color: 'var(--text)' }}>Compare</strong> — See which columns improved, then repeat if needed</span>
                                    </div>
                                </div>
                            </div>

                            {/* Upload dropzone + existing docs */}
                            <div style={{
                                marginBottom: '16px', padding: '14px 16px', borderRadius: '8px',
                                background: 'var(--bg)', border: '1px solid var(--border)',
                            }}>
                                <div style={{ fontSize: '13px', fontWeight: 600, marginBottom: '10px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                                        <Icon name="FileText" size={14} />
                                        Step 1: Add Context
                                    </div>
                                    <button onClick={() => setShowGuidance(!showGuidance)}
                                        style={{
                                            background: 'transparent', border: 'none', color: 'var(--accent)',
                                            cursor: 'pointer', fontSize: '12px', display: 'flex', alignItems: 'center', gap: '4px',
                                        }}>
                                        <Icon name="BookOpen" size={12} />
                                        {showGuidance ? 'Hide guide' : 'What should I upload?'}
                                    </button>
                                </div>

                                {/* Drag-and-drop upload zone */}
                                <div
                                    onClick={handleDropzoneClick}
                                    onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                                    onDragLeave={() => setDragOver(false)}
                                    onDrop={handleDrop}
                                    style={{
                                        padding: '16px',
                                        borderRadius: '8px',
                                        border: `2px dashed ${dragOver ? 'var(--accent)' : 'var(--border)'}`,
                                        background: dragOver ? 'rgba(99, 102, 241, 0.06)' : 'transparent',
                                        textAlign: 'center',
                                        cursor: 'pointer',
                                        transition: 'all 0.15s',
                                        marginBottom: contextDocs.length > 0 ? '10px' : '0',
                                    }}>
                                    <input
                                        ref={fileInputRef}
                                        type="file"
                                        accept=".pdf,.txt,.md,.csv,.xlsx,.xls,.png,.jpg,.jpeg,.gif,.webp,.sql,.json,.xml,.log"
                                        multiple
                                        onChange={handleFileChange}
                                        style={{ display: 'none' }}
                                    />
                                    {uploading ? (
                                        <div style={{ fontSize: '13px', color: 'var(--accent)' }}>
                                            <Icon name="Clock" size={16} /> Uploading and extracting text...
                                        </div>
                                    ) : (
                                        <div>
                                            <div style={{ fontSize: '13px', marginBottom: '4px' }}>
                                                <Icon name="Upload" size={16} /> <strong>Drop files here</strong> or click to browse
                                            </div>
                                            <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>
                                                PDF, TXT, CSV, Excel, SQL, images, JSON, XML
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {uploadMsg && (
                                    <div style={{
                                        marginTop: '6px', fontSize: '12px',
                                        color: uploadMsg.startsWith('Error') ? '#ef4444' : '#22c55e',
                                    }}>
                                        {uploadMsg}
                                    </div>
                                )}

                                {/* Uploaded documents list */}
                                {contextDocs.length > 0 && (
                                    <div style={{ marginTop: '8px' }}>
                                        <div style={{ fontSize: '11px', color: 'var(--text-dim)', marginBottom: '6px' }}>
                                            {contextDocs.length} document{contextDocs.length !== 1 ? 's' : ''} uploaded
                                        </div>
                                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px' }}>
                                            {contextDocs.map(doc => (
                                                <div key={doc.id} style={{
                                                    display: 'flex', alignItems: 'center', gap: '6px',
                                                    padding: '4px 10px', borderRadius: '6px',
                                                    background: 'var(--surface)', border: '1px solid var(--border)',
                                                    fontSize: '12px',
                                                }}>
                                                    <Icon name="File" size={12} />
                                                    <span style={{ maxWidth: '200px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                                                        {doc.filename}
                                                    </span>
                                                    <button onClick={(e) => { e.stopPropagation(); handleDeleteDoc(doc.id); }}
                                                        style={{ background: 'transparent', border: 'none', color: 'var(--text-dim)', cursor: 'pointer', padding: '0', lineHeight: 1 }}>
                                                        <Icon name="X" size={12} />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Inline knowledge entry toggle */}
                                <div style={{ marginTop: '10px', borderTop: '1px solid var(--border)', paddingTop: '10px' }}>
                                    <button onClick={() => setShowKnowledgeEntry(!showKnowledgeEntry)}
                                        style={{
                                            background: 'transparent', border: 'none',
                                            color: showKnowledgeEntry ? 'var(--accent)' : 'var(--text-dim)',
                                            cursor: 'pointer', fontSize: '12px',
                                            display: 'flex', alignItems: 'center', gap: '6px',
                                        }}>
                                        <Icon name="Edit3" size={12} />
                                        {showKnowledgeEntry ? 'Hide direct entry' : 'Or enter what you know about specific columns'}
                                    </button>
                                </div>
                            </div>

                            {/* Re-enrich button — Step 2 */}
                            <div style={{ display: 'flex', gap: '10px', marginBottom: '16px', alignItems: 'center' }}>
                                <button onClick={handleReenrichWithContext} disabled={reEnriching}
                                    style={{
                                        background: '#6366f1',
                                        color: 'white',
                                        border: 'none',
                                        padding: '10px 18px', borderRadius: '6px', cursor: reEnriching ? 'not-allowed' : 'pointer',
                                        fontSize: '13px', fontWeight: 600,
                                        display: 'flex', alignItems: 'center', gap: '6px',
                                        opacity: reEnriching ? 0.7 : 1,
                                    }}>
                                    <Icon name="RefreshCw" size={14} />
                                    {reEnriching ? 'Preparing...' : 'Step 2: Re-enrich with New Context'}
                                </button>
                                <span style={{ fontSize: '12px', color: 'var(--text-dim)' }}>
                                    {contextDocs.length > 0 || knowledgeSaved
                                        ? `Ready — ${contextDocs.length} doc${contextDocs.length !== 1 ? 's' : ''} + ${knowledgeSaved ? 'your knowledge entries' : 'profiling data'}`
                                        : 'Add context above first for best results'}
                                </span>
                            </div>

                            {/* Documentation Guidance Section */}
                            {showGuidance && (
                                <div style={{
                                    marginBottom: '16px',
                                    padding: '16px',
                                    borderRadius: '8px',
                                    background: 'var(--bg)',
                                    border: '1px solid var(--border)',
                                }}>
                                    <div style={{ fontSize: '13px', fontWeight: 600, marginBottom: '12px' }}>
                                        Where to Find Documentation That Improves Enrichment
                                    </div>
                                    <div style={{ fontSize: '12px', color: 'var(--text-dim)', marginBottom: '12px' }}>
                                        Each type of documentation below can significantly improve AI accuracy. Even partial or outdated docs help.
                                        Upload them via the Context Library page, or use the direct knowledge entry below for columns you already know.
                                    </div>
                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                                        {[
                                            {
                                                icon: 'Code', title: 'SQL Reports & Queries',
                                                text: 'Old reports often use column aliases that reveal meanings. Look in shared drives, report folders, or BI tools.',
                                                example: 'Example: SELECT d.A2 AS district_name reveals A2\'s meaning',
                                            },
                                            {
                                                icon: 'FileText', title: 'Data Dictionaries & Field Lists',
                                                text: 'Even partial dictionaries help. Check wikis, SharePoint, Confluence, or application documentation.',
                                                example: 'Any spreadsheet mapping column names to business meanings',
                                            },
                                            {
                                                icon: 'Mail', title: 'Emails & Handover Notes',
                                                text: 'When original developers left, they may have written handover notes. Search email for table names.',
                                                example: 'Search for "data model" or "database documentation"',
                                            },
                                            {
                                                icon: 'GitBranch', title: 'ERD Diagrams & Schema Docs',
                                                text: 'Entity-Relationship diagrams show table relationships and often include column descriptions.',
                                                example: 'Check technical documentation or design tools (Visio, Lucidchart)',
                                            },
                                            {
                                                icon: 'Monitor', title: 'App Screenshots & User Manuals',
                                                text: 'Screenshots of the application UI can be uploaded directly. The AI uses vision to read field labels.',
                                                example: 'Form screenshots where field labels map to database columns',
                                            },
                                            {
                                                icon: 'Terminal', title: 'Code & Stored Procedures',
                                                text: 'Application source code, stored procedures, or ETL scripts often have comments explaining column usage.',
                                                example: 'Look for INSERT/UPDATE statements with column comments',
                                            },
                                        ].map((item, i) => (
                                            <div key={i} style={{
                                                padding: '10px 12px',
                                                borderRadius: '6px',
                                                border: '1px solid var(--border)',
                                                background: 'var(--surface)',
                                            }}>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '4px' }}>
                                                    <Icon name={item.icon} size={14} />
                                                    <span style={{ fontWeight: 600, fontSize: '12px' }}>{item.title}</span>
                                                </div>
                                                <div style={{ fontSize: '11px', color: 'var(--text-dim)', marginBottom: '4px', lineHeight: '1.4' }}>
                                                    {item.text}
                                                </div>
                                                <div style={{ fontSize: '11px', color: 'var(--accent)', fontStyle: 'italic' }}>
                                                    {item.example}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Direct Knowledge Entry */}
                            {showKnowledgeEntry && (
                                <div style={{
                                    marginBottom: '16px',
                                    padding: '16px',
                                    borderRadius: '8px',
                                    background: 'var(--bg)',
                                    border: '1px solid var(--border)',
                                }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                                        <div>
                                            <div style={{ fontSize: '13px', fontWeight: 600 }}>
                                                Enter Column Knowledge
                                            </div>
                                            <div style={{ fontSize: '11px', color: 'var(--text-dim)', marginTop: '2px' }}>
                                                Type the business meaning for columns you already know. These will be saved as context for re-enrichment.
                                            </div>
                                        </div>
                                        {knowledgeEntryCount > 0 && (
                                            <button onClick={handleSaveKnowledge} disabled={savingKnowledge}
                                                style={{
                                                    background: knowledgeSaved ? '#22c55e' : '#6366f1',
                                                    color: 'white',
                                                    border: 'none',
                                                    padding: '6px 12px', borderRadius: '6px', cursor: savingKnowledge ? 'not-allowed' : 'pointer',
                                                    fontSize: '12px', fontWeight: 600,
                                                    display: 'flex', alignItems: 'center', gap: '4px',
                                                }}>
                                                <Icon name={knowledgeSaved ? 'Check' : 'Save'} size={12} />
                                                {savingKnowledge ? 'Saving...' : knowledgeSaved ? `Saved ${knowledgeEntryCount} entries` : `Save ${knowledgeEntryCount} entr${knowledgeEntryCount === 1 ? 'y' : 'ies'}`}
                                            </button>
                                        )}
                                    </div>
                                    <div style={{ maxHeight: '400px', overflowY: 'auto' }}>
                                        <table style={{ width: '100%', fontSize: '12px', borderCollapse: 'collapse' }}>
                                            <thead>
                                                <tr style={{ borderBottom: '1px solid var(--border)' }}>
                                                    <th style={{ textAlign: 'left', padding: '6px 8px', fontWeight: 600, color: 'var(--text-dim)', width: '12%' }}>Table</th>
                                                    <th style={{ textAlign: 'left', padding: '6px 8px', fontWeight: 600, color: 'var(--text-dim)', width: '12%' }}>Column</th>
                                                    <th style={{ textAlign: 'left', padding: '6px 8px', fontWeight: 600, color: 'var(--text-dim)', width: '18%' }}>AI Business Name</th>
                                                    <th style={{ textAlign: 'center', padding: '6px 8px', fontWeight: 600, color: 'var(--text-dim)', width: '6%' }}>Conf</th>
                                                    <th style={{ textAlign: 'left', padding: '6px 8px', fontWeight: 600, color: '#6366f1', width: '24%' }}>Your Business Name</th>
                                                    <th style={{ textAlign: 'left', padding: '6px 8px', fontWeight: 600, color: '#6366f1', width: '28%' }}>Your Description (optional)</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {/* Show low confidence columns first, then moderate */}
                                                {Object.entries(summary.low_by_table || {}).concat(Object.entries(summary.moderate_by_table || {})).map(([tableName, cols]) =>
                                                    cols.map(col => (
                                                        <tr key={col.column_id} style={{ borderBottom: '1px solid var(--border)', background: col.confidence_score < 50 ? 'rgba(239, 68, 68, 0.03)' : 'transparent' }}>
                                                            <td style={{ padding: '6px 8px', color: 'var(--text-dim)' }}>{col.table_name}</td>
                                                            <td style={{ padding: '6px 8px', fontWeight: 500, fontFamily: 'monospace', fontSize: '11px' }}>{col.column_name}</td>
                                                            <td style={{ padding: '6px 8px', color: 'var(--text-dim)' }}>{col.business_name || '—'}</td>
                                                            <td style={{ textAlign: 'center', padding: '6px 8px' }}>
                                                                <span style={{
                                                                    display: 'inline-block', padding: '1px 6px', borderRadius: '8px', fontSize: '11px', fontWeight: 600,
                                                                    background: col.confidence_score < 50 ? 'rgba(239, 68, 68, 0.12)' : 'rgba(234, 179, 8, 0.12)',
                                                                    color: col.confidence_score < 50 ? '#ef4444' : '#eab308',
                                                                }}>
                                                                    {col.confidence_score}%
                                                                </span>
                                                            </td>
                                                            <td style={{ padding: '4px 6px' }}>
                                                                <input
                                                                    type="text"
                                                                    placeholder="e.g. District Name"
                                                                    value={knowledgeEntries[col.column_id]?.business_name || ''}
                                                                    onChange={e => handleKnowledgeChange(col.column_id, 'business_name', e.target.value)}
                                                                    onFocus={() => {
                                                                        if (!knowledgeEntries[col.column_id]) {
                                                                            setKnowledgeEntries(prev => ({
                                                                                ...prev,
                                                                                [col.column_id]: { table_name: col.table_name, column_name: col.column_name, business_name: '', description: '' }
                                                                            }));
                                                                        }
                                                                    }}
                                                                    style={{
                                                                        width: '100%', padding: '4px 8px', borderRadius: '4px',
                                                                        border: '1px solid var(--border)', background: 'var(--surface)',
                                                                        color: 'var(--text)', fontSize: '12px',
                                                                    }}
                                                                />
                                                            </td>
                                                            <td style={{ padding: '4px 6px' }}>
                                                                <input
                                                                    type="text"
                                                                    placeholder="Optional description"
                                                                    value={knowledgeEntries[col.column_id]?.description || ''}
                                                                    onChange={e => handleKnowledgeChange(col.column_id, 'description', e.target.value)}
                                                                    onFocus={() => {
                                                                        if (!knowledgeEntries[col.column_id]) {
                                                                            setKnowledgeEntries(prev => ({
                                                                                ...prev,
                                                                                [col.column_id]: { table_name: col.table_name, column_name: col.column_name, business_name: '', description: '' }
                                                                            }));
                                                                        }
                                                                    }}
                                                                    style={{
                                                                        width: '100%', padding: '4px 8px', borderRadius: '4px',
                                                                        border: '1px solid var(--border)', background: 'var(--surface)',
                                                                        color: 'var(--text)', fontSize: '12px',
                                                                    }}
                                                                />
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                    {knowledgeSaved && (
                                        <div style={{
                                            marginTop: '10px', padding: '8px 12px', borderRadius: '6px',
                                            background: 'rgba(34, 197, 94, 0.08)', border: '1px solid rgba(34, 197, 94, 0.2)',
                                            fontSize: '12px', color: '#22c55e', display: 'flex', alignItems: 'center', gap: '6px',
                                        }}>
                                            <Icon name="Check" size={14} />
                                            Knowledge saved. Click "Re-enrich with New Context" to apply.
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Before/After Comparison */}
                            {showDiff && diff && (
                                <div style={{
                                    padding: '16px',
                                    borderRadius: '8px',
                                    background: 'var(--bg)',
                                    border: '1px solid var(--border)',
                                }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                                        <div style={{ fontSize: '13px', fontWeight: 600, display: 'flex', alignItems: 'center', gap: '6px' }}>
                                            <Icon name="GitCompare" size={14} />
                                            Before / After Comparison
                                        </div>
                                        <button onClick={() => setShowDiff(false)} style={{
                                            background: 'transparent', border: 'none', color: 'var(--text-dim)', cursor: 'pointer', fontSize: '12px',
                                        }}>
                                            <Icon name="X" size={14} />
                                        </button>
                                    </div>

                                    {/* Summary stats */}
                                    <div style={{ display: 'flex', gap: '16px', marginBottom: '14px', fontSize: '13px' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                                            <span style={{ color: 'var(--text-dim)' }}>Avg confidence:</span>
                                            <span>{diff.summary.prev_avg_confidence}%</span>
                                            <span style={{ color: 'var(--text-dim)' }}>&rarr;</span>
                                            <span style={{ fontWeight: 600 }}>{diff.summary.curr_avg_confidence}%</span>
                                            <span style={{
                                                fontWeight: 600,
                                                color: diff.summary.confidence_lift > 0 ? '#22c55e' : diff.summary.confidence_lift < 0 ? '#ef4444' : 'var(--text-dim)',
                                            }}>
                                                ({diff.summary.confidence_lift > 0 ? '+' : ''}{diff.summary.confidence_lift}pp)
                                            </span>
                                        </div>
                                    </div>

                                    {/* Change counts */}
                                    <div style={{ display: 'flex', gap: '10px', marginBottom: '14px', flexWrap: 'wrap' }}>
                                        {diff.summary.improved_count > 0 && (
                                            <span style={{
                                                padding: '3px 10px', borderRadius: '12px', fontSize: '12px', fontWeight: 600,
                                                background: 'rgba(34, 197, 94, 0.1)', color: '#22c55e',
                                            }}>
                                                {diff.summary.improved_count} improved
                                            </span>
                                        )}
                                        {diff.summary.new_count > 0 && (
                                            <span style={{
                                                padding: '3px 10px', borderRadius: '12px', fontSize: '12px', fontWeight: 600,
                                                background: 'rgba(59, 130, 246, 0.1)', color: '#3b82f6',
                                            }}>
                                                {diff.summary.new_count} new
                                            </span>
                                        )}
                                        {diff.summary.regressed_count > 0 && (
                                            <span style={{
                                                padding: '3px 10px', borderRadius: '12px', fontSize: '12px', fontWeight: 600,
                                                background: 'rgba(239, 68, 68, 0.1)', color: '#ef4444',
                                            }}>
                                                {diff.summary.regressed_count} regressed
                                            </span>
                                        )}
                                        {diff.summary.unchanged_count > 0 && (
                                            <span style={{
                                                padding: '3px 10px', borderRadius: '12px', fontSize: '12px', fontWeight: 600,
                                                background: 'rgba(148, 163, 184, 0.1)', color: 'var(--text-dim)',
                                            }}>
                                                {diff.summary.unchanged_count} unchanged
                                            </span>
                                        )}
                                    </div>

                                    {/* Improved columns detail */}
                                    {diff.improved.length > 0 && (
                                        <div style={{ marginBottom: '10px' }}>
                                            <div style={{ fontSize: '12px', fontWeight: 600, color: '#22c55e', marginBottom: '6px' }}>Improved</div>
                                            <table style={{ width: '100%', fontSize: '11px', borderCollapse: 'collapse' }}>
                                                <thead>
                                                    <tr style={{ borderBottom: '1px solid var(--border)' }}>
                                                        <th style={{ textAlign: 'left', padding: '4px 6px', color: 'var(--text-dim)' }}>Table</th>
                                                        <th style={{ textAlign: 'left', padding: '4px 6px', color: 'var(--text-dim)' }}>Column</th>
                                                        <th style={{ textAlign: 'left', padding: '4px 6px', color: 'var(--text-dim)' }}>Before</th>
                                                        <th style={{ textAlign: 'left', padding: '4px 6px', color: 'var(--text-dim)' }}>After</th>
                                                        <th style={{ textAlign: 'center', padding: '4px 6px', color: 'var(--text-dim)' }}>Lift</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {diff.improved.map((col, i) => (
                                                        <tr key={i} style={{ borderBottom: '1px solid var(--border)', background: 'rgba(34, 197, 94, 0.03)' }}>
                                                            <td style={{ padding: '4px 6px', color: 'var(--text-dim)' }}>{col.table_name}</td>
                                                            <td style={{ padding: '4px 6px', fontFamily: 'monospace' }}>{col.column_name}</td>
                                                            <td style={{ padding: '4px 6px', color: 'var(--text-dim)' }}>{col.old_business_name || '—'} ({col.old_confidence}%)</td>
                                                            <td style={{ padding: '4px 6px', fontWeight: 500 }}>{col.new_business_name} ({col.new_confidence}%)</td>
                                                            <td style={{ textAlign: 'center', padding: '4px 6px', color: '#22c55e', fontWeight: 600 }}>+{col.delta}pp</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}

                                    {/* Regressed columns detail */}
                                    {diff.regressed.length > 0 && (
                                        <div style={{ marginBottom: '10px' }}>
                                            <div style={{ fontSize: '12px', fontWeight: 600, color: '#ef4444', marginBottom: '6px' }}>Regressed</div>
                                            <table style={{ width: '100%', fontSize: '11px', borderCollapse: 'collapse' }}>
                                                <thead>
                                                    <tr style={{ borderBottom: '1px solid var(--border)' }}>
                                                        <th style={{ textAlign: 'left', padding: '4px 6px', color: 'var(--text-dim)' }}>Table</th>
                                                        <th style={{ textAlign: 'left', padding: '4px 6px', color: 'var(--text-dim)' }}>Column</th>
                                                        <th style={{ textAlign: 'left', padding: '4px 6px', color: 'var(--text-dim)' }}>Before</th>
                                                        <th style={{ textAlign: 'left', padding: '4px 6px', color: 'var(--text-dim)' }}>After</th>
                                                        <th style={{ textAlign: 'center', padding: '4px 6px', color: 'var(--text-dim)' }}>Change</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {diff.regressed.map((col, i) => (
                                                        <tr key={i} style={{ borderBottom: '1px solid var(--border)', background: 'rgba(239, 68, 68, 0.03)' }}>
                                                            <td style={{ padding: '4px 6px', color: 'var(--text-dim)' }}>{col.table_name}</td>
                                                            <td style={{ padding: '4px 6px', fontFamily: 'monospace' }}>{col.column_name}</td>
                                                            <td style={{ padding: '4px 6px', color: 'var(--text-dim)' }}>{col.old_business_name || '—'} ({col.old_confidence}%)</td>
                                                            <td style={{ padding: '4px 6px', fontWeight: 500 }}>{col.new_business_name} ({col.new_confidence}%)</td>
                                                            <td style={{ textAlign: 'center', padding: '4px 6px', color: '#ef4444', fontWeight: 600 }}>{col.delta}pp</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}

                                    {/* Still-low columns */}
                                    {diff.unchanged_low && diff.unchanged_low.length > 0 && (
                                        <div>
                                            <div style={{ fontSize: '12px', fontWeight: 600, color: '#eab308', marginBottom: '6px' }}>
                                                Still Need Attention ({diff.unchanged_low.length})
                                            </div>
                                            <div style={{ fontSize: '11px', color: 'var(--text-dim)', display: 'flex', flexWrap: 'wrap', gap: '4px' }}>
                                                {diff.unchanged_low.slice(0, 15).map((col, i) => (
                                                    <span key={i} style={{
                                                        padding: '2px 6px', borderRadius: '4px',
                                                        background: 'rgba(234, 179, 8, 0.08)', border: '1px solid rgba(234, 179, 8, 0.15)',
                                                    }}>
                                                        {col.table_name}.{col.column_name} ({col.new_confidence}%)
                                                    </span>
                                                ))}
                                                {diff.unchanged_low.length > 15 && (
                                                    <span style={{ padding: '2px 6px', color: 'var(--text-dim)' }}>
                                                        +{diff.unchanged_low.length - 15} more
                                                    </span>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const PipelineMonitor = ({ appId, onNavigate }) => {
            const [pipelineStatus, setPipelineStatus] = useState(null);
            const [history, setHistory] = useState([]);
            const [isRunning, setIsRunning] = useState(false);
            const [resetMode, setResetMode] = useState(null); // null, 'enrichments', 'full'
            const [runCompleteCount, setRunCompleteCount] = useState(0); // increments when pipeline finishes
            const pollRef = useRef(null);
            const wasRunningRef = useRef(false);

            const fetchStatus = async () => {
                const data = await api.get(`/pipeline/${appId}/status`);
                if (data) {
                    setPipelineStatus(data);
                    const nowRunning = data.status === 'running';
                    // Detect transition from running → completed/cancelled/failed
                    if (wasRunningRef.current && !nowRunning) {
                        setRunCompleteCount(c => c + 1);
                        fetchHistory(); // Also refresh history
                    }
                    wasRunningRef.current = nowRunning;
                    setIsRunning(nowRunning);
                }
            };

            const fetchHistory = async () => {
                const data = await api.get(`/pipeline/${appId}/history`);
                if (data && data.runs) setHistory(data.runs);
            };

            useEffect(() => {
                fetchStatus();
                fetchHistory();
            }, [appId]);

            // Poll while running
            useEffect(() => {
                if (isRunning) {
                    pollRef.current = setInterval(() => { fetchStatus(); }, 3000);
                } else {
                    if (pollRef.current) clearInterval(pollRef.current);
                }
                return () => { if (pollRef.current) clearInterval(pollRef.current); };
            }, [isRunning]);

            const handleRunPipeline = async () => {
                wasRunningRef.current = true;
                setIsRunning(true);
                const data = await api.post(`/pipeline/${appId}/run`, {});
                if (data && data.run) {
                    const stages = typeof data.run.stages === 'string' ? JSON.parse(data.run.stages) : data.run.stages;
                    setPipelineStatus({ status: 'running', stages: stages, progress: {} });
                }
                // Polling will take over
            };

            const handleCancel = async () => {
                if (!confirm('Cancel the running pipeline? The current step will finish, then the pipeline will stop. Partial work is preserved.')) return;
                const data = await api.post(`/pipeline/${appId}/cancel`, {});
                if (data) {
                    alert(data.message || 'Cancel signal sent');
                }
            };

            const handleGateAction = async (action) => {
                const data = await api.post(`/pipeline/${appId}/approve`, { action });
                if (data) {
                    console.log(`Gate ${data.stage} ${action}d`);
                }
            };

            const handleReset = async (mode) => {
                const endpoint = mode === 'enrichments'
                    ? `/pipeline/${appId}/reset-enrichments`
                    : `/pipeline/${appId}/reset`;
                const data = await api.post(endpoint, {});
                if (data) {
                    setResetMode(null);
                    setPipelineStatus(null);
                    setHistory([]);
                    alert(data.message || 'Reset completed');
                }
            };

            const stages = pipelineStatus?.stages || {};
            const progress = pipelineStatus?.progress || {};

            const getStageStatus = (stageId) => {
                const s = stages[stageId];
                return s ? s.status : 'pending';
            };

            const getStageBadge = (status) => {
                if (status === 'completed') return 'badge-green';
                if (status === 'running') return 'badge-orange';
                if (status === 'awaiting_approval') return 'badge-orange';
                if (status === 'skipped') return 'badge-blue';
                if (status === 'cancelled') return 'badge-blue';
                if (status === 'failed') return 'badge-orange';
                return 'badge-blue';
            };

            const formatDuration = (ms) => {
                if (!ms) return '-';
                if (ms < 1000) return `${ms}ms`;
                return `${(ms / 1000).toFixed(1)}s`;
            };

            return (
                <>
                    <h2 style={{ marginBottom: '20px' }}>Pipeline Monitor</h2>

                    <div style={{ display: 'flex', gap: '12px', marginBottom: '20px' }}>
                        <button className="btn-primary" onClick={handleRunPipeline} disabled={isRunning}>
                            {isRunning ? <><Icon name="Clock" /> Running...</> : <><Icon name="Play" /> Run Pipeline</>}
                        </button>
                        {isRunning && (
                            <button style={{ background: '#dc2626', color: 'white', border: 'none', padding: '8px 16px', borderRadius: '6px', cursor: 'pointer', fontSize: '13px', display: 'flex', alignItems: 'center', gap: '6px' }}
                                onClick={handleCancel}>
                                <Icon name="Square" size={14} /> Cancel Pipeline
                            </button>
                        )}
                        {!resetMode ? (
                            <>
                                <button style={{ background: '#d97706', color: 'white', border: 'none', padding: '8px 16px', borderRadius: '6px', cursor: 'pointer', fontSize: '13px', display: 'flex', alignItems: 'center', gap: '6px' }}
                                    onClick={() => setResetMode('enrichments')} disabled={isRunning}>
                                    <Icon name="RefreshCw" size={14} /> Re-enrich
                                </button>
                                <button style={{ background: '#dc2626', color: 'white', border: 'none', padding: '8px 16px', borderRadius: '6px', cursor: 'pointer', fontSize: '13px', display: 'flex', alignItems: 'center', gap: '6px' }}
                                    onClick={() => setResetMode('full')} disabled={isRunning}>
                                    <Icon name="RotateCcw" size={14} /> Full Reset
                                </button>
                            </>
                        ) : (
                            <div style={{ display: 'flex', gap: '8px', alignItems: 'center', padding: '8px 12px', background: 'var(--bg-surface)', borderRadius: '6px', border: '1px solid var(--border)' }}>
                                <span style={{ color: resetMode === 'full' ? '#ef4444' : '#d97706', fontSize: '13px' }}>
                                    {resetMode === 'full'
                                        ? 'Full reset — clears everything including source data?'
                                        : 'Reset enrichments only — keeps loaded data and profiling?'}
                                </span>
                                <button style={{ background: resetMode === 'full' ? '#dc2626' : '#d97706', color: 'white', border: 'none', padding: '6px 12px', borderRadius: '4px', cursor: 'pointer', fontSize: '12px' }}
                                    onClick={() => handleReset(resetMode)}>Confirm</button>
                                <button style={{ background: '#374151', color: 'white', border: 'none', padding: '6px 12px', borderRadius: '4px', cursor: 'pointer', fontSize: '12px' }}
                                    onClick={() => setResetMode(null)}>Cancel</button>
                            </div>
                        )}
                    </div>

                    {/* Gate Approval Dialog */}
                    {pipelineStatus?.pending_gate && (
                        <div style={{
                            marginBottom: '20px', padding: '20px', borderRadius: '10px',
                            background: 'linear-gradient(135deg, rgba(251, 191, 36, 0.08), rgba(245, 158, 11, 0.12))',
                            border: '2px solid rgba(245, 158, 11, 0.4)',
                        }}>
                            <div style={{ fontSize: '15px', fontWeight: 700, color: '#f59e0b', marginBottom: '10px', display: 'flex', alignItems: 'center', gap: '8px' }}>
                                <Icon name="ShieldAlert" size={18} /> Approval Required
                            </div>
                            <div style={{ fontSize: '14px', color: 'var(--text)', marginBottom: '12px' }}>
                                {pipelineStatus.pending_gate.stage === 'enrich' ? (
                                    <>
                                        <strong>AI Semantic Enrichment</strong> is ready to start.
                                        {pipelineStatus.pending_gate.summary && (
                                            <div style={{ marginTop: '8px', fontSize: '13px', color: 'var(--text-dim)' }}>
                                                {pipelineStatus.pending_gate.summary.tables} tables · {pipelineStatus.pending_gate.summary.columns} columns to enrich
                                                · {pipelineStatus.pending_gate.summary.parallel_workers || 1} parallel workers
                                                · ~{pipelineStatus.pending_gate.summary.estimated_minutes} min estimated
                                                {pipelineStatus.pending_gate.summary.metadata_entries > 0 && (
                                                    <> · {pipelineStatus.pending_gate.summary.metadata_entries} metadata entries available</>
                                                )}
                                            </div>
                                        )}
                                    </>
                                ) : pipelineStatus.pending_gate.stage === 'validate' ? (
                                    <>
                                        <strong>QPD Seeding</strong> (generate & test sample queries) is ready to start.
                                        {pipelineStatus.pending_gate.summary && (
                                            <div style={{ marginTop: '8px', fontSize: '13px', color: 'var(--text-dim)' }}>
                                                {pipelineStatus.pending_gate.summary.enriched_tables} enriched tables
                                                · ~{pipelineStatus.pending_gate.summary.estimated_minutes} min estimated
                                                {pipelineStatus.pending_gate.summary.description && (
                                                    <div style={{ marginTop: '4px' }}>{pipelineStatus.pending_gate.summary.description}</div>
                                                )}
                                            </div>
                                        )}
                                    </>
                                ) : (
                                    <strong>{pipelineStatus.pending_gate.stage}</strong>
                                )}
                            </div>
                            <div style={{ display: 'flex', gap: '10px' }}>
                                <button className="btn-primary" onClick={() => handleGateAction('approve')}
                                    style={{ background: '#22c55e', display: 'flex', alignItems: 'center', gap: '6px' }}>
                                    <Icon name="CheckCircle" size={14} /> Approve & Continue
                                </button>
                                <button style={{ background: '#6b7280', color: 'white', border: 'none', padding: '8px 16px', borderRadius: '6px', cursor: 'pointer', fontSize: '13px', display: 'flex', alignItems: 'center', gap: '6px' }}
                                    onClick={() => handleGateAction('skip')}>
                                    <Icon name="SkipForward" size={14} /> Skip This Step
                                </button>
                                <button style={{ background: '#dc2626', color: 'white', border: 'none', padding: '8px 16px', borderRadius: '6px', cursor: 'pointer', fontSize: '13px', display: 'flex', alignItems: 'center', gap: '6px' }}
                                    onClick={handleCancel}>
                                    <Icon name="Square" size={14} /> Cancel Pipeline
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Live progress bar */}
                    {isRunning && progress.columns_total > 0 && (
                        <div style={{ marginBottom: '20px', padding: '16px', background: 'var(--surface)', borderRadius: '8px', border: '1px solid var(--border)' }}>
                            <div style={{ fontSize: '14px', fontWeight: 600, color: 'var(--text)', marginBottom: '8px' }}>
                                <Icon name="Globe" size={14} /> AI Semantic Enrichment in Progress
                            </div>
                            <div style={{ fontSize: '13px', color: 'var(--text-dim)', marginBottom: '8px' }}>
                                Analyzing: <strong style={{ color: 'var(--text)' }}>{progress.current_table || '...'}</strong>
                                &nbsp;·&nbsp; {progress.tables_done} / {progress.tables_total} tables
                                &nbsp;·&nbsp; {progress.columns_done} / {progress.columns_total} columns
                                &nbsp;·&nbsp; {Math.round((progress.columns_done / progress.columns_total) * 100)}% complete
                                {progress.eta_seconds > 0 && (
                                    <>&nbsp;·&nbsp; ~{progress.eta_seconds > 60 ? Math.ceil(progress.eta_seconds / 60) + ' min' : progress.eta_seconds + 's'} remaining</>
                                )}
                            </div>
                            <div className="progress-bar" style={{ height: '8px' }}>
                                <div className="progress-fill" style={{ width: `${Math.round((progress.columns_done / progress.columns_total) * 100)}%`, transition: 'width 0.5s' }} />
                            </div>
                            {/* Worker lanes */}
                            {progress.workers && progress.workers.length > 1 && (
                                <div style={{ marginTop: '12px', display: 'grid', gridTemplateColumns: `repeat(${Math.min(progress.workers.length, 4)}, 1fr)`, gap: '8px' }}>
                                    {progress.workers.map((w, i) => (
                                        <div key={i} style={{
                                            padding: '8px 10px',
                                            borderRadius: '6px',
                                            border: '1px solid var(--border)',
                                            background: w.status === 'enriching' ? 'rgba(59, 130, 246, 0.08)' : w.status === 'done' ? 'rgba(34, 197, 94, 0.06)' : 'var(--bg)',
                                            fontSize: '12px'
                                        }}>
                                            <div style={{ fontWeight: 600, marginBottom: '4px', display: 'flex', alignItems: 'center', gap: '6px' }}>
                                                <span style={{
                                                    width: '8px', height: '8px', borderRadius: '50%', display: 'inline-block',
                                                    background: w.status === 'enriching' ? '#3b82f6' : w.status === 'done' ? '#22c55e' : w.status === 'error' ? '#ef4444' : '#94a3b8',
                                                    animation: w.status === 'enriching' ? 'pulse 1.5s ease-in-out infinite' : 'none'
                                                }} />
                                                Worker {i + 1}
                                                <span style={{ fontWeight: 400, color: 'var(--text-dim)' }}>
                                                    ({w.tables_done} done)
                                                </span>
                                            </div>
                                            <div style={{ color: w.status === 'enriching' ? 'var(--text)' : 'var(--text-dim)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                                                {w.status === 'enriching' ? w.current_table : w.status === 'done' ? 'Finished' : w.status === 'error' ? 'Error' : 'Waiting...'}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {progress.token_usage && progress.token_usage.total_tokens > 0 && (
                                <div style={{ fontSize: '11px', color: 'var(--text-dim)', marginTop: '8px' }}>
                                    Tokens: {(progress.token_usage.total_tokens / 1000).toFixed(1)}K
                                    (in: {(progress.token_usage.input_tokens / 1000).toFixed(1)}K, out: {(progress.token_usage.output_tokens / 1000).toFixed(1)}K)
                                </div>
                            )}
                        </div>
                    )}

                    {/* Pipeline errors panel — shows during or after run if any errors occurred */}
                    {progress.errors && progress.errors.length > 0 && (
                        <details style={{
                            marginBottom: '16px', borderRadius: '8px',
                            background: 'rgba(239, 68, 68, 0.06)', border: '1px solid rgba(239, 68, 68, 0.2)',
                        }}>
                            <summary style={{
                                padding: '10px 14px', cursor: 'pointer', fontSize: '13px',
                                display: 'flex', alignItems: 'center', gap: '8px', color: '#ef4444', fontWeight: 600,
                            }}>
                                <Icon name="AlertTriangle" size={16} />
                                {progress.errors.length} error{progress.errors.length !== 1 ? 's' : ''} during pipeline execution
                            </summary>
                            <div style={{ padding: '0 14px 12px', maxHeight: '300px', overflowY: 'auto' }}>
                                {progress.errors.map((err, i) => (
                                    <div key={i} style={{
                                        padding: '8px 10px', marginTop: '6px', borderRadius: '6px',
                                        background: 'rgba(239, 68, 68, 0.05)', border: '1px solid rgba(239, 68, 68, 0.1)',
                                        fontSize: '12px', fontFamily: 'monospace', lineHeight: '1.4',
                                    }}>
                                        {err.table && <span style={{ color: '#ef4444', fontWeight: 600 }}>[{err.table}]</span>}
                                        {' '}<span style={{ color: 'var(--text-dim)' }}>{err.error || JSON.stringify(err)}</span>
                                    </div>
                                ))}
                            </div>
                        </details>
                    )}

                    {/* Stage-level failure detail — shows if any stage has an error message */}
                    {!isRunning && pipelineStatus?.status === 'failed' && (() => {
                        const failedStages = Object.entries(stages).filter(([k, v]) => v.error);
                        if (failedStages.length === 0) return null;
                        return (
                            <div style={{
                                marginBottom: '16px', padding: '14px', borderRadius: '8px',
                                background: 'rgba(239, 68, 68, 0.06)', border: '1px solid rgba(239, 68, 68, 0.2)',
                            }}>
                                <div style={{ fontSize: '14px', fontWeight: 700, color: '#ef4444', marginBottom: '8px', display: 'flex', alignItems: 'center', gap: '8px' }}>
                                    <Icon name="AlertTriangle" size={16} /> Pipeline Failed
                                </div>
                                {failedStages.map(([name, stage]) => (
                                    <div key={name} style={{ marginBottom: '8px' }}>
                                        <div style={{ fontSize: '13px', fontWeight: 600, color: 'var(--text)', marginBottom: '4px' }}>
                                            Stage: {name}
                                        </div>
                                        <div style={{
                                            padding: '8px 12px', borderRadius: '6px',
                                            background: 'rgba(0,0,0,0.15)', fontSize: '12px',
                                            fontFamily: 'monospace', color: '#fca5a5', lineHeight: '1.5',
                                            whiteSpace: 'pre-wrap', wordBreak: 'break-word', maxHeight: '200px', overflowY: 'auto',
                                        }}>
                                            {stage.error}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        );
                    })()}

                    {/* Metadata discovery indicator (shows after Discover stage completes) */}
                    {progress.metadata_discovery && (
                        <div style={{
                            marginBottom: '16px', padding: '10px 14px', borderRadius: '8px',
                            background: progress.metadata_discovery.extracted_entries > 0 ? 'rgba(34, 197, 94, 0.08)' : 'rgba(148, 163, 184, 0.1)',
