                        const isLargeSchema = tablesList.length > 50;

                        // For large schemas, skip per-table column fetch (use table-level metadata only)
                        for (const t of tablesList) {
                            const meta = t.entity_metadata || {};
                            let cols = [];
                            if (!isLargeSchema) {
                                const colsResp = await api.get(`/schema/${appId}/tables/${t.id}/columns`);
                                cols = colsResp?.columns || colsResp || [];
                            }
                            const enrichedCols = cols.filter(c => c.enrichment_status === 'ai_enriched' || c.enrichment_status === 'approved' || c.business_name);

                            enrichedEntities.push({
                                table_name: t.table_name,
                                business_name: meta.business_name || t.entity_name || t.table_name,
                                description: t.description || '',
                                entity_type: meta.entity_type || 'UNKNOWN',
                                domain: meta.domain || meta.module || '',
                                sample_questions: meta.sample_questions || [],
                                columns: cols.map(c => ({
                                    column_name: c.column_name,
                                    business_name: c.business_name || c.column_name,
                                    description: c.description || '',
                                    data_type: c.data_type,
                                    is_pk: c.is_pk || c.is_primary_key,
                                    is_fk: c.is_fk || c.is_foreign_key,
                                    confidence: c.confidence_score,
                                    value_dictionary: (typeof c.value_mapping === 'object' && c.value_mapping !== null) ? c.value_mapping : null
                                })),
                                column_count: parseInt(t.column_count) || cols.length,
                                enriched_count: parseInt(t.enriched_column_count) || enrichedCols.length
                            });
                        }

                        // Build relationships from the API (populated during Discover stage)
                        const rels = apiRels.map(r => ({
                            from: r.from_table,
                            to: r.to_table,
                            column: r.from_column,
                            toColumn: r.to_column,
                            type: r.rel_type || 'FK',
                            cardinality: r.cardinality || ''
                        }));

                        setEntities(enrichedEntities);
                        setRelationships(rels);
                    } catch (err) {
                        console.error('KG fetch error:', err);
                    }
                    setLoading(false);
                };
                fetchKG();
            }, [appId]);

            if (loading) return <div style={{ padding: '40px', textAlign: 'center', color: 'var(--text-dim)' }}>Loading knowledge graph...</div>;
            if (!entities.length) return <div style={{ padding: '40px', textAlign: 'center', color: 'var(--text-dim)' }}>No enriched objects yet. Run the pipeline first.</div>;

            // For large schemas (>100 entities), show summary + redirect to full KG viewer
            if (entities.length > 100) {
                const domainCounts = {};
                entities.forEach(e => { const d = e.domain || 'Unclassified'; domainCounts[d] = (domainCounts[d] || 0) + 1; });
                const sortedDomains = Object.entries(domainCounts).sort((a, b) => b[1] - a[1]);
                const entityTypeCounts = {};
                entities.forEach(e => { const t = e.entity_type || 'UNKNOWN'; entityTypeCounts[t] = (entityTypeCounts[t] || 0) + 1; });
                return (
                    <div style={{ padding: '30px' }}>
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '20px' }}>
                            <h2 style={{ margin: 0 }}>Knowledge Graph</h2>
                            <button onClick={() => onOpenGraphViewer && onOpenGraphViewer()}
                                style={{ background: 'linear-gradient(135deg, #6366f1, #8b5cf6)', color: '#fff', border: 'none', borderRadius: '8px', padding: '10px 20px', cursor: 'pointer', fontSize: '14px', fontWeight: 600, display: 'flex', alignItems: 'center', gap: '8px' }}>
                                <Icon name="Network" size={16} /> Open Interactive Graph
                            </button>
                        </div>
                        <p style={{ color: 'var(--text-dim)', fontSize: '14px', marginBottom: '20px' }}>
                            This application has {entities.length} tables and {relationships.length} relationship{relationships.length !== 1 ? 's' : ''} across {sortedDomains.length} domain{sortedDomains.length !== 1 ? 's' : ''}.
                            {sortedDomains.length === 1 && sortedDomains[0][0] === 'Unclassified' && (
                                <span style={{ display: 'block', marginTop: '6px', color: '#f59e0b', fontSize: '13px' }}>
                                    Domains and entity types will be classified after AI enrichment runs. Relationships discovered so far are available in the interactive graph.
                                </span>
                            )}
                        </p>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                            <div style={{ background: 'var(--bg-surface)', border: '1px solid var(--border)', borderRadius: '10px', padding: '16px' }}>
                                <div style={{ fontSize: '12px', fontWeight: 600, color: 'var(--text-dim)', textTransform: 'uppercase', marginBottom: '10px' }}>Domains ({sortedDomains.length})</div>
                                {sortedDomains.map(([domain, count]) => (
                                    <div key={domain} style={{ display: 'flex', justifyContent: 'space-between', padding: '4px 0', fontSize: '13px', color: 'var(--text-primary)' }}>
                                        <span>{domain}</span>
                                        <span style={{ color: 'var(--accent)', fontWeight: 600 }}>{count}</span>
                                    </div>
                                ))}
                            </div>
                            <div style={{ background: 'var(--bg-surface)', border: '1px solid var(--border)', borderRadius: '10px', padding: '16px' }}>
                                <div style={{ fontSize: '12px', fontWeight: 600, color: 'var(--text-dim)', textTransform: 'uppercase', marginBottom: '10px' }}>Entity Types</div>
                                {Object.entries(entityTypeCounts).sort((a, b) => b[1] - a[1]).map(([type, count]) => (
                                    <div key={type} style={{ display: 'flex', justifyContent: 'space-between', padding: '4px 0', fontSize: '13px', color: 'var(--text-primary)' }}>
                                        <span>{type}</span>
                                        <span style={{ color: 'var(--accent)', fontWeight: 600 }}>{count}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            // Graph layout with zoom/pan — arrange entities in a circle (small schemas only)
            const GraphView = () => {
                const svgRef = React.useRef(null);
                const [zoom, setZoom] = useState(1);
                const [pan, setPan] = useState({ x: 0, y: 0 });
                const [dragging, setDragging] = useState(false);
                const dragStart = React.useRef({ x: 0, y: 0, panX: 0, panY: 0 });

                const cx = 400, cy = 300;
                // Scale radius based on entity count for larger graphs
                const baseRadius = Math.min(230, Math.max(150, entities.length * 35));
                const radius = baseRadius;
                const positions = entities.map((e, i) => {
                    const angle = (2 * Math.PI * i) / entities.length - Math.PI / 2;
                    return { x: cx + radius * Math.cos(angle), y: cy + radius * Math.sin(angle) };
                });

                const entityColors = { 'MASTER': '#6366f1', 'TRANSACTION': '#22c55e', 'REFERENCE': '#f59e0b', 'UNKNOWN': '#64748b' };

                // Zoom with scroll wheel
                const handleWheel = React.useCallback((e) => {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? -0.1 : 0.1;
                    setZoom(z => Math.max(0.3, Math.min(3, z + delta)));
                }, []);

                // Pan with mouse drag
                const handleMouseDown = React.useCallback((e) => {
                    if (e.button !== 0) return;
                    // Only start drag if not clicking a node
                    if (e.target.tagName === 'circle' || e.target.tagName === 'text') return;
                    setDragging(true);
                    dragStart.current = { x: e.clientX, y: e.clientY, panX: pan.x, panY: pan.y };
                }, [pan]);

                const handleMouseMove = React.useCallback((e) => {
                    if (!dragging) return;
                    const dx = e.clientX - dragStart.current.x;
                    const dy = e.clientY - dragStart.current.y;
                    setPan({ x: dragStart.current.panX + dx / zoom, y: dragStart.current.panY + dy / zoom });
                }, [dragging, zoom]);

                const handleMouseUp = React.useCallback(() => {
                    setDragging(false);
                }, []);

                // Attach wheel listener with passive: false
                React.useEffect(() => {
                    const svg = svgRef.current;
                    if (!svg) return;
                    svg.addEventListener('wheel', handleWheel, { passive: false });
                    return () => svg.removeEventListener('wheel', handleWheel);
                }, [handleWheel]);

                const resetView = () => { setZoom(1); setPan({ x: 0, y: 0 }); };

                // Compute viewBox based on zoom and pan
                const vw = 800 / zoom, vh = 600 / zoom;
                const vx = 400 - vw / 2 - pan.x;
                const vy = 300 - vh / 2 - pan.y;

                return (
                    <div style={{ position: 'relative' }}>
                        <svg ref={svgRef} viewBox={`${vx} ${vy} ${vw} ${vh}`}
                            style={{ width: '100%', background: 'var(--card-bg)', borderRadius: '8px', border: '1px solid var(--border)', cursor: dragging ? 'grabbing' : 'grab' }}
                            onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}
                        >
                            <defs>
                                <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                                    <polygon points="0 0, 8 3, 0 6" fill="rgba(99,102,241,0.5)" />
                                </marker>
                            </defs>
                            {/* Relationship lines with labels */}
                            {relationships.map((r, i) => {
                                const fromIdx = entities.findIndex(e => e.table_name === r.from);
                                const toIdx = entities.findIndex(e => e.table_name === r.to);
                                if (fromIdx === -1 || toIdx === -1) return null;
                                const p1 = positions[fromIdx], p2 = positions[toIdx];
                                const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
                                const dx = p2.x - p1.x, dy = p2.y - p1.y;
                                const dist = Math.sqrt(dx*dx + dy*dy) || 1;
                                const ux = dx/dist, uy = dy/dist;
                                return (
                                    <g key={i}>
                                        <line
                                            x1={p1.x + ux * 34} y1={p1.y + uy * 34}
                                            x2={p2.x - ux * 34} y2={p2.y - uy * 34}
                                            stroke="rgba(99,102,241,0.4)" strokeWidth="2"
                                            markerEnd="url(#arrowhead)"
                                        />
                                        <rect x={mx - 30} y={my - 8} width="60" height="16" rx="3"
                                            fill="var(--bg-primary)" opacity="0.9" />
                                        <text x={mx} y={my + 4} textAnchor="middle" fill="var(--text-dim)" fontSize="8">
                                            {r.column}
                                        </text>
                                    </g>
                                );
                            })}
                            {/* Entity nodes */}
                            {entities.map((e, i) => {
                                const p = positions[i];
                                const color = entityColors[e.entity_type] || entityColors['UNKNOWN'];
                                const isSelected = selectedEntity?.table_name === e.table_name;
                                const connCount = relationships.filter(r => r.from === e.table_name || r.to === e.table_name).length;
                                return (
                                    <g key={e.table_name} onClick={(ev) => { ev.stopPropagation(); setSelectedEntity(e); }} style={{ cursor: 'pointer' }}>
                                        {isSelected && <circle cx={p.x} cy={p.y} r="46" fill="none" stroke={color} strokeWidth="1" opacity="0.4" />}
                                        <circle cx={p.x} cy={p.y} r={isSelected ? 40 : 34}
                                            fill={color} opacity={isSelected ? 1 : 0.8}
                                            stroke={isSelected ? '#fff' : 'rgba(255,255,255,0.2)'} strokeWidth={isSelected ? 2 : 1}
                                        />
                                        <text x={p.x} y={p.y - 6} textAnchor="middle" fill="#fff" fontSize="10" fontWeight="600" style={{ pointerEvents: 'none' }}>
                                            {(e.business_name || e.table_name).split(' ').slice(0, 2).join(' ')}
                                        </text>
                                        <text x={p.x} y={p.y + 8} textAnchor="middle" fill="rgba(255,255,255,0.7)" fontSize="8" style={{ pointerEvents: 'none' }}>
                                            {e.column_count} cols
                                        </text>
                                        {connCount > 0 && (
                                            <text x={p.x} y={p.y + 19} textAnchor="middle" fill="rgba(255,255,255,0.5)" fontSize="7" style={{ pointerEvents: 'none' }}>
                                                {connCount} rel{connCount !== 1 ? 's' : ''}
                                            </text>
                                        )}
                                    </g>
                                );
                            })}
                            {/* Legend — fixed position relative to viewBox */}
                            <g transform={`translate(${vx + 12}, ${vy + 12})`}>
                                {Object.entries(entityColors).filter(([k]) => k !== 'UNKNOWN').map(([label, color], i) => (
                                    <g key={label} transform={`translate(0, ${i * 18})`}>
                                        <circle cx="5" cy="5" r="5" fill={color} opacity="0.8" />
                                        <text x="14" y="9" fill="var(--text-dim)" fontSize="9">{label}</text>
                                    </g>
                                ))}
                                <text x="0" y={3 * 18 + 10} fill="var(--text-dim)" fontSize="8">
                                    {relationships.length} relationship{relationships.length !== 1 ? 's' : ''}
                                </text>
                            </g>
                        </svg>
                        {/* Zoom/pan controls */}
                        <div style={{ position: 'absolute', bottom: '12px', right: '12px', display: 'flex', gap: '4px', background: 'var(--card-bg)', border: '1px solid var(--border)', borderRadius: '6px', padding: '4px' }}>
                            <button onClick={() => setZoom(z => Math.min(3, z + 0.2))} style={{ width: '28px', height: '28px', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'none', border: '1px solid var(--border)', borderRadius: '4px', color: 'var(--text)', cursor: 'pointer', fontSize: '16px', fontWeight: 'bold' }} title="Zoom in">+</button>
                            <button onClick={() => setZoom(z => Math.max(0.3, z - 0.2))} style={{ width: '28px', height: '28px', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'none', border: '1px solid var(--border)', borderRadius: '4px', color: 'var(--text)', cursor: 'pointer', fontSize: '16px', fontWeight: 'bold' }} title="Zoom out">−</button>
                            <button onClick={resetView} style={{ width: '28px', height: '28px', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'none', border: '1px solid var(--border)', borderRadius: '4px', color: 'var(--text)', cursor: 'pointer', fontSize: '12px' }} title="Reset view">↺</button>
                            <span style={{ display: 'flex', alignItems: 'center', fontSize: '10px', color: 'var(--text-dim)', padding: '0 4px' }}>{Math.round(zoom * 100)}%</span>
                        </div>
                    </div>
                );
            };

            const EntityDetail = ({ entity }) => (
                <div style={{ background: 'var(--card-bg)', borderRadius: '8px', border: '1px solid var(--border)', padding: '16px' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '12px' }}>
                        <div>
                            <h3 style={{ margin: 0, fontSize: '16px' }}>{entity.business_name}</h3>
                            <div style={{ fontSize: '12px', color: 'var(--text-dim)', marginTop: '4px' }}>
                                {entity.table_name} | {entity.entity_type} | {entity.domain}
                            </div>
                        </div>
                        <button onClick={() => setSelectedEntity(null)} style={{ background: 'none', border: 'none', color: 'var(--text-dim)', cursor: 'pointer', fontSize: '18px' }}>✕</button>
                    </div>

                    {entity.description && (
                        <div style={{ fontSize: '13px', lineHeight: '1.5', color: 'var(--text)', marginBottom: '16px', padding: '12px', background: 'rgba(99,102,241,0.05)', borderRadius: '6px', borderLeft: '3px solid var(--accent)' }}>
                            {entity.description}
                        </div>
                    )}

                    <div className="header-bar">Columns ({entity.columns.length})</div>
                    <div style={{ maxHeight: '250px', overflowY: 'auto' }}>
                        <table className="data-grid" style={{ fontSize: '12px' }}>
                            <thead>
                                <tr>
                                    <th style={{ width: '20px' }}></th>
                                    <th>Column</th>
                                    <th>Business Name</th>
                                    <th>Type</th>
                                </tr>
                            </thead>
                            <tbody>
                                {entity.columns.map(c => (
                                    <tr key={c.column_name}>
                                        <td>{c.is_pk ? '🔑' : c.is_fk ? '🔗' : ''}</td>
                                        <td style={{ fontFamily: 'monospace', fontSize: '11px' }}>{c.column_name}</td>
                                        <td>{c.business_name}</td>
                                        <td style={{ color: 'var(--text-dim)' }}>{c.data_type}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {/* Value dictionaries */}
                    {entity.columns.filter(c => c.value_dictionary && Object.keys(c.value_dictionary).length > 0).length > 0 && (
                        <>
                            <div className="header-bar" style={{ marginTop: '16px' }}>Value Dictionaries</div>
                            {entity.columns.filter(c => c.value_dictionary && Object.keys(c.value_dictionary).length > 0).map(c => (
                                <div key={c.column_name} style={{ marginBottom: '10px' }}>
                                    <div style={{ fontSize: '12px', fontWeight: 600, marginBottom: '4px' }}>{c.business_name} ({c.column_name})</div>
                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '4px' }}>
                                        {Object.entries(c.value_dictionary).slice(0, 10).map(([val, count]) => (
                                            <span key={val} style={{ fontSize: '11px', padding: '2px 8px', background: 'rgba(99,102,241,0.1)', borderRadius: '4px', color: 'var(--text)' }}>
                                                {val} <span style={{ color: 'var(--text-dim)' }}>({count})</span>
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </>
                    )}

                    {/* Relationships */}
                    {(() => {
                        const outbound = relationships.filter(r => r.from === entity.table_name);
                        const inbound = relationships.filter(r => r.to === entity.table_name);
                        if (outbound.length === 0 && inbound.length === 0) return null;
                        return (
                            <>
                                <div className="header-bar" style={{ marginTop: '16px' }}>Relationships ({outbound.length + inbound.length})</div>
                                {outbound.length > 0 && (
                                    <div style={{ marginBottom: '8px' }}>
                                        <div style={{ fontSize: '11px', fontWeight: 600, color: 'var(--text-dim)', marginBottom: '4px', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Outbound (this table references)</div>
                                        {outbound.map((r, i) => (
                                            <div key={'out-'+i} style={{ fontSize: '12px', padding: '6px 10px', marginBottom: '3px', background: 'rgba(34,197,94,0.08)', borderRadius: '4px', borderLeft: '3px solid #22c55e', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                <span><span style={{ fontFamily: 'monospace', fontSize: '11px' }}>{r.column}</span> → <strong>{r.to}</strong>.{r.toColumn}</span>
                                                <span style={{ fontSize: '10px', color: 'var(--text-dim)', background: 'rgba(99,102,241,0.1)', padding: '1px 6px', borderRadius: '3px' }}>{r.cardinality || r.type}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {inbound.length > 0 && (
                                    <div style={{ marginBottom: '8px' }}>
                                        <div style={{ fontSize: '11px', fontWeight: 600, color: 'var(--text-dim)', marginBottom: '4px', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Inbound (referenced by)</div>
                                        {inbound.map((r, i) => (
                                            <div key={'in-'+i} style={{ fontSize: '12px', padding: '6px 10px', marginBottom: '3px', background: 'rgba(99,102,241,0.08)', borderRadius: '4px', borderLeft: '3px solid #6366f1', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                <span><strong>{r.from}</strong>.{r.column} → <span style={{ fontFamily: 'monospace', fontSize: '11px' }}>{r.toColumn}</span></span>
                                                <span style={{ fontSize: '10px', color: 'var(--text-dim)', background: 'rgba(99,102,241,0.1)', padding: '1px 6px', borderRadius: '3px' }}>{r.cardinality || r.type}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </>
                        );
                    })()}

                    {entity.sample_questions.length > 0 && (
                        <>
                            <div className="header-bar" style={{ marginTop: '16px' }}>Sample Questions</div>
                            {entity.sample_questions.map((q, i) => (
                                <div key={i} style={{ fontSize: '12px', padding: '6px 10px', marginBottom: '4px', background: 'rgba(99,102,241,0.05)', borderRadius: '4px' }}>{q}</div>
                            ))}
                        </>
                    )}
                </div>
            );

            return (
                <>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                        <h2 style={{ margin: 0 }}>Knowledge Graph</h2>
                        <div style={{ display: 'flex', gap: '8px' }}>
                            <button className={viewMode === 'graph' ? 'btn-primary' : 'btn-secondary'} onClick={() => setViewMode('graph')} style={{ padding: '6px 14px', fontSize: '13px' }}>
                                <Icon name="Share" size={14} /> Graph View
                            </button>
                            <button className={viewMode === 'list' ? 'btn-primary' : 'btn-secondary'} onClick={() => setViewMode('list')} style={{ padding: '6px 14px', fontSize: '13px' }}>
                                <Icon name="List" size={14} /> Object List
                            </button>
                        </div>
                    </div>

                    {/* Summary KPIs */}
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '12px', marginBottom: '20px' }}>
                        <div className="kpi-card"><div className="kpi-label">Business Objects</div><div className="kpi-value">{entities.length}</div></div>
                        <div className="kpi-card"><div className="kpi-label">Relationships</div><div className="kpi-value">{relationships.length}</div></div>
                        <div className="kpi-card"><div className="kpi-label">Total Columns</div><div className="kpi-value">{entities.reduce((s, e) => s + e.column_count, 0)}</div></div>
                        <div className="kpi-card"><div className="kpi-label">Enriched</div><div className="kpi-value">{entities.reduce((s, e) => s + e.enriched_count, 0)}</div></div>
                    </div>

                    {viewMode === 'graph' ? (
                        <div style={{ display: 'grid', gridTemplateColumns: selectedEntity ? '1fr 1fr' : '1fr', gap: '20px' }}>
                            <GraphView />
                            {selectedEntity && <EntityDetail entity={selectedEntity} />}
                        </div>
                    ) : (
                        <div style={{ display: 'grid', gridTemplateColumns: '250px 1fr', gap: '20px' }}>
                            <div>
                                <div className="header-bar">Business Objects</div>
                                {entities.map(e => (
                                    <div key={e.table_name}
                                        onClick={() => setSelectedEntity(e)}
                                        style={{
                                            padding: '10px 12px', marginBottom: '4px', borderRadius: '6px', cursor: 'pointer',
                                            background: selectedEntity?.table_name === e.table_name ? 'rgba(99,102,241,0.15)' : 'var(--card-bg)',
                                            border: '1px solid ' + (selectedEntity?.table_name === e.table_name ? 'var(--accent)' : 'var(--border)')
                                        }}
                                    >
                                        <div style={{ fontSize: '13px', fontWeight: 600 }}>{e.business_name}</div>
                                        <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>{e.table_name} | {e.column_count} columns | {e.entity_type}</div>
                                    </div>
                                ))}
                            </div>
                            {selectedEntity ? <EntityDetail entity={selectedEntity} /> : (
                                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-dim)' }}>
                                    Select an object to view its definition
                                </div>
                            )}
                        </div>
                    )}
                </>
            );
        };

        // =====================================================
        // CONTEXT LIBRARY (Context-Assisted Build)
        // =====================================================
        const ContextLibrary = ({ appId }) => {
            const [documents, setDocuments] = useState([]);
            const [loading, setLoading] = useState(true);
            const [uploading, setUploading] = useState(false);
            const [uploadMsg, setUploadMsg] = useState('');
            const [description, setDescription] = useState('');
            const [previewDoc, setPreviewDoc] = useState(null);
            const [previewText, setPreviewText] = useState('');
            const [showReEnrich, setShowReEnrich] = useState(false);
            const [lowConfCols, setLowConfCols] = useState([]);
            const [selectedCols, setSelectedCols] = useState(new Set());
            const [reEnriching, setReEnriching] = useState(false);
            const [reEnrichResult, setReEnrichResult] = useState(null);
            const [selectedDocs, setSelectedDocs] = useState(new Set());

            const loadDocuments = async () => {
                try {
                    const data = await api.get(`/context/${appId}/documents`);
                    setDocuments(data.documents || []);
                } catch (err) {
                    console.error('Failed to load context documents:', err);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { if (appId) loadDocuments(); }, [appId]);

            const handleUpload = async (e) => {
                const files = Array.from(e.target.files || []);
                if (files.length === 0) return;

                setUploading(true);
                setUploadMsg('');
                const results = [];
                try {
                    const token = sessionStorage.getItem('bokg_jwt');
                    for (const file of files) {
                        const formData = new FormData();
                        formData.append('file', file);
                        formData.append('description', description);

                        const resp = await fetch(`${API_BASE_URL}/context/${appId}/upload`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${token}` },
                            body: formData,
                        });
                        const data = await resp.json();
                        if (!resp.ok) {
                            results.push(`✗ ${file.name}: ${data.error || 'Upload failed'}`);
                        } else {
                            results.push(`✓ ${file.name} — ${data.text_length.toLocaleString()} chars extracted`);
                        }
                    }

                    const successCount = results.filter(r => r.startsWith('✓')).length;
                    setUploadMsg(files.length === 1
                        ? results[0]
                        : `Uploaded ${successCount}/${files.length} files:\n${results.join('\n')}`);
                    setDescription('');
                    e.target.value = '';
                    loadDocuments();
                } catch (err) {
                    setUploadMsg(`Error: ${err.message}`);
                } finally {
                    setUploading(false);
                }
            };

            const handleDelete = async (docId) => {
                if (!confirm('Remove this context document?')) return;
                try {
                    await api.call('DELETE', `/context/${appId}/documents/${docId}`);
                    loadDocuments();
                } catch (err) {
                    alert('Failed to delete: ' + err.message);
                }
            };

            const toggleDocSelect = (docId) => {
                setSelectedDocs(prev => {
                    const next = new Set(prev);
                    if (next.has(docId)) next.delete(docId);
                    else next.add(docId);
                    return next;
                });
            };

            const toggleSelectAll = () => {
                if (selectedDocs.size === documents.length) {
                    setSelectedDocs(new Set());
                } else {
                    setSelectedDocs(new Set(documents.map(d => d.id)));
                }
            };

            const handleBulkDelete = async () => {
                if (selectedDocs.size === 0) return;
                if (!confirm(`Remove ${selectedDocs.size} selected document${selectedDocs.size > 1 ? 's' : ''}?`)) return;
                try {
                    for (const docId of selectedDocs) {
                        await api.call('DELETE', `/context/${appId}/documents/${docId}`);
                    }
                    setSelectedDocs(new Set());
                    loadDocuments();
                } catch (err) {
                    alert('Failed to delete: ' + err.message);
                }
            };

            const handlePreview = async (docId) => {
                try {
                    const data = await api.get(`/context/${appId}/documents/${docId}`);
                    setPreviewDoc(data.document);
                    setPreviewText(data.document.extracted_text || '');
                } catch (err) {
                    alert('Failed to load preview: ' + err.message);
                }
            };

            const loadLowConfCols = async () => {
                try {
                    const data = await api.get(`/schema/${appId}/columns?tier=manual&limit=100`);
                    // Also get review tier
                    const data2 = await api.get(`/schema/${appId}/columns?tier=review&limit=100`);
                    const allCols = [...(data.columns || []), ...(data2.columns || [])];
                    // Sort by confidence ascending
                    allCols.sort((a, b) => (parseFloat(a.confidence_score) || 0) - (parseFloat(b.confidence_score) || 0));
                    setLowConfCols(allCols);
                    setShowReEnrich(true);
                } catch (err) {
                    alert('Failed to load columns: ' + err.message);
                }
            };

            const toggleCol = (colId) => {
                setSelectedCols(prev => {
                    const next = new Set(prev);
                    if (next.has(colId)) next.delete(colId);
                    else next.add(colId);
                    return next;
                });
            };

            const handleReEnrich = async () => {
                if (selectedCols.size === 0) return;
                setReEnriching(true);
                setReEnrichResult(null);
                try {
                    const data = await api.call('POST', `/context/${appId}/re-enrich`, {
                        column_ids: [...selectedCols],
                    });
                    setReEnrichResult(data);
                    // Refresh columns list
                    loadLowConfCols();
                } catch (err) {
                    alert('Re-enrich failed: ' + err.message);
                } finally {
                    setReEnriching(false);
                }
            };

            const fileTypeIcon = (type) => {
                if (type === 'auto_discovered') return 'Database';
                if (type?.includes('pdf')) return 'FileText';
                if (type?.includes('spreadsheet') || type?.includes('excel')) return 'Table';
                if (type?.includes('image')) return 'Image';
                return 'File';
            };

            const formatSize = (bytes) => {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            };

            if (loading) return <div style={{ padding: '40px', textAlign: 'center', color: 'var(--text-dim)' }}>Loading context library...</div>;

            return (
                <>
                    <h2 style={{ marginBottom: '4px' }}>Context Library</h2>
                    <p style={{ color: 'var(--text-dim)', fontSize: '13px', marginBottom: '20px' }}>
                        Upload reference documentation (ERDs, data dictionaries, application guides) to help the AI produce
                        higher-confidence enrichments. Context documents are automatically used during enrichment.
                    </p>

                    {/* Upload section */}
                    <div className="form-section" style={{ marginBottom: '24px' }}>
                        <h3>Upload Reference Document</h3>
                        <p style={{ fontSize: '13px', color: 'var(--text-dim)', marginBottom: '12px' }}>
                            Supports PDF, text, CSV, Excel spreadsheets, and images (ERD screenshots, UI screenshots).
                        </p>
                        <div className="form-row">
                            <div className="form-group" style={{ flex: 2 }}>
                                <label>Document Description (optional)</label>
                                <input type="text" placeholder="e.g., Financial database ERD, District table data dictionary"
                                    value={description} onChange={(e) => setDescription(e.target.value)} />
                            </div>
                            <div className="form-group" style={{ flex: 1 }}>
                                <label>Select File</label>
                                <input type="file" multiple
                                    accept=".pdf,.txt,.md,.csv,.xlsx,.xls,.png,.jpg,.jpeg,.gif,.webp,.sql,.json,.xml,.log"
                                    onChange={handleUpload}
                                    disabled={uploading}
                                    style={{ fontSize: '13px' }} />
                            </div>
                        </div>
                        {uploading && (
                            <div style={{ color: 'var(--accent)', fontSize: '13px', marginTop: '8px' }}>
                                Processing document... (extracting text, this may take a moment for images)
                            </div>
                        )}
                        {uploadMsg && (
                            <div style={{
                                marginTop: '8px', padding: '10px 14px', borderRadius: '6px', fontSize: '13px',
                                background: uploadMsg.startsWith('Error') ? '#fde8e8' : '#d4edda',
                                color: uploadMsg.startsWith('Error') ? '#991b1b' : '#155724',
                            }}>
                                {uploadMsg}
                            </div>
                        )}
                    </div>

                    {/* Document list */}
                    {documents.length === 0 ? (
                        <div style={{
                            padding: '40px', textAlign: 'center', borderRadius: '8px',
                            border: '2px dashed var(--border)', color: 'var(--text-dim)'
                        }}>
                            <Icon name="FileText" size={32} /><br /><br />
                            No reference documents uploaded yet.<br />
                            Upload ERDs, data dictionaries, or application documentation to improve enrichment quality.
                        </div>
                    ) : (
                        <>
                            <div className="header-bar" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                <span>{documents.length} Reference Document{documents.length !== 1 ? 's' : ''}</span>
                                <div style={{ display: 'flex', gap: '8px' }}>
                                    {selectedDocs.size > 0 && (
                                        <button className="btn-secondary btn-sm" onClick={handleBulkDelete}
                                            style={{ fontSize: '12px', color: '#ef4444', borderColor: '#ef4444' }}>
                                            Remove {selectedDocs.size} Selected
                                        </button>
                                    )}
                                    <button className="btn-primary btn-sm" onClick={loadLowConfCols}
                                        style={{ fontSize: '12px' }}>
                                        <Icon name="RefreshCw" size={12} /> Re-Enrich Low-Confidence Columns
                                    </button>
                                </div>
                            </div>
                            <table className="data-grid">
                                <thead>
                                    <tr>
                                        <th style={{ width: '36px', textAlign: 'center' }}>
                                            <input type="checkbox"
                                                checked={selectedDocs.size === documents.length && documents.length > 0}
                                                onChange={toggleSelectAll}
                                                title="Select all" />
                                        </th>
                                        <th>Document</th>
                                        <th>Type</th>
                                        <th>Size</th>
                                        <th>Extracted Text</th>
                                        <th>Uploaded</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {documents.map(doc => (
                                        <tr key={doc.id} style={{ background: selectedDocs.has(doc.id) ? 'rgba(99, 102, 241, 0.06)' : undefined }}>
                                            <td style={{ textAlign: 'center' }}>
                                                <input type="checkbox"
                                                    checked={selectedDocs.has(doc.id)}
                                                    onChange={() => toggleDocSelect(doc.id)} />
                                            </td>
                                            <td>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                                    <Icon name={fileTypeIcon(doc.file_type)} size={16} />
                                                    <div>
                                                        <strong>{doc.filename}</strong>
                                                        {doc.file_type === 'auto_discovered' && (
                                                            <span style={{
                                                                marginLeft: '8px', padding: '1px 8px', borderRadius: '10px',
                                                                fontSize: '10px', fontWeight: 600, background: 'rgba(34, 197, 94, 0.15)', color: '#22c55e'
                                                            }}>Auto-Discovered</span>
                                                        )}
                                                        {doc.description && <div style={{ fontSize: '12px', color: 'var(--text-dim)' }}>{doc.description}</div>}
                                                    </div>
                                                </div>
                                            </td>
                                            <td style={{ fontSize: '12px' }}>{doc.file_type === 'auto_discovered' ? 'auto' : doc.file_type?.split('/').pop()}</td>
                                            <td style={{ fontSize: '12px' }}>{formatSize(doc.file_size)}</td>
                                            <td style={{ fontSize: '12px' }}>{(doc.text_length || 0).toLocaleString()} chars</td>
                                            <td style={{ fontSize: '12px' }}>{doc.uploaded_at ? new Date(doc.uploaded_at).toLocaleDateString() : '-'}</td>
                                            <td>
                                                <div style={{ display: 'flex', gap: '6px' }}>
                                                    <button className="btn-secondary btn-sm" onClick={() => handlePreview(doc.id)}
                                                        title="Preview extracted text">Preview</button>
                                                    <button className="btn-secondary btn-sm" onClick={() => handleDelete(doc.id)}
                                                        title="Remove document" style={{ color: '#ef4444' }}>Remove</button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </>
                    )}

                    {/* Preview modal */}
                    {previewDoc && (
                        <div style={{
                            position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
                            background: 'rgba(0,0,0,0.5)', zIndex: 1000,
                            display: 'flex', justifyContent: 'center', alignItems: 'center'
                        }} onClick={() => setPreviewDoc(null)}>
                            <div style={{
                                background: 'var(--bg)', borderRadius: '12px', padding: '24px',
                                maxWidth: '700px', width: '90%', maxHeight: '80vh', overflow: 'auto'
                            }} onClick={e => e.stopPropagation()}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                                    <h3 style={{ margin: 0 }}>{previewDoc.filename}</h3>
                                    <button className="btn-secondary btn-sm" onClick={() => setPreviewDoc(null)}>Close</button>
                                </div>
                                <div style={{ fontSize: '12px', color: 'var(--text-dim)', marginBottom: '12px' }}>
                                    {previewText.length.toLocaleString()} characters extracted
                                </div>
                                <pre style={{
                                    background: 'var(--surface)', padding: '16px', borderRadius: '8px',
                                    fontSize: '12px', lineHeight: 1.5, whiteSpace: 'pre-wrap', wordWrap: 'break-word',
                                    maxHeight: '50vh', overflow: 'auto', border: '1px solid var(--border)'
                                }}>
                                    {previewText || '[No text extracted]'}
                                </pre>
                            </div>
                        </div>
                    )}

                    {/* Re-enrich panel */}
                    {showReEnrich && (
                        <div style={{ marginTop: '24px' }}>
                            <div className="header-bar" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                <span>Targeted Re-Enrich with Context</span>
                                <button className="btn-secondary btn-sm" onClick={() => { setShowReEnrich(false); setReEnrichResult(null); }}>Close</button>
                            </div>
                            <p style={{ fontSize: '13px', color: 'var(--text-dim)', margin: '8px 0 12px' }}>
                                Select low-confidence columns to re-enrich using your uploaded reference documents.
                                The AI will use the context to produce better business names, descriptions, and higher confidence scores.
                            </p>

                            {reEnrichResult && (
                                <div style={{
                                    padding: '12px 16px', borderRadius: '8px', marginBottom: '12px',
                                    background: '#d4edda', color: '#155724', fontSize: '13px'
                                }}>
                                    Re-enriched {reEnrichResult.re_enriched} columns using {reEnrichResult.context_documents_used} context documents.
                                    {reEnrichResult.columns && reEnrichResult.columns.map((c, i) => (
                                        <div key={i} style={{ marginTop: '4px', fontSize: '12px' }}>
                                            <code>{c.table_name}.{c.column_name}</code>: confidence {c.old_confidence}% → <strong>{c.new_confidence}%</strong>
                                            {c.new_business_name !== c.old_business_name && (
                                                <span> | name: "{c.old_business_name}" → "<strong>{c.new_business_name}</strong>"</span>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            )}

                            {lowConfCols.length === 0 ? (
                                <div style={{ padding: '20px', textAlign: 'center', color: 'var(--text-dim)', fontSize: '13px' }}>
                                    No low-confidence columns found. All columns are in the auto-approve tier.
                                </div>
                            ) : (
                                <>
                                    <div style={{ marginBottom: '12px', display: 'flex', gap: '8px', alignItems: 'center' }}>
                                        <button className="btn-primary btn-sm" onClick={handleReEnrich}
                                            disabled={selectedCols.size === 0 || reEnriching}>
                                            {reEnriching ? 'Re-enriching...' : `Re-Enrich ${selectedCols.size} Selected Column${selectedCols.size !== 1 ? 's' : ''}`}
                                        </button>
                                        <button className="btn-secondary btn-sm"
                                            onClick={() => setSelectedCols(new Set(lowConfCols.map(c => c.id)))}>
                                            Select All ({lowConfCols.length})
                                        </button>
                                        <button className="btn-secondary btn-sm"
                                            onClick={() => setSelectedCols(new Set())}>
                                            Clear
                                        </button>
                                    </div>
                                    <table className="data-grid">
                                        <thead>
                                            <tr>
                                                <th style={{ width: '30px' }}></th>
                                                <th>Table</th>
                                                <th>Column</th>
                                                <th>Current Name</th>
                                                <th>Confidence</th>
                                                <th>Status</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {lowConfCols.slice(0, 50).map(col => (
                                                <tr key={col.id} style={{ cursor: 'pointer' }} onClick={() => toggleCol(col.id)}>
                                                    <td><input type="checkbox" checked={selectedCols.has(col.id)} onChange={() => toggleCol(col.id)} /></td>
                                                    <td style={{ fontSize: '13px' }}>{col.table_name}</td>
                                                    <td><code style={{ fontSize: '12px' }}>{col.column_name}</code></td>
                                                    <td style={{ fontSize: '13px' }}>{col.business_name || '-'}</td>
                                                    <td>
                                                        <span style={{
                                                            color: parseFloat(col.confidence_score) < 60 ? '#ef4444' : '#f59e0b',
                                                            fontWeight: 600
                                                        }}>
                                                            {col.confidence_score}%
                                                        </span>
                                                    </td>
                                                    <td>
                                                        <span className={`badge ${col.enrichment_status === 'approved' ? 'badge-green' : col.enrichment_status === 'ai_enriched' ? 'badge-blue' : 'badge-orange'}`}>
                                                            {col.enrichment_status}
                                                        </span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </>
                            )}
                        </div>
                    )}

                    {/* Guidance */}
                    <div style={{
                        marginTop: '24px', padding: '16px 20px', borderRadius: '8px',
                        background: 'rgba(59, 130, 246, 0.05)', border: '1px solid rgba(59, 130, 246, 0.15)',
                        fontSize: '13px', color: 'var(--text-dim)', lineHeight: 1.6
                    }}>
                        <strong style={{ color: 'var(--text)' }}>How Context-Assisted Build Works</strong><br />
                        When you upload reference documents, the AI enrichment pipeline uses them alongside profiling data
                        to resolve opaque column names, confirm business meanings, and produce higher-confidence enrichments.
                        This is especially valuable for databases with cryptic column names (like A6, A7, A8) where
                        the AI alone can only guess from data patterns. With documentation, those guesses become
                        confirmed facts — dramatically improving your Knowledge Trust Score.
                    </div>
                </>
            );
        };

        const QualityDashboard = ({ appId }) => {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                if (!appId) return;
                const load = async () => {
                    try {
                        setError(null);
                        const token = sessionStorage.getItem('bokg_jwt');
                        const response = await fetch(`${API_BASE_URL}/quality/${appId}/dashboard`, {
                            headers: {
                                'Content-Type': 'application/json',
                                ...(token && { 'Authorization': `Bearer ${token}` })
                            }
                        });
                        if (!response.ok) {
                            const errBody = await response.text();
                            console.error('Quality dashboard error:', response.status, errBody);
                            setError(`API error ${response.status}: ${errBody}`);
                            return;
                        }
                        const d = await response.json();
                        setData(d);
                    } catch (err) {
                        console.error('Failed to load quality data:', err);
                        setError(err.message);
                    } finally {
                        setLoading(false);
                    }
                };
                load();
            }, [appId]);

            if (loading) return <div style={{ padding: '40px', textAlign: 'center', color: 'var(--text-dim)' }}>Loading quality metrics...</div>;
            if (error) return <div style={{ padding: '40px', textAlign: 'center' }}><div style={{ color: '#ef4444', marginBottom: '8px' }}>Quality Dashboard Error</div><div style={{ color: 'var(--text-dim)', fontSize: '13px', fontFamily: 'monospace', maxWidth: '600px', margin: '0 auto', textAlign: 'left', background: 'rgba(239,68,68,0.1)', padding: '12px', borderRadius: '8px', wordBreak: 'break-all' }}>{error}</div></div>;
            if (!data) return <div style={{ padding: '40px', textAlign: 'center', color: 'var(--text-dim)' }}>No quality data available. Run the enrichment pipeline first.</div>;

            const { trust_score, columns, entities, relationships, patterns, trust_dimensions, domains, confidence_distribution, recent_activity } = data;

            // Trust score color
            const trustColor = trust_score >= 80 ? '#22c55e' : trust_score >= 50 ? '#f59e0b' : '#ef4444';
            const trustLabel = trust_score >= 80 ? 'High Trust' : trust_score >= 50 ? 'Building Trust' : 'Needs Curation';

            // Build confidence histogram data for the chart
            const confBuckets = ['90-100', '80-89', '70-79', '60-69', '50-59', '40-49', '30-39', '20-29', '10-19', '0-9'];
            const confMap = {};
            (confidence_distribution || []).forEach(r => { confMap[r.bucket] = parseInt(r.count); });
            const confHistData = confBuckets.map(b => confMap[b] || 0).reverse();

            // Enrichment status for donut-style breakdown
            const statusData = [
                { label: 'Approved', value: columns.approved, color: '#22c55e' },
                { label: 'AI Enriched', value: columns.ai_enriched, color: '#3b82f6' },
                { label: 'Needs Review', value: columns.needs_review, color: '#f59e0b' },
                { label: 'Rejected', value: columns.rejected, color: '#ef4444' },
                { label: 'Draft', value: columns.draft, color: '#94a3b8' },
            ].filter(s => s.value > 0);

            const totalWithStatus = statusData.reduce((a, b) => a + b.value, 0) || 1;

            return (
                <>
                    <h2 style={{ marginBottom: '4px' }}>Knowledge Trust Dashboard</h2>
                    <p style={{ color: 'var(--text-dim)', fontSize: '13px', marginBottom: '20px' }}>
                        Measures how trustworthy your Business Object Knowledge Graph is for downstream governance and analytics.
                    </p>

                    {/* Trust Score Hero */}
                    <div style={{ display: 'flex', gap: '20px', marginBottom: '24px' }}>
                        <div style={{
                            flex: '0 0 200px', padding: '24px', borderRadius: '12px',
                            background: `linear-gradient(135deg, ${trustColor}10, ${trustColor}20)`,
                            border: `2px solid ${trustColor}40`, textAlign: 'center'
                        }}>
                            <div style={{ fontSize: '11px', textTransform: 'uppercase', letterSpacing: '1px', color: 'var(--text-dim)', marginBottom: '8px' }}>
                                Knowledge Trust Score
                            </div>
                            <div style={{ fontSize: '48px', fontWeight: 700, color: trustColor, lineHeight: 1 }}>
                                {trust_score}
                            </div>
                            <div style={{ fontSize: '13px', color: trustColor, fontWeight: 600, marginTop: '4px' }}>
                                {trustLabel}
                            </div>
                        </div>

                        {/* Trust dimensions */}
                        <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '12px' }}>
                            {[
                                { label: 'Curation Coverage', value: trust_dimensions.curation_coverage, desc: 'Human-approved columns', weight: '40%' },
                                { label: 'Avg Confidence', value: Math.round(trust_dimensions.avg_confidence), desc: 'AI confidence in enrichments', weight: '25%' },
                                { label: 'Description Coverage', value: trust_dimensions.description_coverage, desc: 'Columns with descriptions', weight: '20%' },
                                { label: 'Entity Coverage', value: trust_dimensions.entity_coverage, desc: 'Approved business entities', weight: '8%' },
                                { label: 'Relationship Coverage', value: trust_dimensions.relationship_coverage, desc: 'Approved relationships', weight: '7%' },
                                { label: 'Enrichment Coverage', value: trust_dimensions.enrichment_coverage, desc: 'Any enrichment (AI or human)', weight: '' },
                            ].map((dim, i) => {
                                const dc = dim.value >= 80 ? '#22c55e' : dim.value >= 50 ? '#f59e0b' : '#ef4444';
                                return (
                                    <div key={i} style={{ padding: '12px', borderRadius: '8px', border: '1px solid var(--border)', background: 'var(--surface)' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '4px' }}>
                                            <span style={{ fontSize: '12px', color: 'var(--text-dim)' }}>{dim.label}</span>
                                            {dim.weight && <span style={{ fontSize: '10px', color: 'var(--text-dim)', opacity: 0.6 }}>{dim.weight}</span>}
                                        </div>
                                        <div style={{ fontSize: '22px', fontWeight: 700, color: dc }}>{dim.value}%</div>
                                        <div className="progress-bar" style={{ height: '4px', marginTop: '4px' }}>
                                            <div style={{ width: `${dim.value}%`, height: '100%', background: dc, borderRadius: '2px', transition: 'width 0.5s' }} />
                                        </div>
                                        <div style={{ fontSize: '11px', color: 'var(--text-dim)', marginTop: '4px' }}>{dim.desc}</div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* KPI row */}
                    <div className="kpi-grid" style={{ marginBottom: '24px' }}>
                        <div className="kpi-card">
                            <div className="kpi-label">Total Columns</div>
                            <div className="kpi-value">{columns.total.toLocaleString()}</div>
                        </div>
                        <div className="kpi-card">
                            <div className="kpi-label">Approved</div>
                            <div className="kpi-value" style={{ color: '#22c55e' }}>{columns.approved.toLocaleString()}</div>
                        </div>
                        <div className="kpi-card">
                            <div className="kpi-label">Entities</div>
                            <div className="kpi-value">{entities.total} <span style={{ fontSize: '14px', color: 'var(--text-dim)' }}>({entities.approved} approved)</span></div>
                        </div>
                        <div className="kpi-card">
                            <div className="kpi-label">Relationships</div>
                            <div className="kpi-value">{relationships.total} <span style={{ fontSize: '14px', color: 'var(--text-dim)' }}>({relationships.approved} approved)</span></div>
                        </div>
                        <div className="kpi-card">
                            <div className="kpi-label">Query Patterns</div>
                            <div className="kpi-value">{patterns}</div>
                        </div>
                    </div>

                    {/* Charts row */}
                    <div className="two-column" style={{ marginBottom: '24px' }}>
                        {/* Enrichment status breakdown */}
                        <div className="chart-container">
                            <div className="chart-title">Column Curation Status</div>
                            <div style={{ display: 'flex', gap: '16px', alignItems: 'center', padding: '16px 0' }}>
                                {/* Stacked bar */}
                                <div style={{ flex: 1 }}>
                                    <div style={{ display: 'flex', height: '32px', borderRadius: '6px', overflow: 'hidden', marginBottom: '12px' }}>
                                        {statusData.map((s, i) => (
                                            <div key={i} style={{
                                                width: `${(s.value / totalWithStatus) * 100}%`,
                                                background: s.color,
                                                minWidth: s.value > 0 ? '3px' : 0,
                                                transition: 'width 0.5s'
                                            }} title={`${s.label}: ${s.value}`} />
                                        ))}
                                    </div>
                                    {/* Legend */}
                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '12px' }}>
                                        {statusData.map((s, i) => (
                                            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '6px', fontSize: '12px' }}>
                                                <span style={{ width: '10px', height: '10px', borderRadius: '2px', background: s.color, display: 'inline-block' }} />
                                                {s.label}: <strong>{s.value.toLocaleString()}</strong>
                                                <span style={{ color: 'var(--text-dim)' }}>({Math.round((s.value / totalWithStatus) * 100)}%)</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Confidence distribution */}
                        <div className="chart-container">
                            <div className="chart-title">Confidence Score Distribution</div>
                            <div style={{ padding: '16px 0' }}>
                                <Histogram data={confHistData} height={180} />
                                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '11px', color: 'var(--text-dim)', marginTop: '-12px', padding: '0 4px' }}>
                                    <span>0</span><span>10</span><span>20</span><span>30</span><span>40</span><span>50</span><span>60</span><span>70</span><span>80</span><span>90+</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Domain breakdown table */}
                    <div className="header-bar" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <span>Domain Trust Breakdown</span>
                        <span style={{ fontSize: '12px', color: 'var(--text-dim)', fontWeight: 400 }}>
                            {domains.length} domains discovered
                        </span>
                    </div>
                    <table className="data-grid">
                        <thead>
                            <tr>
                                <th>Domain</th>
                                <th>Tables</th>
                                <th>Columns</th>
                                <th>Approved</th>
                                <th>Avg Confidence</th>
                                <th>Trust Level</th>
                            </tr>
                        </thead>
                        <tbody>
                            {(domains || []).map((dom, idx) => {
                                const approvalRate = dom.column_count > 0 ? Math.round((dom.approved_columns / dom.column_count) * 100) : 0;
                                const domTrust = dom.column_count > 0
                                    ? Math.round(approvalRate * 0.6 + parseFloat(dom.avg_confidence) * 0.4)
                                    : 0;
                                const dtColor = domTrust >= 80 ? '#22c55e' : domTrust >= 50 ? '#f59e0b' : '#ef4444';
                                const dtLabel = domTrust >= 80 ? 'Trusted' : domTrust >= 50 ? 'Partial' : 'Low';
                                return (
                                    <tr key={idx}>
                                        <td><strong>{dom.domain}</strong></td>
                                        <td>{dom.table_count}</td>
                                        <td>{dom.column_count}</td>
                                        <td>
                                            {dom.approved_columns}
                                            <span style={{ color: 'var(--text-dim)', fontSize: '12px' }}> ({approvalRate}%)</span>
                                        </td>
                                        <td>{dom.avg_confidence}%</td>
                                        <td>
                                            <span style={{
                                                display: 'inline-flex', alignItems: 'center', gap: '6px', padding: '2px 10px',
                                                borderRadius: '12px', fontSize: '12px', fontWeight: 600,
                                                background: `${dtColor}18`, color: dtColor
                                            }}>
                                                <span style={{ width: '6px', height: '6px', borderRadius: '50%', background: dtColor }} />
                                                {dtLabel}
                                            </span>
                                        </td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>

                    {/* Recent curation activity */}
                    {recent_activity && recent_activity.length > 0 && (
                        <>
                            <div className="header-bar" style={{ marginTop: '24px' }}>Recent Curation Activity</div>
                            <table className="data-grid">
                                <thead>
                                    <tr>
                                        <th>Table</th>
                                        <th>Column</th>
                                        <th>Action</th>
                                        <th>Confidence</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {recent_activity.map((act, idx) => (
                                        <tr key={idx}>
                                            <td style={{ fontSize: '13px' }}>{act.table_name}</td>
                                            <td><code style={{ fontSize: '12px' }}>{act.column_name}</code></td>
                                            <td>
                                                <span className={`badge ${act.enrichment_status === 'approved' ? 'badge-green' : 'badge-red'}`}>
                                                    {act.enrichment_status}
                                                </span>
                                            </td>
                                            <td>{act.confidence_score ? `${act.confidence_score}%` : '-'}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </>
                    )}

                    {/* Trust explainer */}
                    <div style={{
                        marginTop: '24px', padding: '16px 20px', borderRadius: '8px',
                        background: 'rgba(59, 130, 246, 0.05)', border: '1px solid rgba(59, 130, 246, 0.15)',
                        fontSize: '13px', color: 'var(--text-dim)', lineHeight: 1.6
                    }}>
                        <strong style={{ color: 'var(--text)' }}>How the Trust Score Works</strong><br />
                        The Knowledge Trust Score measures how reliable your Knowledge Graph is for enterprise governance and analytics.
                        It weights human curation coverage (40%), AI confidence (25%), description completeness (20%),
                        and entity/relationship approval (15%). A score of 80+ means the knowledge graph is ready for
                        production use in Solix EDG and downstream data governance workflows.
                    </div>
                </>
            );
        };

        // ═══════════════════════════════════════════════════════════════
        //  Synonym Manager — Ontology & Synonym Management Panel
        // ═══════════════════════════════════════════════════════════════
        const SynonymManager = ({ appId }) => {
            const [synonyms, setSynonyms] = useState([]);
            const [summary, setSummary] = useState({});
            const [loading, setLoading] = useState(true);
            const [filter, setFilter] = useState({ status: '', source: '', search: '' });
            const [showAdd, setShowAdd] = useState(false);
            const [newSynonym, setNewSynonym] = useState({ term: '', columnId: '', tableId: '' });
            const [tables, setTables] = useState([]);
            const [columns, setColumns] = useState([]);
            const [generating, setGenerating] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [editTerm, setEditTerm] = useState('');
            const [showPackPicker, setShowPackPicker] = useState(false);
            const [availablePacks, setAvailablePacks] = useState([]);
            const [selectedPacks, setSelectedPacks] = useState([]);
            const [applying, setApplying] = useState(false);
            const [showResetConfirm, setShowResetConfirm] = useState(false);

            const fetchSynonyms = async () => {
                try {
                    const params = new URLSearchParams();
                    if (filter.status) params.set('status', filter.status);
                    if (filter.source) params.set('source', filter.source);
                    const url = `/api/synonyms/${appId}?${params}`;
                    const res = await fetch(url, { headers: { 'Authorization': `Bearer ${sessionStorage.getItem('bokg_jwt')}` } });
                    const data = await res.json();
                    let syns = data.synonyms || [];
                    if (filter.search) {
                        const s = filter.search.toLowerCase();
                        syns = syns.filter(r => r.term.toLowerCase().includes(s) || (r.column_name||'').toLowerCase().includes(s) || (r.table_name||'').toLowerCase().includes(s));
                    }
                    setSynonyms(syns);
                    setSummary(data.summary || {});
                } catch (e) { console.error(e); }
                setLoading(false);
            };

            const authHeaders = () => ({ 'Authorization': `Bearer ${sessionStorage.getItem('bokg_jwt')}` });

            const fetchTables = async () => {
                try {
                    const res = await fetch(`/api/synonyms/${appId}/tables`, { headers: authHeaders() });
                    const data = await res.json();
                    setTables(data.tables || []);
                } catch (e) { console.error(e); }
            };

            const fetchColumns = async (tableId) => {
                if (!tableId) { setColumns([]); return; }
                try {
                    const res = await fetch(`/api/synonyms/${appId}/tables/${tableId}/columns`, { headers: authHeaders() });
                    const data = await res.json();
                    setColumns(data.columns || []);
                } catch (e) { console.error(e); }
            };

            useEffect(() => { fetchSynonyms(); fetchTables(); }, [appId]);
            useEffect(() => { fetchSynonyms(); }, [filter.status, filter.source]);

            const handleAdd = async () => {
                const term = newSynonym.term?.trim();
                if (!term) { alert('Please enter a synonym term'); return; }
                const payload = {
                    term,
