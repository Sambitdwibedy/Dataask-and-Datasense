                            timestamp: new Date(),
                            isMultiResult: true,
                        }));
                        setMessages(prev => [...prev, ...newMessages]);
                        setDevLog(prev => [...prev, ...data.results.map(r => ({
                            timestamp: new Date().toLocaleTimeString(), query: r.query, sql: r.sql, status: r.error ? 'error' : 'success'
                        }))]);

                        // If there are items needing clarification, add a Claudia message for that
                        if (data.needs_clarification && data.needs_clarification.length > 0) {
                            const clarifyText = data.needs_clarification.map(q => q.clarify_spoken || `I need more detail on ${q.label}.`).join(' ');
                            setMessages(prev => [...prev, {
                                role: 'claudia',
                                content: clarifyText,
                                type: 'clarify',
                                timestamp: new Date()
                            }]);
                        }

                        // Speak the summary and auto-listen
                        speakResponse(claudiaText, data.audio_base64, autoListen);
                        onResponseDelivered('multi_answer', data.result_count || data.results.length);
                    } else if (data.type === 'answer' && data.rows) {
                        // Show Claudia's spoken text as a visible chat bubble ABOVE the data card
                        setMessages(prev => [...prev, { role: 'claudia', content: claudiaText, type: 'spoken', timestamp: new Date() }]);

                        // Got data results — display as assistant message
                        const assistantMsg = {
                            role: 'assistant',
                            content: data.query || userText,
                            sql: data.sql,
                            rows: data.rows || [],
                            columns: data.columns || [],
                            column_business_names: data.column_business_names || {},
                            row_count: data.row_count || 0,
                            error: data.error,
                            queryId: data.queryId,
                            token_usage: data.token_usage,
                            generationTime: data.generationTime,
                            executionTime: data.executionTime,
                            retryCount: data.retryCount || 0,
                            schemaLinked: data.schemaLinked || false,
                            explanation: data.explanation || '',
                            feedback: null,
                            timestamp: new Date()
                        };
                        setMessages(prev => [...prev, assistantMsg]);
                        setDevLog(prev => [...prev, { timestamp: new Date().toLocaleTimeString(), query: data.query, sql: data.sql, status: 'success' }]);

                        // Speak the answer and auto-listen
                        speakResponse(claudiaText, data.audio_base64, autoListen);
                        onResponseDelivered('answer');
                    } else if (data.type === 'doc_answer') {
                        // Document-based answer from unstructured RAG engine
                        setMessages(prev => [...prev, { role: 'claudia', content: claudiaText, type: 'spoken', timestamp: new Date() }]);
                        const docMsg = {
                            role: 'assistant',
                            content: data.query || userText,
                            label: data.label || 'Document Search',
                            intent: 'UNSTRUCTURED',
                            answer: data.answer || '',
                            citations: data.citations || [],
                            rows: [], columns: [],
                            row_count: 0,
                            token_usage: data.token_usage,
                            generationTime: data.generationTime,
                            schemaLinked: false,
                            feedback: null,
                            timestamp: new Date()
                        };
                        setMessages(prev => [...prev, docMsg]);
                        speakResponse(claudiaText, data.audio_base64, autoListen);
                        onResponseDelivered('doc_answer');
                    } else {
                        // Clarify, greeting, or farewell — show as system message
                        // Skip duplicate greetings (one was already shown when mic was clicked)
                        const isGreeting = data.type === 'greeting';
                        const alreadyGreeted = isGreeting && messages.some(m => m.role === 'claudia' && m.type === 'greeting');

                        if (data.type === 'farewell') {
                            // Server returned a personalized farewell — use it directly as
                            // the endSession message (don't display it AND fire a generic goodbye)
                            endSession(claudiaText);
                            // Play inline TTS if provided, otherwise let endSession's speak handle it
                            if (data.audio_base64) {
                                voiceOutput.stopSpeaking();
                                voiceOutput.playBase64Audio(data.audio_base64, null);
                            }
                            return;
                        }

                        if (!alreadyGreeted) {
                            setMessages(prev => [...prev, {
                                role: 'claudia',
                                content: claudiaText,
                                type: data.type,
                                timestamp: new Date()
                            }]);
                        }

                        // Speak and auto-listen (skip duplicate greetings)
                        if (!alreadyGreeted) {
                            speakResponse(claudiaText, data.audio_base64, autoListen);
                        } else {
                            autoListen(); // Still listen after skipping duplicate greeting
                        }
                        onResponseDelivered(data.type);
                    }
                } catch (err) {
                    console.error('[Converse] Error:', err);
                    const errText = "Sorry, I had trouble with that. Could you try again?";
                    setConversationHistory(prev => [...prev, { role: 'claudia', text: errText }]);
                    setMessages(prev => [...prev, { role: 'claudia', content: errText, type: 'error', timestamp: new Date() }]);
                    voiceOutput.speak(errText, { onComplete: autoListen });
                } finally {
                    setConversing(false);
                    setIsLoading(false);
                }
                } finally {  // outer finally — always release lock
                    converseLockedRef.current = false;
                    // Process any input that arrived while we were locked — BUT NOT if we're
                    // still in the executing phase. During executing, the deferred input will
                    // be picked up by executePendingQueries' completion handler (which properly
                    // transitions to reviewing first). Re-processing here while still executing
                    // causes an infinite loop: defer → finally → re-call → still executing → defer...
                    if (deferredInputRef.current && conversationPhaseRef.current !== 'executing') {
                        const deferred = deferredInputRef.current;
                        deferredInputRef.current = null;
                        console.log('[Session] Processing queued input after lock release:', deferred.substring(0, 40));
                        // Small delay to let state settle before re-entering
                        setTimeout(() => {
                            if (converseHandlerRef.current) converseHandlerRef.current(deferred);
                        }, 100);
                    }
                }
            };
            converseHandlerRef.current = handleConverse;

            const handleFeedback = async (msgIndex, feedback) => {
                const msg = messages[msgIndex];
                if (!msg || !msg.queryId) return;
                await api.post(`/test/${selectedApp}/query/${msg.queryId}/feedback`, { feedback });
                setMessages(prev => prev.map((m, i) => i === msgIndex ? { ...m, feedback } : m));
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    // In Conversation Router mode, type-to-converse also works
                    if (voiceMode && query.trim()) {
                        handleConverse(query.trim());
                    } else {
                        handleAsk();
                    }
                }
            };

            const selectedAppInfo = apps.find(a => String(a.id) === String(selectedApp));

            // Close user menu on outside click
            useEffect(() => {
                const handleClick = (e) => { if (!e.target.closest('.dropdown')) setUserMenuOpen(false); };
                document.addEventListener('click', handleClick);
                return () => document.removeEventListener('click', handleClick);
            }, []);

            // No workspace AND no app — show setup message (not a gate, just guidance)
            // With workspaces, the default is auto-selected on mount so this rarely shows
            if (!selectedApp && !selectedWorkspace) {
                // If apps exist but no workspaces, fall back to letting user pick an app
                if (apps.length > 0 && workspaces.length === 0) {
                    return (
                        <div style={{ background: 'var(--bg)', minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
                            <div className="header" style={{ borderBottom: '1px solid var(--border)', padding: '0 24px' }}>
                                <div className="header-left">
                                    <div className="header-logo"><KGLogo size={24} /> Solix Data Ask</div>
                                </div>
                                <div className="header-right">
                                    <div className={`dropdown ${userMenuOpen ? 'open' : ''}`}>
                                        <div className="user-menu" onClick={(e) => { e.stopPropagation(); setUserMenuOpen(!userMenuOpen); }}>
                                            <span style={{ fontSize: '13px', color: 'var(--text-dim)', marginRight: '8px' }}>{user.name}</span>
                                            <div className="avatar">{(user.name || 'U')[0]}</div>
                                            <Icon name="ChevronDown" />
                                        </div>
                                        <div className="dropdown-menu">
                                            <button className="dropdown-item" onClick={onLogout}>Logout</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '40px' }}>
                                <KGLogo size={120} />
                                <div style={{ height: '16px' }} />
                                <h2 style={{ margin: '0 0 8px', color: 'var(--text)' }}>Select a Data Source</h2>
                                <p style={{ color: 'var(--text-dim)', marginBottom: '32px', textAlign: 'center' }}>Choose a published knowledge graph to start asking questions.</p>
                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: '16px', maxWidth: '900px', width: '100%' }}>
                                    {apps.map(app => (
                                        <div key={app.id} className="card" onClick={() => setSelectedApp(String(app.id))}
                                            style={{ cursor: 'pointer', transition: 'border-color 0.2s', border: '1px solid var(--border)' }}
                                            onMouseOver={e => e.currentTarget.style.borderColor = 'var(--accent)'}
                                            onMouseOut={e => e.currentTarget.style.borderColor = 'var(--border)'}>
                                            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '8px' }}>
                                                <Icon name="Database" size={20} style={{ color: 'var(--accent)' }} />
                                                <span style={{ fontWeight: 600, color: 'var(--text)' }}>{app.name}</span>
                                            </div>
                                            <div style={{ fontSize: '12px', color: 'var(--text-dim)' }}>{app.type} &middot; {app.table_count} tables &middot; {app.column_count} columns</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    );
                }
                // No data at all
                return (
                    <div style={{ background: 'var(--bg)', minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
                        <KGLogo size={80} />
                        <h2 style={{ margin: '16px 0 8px', color: 'var(--text)' }}>Welcome to Data Ask</h2>
                        <p style={{ color: 'var(--text-dim)', textAlign: 'center' }}>No workspaces or data sources are available yet.<br/>Contact your administrator to get set up.</p>
                    </div>
                );
            }

            // Smart numeric formatting (ported from OEBS prototype + improved)
            const CURRENCY_TOKENS = new Set(['amount','balance','cash','spend','expense','revenue','cost','price','credit','debit','salary','wage','wages','compensation','earnings','premium','payment','loan']);
            const NON_CURRENCY_TOKENS = new Set(['number','num','id','code','flag','status','date','name','count','qty','quantity','percent','pct','percentage','ratio','rate','seq','rank','row','type','class','category','district']);

            const detectColFormat = (colName) => {
                const tokens = colName.toLowerCase().split(/[_\s]+/);
                if (tokens.some(t => t.includes('percent') || t.includes('pct') || t.includes('ratio') || t.includes('rate'))) return 'percent';
                if (tokens.some(t => CURRENCY_TOKENS.has(t)) && !tokens.some(t => NON_CURRENCY_TOKENS.has(t))) return 'currency';
                return 'auto';
            };

            const formatCellValue = (val, colName) => {
                if (val == null) return '\u2014';
                const strVal = String(val);

                // Detect date/timestamp values BEFORE number parsing
                // PG DATE_TRUNC returns ISO timestamps like "2025-04-01T00:00:00.000Z"
                // Also matches "2025-04-01" date strings
                const dateMatch = strVal.match(/^(\d{4})-(\d{2})-(\d{2})(T|\s|$)/);
                if (dateMatch) {
                    const d = new Date(strVal);
                    if (!isNaN(d.getTime())) {
                        const lc = (colName || '').toLowerCase();
                        // If column name suggests month-level grouping, show "Mon YYYY"
                        if (/month|period|quarter/i.test(lc) || (d.getDate() === 1)) {
                            return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', timeZone: 'UTC' });
                        }
                        // Otherwise show full date
                        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric', timeZone: 'UTC' });
                    }
                }
                // Catch partial date strings: "YYYY-MM" from TO_CHAR (safety net)
                const partialDateMatch = strVal.match(/^(\d{4})-(\d{2})$/);
                if (partialDateMatch) {
                    const yr = parseInt(partialDateMatch[1]);
                    const mo = parseInt(partialDateMatch[2]);
                    if (yr >= 1900 && yr <= 2100 && mo >= 1 && mo <= 12) {
                        const d = new Date(Date.UTC(yr, mo - 1, 1));
                        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', timeZone: 'UTC' });
                    }
                }

                const num = parseFloat(strVal);
                if (isNaN(num)) return strVal;

                const format = detectColFormat(colName);
                if (format === 'percent') {
                    return num.toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + '%';
                }
                if (format === 'currency') {
                    return num.toLocaleString('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2, maximumFractionDigits: 2 });
                }

                // Smart detection: don't comma-format years, IDs, codes, zip codes, phone numbers
                const lowerCol = (colName || '').toLowerCase();
                const isYearValue = /^\d{4}$/.test(strVal.trim()) && num >= 1900 && num <= 2100;
                const isIdColumn = /(_id|_code|_num|_no|_key|_ref|zipcode|zip_code|phone|fax|ssn)$/i.test(lowerCol)
                    || /^(id|code|year|yr|fiscal_year|fy|period|month|day|quarter)$/i.test(lowerCol);
                const isYearColumn = /(year|yr|fiscal_year|fy|period_year)$/i.test(lowerCol);

                // If value looks like a year OR column is a year/ID type, don't add commas
                if (isYearValue || isIdColumn || isYearColumn) {
                    if (strVal.includes('.') && num !== Math.floor(num)) {
                        return num.toFixed(2);
                    }
                    return strVal.trim();
                }

                // Auto: detect if it's an integer or decimal
                if (strVal.includes('.') && num !== Math.floor(num)) {
                    // Has meaningful decimals — show up to 2
                    return num.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
                }
                // Integer or whole number — apply comma formatting
                return Math.round(num).toLocaleString('en-US');
            };

            // Helper to highlight SQL syntax
            const highlightSQL = (sql) => {
                if (!sql) return sql;
                const keywords = /\b(SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|ON|GROUP|BY|ORDER|HAVING|LIMIT|OFFSET|UNION|INSERT|UPDATE|DELETE|CREATE|DROP|ALTER|AND|OR|NOT|IN|EXISTS|CASE|WHEN|THEN|ELSE|END|AS|DISTINCT)\b/gi;
                return sql.replace(keywords, match => `<span style="color: #8b5cf6; font-weight: 600">${match}</span>`);
            };

            // Get unique domains for the filter dropdown
            const exampleDomains = ['All', ...new Set(sampleQuestions.map(sq => sq.domain || 'General'))].sort((a, b) => {
                if (a === 'All') return -1;
                if (b === 'All') return 1;
                return a.localeCompare(b);
            });

            // Group sample questions by entity, filtered by selected domain
            const groupedQuestions = {};
            const filteredQuestions = exampleDomainFilter === 'All'
                ? sampleQuestions
                : sampleQuestions.filter(sq => (sq.domain || 'General') === exampleDomainFilter);
            filteredQuestions.forEach(sq => {
                const entity = sq.table || 'General';
                if (!groupedQuestions[entity]) groupedQuestions[entity] = [];
                groupedQuestions[entity].push(sq.question);
            });

            // Chat interface with OEBS-style left sidebar
            return (
                <div style={{ background: 'var(--bg)', height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
                    {/* Header */}
                    <div className="header" style={{ borderBottom: '1px solid var(--border)', padding: '0 24px', flexShrink: 0 }}>
                        <div className="header-left" style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                            <div className="header-logo"><KGLogo size={24} /> Solix Data Ask</div>
                            {/* Workspace Switcher */}
                            {workspaces.length > 0 ? (
                                <div className="ws-switcher" style={{ position: 'relative', borderLeft: '1px solid var(--border)', paddingLeft: '12px' }}>
                                    <button onClick={(e) => { e.stopPropagation(); setWorkspaceSwitcherOpen(!workspaceSwitcherOpen); }}
                                        style={{ background: 'none', border: '1px solid var(--border)', borderRadius: '6px', padding: '4px 10px', cursor: 'pointer', color: 'var(--text-primary)', fontSize: '13px', display: 'flex', alignItems: 'center', gap: '6px' }}>
                                        <Icon name="Layers" size={14} />
                                        {selectedWorkspace?.name || 'Select Workspace'}
                                        <Icon name="ChevronDown" size={12} />
                                    </button>
                                    {workspaceSwitcherOpen && (
                                        <div style={{ position: 'absolute', top: '100%', left: '12px', marginTop: '4px', background: 'var(--bg-surface)', border: '1px solid var(--border)', borderRadius: '8px', minWidth: '240px', zIndex: 100, boxShadow: '0 8px 24px rgba(0,0,0,0.4)', padding: '4px 0' }}>
                                            <div style={{ padding: '8px 12px', fontSize: '11px', color: 'var(--text-dim)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Workspaces</div>
                                            {workspaces.map(ws => (
                                                <button key={ws.id} onClick={() => handleWorkspaceSwitch(ws)}
                                                    style={{ display: 'flex', alignItems: 'center', gap: '8px', width: '100%', padding: '8px 12px', background: selectedWorkspace?.id === ws.id ? 'rgba(99,102,241,0.1)' : 'transparent', border: 'none', borderRadius: 0, cursor: 'pointer', color: selectedWorkspace?.id === ws.id ? 'var(--accent)' : 'var(--text-primary)', fontSize: '13px', textAlign: 'left' }}>
                                                    {selectedWorkspace?.id === ws.id
                                                        ? <Icon name="Check" size={14} style={{ color: 'var(--accent)' }} />
                                                        : <span style={{ display: 'inline-block', width: 14, height: 14, borderRadius: '50%', border: '1.5px solid var(--border)' }} />
                                                    }
                                                    <div>
                                                        <div>{ws.name}</div>
                                                        {ws.description && <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>{ws.description}</div>}
                                                    </div>
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <span style={{ fontSize: '13px', color: 'var(--text-dim)', borderLeft: '1px solid var(--border)', paddingLeft: '12px' }}>{selectedAppInfo?.name}</span>
                            )}
                        </div>
                        <div className="header-right" style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                            {/* Developer Mode Button */}
                            <button onClick={() => setShowDevPanel(!showDevPanel)} title="Developer Mode"
                                style={{ background: showDevPanel ? 'rgba(99,102,241,0.15)' : 'transparent', border: '1px solid var(--border)', borderRadius: '6px', padding: '6px 10px', cursor: 'pointer', color: showDevPanel ? 'var(--accent)' : 'var(--text-dim)', fontSize: '14px', display: 'flex', alignItems: 'center' }}>
                                🔧
                            </button>
                            {/* Knowledge Graph Viewer Button */}
                            <button onClick={() => setShowKGViewer(true)} title="Knowledge Graph"
                                style={{ background: showKGViewer ? 'rgba(99,102,241,0.15)' : 'transparent', border: '1px solid var(--border)', borderRadius: '6px', padding: '6px 10px', cursor: 'pointer', color: showKGViewer ? 'var(--accent)' : 'var(--text-dim)', fontSize: '14px', display: 'flex', alignItems: 'center' }}>
                                🌐
                            </button>
                            {/* Query Catalog Button */}
                            <button onClick={() => setShowQueryCatalog(!showQueryCatalog)} title="Query Catalog"
                                style={{ background: showQueryCatalog ? 'rgba(99,102,241,0.15)' : 'transparent', border: '1px solid var(--border)', borderRadius: '6px', padding: '6px 10px', cursor: 'pointer', color: showQueryCatalog ? 'var(--accent)' : 'var(--text-dim)', fontSize: '14px', display: 'flex', alignItems: 'center' }}>
                                📚
                            </button>
                            {/* Voice Assistant Toggle — hidden when voice is disabled in Settings */}
                            {isVoiceEnabled() && (
                            <button onClick={() => {
                                    voiceOutput.unlockAudio();
                                    const newMode = !voiceMode;
                                    const name = getAssistantName();
                                    setVoiceMode(newMode);
                                    if (newMode && selectedApp) {
                                        sessionRequestCountRef.current = 0;
                                        pendingQueriesRef.current = [];
                                        conversationPhaseRef.current = 'greeting';
                                        if (sessionIdleTimerRef.current) { clearTimeout(sessionIdleTimerRef.current); sessionIdleTimerRef.current = null; }
                                        setConversationHistory([]);
                                        const greetingText = `Good morning! I'm ${name}, your Data Ask Agent. What can I look up for you today?`;
                                        const greeting = { role: 'claudia', content: greetingText, type: 'greeting', timestamp: new Date() };
                                        setMessages(prev => [...prev, greeting]);
                                        setConversationHistory([{ role: 'claudia', text: greetingText }]);
                                        const onGreetingDone = () => {
                                            if (voiceStartListeningRef.current) setTimeout(() => voiceStartListeningRef.current(), 400);
                                        };
                                        if (!voiceOutput.speakGreetingCached(onGreetingDone)) {
                                            // Cache missed (prefetch may have failed due to JWT timing) —
                                            // speak() now always tries cloud TTS first with browser fallback
                                            voiceOutput.speak(greetingText, { onComplete: onGreetingDone });
                                        }
                                    }
                                    if (!newMode) {
                                        voiceOutput.stopSpeaking(); voiceInput.stopListening(); setInterimTranscript('');
                                        setConversationHistory([]);
                                        sessionRequestCountRef.current = 0;
                                        pendingQueriesRef.current = [];
                                        conversationPhaseRef.current = 'greeting';
                                        if (sessionIdleTimerRef.current) { clearTimeout(sessionIdleTimerRef.current); sessionIdleTimerRef.current = null; }
                                    }
                                }} title={voiceMode ? 'End Conversation' : `Talk to ${getAssistantName()}`}
                                    className={`voice-mode-toggle ${voiceMode ? 'active' : ''}`}
                                    style={voiceMode ? {} : { background: 'rgba(99,102,241,0.15)', border: '1px solid var(--accent)', padding: '6px 14px' }}>
                                    <Icon name={voiceMode ? 'MicOff' : 'Mic'} size={14} />
                                    <span style={{ marginLeft: 6, fontSize: 12 }}>{voiceMode ? 'End Conversation' : `Talk to ${getAssistantName()}`}</span>
                            </button>
                            )}
                            {/* Theme Toggle */}
                            <button onClick={toggleTheme} title={theme === 'dark' ? 'Switch to Light Mode' : 'Switch to Dark Mode'}
                                style={{ background: 'transparent', border: '1px solid var(--border)', borderRadius: '6px', padding: '6px 10px', cursor: 'pointer', color: 'var(--text-dim)', fontSize: '14px', display: 'flex', alignItems: 'center' }}>
                                <Icon name={theme === 'dark' ? 'Sun' : 'Moon'} size={14} />
                            </button>
                            {/* Settings Button */}
                            <button onClick={() => setShowSettings(!showSettings)} title="Settings"
                                style={{ background: showSettings ? 'rgba(99,102,241,0.15)' : 'transparent', border: '1px solid var(--border)', borderRadius: '6px', padding: '6px 10px', cursor: 'pointer', color: showSettings ? 'var(--accent)' : 'var(--text-dim)', fontSize: '14px', display: 'flex', alignItems: 'center' }}>
                                ⚙️
                            </button>
                            <div className={`dropdown ${userMenuOpen ? 'open' : ''}`}>
                                <div className="user-menu" onClick={(e) => { e.stopPropagation(); setUserMenuOpen(!userMenuOpen); }}>
                                    <span style={{ fontSize: '13px', color: 'var(--text-dim)', marginRight: '8px' }}>{user.name}</span>
                                    <div className="avatar">{(user.name || 'U')[0]}</div>
                                    <Icon name="ChevronDown" />
                                </div>
                                <div className="dropdown-menu">
                                    <button className="dropdown-item" onClick={onLogout}>Logout</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
                        {/* LEFT SIDEBAR — OEBS-style: Examples + History tabs */}
                        {idaSidebarOpen ? (
                        <div style={{ width: '300px', borderRight: '1px solid var(--border)', display: 'flex', flexDirection: 'column', background: 'var(--surface)', flexShrink: 0, overflow: 'hidden' }}>
                            {/* Tabs + collapse button */}
                            <div style={{ display: 'flex', borderBottom: '1px solid var(--border)' }}>
                                {['examples', 'history', 'domains'].map(tab => (
                                    <button key={tab} onClick={() => setSidebarTab(tab)}
                                        style={{
                                            flex: 1, background: 'transparent', border: 'none',
                                            borderBottom: sidebarTab === tab ? '2px solid var(--accent)' : '2px solid transparent',
                                            color: sidebarTab === tab ? 'var(--accent)' : 'var(--text-dim)',
                                            padding: '10px 4px', fontSize: '11px', fontWeight: 600,
                                            textTransform: 'uppercase', letterSpacing: '0.5px', cursor: 'pointer'
                                        }}>
                                        {tab === 'examples' ? 'Examples' : tab === 'history' ? `History (${history.length})` : 'Domains'}
                                    </button>
                                ))}
                                <button onClick={() => setIdaSidebarOpen(false)} title="Hide sidebar"
                                    style={{ background: 'transparent', border: 'none', color: 'var(--text-dim)', cursor: 'pointer', padding: '6px 10px', fontSize: '14px' }}>
                                    <Icon name="PanelLeftClose" size={14} />
                                </button>
                            </div>

                            {/* Tab content */}
                            <div style={{ flex: 1, overflowY: 'auto', padding: '12px', minHeight: 0 }}>
                                {sidebarTab === 'examples' && (
                                    <div>
                                        {/* Domain filter dropdown */}
                                        {exampleDomains.length > 2 && (
                                            <div style={{ marginBottom: '10px' }}>
                                                <select
                                                    value={exampleDomainFilter}
                                                    onChange={e => setExampleDomainFilter(e.target.value)}
                                                    style={{
                                                        width: '100%', padding: '7px 10px', fontSize: '12px',
                                                        border: '1px solid var(--border)', borderRadius: '6px',
                                                        background: 'var(--bg)', color: 'var(--text)',
                                                        cursor: 'pointer', appearance: 'auto'
                                                    }}>
                                                    {exampleDomains.map(d => (
                                                        <option key={d} value={d}>
                                                            {d === 'All' ? `All Domains (${exampleDomains.length - 1})` : `${d} (${sampleQuestions.filter(sq => (sq.domain || 'General') === d).length})`}

                                                        {q}
                                                    </button>
                                                ))}
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {sidebarTab === 'history' && (
                                    <div>
                                        {history.length === 0 ? (
                                            <div style={{ color: 'var(--text-dim)', fontSize: '13px', textAlign: 'center', padding: '20px 0' }}>

                                            </div>

                                            <div key={h.id} onClick={() => handleAsk(h.nl_query)}
                                                style={{ padding: '10px', borderRadius: '6px', border: '1px solid var(--border)', marginBottom: '6px', cursor: 'pointer', fontSize: '12px', color: 'var(--text)', transition: 'border-color 0.15s' }}
                                                onMouseOver={e => { e.currentTarget.style.borderColor = 'var(--accent)'; e.currentTarget.style.background = 'rgba(99,102,241,0.06)'; }}
                                                onMouseOut={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.background = 'transparent'; }}>
                                                <div style={{ marginBottom: '4px', lineHeight: '1.4' }}>{h.nl_query}</div>
                                                <div style={{ display: 'flex', gap: '8px', fontSize: '10px', color: 'var(--text-dim)' }}>
                                                    <span>{new Date(h.created_at).toLocaleDateString()}</span>

                                                    {h.feedback === 'thumbs_down' && <span style={{ color: '#ef4444' }}>👎</span>}

                                            </div>

                                {sidebarTab === 'domains' && (
                                    <div>
                                        {domainInfo.length === 0 ? (
                                            <div style={{ color: 'var(--text-dim)', fontSize: '13px', textAlign: 'center', padding: '20px 0' }}>

                                            </div>
                                        ) : (
                                            <>
                                                <div style={{ fontSize: '11px', color: 'var(--text-dim)', marginBottom: '12px', padding: '8px', background: 'rgba(99,102,241,0.06)', borderRadius: '4px' }}>
                                                    <div style={{ fontWeight: 600 }}>Coverage:</div>
                                                    <div>{domainInfo.length} domains, {kgTableData.length} tables</div>
                                                </div>
                                                {domainInfo.map((domain, di) => (
                                                    <div key={di} style={{ marginBottom: '12px', padding: '10px', border: '1px solid var(--border)', borderRadius: '6px' }}>
                                                        <div style={{ fontWeight: 600, fontSize: '12px', color: 'var(--text)', marginBottom: '4px' }}>{domain.name}</div>
                                                        <div style={{ fontSize: '11px', color: 'var(--text-dim)', marginBottom: '4px' }}>
                                                            {domain.tableCount} table{domain.tableCount !== 1 ? 's' : ''}
