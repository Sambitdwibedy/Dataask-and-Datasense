                    {/* KG Viewer Overlay — rendered here with selectedApp so it works for end users */}
                    <KGViewerOverlay appId={selectedApp} show={showKGViewer} onClose={() => setShowKGViewer(false)} />

                    {/* KG VIEWER — old inline version (removed) */}
                    {false && (() => {
                        const _KGViewer_REMOVED = () => {
                            const svgRef = React.useRef(null);
                            const zoomRef = React.useRef(null);
                            const gRef = React.useRef(null);
                            const [kgSearch, setKgSearch] = React.useState('');
                            const [kgSelectedNode, setKgSelectedNode] = React.useState(null);
                            const [kgViewMode, setKgViewMode] = React.useState('tables');   // tables | concepts | full
                            const [kgDomainFilter, setKgDomainFilter] = React.useState('all');

                            const kgZoomIn = () => {
                                if (!svgRef.current || !zoomRef.current) return;
                                d3.select(svgRef.current).transition().duration(300).call(zoomRef.current.scaleBy, 1.4);
                            };
                            const kgZoomOut = () => {
                                if (!svgRef.current || !zoomRef.current) return;
                                d3.select(svgRef.current).transition().duration(300).call(zoomRef.current.scaleBy, 0.7);
                            };
                            const kgZoomFit = () => {
                                if (!svgRef.current || !zoomRef.current || !gRef.current) return;
                                const width = svgRef.current.clientWidth;
                                const height = svgRef.current.clientHeight;
                                const bounds = gRef.current.node().getBBox();
                                if (bounds.width === 0 || bounds.height === 0) return;
                                const scale = Math.min(0.9 * width / bounds.width, 0.9 * height / bounds.height, 2);
                                const tx = width / 2 - scale * (bounds.x + bounds.width / 2);
                                const ty = height / 2 - scale * (bounds.y + bounds.height / 2);
                                d3.select(svgRef.current).transition().duration(500).call(zoomRef.current.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
                            };

                            React.useEffect(() => {
                                if (!svgRef.current || typeof d3 === 'undefined') return;
                                if (kgTableData.length === 0) return;

                                const svg = d3.select(svgRef.current);
                                svg.selectAll('*').remove();

                                const width = svgRef.current.clientWidth;
                                const height = svgRef.current.clientHeight;
                                svg.attr('viewBox', [0, 0, width, height]);

                                // Stable domain color assignment — matches filter bar palette order (from domainInfo)
                                const domainColors = {};
                                const palette = ['#6366f1','#8b5cf6','#06b6d4','#22c55e','#f59e0b','#ef4444','#ec4899','#14b8a6','#f97316','#a855f7','#0ea5e9','#84cc16','#d946ef','#f43f5e','#2dd4bf','#facc15','#fb923c','#c084fc'];
                                domainInfo.forEach((d, i) => { domainColors[d.name] = palette[i % palette.length]; });
                                let colorIdx = domainInfo.length;

                                // Pre-compute relationship degree per table (how many FKs reference it)
                                const relDegree = {};
                                kgRelationshipData.forEach(r => {
                                    relDegree[r.from_table] = (relDegree[r.from_table] || 0) + 1;
                                    relDegree[r.to_table] = (relDegree[r.to_table] || 0) + 1;
                                });

                                // Build ALL nodes first (for stable color mapping), then filter
                                const allNodes = kgTableData.map(t => {
                                    const meta = typeof t.entity_metadata === 'string' ? JSON.parse(t.entity_metadata || '{}') : (t.entity_metadata || {});
                                    const domain = meta.domain || meta.module || 'Unclassified';
                                    if (!domainColors[domain]) domainColors[domain] = palette[colorIdx++ % palette.length];
                                    const entityType = (meta.entity_type || 'UNKNOWN').toUpperCase();
                                    const degree = relDegree[t.table_name] || 0;
                                    // Size by relationship degree: more connections = larger node (min 5, max 18)
                                    const nodeSize = Math.max(5, Math.min(18, 5 + degree * 1.2));
                                    return {
                                        id: t.table_name,
                                        label: t.entity_name || t.table_name,
                                        domain,
                                        entityType,
                                        color: domainColors[domain],
                                        size: nodeSize,
                                        degree,
                                        description: meta.business_description || meta.description || '',
                                        columnCount: t.column_count || 0,
                                        nodeType: 'TABLE'
                                    };
                                });

                                // Apply domain filter
                                let nodes = kgDomainFilter === 'all' ? [...allNodes] : allNodes.filter(n => n.domain === kgDomainFilter);

                                // Apply search filter
                                const searchLower = kgSearch.toLowerCase().trim();
                                if (searchLower) {
                                    const matchIds = new Set();
                                    nodes.forEach(n => {
                                        if (n.id.toLowerCase().includes(searchLower) || n.label.toLowerCase().includes(searchLower) || n.description.toLowerCase().includes(searchLower) || n.domain.toLowerCase().includes(searchLower))
                                            matchIds.add(n.id);
                                    });
                                    // Include neighbors of matched nodes
                                    kgRelationshipData.forEach(r => {
                                        if (matchIds.has(r.from_table)) matchIds.add(r.to_table);
                                        if (matchIds.has(r.to_table)) matchIds.add(r.from_table);
                                    });
                                    nodes = nodes.filter(n => matchIds.has(n.id));
                                }

                                const nodeIds = new Set(nodes.map(n => n.id));

                                // Build links from relationships, filtered to visible nodes
                                let links = kgRelationshipData
                                    .filter(r => nodeIds.has(r.from_table) && nodeIds.has(r.to_table))
                                    .map(r => ({
                                        source: r.from_table,
                                        target: r.to_table,
                                        label: `${r.from_column} → ${r.to_column}`,
                                        type: r.rel_type || 'FK'
                                    }));

                                // View mode filtering
                                if (kgViewMode === 'tables') {
                                    // Tables & Joins: only show tables that have at least one relationship (connected component)
                                    const connectedIds = new Set();
                                    links.forEach(l => { connectedIds.add(l.source); connectedIds.add(l.target); });
                                    // Keep all nodes if filtered set is small (< 30), otherwise trim orphans
                                    if (nodes.length > 30) nodes = nodes.filter(n => connectedIds.has(n.id));
                                    // Re-filter links after node pruning
                                    const finalIds = new Set(nodes.map(n => n.id));
                                    links = links.filter(l => finalIds.has(l.source) && finalIds.has(l.target));
                                } else if (kgViewMode === 'concepts') {
                                    // Business Concepts: add domain hub nodes and connect tables to them
                                    const domainHubs = {};
                                    nodes.forEach(n => {
                                        if (!domainHubs[n.domain]) {
                                            domainHubs[n.domain] = {
                                                id: `domain:${n.domain}`, label: n.domain, domain: n.domain,
                                                entityType: 'DOMAIN', color: domainColors[n.domain] || '#666',
                                                size: 18, description: `Domain: ${n.domain}`, columnCount: 0,
                                                nodeType: 'DOMAIN'
                                            };
                                        }
                                    });
                                    Object.values(domainHubs).forEach(hub => nodes.push(hub));
                                    // Add domain membership links
                                    nodes.filter(n => n.nodeType === 'TABLE').forEach(n => {
                                        links.push({ source: `domain:${n.domain}`, target: n.id, label: '', type: 'BELONGS_TO' });
                                    });
                                }
                                // 'full' mode = no additional filtering

                                // Zoom behavior
                                const g = svg.append('g');
                                gRef.current = g;
                                const zoom = d3.zoom()
                                    .scaleExtent([0.1, 5])
                                    .on('zoom', (event) => g.attr('transform', event.transform));
                                zoomRef.current = zoom;
                                svg.call(zoom);

                                // Arrow markers
                                const defs = svg.append('defs');
                                defs.append('marker')
                                    .attr('id', 'kg-arrow')
                                    .attr('viewBox', '0 -3 6 6')
                                    .attr('refX', 18).attr('refY', 0)
                                    .attr('markerWidth', 6).attr('markerHeight', 6)
                                    .attr('orient', 'auto')
                                    .append('path').attr('d', 'M0,-3L6,0L0,3').attr('fill', '#555');

                                // Force simulation — tuned per view mode
                                const simulation = d3.forceSimulation(nodes)
                                    .force('link', d3.forceLink(links).id(d => d.id)
                                        .distance(d => d.type === 'BELONGS_TO' ? 60 : 90)
                                        .strength(d => d.type === 'BELONGS_TO' ? 0.7 : 0.4))
                                    .force('charge', d3.forceManyBody().strength(d => d.nodeType === 'DOMAIN' ? -500 : -200))
                                    .force('center', d3.forceCenter(width / 2, height / 2))
                                    .force('collision', d3.forceCollide().radius(d => (d.size || 10) + 8))
                                    .force('x', d3.forceX(width / 2).strength(0.03))
                                    .force('y', d3.forceY(height / 2).strength(0.03));

                                // Draw edges
                                const link = g.append('g')
                                    .selectAll('line')
                                    .data(links)
                                    .join('line')
                                    .attr('stroke', d => d.type === 'BELONGS_TO' ? '#444' : '#555')
                                    .attr('stroke-opacity', d => d.type === 'BELONGS_TO' ? 0.3 : 0.6)
                                    .attr('stroke-width', d => d.type === 'BELONGS_TO' ? 0.8 : 1.5)
                                    .attr('stroke-dasharray', d => d.type === 'BELONGS_TO' ? '3,3' : 'none')
                                    .attr('marker-end', d => d.type === 'BELONGS_TO' ? '' : 'url(#kg-arrow)');

                                // Draw nodes
                                const node = g.append('g')
                                    .selectAll('g')
                                    .data(nodes)
                                    .join('g')
                                    .attr('cursor', 'pointer')
                                    .call(d3.drag()
                                        .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                                        .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
                                        .on('end', (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
                                    );

                                // Domain hub nodes get a diamond shape, tables get circles
                                node.each(function(d) {
                                    const el = d3.select(this);
                                    if (d.nodeType === 'DOMAIN') {
                                        el.append('rect')
                                            .attr('x', -12).attr('y', -12).attr('width', 24).attr('height', 24)
                                            .attr('rx', 3)
                                            .attr('transform', 'rotate(45)')
                                            .attr('fill', d.color || '#666')
                                            .attr('stroke', '#fff').attr('stroke-width', 2).attr('opacity', 0.95);
                                    } else {
                                        el.append('circle')
                                            .attr('r', d.size || 10)
                                            .attr('fill', d.color || '#666')
                                            .attr('stroke', 'rgba(255,255,255,0.3)').attr('stroke-width', 1).attr('opacity', 0.9);
                                    }
                                });

                                node.append('text')
                                    .attr('dy', d => d.nodeType === 'DOMAIN' ? 26 : (d.size || 10) + 12)
                                    .attr('text-anchor', 'middle')
                                    .attr('fill', d => d.nodeType === 'DOMAIN' ? '#fff' : '#bbb')
                                    .attr('font-size', d => d.nodeType === 'DOMAIN' ? 11 : 9)
                                    .attr('font-weight', d => d.nodeType === 'DOMAIN' ? 700 : 400)
                                    .text(d => {
                                        const name = d.label || d.id;
                                        return name.length > 22 ? name.substring(0, 20) + '...' : name;
                                    });

                                // Hover: highlight connected edges and dim others
                                node.on('mouseover', (event, d) => {
                                    link.attr('stroke-opacity', l => {
                                        const src = typeof l.source === 'object' ? l.source.id : l.source;
                                        const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                                        return (src === d.id || tgt === d.id) ? 1 : 0.1;
                                    }).attr('stroke-width', l => {
                                        const src = typeof l.source === 'object' ? l.source.id : l.source;
                                        const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                                        return (src === d.id || tgt === d.id) ? 2.5 : 1;
                                    });
                                    node.attr('opacity', n => {
                                        if (n.id === d.id) return 1;
                                        const connected = links.some(l => {
                                            const src = typeof l.source === 'object' ? l.source.id : l.source;
                                            const tgt = typeof l.target === 'object' ? l.target.id : l.target;
                                            return (src === d.id && tgt === n.id) || (tgt === d.id && src === n.id);
                                        });
                                        return connected ? 1 : 0.2;
                                    });
                                }).on('mouseout', () => {
                                    link.attr('stroke-opacity', 0.6).attr('stroke-width', 1.5);
                                    node.attr('opacity', 1);
                                }).on('click', (event, d) => {
                                    event.stopPropagation();
                                    setKgSelectedNode(d);
                                });

                                svg.on('click', () => setKgSelectedNode(null));

                                // Tick
                                simulation.on('tick', () => {
                                    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                                        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
                                    node.attr('transform', d => `translate(${d.x},${d.y})`);
                                });

                                // Auto-fit after settling
                                simulation.on('end', () => {
                                    const bounds = g.node().getBBox();
                                    if (bounds.width > 0 && bounds.height > 0) {
                                        const padding = 40;
                                        const scale = Math.min((width - padding * 2) / bounds.width, (height - padding * 2) / bounds.height, 1.5);
                                        const tx = width / 2 - (bounds.x + bounds.width / 2) * scale;
                                        const ty = height / 2 - (bounds.y + bounds.height / 2) * scale;
                                        svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
                                    }
                                });

                                return () => simulation.stop();
                            }, [kgTableData, kgRelationshipData, kgViewMode, kgDomainFilter, kgSearch]);

                            // Filter search
                            const filteredNodeInfo = kgSelectedNode ? (() => {

                        };

                    })()}

                    {/* SETTINGS MODAL */}
                    {showSettings && (
                        <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.85)', zIndex: 2000, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                            <div style={{ background: 'var(--bg-surface)', border: '1px solid var(--border)', borderRadius: '8px', padding: '24px', minWidth: '400px', maxWidth: '500px' }}>

                                        {(() => {
                                            const m = selectedAppInfo?.config?.query_engine?.model || 'claude-sonnet-4-20250514';
                                            if (m.includes('haiku')) return 'Claude Haiku 4.5';
